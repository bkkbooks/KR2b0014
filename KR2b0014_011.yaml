body:
  text: 三年十九而猶有童心比葬三易衰君子知其蔡靈侯般元夏魯襄公薨魯人立公子禱立展輿又廢之冬展與弒莒子自立不終莒犂比公生去疾及展輿既四禱元魯昭公魯伐莒取鄆夏鄭放遊楚于吳秦伯之弟春晉趙武楚公子圍及諸侯之大夫會于虢奔吳冬楚公子圍弒郟敖自立圍弟比奔晉針出奔晉秋莒去疾自齊入於莒莒展輿出奔鄭黑肱五政出多門公室始卑夏晉侯娶少薑楚靈王虔元晉韓起為政諸大夫強氏而代其位傷疾作而不果子産殺之於齊尋卒秋鄭子晢將作亂欲去遊六侯使春齊其公室之將衰也冬北燕簡公欲去諸大夫晏嬰請繼室于晉晉侯許之嬰與叔向語皆知殺公之外嬖公出奔齊而立其寵人大夫比以七晉晉人許之夏楚會春楚靈王求諸侯于賴申無宇曰楚禍之首將在此矣召諸侯而來諸侯于申執徐子以伐吳執齊慶封殺之遂滅不違民其居乎伐國而克王心子甲八室季孟叔孫盡征之而春魯人舍中軍四分公女夏莒牟夷以牟婁及防兹奔魯冬楚子貢于公楚子娶于晉晉韓起羊舌肹如楚送弟蹶由犒師楚子執之以諸侯伐吳吳子使其九亥與寺人栁譖華合秦哀公元夏宋華吳吳敗其師于房鍾子蕩歸罪於薳泄而殺之比逐之秋楚薳泄伐徐吳救之令尹子蕩伐納簡公齊侯伐燕十為章華之臺願與諸侯落之使薳春燕人賂齊侯不克而還楚子縶有足疾立少子元晉人反戚田于衛啓疆召魯侯魯如楚秋衛襄公薨長子孟十一妃生公子留留有寵屬諸司徒招與公子過衛靈公元元陳哀公元妃生太子偃師二出奔鄭晉侯成虒祁之宫諸侯畢賀歸而皆哀公有廢疾招過殺太子而立留夏哀公縊留奉孫吳以伐陳遂滅陳有二心冬楚公子棄疾十二會楚子于陳春諸侯之大夫張躍率隂戎伐頴王讓于晉晉人致閻田楚人遷許于夷晉與周爭閻田晉梁丙十三出奔魯齊公室益弱陳氏始大夏齊陳氏鮑氏逐欒施髙疆施疆十四夷宋元晉昭公子棄疾圍蔡諸侯之大夫會于厥憗謀救蔡也公佐元夏楚子虔誘蔡侯般殺之於申楚公陳蔡不羹申無宇曰末大必折尾大不掉必害冬楚滅蔡執蔡世子有以歸用之楚子大城國於十五靈王使蕩侯圍徐次於乾溪以為之援冬魯南蒯謀去季氏不克以費叛楚不吉投龜詬天民患王之無厭故從亂如歸靈王驕侈欲求周九鼎又卜曰余尚得天下十六從以蔡公棄疾命召公子比公子黑肱遂奉蔡平侯廬陳惠公吳鄭定公寧元夏楚觀比為王黑肱為令尹楚師潰於乾溪靈王縊棄棄疾帥陳蔡不羮許葉之師以入楚殺太子祿昭公合諸侯盟于平丘以邾莒之訴執魯季孫疾殺比及黑肱而自立封陳蔡復遷邑秋晉如意十七秋莒蒲餘侯殺公子意恢逐郊公而楚平王居元春費人逐南蒯蒯奔齊之弟庚輿立著丘公戌甲十八伐鮮虞圍鼓鼓人或請以曹平公須元秋晉荀吳竭力盡然後取之吳子夷末薨將立季札季城叛弗許使鼓人殺叛人而繕守備鼓人告食夷末之子僚札逃國人立十九子殺之齊侯伐徐徐子及吳王僚元春楚子誘戎蠻回如晉還曰晉君幼弱六卿強而奢傲將因是莒人從齊侯盟且賂之無伯故也夏魯子服常能無卑乎以習習實為二十滅陸渾冬吳伐楚楚司馬晉頃公去疾元秋晉荀吳敗吳師子魚大二十一王子勝遷許于白羽夏宋衛陳鄭災冬楚二十二悼曹為少師無極無寵乃為建聘婦于秦既而勸王公午元楚平王使伍奢為太子建師費無極太子止之藥薨太子奔晉春秋書止弒其君取之又大城城父而置太子焉夏許悼公飲二十三奔宋又奔鄭楚子殺伍奢及其子尚少春楚費無極譖太子及伍奢將叛太子死鳥北宫氏攻齊氏滅之衛侯反國殺宣薑子員奔吳秋衛齊豹殺衛侯之兄縶衛侯如亂出奔陳華登奔吳冬宋華亥向寧華定作二十四夏宋華貙召蔡悼侯東國元師救之宋師敗宋公欲出厨人濮止之晉齊衛華亥向寧華定復入于宋南里以叛華登以吳于蔡平侯之弟東國使蔡人逐太子朱而立之救宋大敗華氏圍諸南里冬楚費無極取貨二十五景王愛長庶子朝劉耿單旗惡之王與春楚薳越救華氏華氏向氏出奔楚孟立王子猛子朝攻劉王室亂王猛居于皇復賓孟謀殺劉單而立朝未及而崩夏劉單殺賓劉單立其母弟丐入于王城猛尋卒敬王丐元年孫婼莒子庚輿虐秋國人逐之出春魯人取邾師晉人執魯行人叔于雞父胡子髠沈子逞滅獲陳夏齧天王出奔魯齊人納郊公吳敗頓胡沈蔡陳許之師氏立王子朝居于狄泉尹二伯涖問周故立於乾祭而問於蔡昭侯申元春晉侯使士景子以寧王室獻子與韓宣子圖之乃召諸侯期介衆乃辭王子朝不納其使子太叔言於范獻年以明申甲三王室魯昭公與臧昭伯郈昭伯夏諸侯之大夫會于黃父以謀意如請以五乘亡弗許叔孫氏孟氏救之公徒謀去季氏子家羈曰不可不聽秋伐季氏季孫次于陽州敗公奔齊四鄆以處魯侯齊侯將納魯侯季氏宋景公欒南元春齊侯從魯取鄟陵晉知躒趙鞅帥師納王冬召伯盈逐王賂梁丘據圍成不克而還秋齊侯魯侯盟于及周之典籍奔楚王徙都成周子朝尹氏召氏毛伯奉王子朝五春吳師伐楚昭王軫元楚費無極譖郤宛殺之秋晉士鞅及諸侯之楚圍潛夏吳諸樊之子光弒王僚而自立季孫而以難復冬諸侯之師戍成周宋人大夫盟于扈令戍周且謀納魯侯士鞅取貨于人立其弟野執曹悼公曹六侯如晉不見受次于乾侯夏曹聲公野吳王闔廬元春魯廬召伍員寵任之與謀國事晉殺祁盈楊食我吳王闔七春魯侯歸于鄆鄭獻公蠆元侯王殺召伯盈及尹固齊人卑之復入晉次于乾八燭庸奔楚楚子封吳公子掩餘公子吳子問伐楚之謀於伍員員曰為三軍以肄焉之於養冬吳王闔閭滅徐徐子章羽奔楚繼之必大克之從之楚於是乎始病彼出則歸彼歸則出既罷而後以三軍九公午晉定季孫會晉荀躒於適厯請從君以歸躒與季孫元春晉侯將以師納魯侯范獻子請召季孫掩耳而走冬邾黑肱以濫奔魯賤而春秋書如乾侯昭公不肯歸曰見夫人者有如河荀躒義也名懲不十大夫于狄泉城成周罷戍人魯昭夏吳始伐越冬晉魏舒合諸侯之公矣民不知君何以得國是以為君慎名與器公薨于乾侯晉史墨曰政在季氏於此君也四公之弟通弒聲公不可以假人曹平十一元夏魯昭公之喪魯定公宋曹隱公通其弟公子宋歸于魯魯人立十二其師于豫章遂圍巢克之秋楚令尹囊瓦伐吳吳敗午甲十三裘與馬弗與三年止之蔡侯歸如晉蔡昭侯唐成公朝于楚囊瓦欲得其子為質而請伐楚以其子及大夫之十四寅求貨於蔡侯弗得乃春諸侯會于召陵晉荀大敗囊瓦於柏舉囊瓦奔鄭吳入郢楚昭王奔辭蔡侯蔡為晉滅沈冬蔡侯及吳子唐侯伐楚于秦曹聲公之弟露弒隱公隨伍胥鞭平王尸申包胥求救十五曹靖公露陳懷公栁敗吳師吳夫槩王歸自立以與吳子戰而大敗元春殺子朝于楚夏越入吳秦師救楚大意如卒家臣陽虎囚其子斯而專魯政奔楚楚子還入郢秋楚滅唐魯季孫十六西喜曰乃今可為矣於是遷郢於鄀而改紀其春鄭滅許夏吳人敗楚師楚國大懼令尹子社冬儋翩以子朝之徒作亂王處于姑蕕政以定楚國秋陽虎盟魯侯及三桓於周十七陽虎居之以為政秋齊侯鄭伯盟于鹹齊春儋翩入于儀栗以叛齊人歸魯鄆陽關始叛者也齊國夏伐魯冬王入于王城人執衛行人北宫結以侵衛齊侯衛侯盟于沙十八衛侯于鄟澤捘其手衛復叛秋晉士鞅侵春魯侯侵齊夏齊國夏伐魯晉涉他盟季孫斯于蒲圃而殺之斯入于孟氏虎劫魯侯鄭遂侵衛冬陽虎欲去三桓而代其位將享克入于歡闡以叛及叔孫以攻孟氏弗十九夏魯伐陽關陽虎奔陳閔公越曹陽元君富於季氏此虎所欲傾覆也齊人執之逃奔齊請伐魯鮑文子曰魯衆庶猶睦若之何取之儀衛侯會之秦哀公薨孫惠公立宋乂奔晉適趙氏秋齊侯伐晉夷二十公鄭秦惠齊人歸魯鄆歡龜隂之田晉趙鞅圍衛殺涉聲公勝元夏魯侯及齊侯會于夾谷孔子相宋公之弟辰暨仲他石彄公子地出奔陳他魯侯犯以郈叛秋郈人駟赤逐之犯奔齊二十一心從之大為宋患宋公寵向魋故也春辰他彄地自陳入于蕭以反樂大二十二郈公山弗擾以費人襲魯弗克遂奔齊遂夏魯仲由為季氏宰將墮三都叔孫氏墮不可魯侯圍成弗克墮費將墮成公斂處父辰甲二十三侯伐晉河春齊侯衛之姻也秋范氏中行氏伐趙氏之宫趙鞅奔晉內晉趙鞅殺邯鄲午午荀寅之甥也寅范吉射伐范中行氏荀寅范吉射奔朝歌韓魏以趙氏陽晉人圍之冬荀躒韓不信魏曼多奉晉侯以侯許之為請晉二十四魯楚滅頓夏吳伐越越子越王勾踐元春衛公叔戍奔朝歌齊侯魯侯會于牽以救之衛靈公為夫勾踐敗吳于攜李闔閭傷將指而薨晉人圍羞之將殺南子弗克出奔于宋人南子召宋朝于宋太子蒯聵二十五差元吳王夫滅胡春楚二十六聽命師還蔡遷於吳吳王夫差魯哀公蔣元春楚子圍蔡蔡人差許之子胥諌曰去疾莫如盡不聽退曰二十敗越於夫椒勾踐棲於會稽請委國為臣妾夫其為沼乎年之外吳二十七子輒晉趙鞅納蒯瞶于戚夏衛靈公薨衛人立蒯瞶之戰于鐡鄭師敗績冬蔡遷于州來秋齊人輸范氏粟鄭罕達送之與晉師二十八戚夏趙鞅殺萇弘冬趙鞅圍朝歌荀寅奔邯衛出公輒燕獻公元春齊國夏衛石曼姑圍鄲二十九蠻子赤歸于楚秋趙鞅圍邯鄲冬春蔡公孫翩弒昭侯夏晉人執戎八邑會鮮虞納荀寅于柏人荀寅奔鮮虞齊國夏伐晉取三十侯朔元春秦悼公蔡成荼故不立太子公疾使國惠子髙昭子立荼置晉圍桓人荀寅范吉射奔齊齊景公愛幼子子皆出亡公子陽生奔魯羣公子于萊秋公薨羣公三十一春吳伐陳齊孺子荼元國髙奔魯陳乞使逆公子陽生于魯而立之殺楚子救陳夏齊陳乞鮑牧以兵逐國子髙子荼孺子三十二侯會吳于鄫吳責百牢于魯秋齊悼公陽生楚惠王章元夏魯于曹伯陽伯陽説之使為政乃背晉而姦宋宋魯侯入邾執邾子益以歸曹公孫疆言霸説人不救人伐之晉寅甲三十三殺之吳伐魯及萊門春宋公滅曹執曹伯陽取歡及闡又請師于吳魯人歸季姬悼公喜歸齊悼公逆季姬于魯魯人弗與悼公怒伐魯魯人歸邾隱公于邾歡及闡又殺鮑牧及胡姬三十四師吳子怒與春齊侯辭吳宋公伐鄭吳城刋溝通江淮魯謀伐齊宋取鄭師于雍丘秋三十五隱公春邾吳子三日哭將以舟師自海入齊齊人敗之乃奔齊吳子魯侯伐齊齊人弒悼公以説于吳期伐陳吳延州來季子救陳還夏晉趙鞅伐齊冬楚子三十六壬元齊簡公越子朝且獻賂焉子胥曰是豢吳也吳子及魯春齊國書髙無丕伐魯戰于郊夏吳將伐齊以死冬孔子自衛反魯正禮樂刪詩書侯大敗齊師于艾陵獲國書歸賜子胥屬鏤三十七吳人將執衛侯子貢説太宰嚭乃止夏魯侯會吳于槖臯衛侯會吳于鄖三十八黃池爭長越子伐吳入之獲太子友吳子惡春鄭罕達取宋師于嵒夏吳子晉侯會于七人于幕下其聞也自剄三十九齊闞止有寵於簡公使春魯人獲麟孔子作春秋氏夏陳恆攻止殺之遂執簡公于舒州弒之立為政諸御鞅曰陳闞不可並也弗聽止欲去陳於公公討之魋入于曹以叛遂奔衛其弟驁恆專齊政宋桓魋之寵害四十公驁齊平使子貢如齊齊歸成於魯冬衛蒯瞶因衛渾衛莊公蒯瞶元春魯公孫宿以成叛如齊魯而自立仲由死之輒奔魯又奔齊良夫孔伯姬以入于衛劫孔悝以逐輒四十一伯姬出奔宋楚太子建之子勝在吳子西召夏孔子卒衛莊公飲孔悝酒而遣之孔悝載子期子閭劫惠王自為令尹葉公率方城外人之葉公諌不聽使為白公秋白公作亂殺子西公滅之以入攻白四十二子敗吳於笠澤秋楚滅陳春衛太子疾殺渾良夫越立公孫般師晉師還莊公復入于衛石圃作亂衛莊公不朝于晉冬晉趙鞅伐衛逐莊公而立靈公之子起執般師以歸莊公死于戎州已氏齊人伐衛子甲四十三侯衛師于鄾夏衛石圃逐其君起起奔齊衛侯輒起元春宋公殺右師皇瑗楚公子寧敗巴逐石圃自齊復歸元王仁元年後元春越人侵楚秦厲共公元衛出公二鄭人會于廩夏齊人魯人于艾及郊敗之遂圍吳丘謀伐晉冬越敗吳師三越人始通使于上晉出公錯元夏國四奔越越圍吳三年冬吳師潰夫差請委夏邾隱公自齊奔越越人歸之邾太子革死者有知吾何面目以見子胥也國為臣妾勾踐不許夫差乃自殺曰五瑤伐齊夏晉荀卒於犂丘敗齊髙元六伐齊取廩丘魯哀公以嬖妾為蔡聲侯産元夏晉侯及魯臧石越越太子適郢將妻公而多與之地季孫懼因夫人以其子荆為太子國人始惡之哀公朝于賂焉乃止太宰嚭以納七輒輒奔宋請師于越魯侯歸夏衛褚師北及諸大夫逐衛侯語相侵也公與大夫始有惡自越季康子孟武伯逆於五梧八庸宋樂茷魯夏越臯如后開守郫而納公公不敢入師還立蒯瞶之弟黚叔孫舒伐衛納出公衛公孫彌牟重賂越人申與啓畜于公宫未立而薨大尹矯命立啓六卿出公卒于越宋景公無子取公孫周之子得尹而立得逐啓及大貞定王介元年伐鄭齊陳成子救之晉師還魯衛悼公黚宋昭公得元晉荀瑤故出奔越魯人立其子寧哀公將以越伐魯而去三桓戌甲二寧元魯悼公三四五趙襄子襄子由是惎知伯燕孝公元晉荀瑤圍鄭耻六七易元鄭哀公八取其王成秦伐大荔九十十一申甲十二知伯國諌曰主不備難必至矣曰我不為難誰晉三卿宴於藍臺知襄子戲韓康子而侮假規害人况人之君相乎弗聽敢興之對曰蚋蟻蜂蠆皆能十三元侯元晉晉哀公驕蔡攻公公出奔齊昭公孫忌善於知伯而早死故知氏韓氏趙氏魏氏專政出公欲去之四卿反之國事皆決於知伯知伯立忌之子驕而相十四鄭人弒哀公而立齊宣公就匝元弟丑聲公之十五丑元鄭共公十六韓魏與之請地於趙晉知伯請地於韓魏知伯以晉師圍而灌之城不沒者三板襄子夜趙襄子不與知伯怒攻趙氏趙襄子走保晉陽魏與襄子合攻知伯滅之分其地使張孟談私於韓康子魏桓子韓十七十八十九蔡侯齊元衛敬公費二十公元燕成二十一午甲二十二蔡楚滅二十三二十四杞楚滅二十五渠虜其秦伐義王二十六二十七公元秦躁二十八疾立是為哀王崩太子去叔弟嵬攻殺叔是為考王封其弟於河南以續王五月弟叔襲殺去疾而自立是為思王五月桓公秦南鄭反周公之職是為東周考王嵬元年二三辰甲四栁元晉幽公五六七八公元燕閔九十糾元楚滅莒楚簡王仲衛昭公十一元魯元公嘉十二立其弟懷公秦躁公薨國人十三公元秦懷寅甲十四十五昭公而代之衛公子亹弒威烈王午元年以兄伯魯之不立不肯置嗣以伯衛懷公亹元晉趙襄子卒襄子公懷公太子曰昭子早卒國人立其子靈公魯之孫浣為後浣生烈侯秦庶長嵬弒懷二公元秦靈三鄭殺幽公鄭人立其弟駘鄭幽公已元晉韓武子伐四駘元鄭繻公五六斯以兵誅亂者立幽公之子止晉幽公夜竊出邑中盜殺之魏七公晉烈元八子甲九十十一公而代之秦靈公衛敬公之孫頽弒懷立其季父簡公名衛薨國人廢其子獻公而十二慎公頽元秦簡公衛十三十四十五十六十七衍元魯穆公十八斯使晉魏至鄭韓虔伐鄭取雍丘齊人伐魯取成樂羊伐中山克之使其子擊守中山又伐秦戌甲十九魏斯好賢以卜子夏田子方為師過段楚聲王當元鄭人敗韓氏于負黍吳起為西河守魏由是強於三晉于木之廬必式之任李克為政用二十二十一二十二貸元齊康公右伏羲氏至周威烈王二十二年臣今所補二十三購由元初命晉大夫魏斯韓虔趙籍魏文侯斯韓景侯虔趙烈侯籍宋悼公至是三大夫始受天子之命禮之紀綱盡矣為諸侯先是大夫専國者多矣未有敢自君者二十四聲王國人立其子類燕僖公元盜殺楚安王驕元年類元楚悼王二丘鄭人圍韓陽翟趙烈魏人韓人趙人伐楚至桑武侯立侯薨弟三取趙武侯元秦惠公韓烈侯四殺其相駟子陽楚人圍鄭鄭人申甲五相俠纍盜殺韓六公而立幽公之弟乙鄭駟子陽之黨弒繻七田鄭康宋休公元公乙八九十頃元晉孝公十一于海上食一城齊田和遷康公其祀以奉十二十三於濁澤求為諸侯文侯為之齊田和會魏文侯楚人衛人王許之請于王十四午甲十五侯薨國人復立烈侯之蜀伐秦取南鄭趙武章太子十六齊大公田和元初命田和為諸侯秦出公魏武侯擊韓文侯趙敬侯章十七及其母于淵秦數有亂益衰弱三晉侵奪秦庶長改逆獻公于河曲而立之沈出子西地其河十八吳起之賢譖諸武侯吳起奔楚楚悼秦獻公齊桓公午元魏相公叔疾官罷公族疏逺者以撫養戰士故楚國強盛諸王恱之以為相吳起乃為明法審令廢不急之貴戚怨之侯畏服而十九二十二十一室大臣攻吳楚悼王薨宗位誅為亂者七十餘家起殺之并中王尸肅王即二十二臧元楚肅王二十三薨齊威王即位齊始強於天下齊康公薨田氏絶其祀齊桓公二十四王因齊威元齊辰甲二十五俱元晉靖公二十六奮元趙魏趙韓哀公魯共公家人而分其地共廢晉靖公為烈王喜元年徙都之韓滅鄭因二種元趙成侯三四訓宋辟衛聲公桓公元公兵燕五魏武侯薨無適子公子罃與公中緩韓嚴遂弒哀侯韓人立其子懿侯內亂爭立國六來朝楚肅王薨弟良夫立魏惠王罃韓懿侯元齊威王七宣楚趙成侯因魏之亂伐魏大敗魏師于濁澤遂圍王良夫宋公剔成元王崩弟扁立韓懿侯趙不可韓怒以其師夜去趙師亦歸魏罃遂滅魏趙欲弒罃立公中緩割地而退韓欲兩分之緩顯王扁元年寅甲二三四五晉之師于石秦獻公敗三子錫以黼黻門斬首六萬天六七時六國強大皆擯斥秦秦獻公薨孝公即位是郡秦孝公乃發憤修政欲興穆公之業夷翟遇之楚有巴巫黔中魏有華隂上八公衛秦孝有能出奇計強秦者尊用之魏相公叔座知衛成疾速燕文公元秦孝公下令求賢師羣臣衛鞅西入秦孝公與語大悅鞅之賢薦之魏惠王王不能用九十以衛鞅秦孝公樂成難與慮始孝公卒用鞅言變法令明爵秩為左庶長鞅欲變法秦大臣固爭鞅曰民可與法鞅黔其師公孫刑其傅公子虔明日秦人皆姦慝務耕織禁墮遊尊戰士下無功太子犯邑大治趨令鄉十一侯元韓昭子甲十二十三十四十五少梁魏惠王伐趙圍邯鄲趙告急于齊魯康公毛元秦人敗魏人于元里取十六用臏言直趣大梁魏釋趙而還自救與齊師齊威王使田忌將兵以孫臏為師以救趙忌涓自知不如臏誘而刑之臏逃入齊田忌薦之戰于桂陵魏師敗績臏與魏將龎涓同學兵法王用之威王威十七十八修法制外應諸侯韓由是韓昭侯以申不害為相內興十九縣置令丞凡三十一縣廢井田開阡陌秦徙都咸陽初并小都鄉邑聚以為縣子緤與太子爭立不勝奔韓皆衛鞅之謀也趙威侯薨公二十侯元趙肅二十一戌甲二十二二十三服屬于三晉衛更貶號曰侯二十四偃元魯景公二十五二十六諸侯畢賀秦伯使秦益強天子致伯於逢澤以朝天子公子少官會諸侯二十七二十八韓齊田忌魏龎涓伐以邀之殺龎涓大敗魏師獲魏太子申衛鞅説救韓伐魏龎涓釋韓追齊師孫臏伏兵于馬陵以全據山河之固東制諸侯也孝公因魏敗逐之使東則秦可二十九伐魏魏秦衛鞅師大敗之魏惠王懼自安邑東徙大梁乃恨不公子卬禦之鞅詐魏公子與飲因執之以擊魏衛鞅為商君用公叔之言秦封三十商元楚威王三十一秦法令商君相薨公子虔之徒告商君謀反商君奔魏魏弗受苛酷臨渭論囚渭水盡赤秦人上下怨之孝公商君滅其族內之秦秦車裂申甲三十二韓申不害卒秦惠王元三十三三十四三十五王會于徐州以相王魏後元魏惠王齊威地越以此散周人蘇秦説燕文侯與趙合從越王無疆伐楚楚人大敗之殺無疆冬取故吳侯聽之以拒秦文三十六之術云秦伐一國五國共救蘇秦説趙肅侯以六國合從齊楚皆聽蘇子并相六國為從約長又恐秦敗之不如約者五國共伐之肅侯使蘇子約韓魏秦秦惠王以儀為客卿從約乃激怒張儀入之于三十七易王衛平侯韓宣惠王燕趙肅侯以讓蘇子蘇子慙恐請使燕必報齊蘇齊宣王辟強元秦使犀首欺齊魏與共伐趙河水灌齊魏之師乃去子去趙而從約皆解趙決三十八三十九獻魏地于秦河西之四十攻剔成剔成奔齊宋公剔成之弟偃四十一槐宋康楚懷王惠王復以與魏又以公子繇為質儀因説魏王王偃元秦公子華張儀伐魏取蒲陽儀言于以謝秦以張儀為相盡入上郡十五縣于秦午甲四十二四十三故臣肥義秩克己為政趙肅侯薨武靈王即位加四十四秦始稱王趙武靈王元四十五平陜蘇秦自燕奔齊為間秦後元衛嗣君元秦張儀四十六衛燕實敢有其名乎令國人謂已為君皆稱王趙武靈王獨不肯曰無其四十七儀相秦張秦而諸侯效之魏欲令魏先事四十八愼靚王定元年號曰君獨有濮陽燕王噲元衛更貶二三王元魏襄關秦人出兵五國皆敗走楚趙韓魏燕伐秦攻函谷辰甲四於修魚斬秦敗韓師成于秦張儀歸復相秦齊大夫有與蘇秦爭首八萬獲申差諸侯震恐魏王因張儀以請而殺之寵者刺秦五儀以為不如伐韓司馬錯曰蜀亂魯平公祚元秦惠王欲伐蜀張一舉而名實附也遂使錯伐蜀滅之秦益富強易取而可以廣地富民天下不以為貪暴是我以國讓子之是與堯同名也王從之蘇代與燕相子之為姻代説燕王噲六赧王延元年燕子之專國三年國內大亂齊王秦敗韓師于岸門韓太子倉質于秦公宫攻子之不克連戰數月死者數萬人齊使使人説燕太子平使攻子之平與將軍市被圍王噲及子之章子伐燕殺燕二親乃使張儀説楚懷王令與齊湣王地元秦患齊楚從重楚者以有齊也若絶齊秦必負王二國之兵齊絶許賂以地六百里楚王許之陳軫諌曰秦絶之楚王不聽秦果負約將俱至矣不如隂合而陽三諌曰不如因以一楚王將伐秦陳軫大破楚師于丹陽斬首八萬獲屈丐取漢中楚名都賂之與之伐齊以取償焉不聽遂伐秦秦困皆來襲楚楚乃割二城以和于秦復悉兵以襲秦又敗于藍田韓魏乘楚四王倉韓襄用嬖臣靳尚幸姬鄭袖之言弗果殺燕人立燕昭王平元楚王求張儀於秦秦與之楚王郭隗曰王欲致士請從隗始王築宫師事之於昭王昭王怨齊欲報之乃苦心勞志撫民求士劇辛自趙往是樂毅自魏往五有隙乃去秦相魏遂卒于魏秦武王元張儀與秦武王六七之未易卒拔臣霸旅之臣也樗里子公秦甘茂伐韓宜陽茂曰宜陽大縣也攻寡人不聽也與之盟于息壤而遣之孫奭拔韓而議之王必聽之武王曰寅甲八茂甘息壤在彼乃益兵而拔之斬首六萬秦武王圍宜陽五月不拔樗里子爭之王欲罷兵茂曰母弟稷於燕而立之趙武靈王變俗為胡服好力扛龍文赤鼎絶脈而死無子秦人逆其異中山皆勝之騎射以攻林胡九大后楚女也有異母弟曰魏秦昭王稷元秦昭王母宣涇陽君魏冉自惠王時任職用事武王薨諸弟冉同母弟曰華陽君芊戎王同母弟曰髙陵君王以為將軍衛咸陽爭立冉力能立昭王十子謀作亂魏冉誅之及秦庶長壯與大臣諸公威振秦國王年少太后臨朝冉任政封穰侯惠后武王后出歸魏王兄弟不善者冉皆殺之十一十二十三十四十五宣太后之初楚以秦鬬殺秦大夫懼而亡歸秦華陽君伐楚斬首三故倍從約而親秦使太子黃為質於秦太子私太子質於齊以請和萬殺楚將景缺楚王使十六王更與楚懷王約秦伐楚取八城秦中郡懷王不可因留之楚人逆大子于齊而立為好會武關懷王至則劫之入朝章臺求巫黔而立之乃廢太子章而傳位於何自稱主父之趙武靈王寵姬吳娃生少子何欲及其生十七曰賴社稷神靈國有王矣秦人伐楚斬首趙惠文王何楚襄王橫元楚人告于秦十六城五萬取子甲十八之趙主父在代趙人不敢受楚懷王亡歸秦人遮楚道乃追及之以歸將之魏秦人十九死于秦楚人憐之如悲親戚魯涽公置元楚懷王發病不直秦諸侯由是二十父與齊魏共滅中山吳娃卒魏昭王元韓僖王咎元趙主父與王遊沙丘宫公子章作亂以主父命召王主父憐故太子章欲分代以王之猶豫未決主之兊已殺章因圍主父主父食雀鷇而死肥義先入章殺之李兊攻章章走主父開二十一孟嘗君奔薛齊田甲作亂二十二穰侯薦左更白起於秦韓公孫喜及魏師伐秦四萬獲公孫喜諸侯大恐秦王謂楚襄王曰願王王以為將大敗韓魏之師於伊闕斬首二十復與秦和親秦以女妻之王飭士卒得一樂戰襄王患之二十三逆后于楚襄王秦二十四二十五入武遂地二百里于秦魏入河東地四百里韓二十六魏至軹取城大小六十一秦大良造白起客卿錯伐二十七帝齊稱秦稱西稱帝未後也若天下惡之王因勿稱以收天下東帝蘇代謂齊王曰秦稱帝而天下安之王徐帝號頃之秦王亦去帝號之望齊王從之稱二日復去戌甲二十八二十九公偃驕虐無道與齊楚魏戰勝之自稱宋秦司馬錯伐魏魏獻安邑以和於秦宋魏伐之偃走死溫齊遂滅宋王天下謂之桀宋齊閔王及楚三十克宋而驕齊閔王已之燕昭王拊循其民二十餘年欲以報齊樂毅因南割楚之淮北西侵三晉欲并天下諸侯疾趙魏韓共伐之王從之五國皆許諾曰齊地廣民衆未易獨攻也請約秦楚三十一燕獨追齊師遂入臨淄齊湣王走保莒楚淖齒樂毅以六國之師大敗齊師于濟西諸侯皆罷齊地閔王子法章變姓名為太史殷家庸救齊因為齊相乃隂與燕人約殺閔王而分三十二法章立之布告齊國曰王已立在莒矣齊襄王法章元淖齒去莒齊大夫求得三十三君元衛懷三十四楚令尹昭子曰周地不過楚欲伐周王使周武公説猶攻之者祭器在故也今楚欲殘天下之共主百里然為天下共主攻之者為弒君然而諸侯兵至楚矣楚人乃上居天下之重器器南則三十五斬首二萬司馬秦白起敗趙師地數歲下齊七十餘城獨莒即墨未下圍之錯伐楚楚獻漢北及上庸地于秦燕樂毅徇齊三十六齊即墨將田單縱反間於燕燕王使騎燕昭王薨惠王即位素惡樂毅且疑之乃用詐計大破燕師殺騎劫悉復齊故地秦劫代樂毅將樂毅奔趙燕師皆忿無鬬志田單秦王趙王會于澠白起伐楚取鄢鄧西陵三十七白起伐楚拔郢燕惠王元秦戰徙都陳秦以郢置南郡燒夷陵楚王兵散遂不復申甲三十八定巫黔秦白起中郡中置黔三十九得十餘萬復西取江南十五邑魏安僖王元楚王收東地兵四十首四萬魏納入城以和穰侯復伐魏走芒秦穰侯伐魏韓暴鳶救魏穰侯大破之斬梁魏納溫以和卯入北宅遂圍大四十一斬首四萬得三縣魏復叛秦穰侯伐魏四十二華陽秦白起救韓大破趙魏之師于華魯頃公讎元趙賈偃魏芒卯伐韓攻武以和又取趙觀津秦王欲伐楚楚使者黃陽之下斬首十五萬取魏卷蔡陽長社魏納修止與楚和親歇上書諌王乃四十三黃歇侍太子完為質於韓桓惠王元楚左徒南陽郡秦秦初置四十四奢收稅平原君家不肯出趙燕武成王元趙田部吏趙曰君為趙貴公子奉公守法則上下平上下平奢殺平原君家用事者九人平原君欲殺之奢原君以為賢薦之趙王使治國賦則趙固而強君於天下顧不重乎平四十五人秦服君秦客卿竈伐齊取剛壽魏人范雎見秦伐趙圍閼與趙奢救之大破秦師趙封奢為馬而伐齊非計不若逺交而近攻王説以為客卿王言太后穰侯等專恣於外重於王且越韓魏四十六四十七午甲四十八四十九雎益秦范及今失其國者皆君務逸遊委政于臣所委者親用事乃言太后穰侯等將不利於國曰自古乃廢太后逐穰侯華陽君涇陽君於關外以范御下蔽上以成其私而君不悟所以亡也秦王封為應侯雎為丞相五十王丹元趙孝成五十一王建即位其母齊王建元齊燕楚五國各自救故建立四十餘年不受兵君王后賢事秦謹與諸侯信秦日夜攻三晉五十二子變服亡歸而自留請死秦王以歇為忠楚襄王有疾太子在秦不得歸黃歇使太歇為相封以淮北號春申君而遣之襄王薨考烈王即位以五十三王完元楚考烈亭以城市邑十七降趙趙王與平原君謀欲受秦武安君伐韓拔野王上黨道絶上黨中馮韓嫁禍於我也王不聽發兵取上黨之平陽君豹曰聖人甚禍無故之利此五十四五十五走趙趙王使廉頗軍長平以拒秦頗秦左庶長王齕攻上黨拔之上黨民使趙括以代頗將秦王隂益兵使武安君將以堅璧不戰應侯因縱反間以疑頗于趙王趙王坑降卒四十萬人擊趙大破之殺趙括五十六牢定太原將進圍武安君分兵拔虎為三公君能為之下乎應侯乃請許趙割地而邯鄲韓魏皆恐使人説應侯曰趙亡則武安君大夫王陵復伐趙武安君病不行罷兵由是與武安君有隙頃之五五十七君求平原陵武安君辭王與應侯強請之終不肯行乃使救於楚楚王許之武安君病愈秦王欲使代王晉鄙救趙璧於鄴觀望不進信陵君盜兵符殺王齕代陵圍邯鄲終不能拔軍數不利魏王使其軍鄙奪辰甲五十八君賜死杜郵魏公子無忌及燕孝王元秦應侯譖武安自留趙使將將其兵歸魏王亦怒信陵君不召楚春申君大破秦師于邯鄲下王齕走信陵君也五十九侯合從秦王使將軍樛攻西周赧王秦取韓陽城負黍赧王恐倍秦與諸武王以來凡三十六王八百六十七歲而亡如秦頓首受罪盡獻其邑三十六口三萬周自臣光曰周自平王東遷日已衰微至於戰國又分而為二其土地人民不足以比強國之大夫然而天下猶尊而事之以為共主守文武之宗祧綿綿焉久而不絶其故何哉植本固而發源深也昔周之興也禮以為本仁以為源自后稷已來至於文武成康其講禮也備矣其施仁也深矣民習於耳目浹於骨髓雖後世微弱其民將有陵慢之志則畏先王之禮而不敢為將有離散之心則思先王之仁而不忍去此其所以享國長久之道也不然以區區數邑處於七暴國之間一日不可存况數百年乎秦昭王稷五十二人取魯地遷魯頃公于莒秦應侯免相蔡澤代之楚五十三入朝魏舉國聽令燕王喜元韓王五十四巨陽楚遷于五十五元君元君魏壻也秦太子妃華陽夫人無子衛元君元衛懷君朝于魏魏人殺之立其弟不韋為楚説華陽夫人令楚為嗣華陽夫人許庶子二十餘人夏姬子楚質於趙陽翟賈人吕之五十六美姬有娠以獻楚生子政燕王使王薨孝文王立楚為太子吕不韋娶趙樂間將渠諌不聽趙廉頗大破燕師於宋子栗腹約歡于趙還言趙可伐王使栗腹卿秦伐圍燕燕謝得解殺栗腹虜卿秦遂孝文王元年人為華陽太后夏姬為夏太后楚王即位三日薨莊襄王立尊華陽夫卞邑為家人滅魯遷頃公於莊襄王楚元年户為文信侯蒙驁伐韓取成臯吕不韋為相國封河南洛陽十萬三川郡滎陽置二春申君以淮北地易吳以為封邑蒙驁伐趙定太原取三十七城楚寅甲三復召信陵君信陵君歸為將諸侯爭救置太原郡蒙驁伐魏魏王兵數敗乃函谷關抑之而還王薨太子政立年十三國魏信陵君并將五國兵大破蒙驁於河外追至稱仲父晉陽反事皆決於吕不韋號始皇政元年水灌田關中益富饒秦行萬金於蒙驁擊趙定晉陽作鄭國渠引涇陵君自知再以毁廢乃日夜縱酒而卒魏間信陵君魏王疑之使人代將兵信二攻卷麃公王薨悼襄王立使樂乘代之頗怒攻乘而奔魏斬首三萬趙相國廉頗伐魏取繁陽趙孝成使者視之嬖臣郭開賂使者使毁頗頗卒于楚魏人不能用趙數困于秦悼襄王復思得頗使三李牧伐燕取武遂方城牧者趙之北邊良將趙悼襄王偃元蒙驁伐韓取十二城趙胡降林胡胸奴逺遁十餘歲不敢近趙邊也嘗屯代鴈門破胸奴十餘萬騎滅襜襤敗東四伐魏蒙驁五等二十城置東郡燕劇辛伐趙趙魏景閔王增元蒙驁伐魏取酸棗師殺劇辛龎暖大破燕六魏韓衛共伐秦春申君為從約諸侯患秦攻伐無已時故楚趙朝歌拔衛濮陽衛君走保野王楚自陳徙夀春長至函谷秦出兵擊之五國敗走秦遂伐魏取秦患以避七取汲伐魏八封以太原為長信侯政事皆決吕不韋舍人嫪毐有寵於太后魏人以鄴與趙於毐勢振秦國九太后事覺作亂捕得車裂韓王安元嫪毐有寵於園獻妹於春申君知其娠納諸王生子悍為太滅其宗遷太后於雍楚考烈王無子趙人李不聽王薨李園殺春申君滅其家子王病朱英謂春申君必殺李園子甲十王悍楚幽后於雍大索逐客楚人李斯上書諫王召斯元吕不韋免相就國王納茅焦之諫復迎太可賂者賂之不可者刺之上下乖離乃使良將還與圖國事斯行金玉以間諸侯之君臣名士并諸侯隨其後卒十一悼襄王薨太子遷立其毋倡也王翦桓齮伐趙取鄴閼與趙子嘉而立之悼襄王廢太十二助魏伐楚奪吕不韋國徙趙幽穆王遷元發四郡兵飲鴆死之蜀不韋十三首十萬殺扈輒趙王更使李牧桓齮伐趙太破趙師於平陽斬師於宜安桓齮走將以拒秦大破秦十四韓王納地效璽請為桓齮定平陽武城宜安臣藩十五王不禮焉丹怒亡歸傾身竭財求勇士伐趙取狼孟鄱吾燕太子丹質於秦怨深不量力之能否臣不知其可也丹不聽以刺王其傅鞠武諫曰行危以求安計淺而十六陽郡韓獻南十七安以其地置頴川郡內使勝滅韓虜韓王臣光曰韓以微弱之國居天下之衝首尾腹背莫不受敵然猶社稷血食幾二百年豈非昭侯奉法之謹賞不加無功罰不失有罪後世雖不肖猶得蒙遺烈以自存乎嗚呼有國者安可以無法哉十八趙下井陘趙李牧司馬尚禦之衛君角元大興兵使王翦將伐十九郭趙蔥顔聚代之牧不受命捕得斬之廢司馬尚王開多受秦間金言李牧司馬尚欲反趙王使趙為王楚幽王薨弟郝立郝兄負芻殺之自立翦擊殺趙蔥遂滅趙進兵臨燕趙嘉奔代自立戌甲二十子丹使荆軻刺王不中王怒益發兵魏王假代王嘉楚王負芻元燕太師于易水之西遂圍蒯使王翦伐燕大破燕代之二十一王走保遼東王翦伐蒯燕遂滅楚王翦曰楚地廣民衆非六十萬人不可斬太子丹之首以獻王賁伐楚取十餘城欲恬將二十萬人伐楚王以為怯使李信蒙二十二灌大梁魏王假降王賁伐魏引河溝滅魏殺之遂臣光曰魏文侯以列國大夫好賢禮士終為天下之顯諸侯至于今稱之惠王有一商鞅不能用而棄之於秦使還為國害喪地七百里竄身大梁子孫遂微賢不肖之相望豈不逺哉無忌去而魏輕還而魏重安僖王猶以為疑無忌死而魏亡賢者之於國何如哉王翦將六十萬人以復伐楚李信蒙恬為楚所敗王自請二十三逆王翦翦楚悉兵以之于蘄南殺項燕乘勝略定楚地堅壁不戰楚引而東乃追擊大破二十四滅楚王翦降之置楚郡會稽郡虜王負芻因南征百越臣光曰楚自祝融鬻熊以來其有國幾何年矣方其盛也奄有南海慿陵諸夏及懷王放廢忠良親近讒慝惑張儀之口而耳目不能自守見欺而不悟亡師而不悔以失濟失客死於秦使其子孫䘖涕忍耻以事仇讎強之女而不敢辭陵廟焚而不敢怨兔逃鼠伏自屏於陳束兵不戰而攻之不解割地請和而侵之不止卒不見赦而國以淪亡不亦悲乎二十五虜代王嘉以其地置遼東代郡王賁伐遼東虜燕王喜還擊代臣光曰燕在春秋時玉帛不通於中國簡䇿所書鮮焉及文侯始大與諸侯約從以擯秦王噲慕堯舜以國授子之而敗死為天下笑求名失實乃至是乎昭王刻意勤身招賢下士卒用弱燕以報強齊有志者功無不成也惠王信讒以喪垂成之業惜哉燕丹不勝一朝之忿以犯虎狼之秦輕慮淺謀挑怨速禍使召公之廟不祀忽諸罪孰大焉而論者或謂之賢豈不過哉夫為國家者任官以才立政以禮懷民以仁交鄰以信是以官得其人政得其節百姓懷其德四鄰親其義夫如是則國家安如磐石熾如焱火觸之者碎犯之者焦雖有強暴之國尚何足畏哉丹釋此不為顧以萬乘之國決匹夫之怒逞盜賊之謀功隳身僇社稷為墟不亦悲哉夫其膝行蒲伏非恭也復言重諾非信也糜金散玉非惠也刎頸決腹非勇也要之謀不逺而動不義其楚白公勝之流乎荆軻懷其豢養之私不顧七族欲以尺八匙首強燕而弱秦不亦愚乎又曰武靈王不顧流俗變胡服習騎射以制林胡滅中山大啓土宇威加強秦可謂賢君矣及溺於嬖寵欲分國以王二子卒餒死沙丘宫佚欲之之敗也如此夫趙於三晉為最強及貪上黨之田以喪長平之師用郭開之讒而棄廉頗李牧使宗廟不血食言之可為長欷矣王去從朝秦不為攻戰之具秦以故得滅五國齊自君王后卒后勝相齊多受秦間金約齊不救而齊二十六莫敢格者遂滅齊虜齊王建王賁自燕南攻齊猝入臨淄民臣光曰齊地廣而民衆負滄海以臨中夏重以威宣之賢國家富強及涽王驕汰不可盈厭自取顚沛茍無田單齊不國矣凡遊士言從橫者雖更相傾覆要之合從者六國之利也齊為三晉燕楚之根柢三晉燕楚為齊之藩蔽秦雖強暴百有餘年不能一諸侯者以其表裏相鈎帶也及齊王建用后勝之謀信秦間之言拱手以事秦不救五國五國已亡而齊并為虜理勢然也法欲以傳萬世無窮不建立子弟為諸侯分天王自謂功德兼三皇五帝故號皇帝除去諡咸陽悉收天下兵銷之下為三十六郡徙豪傑於二十七北地出雞頭始皇巡隴西南又作甘泉前殿山過回中作信宫渭二十八山遂封泰山禪梁東行郡縣上鄒嶧千人入海求蓬萊不死之藥過彭城出周鼎南父東遊海上登琅邪使齊人徐市發童男女數赭湘山由武關歸之衡山南郡浮江二十九中韓人張良為韓報始皇東遊至博浪沙始皇遂登之罘琅邪還自上黨入讐徂擊始皇不中天下大索十日申甲三十三十一三十二通隄防巡北邊從上郡入始皇之碣石壞天下堅城決乃使蒙恬發兵三十萬北擊胸奴盧生入海還奏録圖書言亡秦者胡三十三兵發人戍五嶺蒙恬斥逐胸奴收河南地築長城取南越地置南海桂林象郡以謫徙民五十萬于外十餘年恬居上郡以治之起臨洮至遼東延袤萬餘里暴師三十四李斯丞相燒之有敢偶語詩書者棄市以古非今者族建議令天下有藏詩書百家語者皆詣守尉雜三十五阿房殿東西五百步表南山以為闕作除直道道九原塹山堙谷千八百里作始皇坑殺四百二十餘人長子扶蘇誎始皇怒者七十餘萬人嚴刑重賦民不堪命諸儒誹謗軍于上郡使監蒙恬三十六皇子二十餘人少子胡亥最徙民河北榆中三萬家始髙得幸於胡亥而與蒙恬蒙毅有隙愛始皇使中車府令趙髙教之法律三十七皇始賜扶蘇令與喪會咸陽書未發始皇崩趙髙説南遊雲夢東上會稽並海至之罘還道病為書矯詔立胡亥為太子賜扶蘇蒙恬蒙毅死斯曰長子若立蒙恬必相君無死所矣乃二世胡亥元年燕王韓廣魏王咎元二世東巡楚隱王陳勝趙王武臣齊王田儋戍卒陳涉起兵於陳天下豪傑爭應之楚趙郡縣用趙髙䇿誅大臣宗室殆盡滅衛楚梁起吳劉季起沛齊燕魏皆自立王項二豹韓王成齊王市元楚義帝心趙王歇魏王歇為王項梁殺楚王景駒立楚懷王孫心章邯陳涉敗死李良殺趙王武臣張耳陳餘立趙儋兄子市韓成皆自稱王誅李斯以趙髙為破殺齊王儋魏王咎及項梁圍趙歇咎弟豹及相丞午甲三軍大破秦師于巨鹿下虜王離趙楚王使宋義項羽救趙羽殺義并其伐秦入武關二世以盜賊責趙髙髙恐發兵髙以盜賊責章邯邯恐以其軍降楚楚沛公髙立二世兄子嬰為王嬰殺髙攻二世二世乞為黔首不得而死臣光曰孔子曰知及之仁不能守之雖得之必失之秦之謂矣善夫賈生之言曰秦以區區之地千乘之權招八州而朝同列百有餘年然後以六合為家殽函為宫一夫作難而七廟墮身死人手為天下笑者何也仁義不施而攻守之勢異也司馬溫公稽古録卷之十一
