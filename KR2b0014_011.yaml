front:
  text: 司馬溫公稽古録卷十一景王貴元年夷末立晉平公杞出也故合諸侯楚郟敖穈元夏閽弒吳子餘祭弟止出奔北燕冬鄭公孫黑將攻伯有大夫和之大夫以城杞吳季札聘於上國秋齊髙諶曰禍未歇也之盟於伯有氏禆二蔡景侯通於太子般之妻衛襄公惡吳子夷末元佞夫宋災伯姬卒鄭良霄耆酒秋公孫黑夏般弒景侯儋括作亂將立王子佞夫王殺夫會于澶淵鄭子皮授子産政鄭由是復興攻之出奔許自許襲鄭不克而死冬諸侯大
