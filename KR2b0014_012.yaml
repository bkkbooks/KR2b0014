front:
  text: 司馬溫公稽古録卷之十二漢髙祖邦元年江王共敖九江王英布常山王張西楚霸王項籍衡山文王呉芮臨河南王申陽韓王鄭昌元冬沛公至霸上秦耳齊王田榮雍王章邯燕王臧茶殷王司馬卬止春羽陽尊楚王為義帝徙之郴羽自稱西王子嬰降項羽入闗欲擊沛公張良購解得王為代王齊王為膠東王燕王為遼東王魏王楚霸王分天下以王諸侯以沛公為漢王徙趙江王呉芮為衡山王秦將章邯為雍王司馬欣為西魏王而立楚將英布為九江王共敖為臨卬為殷王申陽為河南王齊將田都為齊王田為塞王董翳為翟王趙將張耳為常山王司馬田榮擊殺田市田都田安拜王三齊臧茶安為濟北王燕將臧茶為燕王諸侯由是不服定三秦項王殺韓王成而立鄭昌擊滅遼東王廣漢王用韓信䇿還二餘齊王代王陳復立趙王歇歇立餘為代王項王擊殺田榮廣韓王信元冬項籍弑義帝陳餘逐張耳韓王春漢王以諸侯伐楚入彭城項王大破河南王殷王來降韓王孫信滅韓立信為秋韓信滅魏漢兵獲太公吕后三耳為趙王燕齊皆聴命冬韓信滅代及趙復立張間逐楚謀臣范増紀信詐降漢王乃得脱出軍英布來降夏項王圍漢王於滎陽用陳平反反拔滎陽殺周苛又東擊彭越宛葉間彭越反梁地項王東擊之四楚軍汜水冬王大破王傷胷韓信滅齊破殺楚將龍且因自立為上殺曹咎司馬欣項王還與漢臨廣武而軍射溝以和王用陳平張良䇿復追楚齊王秋楚兵疲食盡與漢割鴻五王於垓下冬大破項之滅
