body:
  text: 臣光曰世稱項王不王秦而歸楚故失天下觀其擁百萬之衆西入函谷擅天下之勢裂山河以王諸侯自謂可以逞其私心而人莫敢違安行無禮忍為不義欲以一夫之力服億兆之心才髙者見疑功大者被絀推此道以行之雖得百秦之地將能免於敗亡乎尊漢王為皇帝都洛陽令天下皆罷兵婁敬立齊王信為楚王彭越為梁王春諸侯共臧茶反滅之立盧綰為燕王説帝徙都闗中從之秋燕王六于陳執楚王冬帝㑹諸侯服天下夏尊太公為太上皇徙韓王信於信廢為淮隂侯悉封兄弟庶子以大國以鎮馬邑信降匈奴太原秋匈奴圍七火食用陳平祕計得免春冬匈奴圍帝于平城七日不匈奴約和親徙都長安與八過趙趙相貫髙謀為逆不果冬帝擊韓王信餘寇於東垣如洛陽春帝九洛陽貫髙事覺廢趙王敖為宣平冬初徙郡國豪傑以實闗中帝如侯辰甲十豨反帝自擊之至邯鄲夏太上皇崩秋代相陳十一將軍冬遣謀反越坐廢死夏帝還長安遣太中大夫陸周勃擊豨淮隂侯信謀反伏誅或告彭越秋淮南王布反帝自擊之賈拜秦南海尉趙陀為南越王十二死長沙冬布敗走奴夏帝崩初帝以太子仁弱欲以少子趙王周勃斬陳豨燕王綰隂與豨通事覺亡入匈任使故能平一海内又使叔孫通制禮儀蕭何如意代羣臣固爭乃止帝豁達寛仁知人善給規摹宏逺矣次律令雖日不暇惠帝盈元年姬帝由是不意稱病不聽政冬太后殺趙王如意及其母戚二齊冬大旱秋相國蕭何薨以齊相曹參代之王來朝獻城陽郡為魯元公主湯沐夏三大春為甌王發諸侯徒隷城長安發民城長安夏立閩越君繇四氏春除挾冬立皇后張律書五千人城長安秋城成春發男女十四萬五六七太后詐取他秋帝崩無子臨朝稱制立兄子台為吕王太傅王陵免人子名之為孝惠子殺其母立以為帝太后寅甲髙后雉元年五人皆為侯夏立所名孝惠子二銖錢秋行五三漢溢夏江汝水溢流千餘家流四千餘家秋伊洛四出怨言太后幽殺之詔夏少帝知太后殺其母為帝以太后稱制故不改元義亦所名孝惠子羣臣曰皇帝乆病昏亂其廢之更立常山王義也五發河東上黨騎士屯北地備匈奴春南越王反自稱南越武帝秋六奴寇夏匈五分錢狄道行七死於邸徙梁王恢爲趙王夏趙王冬匈奴寇狄道春趙幽王友幽秋燕靈王建薨太后殺其子立兄孫吕通爲燕恢自殺太后廢其嗣立其兄子吕禄爲趙王慮侯周竈將兵擊之王南越侵長沙遣隆八禄將南北軍太后崩秋太后病使吕産吕軍灌嬰擊之嬰留滎陽不行大尉周勃使人詐産禄欲作亂齊王襄發兵以誅諸吕産使大將悉誅諸吕廢少帝迎立髙帝子代王恒吕禄奪其軍使朱虛侯章擊吕産殺之文帝恒元年秋丞相周勃謝病免陸賈使南越春立皇后竇氏立子啓爲太子號稱臣越復去帝二子甲三嬰將兵擊之衞將軍軍長夏匈奴寇北地遣丞相灌帝自太原還將軍柴武擊濟北王殺之安帝幸太原濟北王興居反秋太旱四五更造四銖錢夏除盜鑄錢令六謀反發覺徙蜀道死冬帝弟淮南厲王長七八九旱夏大十甘泉冬帝幸十一自代匈奴寇冬帝幸代春至道狄十二酸棗潰金隄冬河決東郡戌甲十三笞代重者笞五夏詔除肉刑以除民田租百又詔十四闗燒囬中宫候騎至雍帝遣三冬匈奴單于將十四萬騎入蕭張武屯渭北大將軍張相如將軍欒布擊匈奴將軍屯隴西北地上郡衛將軍周舍車騎將軍塞師還匈奴出十五郊見五帝畤夏帝幸雍始十六立悼惠王子六夏分齊爲六國侯驕恣賈誼知其必爲患請稍裁抑帝不能用人淮南爲三國立厲王子三人皆爲王是時諸後元二陽宫匈奴和親夏帝幸雍還幸棫三大雨藍田山水春帝幸代秋室八十餘家所殺三百餘人出流五百餘家漢水溢壊民四幸雍夏帝五隴西又春帝幸秋幸代幸雍六中使將軍李勉屯飛狐口蘇隠屯句冬匃奴三萬騎入上郡三萬騎入雲周亞夫屯細栁以備胡月餘匈奴退軍皆罷注張武屯北地又使劉禮屯霸上徐厲屯棘門旱蝗夏大申甲七恭儉百姓富樂夏帝崩帝寛惠景帝啓元年田半租夏復收民二强大請以過稍削其攴御史大夫晁錯患諸侯怨怒郡諸侯三濟南王辟光菑川王賢膠東王雄渠春呉王濞楚王戊膠西王卬趙王遂尉周亞夫將三十六將軍擊之呉楚攻梁不克反南連越北連匈奴天下震動帝誅晁錯遣太始貶削諸侯權宗室寖微亞夫擊破之七國皆滅於是四榮為皇太子夏立栗姬子五六七立膠東王徹為王太子太子母王氏春帝怒栗姬廢太子榮為臨江王夏女陳氏為太子妃為皇后取平陽公主中元二午甲三秋蝗夏旱四蝗夏五六百自是笞者始得全匈奴入鴈門夏帝行幸雍夏詔減笞法不過二吏卒戰死者三千餘人武威酒泉上郡取苑馬後元二門殺太守發春匈奴入鴈屯鴈門車騎材官三給人足太子即位年十六春帝崩帝守文帝之業家武帝徹建元元年銖錢春行三二三饑人相食秋春河決平原大發㑹稽兵救之未至閩越走秋起上林苑閩越圍東甌東甌來告急帝使太中大夫嚴助辰甲四旱夏五初置五經博士夏蝗春罷三銖錢行半兩錢六越圍秋閩國將兵出㑹稽大行王恢出豫章救之兵未逾南越南越守天子約不敢發兵遣大司農韓安乃罷兵南越遣太子入侍嶺閩越王弟餘善殺王降漢元光元國貢孝亷冬初令郡程不識屯鴈門以備匈奴六月罷一人春車騎將軍李廣屯雲中二自漢興冬帝幸雍是王恢始建議伐匈奴令馬邑豪聶壹誘致單與匈奴和親匈奴數敗約漢驅之出塞而止至邑旁單于入塞覺之亡去漢追至塞不及而罷于夏遣韓安國等五將軍伏兵三十餘萬於馬恢誅王三決濮陽汎濫十六郡發卒十萬救河春河徙自頓丘東南入於渤海夏河四笻竹杖請通西南夷以制越中郎將唐蒙使南越見蒟醬五西南夷道傜役夏發巴蜀卒通愁苦又發卒萬人治鴈門險阻秋螟費用甚多皆閉昆明道不得成巴蜀民始六初冬軍公孫敖出代公孫賀出雲中李廣出鴈門衛筭商車春穿漕渠通渭匈奴入上谷遣將奴所得逃歸夏大旱蝗帝幸雍秋匈奴青出上谷青頗斬首虜諸將皆無功李廣為匈國屯漁陽盜邊遣韓安元朔元奴入遼西殺太守入漁陽春立衛皇后赦秋匈數千級東夷穢貊君南閭等二十八萬口降鴈門敗都尉遣衛青出鴈門李息出代獲首虜海郡置滄寅甲二侯匈奴入上谷漁陽遣衛青李春令諸侯王得分郡邑封子弟為置朔方五原郡遣校尉蘇建築朔方城夏募民息出雲中西至符離獲首虜數千級收河南地郡國豪傑於茂陵徙朔方十萬户徙三守入鴈門殺畧千餘人夏匈奴單于入代殺太罷之專意朔方秋罷西南夷屯築朔方城西南夷道累年不通御史大夫公孫弘請四代定襄上郡殺數千人冬帝幸甘泉匈奴入五髙闕公孫賀蘇建李春大旱遣衛青出擊匈奴青圍右賢王僅以身免獲禆王十餘人蔡出朔方李息張次公出右北平凡十餘萬騎皆封侯諸將侯者六人秋匈奴入代殺都尉男女萬五千餘人還即軍中拜青大將軍三子六出定襄斬首虜三千級還休士馬於定襄雲春遣衛青率公孫敖等六將軍凡十餘萬騎右將軍蘇建及前將軍趙信以三千騎獨遇單中鴈門夏衛青復將六將軍出逾漠北大克獲奴建僅以身免于戰敗信降匈元狩元衡山王賜謀反伏誅冬帝幸雍淮南王安太子匈奴入上谷殺數百人大雪民多凍死夏立子據爲二驃騎將軍霍冬幸雍春出北地過居延獲三萬餘級匈奴入鴈門張騫去病出隴西擊匈奴過焉耆山斬獲甚衆夏又邪王以其衆四萬餘人來降置武威酒泉郡匈李廣出右北平騫失期廣爲匈奴所圍秋昆稍衰奴由是三畧千餘是時縣官費衆倉庫空竭貧夏大旱秋匈奴入定襄右北平殺諷百姓莫有應者減隴西北地上郡戍卒半民流徙縣官無以賑之帝寵貴河南人卜式以穿昆明責吏卒四輸鹽鐵官夏衞青將四將軍出春作白金皮幣銷半兩錢置均漠北圍單于斬首萬九千級追至闐顔山乃還定襄霍去病出代各萬餘騎步兵數十萬青到萬餘級封狼居胥山而還去病與右賢王戰斬首七五子甲元鼎元二邑蜀粟以賑江南夏大水闗東饑下三夏闗東饑人相食冬初令人告緡四帝冬欒大以方技見上月餘佩四金印拜五利將軍幸雍遂幸汾隂初祠后土幸洛陽膠東人之士爭言有禁方能神仙者以萬數夏得寳待以不臣之禮使入海求神藥於是燕齊迂怪置甘泉鼎汾隂迎五泰畤於甘泉親祠太一夏南越帝幸雍遂踰隴登崆峒而還初立將軍五道擊之列侯坐酎金失侯者百六十相吕嘉反殺其王及漢使者秋遣路博徳等五西羌反匈奴入五原人欒大詐覺伏誅六卒擊西羌平之以其冬將軍李息將十萬越王餘善反將軍韓説擊之地為五郡帝幸緱氏秋東元封元巡上郡冬帝北乃入塞罷兵歸甘泉東越殺王餘善降悉徙至朔方登單于臺勒兵十八萬匈奴讋不敢出禪肅然坐明堂巡海上至遼西碣石厯北邊還其民於江淮春帝幸嵩髙遂東巡夏封太山泉甘二不見乃禱萬里沙過祠太山發卒數萬人冬帝幸雍春幸緱氏遂至東萊候神人通天臺甘泉前殿始廣諸宫室朝鮮王右渠自臨塞決河築宣防宫導河北行為二渠作僕荀彘擊之反遣將軍楊三軍還荀彘坐爭功棄市陽僕贖夏朝鮮王來降以其地為四郡反分徙其人於酒泉為庶人秋武都氐人戌甲四中道遂北出蕭冬帝幸雍通囬多渇死秋匈奴寇邊遣拔胡將軍郭昌屯朔闗厯獨鹿鳴澤自代而還幸河東夏大旱民方五柱山自潯陽浮江舳艫千里薄樅陽而出冬帝南巡至南郡祀虞舜於九疑登灊天受計於明堂夏還甘泉初置刺史部十三州竝北至琅邪竝海春還至太山增封因朝諸侯六河東益州昆明反遣郭昌將兵擊之秋冬帝幸回中春作首山宫於蒲坂帝幸蝗大旱太初元蓬萊還受計甘泉春起建章宫冬帝幸太山祠上帝禪嵩里望祀孫敖築受降城於塞外秋帝幸安定帝聞千門萬户夏正律厯以寅月為正首遣公軍李廣利將數萬人伐大宛大宛有善馬求之不得使將二籍吏民馬補車春帝幸河東奴將二萬騎出朔方擊匈奴不還騎馬秋蝗遣浚稽將軍趙破三海上夏還春帝東巡原塞外列城西北到盧朐山逰擊將軍韓説將増封太山禪石閭遣光禄大夫徐自為築五單于入定襄雲中殺略數千人破壞光禄諸亭兵屯之强弩都尉路博徳築居延城秋匈奴泉殺都尉障又入張掖酒四千餘疋而還於是外國震恐春大宛殺王毋寡降得馬三從胡客多為侈靡以誇示之冬幸回中爭遣使入朝貢以窺漢之廣大上毎巡狩常天漢元旱秋謫戍屯五原春幸甘泉河東夏大二幸回中夏李春帝幸東海還尉李陵以步卒五千出居延與單于戰斬首萬廣利將三萬騎出酒泉擊匈奴斬首萬餘級都衣使者暴勝之等分道捕逐僅能克之餘級力盡降匈奴東方盜賊羣起遣繡申甲三李廣利將七萬人出五原商丘成將二萬人春帝幸雍遂至安定北地匈奴入五原酒泉氂坐與李廣利謀立昌邑王為嗣皆族誅廣利出西河馬通將四萬騎出酒泉夏丞相劉屈奴歸者千人中唯一二戰不利遂將其衆降匈四又幸太山脩封夏還春帝幸東萊臨大海之詔深陳既往之悔禁苛暴止擅賦務本勸農甘泉是時天下疲於兵革上亦悔之下哀痛蘇息民稍後元元中僕射馬何羅謀反伏誅􅊨春幸甘泉遂幸安定夏侍午甲二廣陵王胥多過失帝欲立少子弗陵恐母后春帝幸五柞宫戾太子既死皇子燕王旦太子年七歳霍光金日磾上官桀受遺詔輔政亂國乃先誅其母鉤弋夫人上疾篤立弗陵為奴入朔方上崩冬匈昭帝弗陵始元元年胡擊之秋大水燕王旦夏益州反遣水衡都尉吕破反事覺秋澤長等伏誅旦以至親勿治自以年長不得立與齊王澤中山王長謀二發冬方屯田張掖郡習戰射士詣朔三四光外孫上官桀之孫也春立皇后上官氏后霍冬大鴻臚田廣明擊益州以后父安為驃騎將軍五年詣闕詐稱衛太春夏陽男子張延田廣明破益州斬首捕虜三萬人子京兆尹雋不疑收案誅之秋六秋罷榷酤夏大旱元鳯元夏上官桀與霍光爭權詐為燕王旦上春武都氐人反遣執金吾馬適擊之之桀乃與蓋長公主桑弘羊謀殺光廢帝立燕書言光罪帝知其詐益親厚光有毁光者輒怒光威震天下王事覺皆族誅二三遼將軍范明友擊之冬遼東烏桓反遣度辰甲四斬其王首而歸以威示西域夏平樂監傅介子使樓蘭因五六桓復夏烏明友擊之犯塞遣范元平元昌邑王賀立之即位淫亂光夏帝崩無嗣霍光迎武帝孫子孫病已於民間以為昭帝嗣時年十八更名復白太后廢之誅昌邑羣臣二百餘人迎衛太后許氏詢冬立皇宣帝詢本始元年先聞光然後奏御公卿皆以定春霍光稽首歸政帝不許事皆増邑受封䇿安宗廟功二三夏旱匈奴侵烏孫遣春霍光夫人顯酖殺許后獲名王已下四萬餘級冬單于自擊烏孫值大田廣明等五將軍兵十五萬與烏孫合擊匈奴屬者皆瓦解攻盜不能治匈奴遂衰雪人畜死者什七八因以饑饉諸國羇四皇后春立女也霍氏光地節元二將軍兄子雲為侍中奉車春霍光薨以光子禹為左事勵精為治夏許后子奭為皇太子都尉山領尚書事皆封侯上始親政寅甲三四霍禹憂懼謀反族誅廢霍后連坐誅滅者帝知霍氏毒殺許后事稍斥退其親黨秋家數十元康元二后王氏春立皇三四神爵元上春充國討之秋大旱趙充國誘䍐幵種羌以幸甘泉河東先零羗豪楊玉反遣後將軍趙人屯田稍以爵賞壞其支黨擊先零大破之罷騎兵留萬二首降衛司馬夏羌人斬楊玉餘人詣吉降初置西域都䕶中西域而立幕鄭吉擊車師破之匈奴大亂日逐王將其衆萬域矣匈奴遣名王奉獻和親府以鎮撫諸國漢之號令班西三四單于遣夏匈奴王來朝弟呼留若子甲五鳯元馮翊韓延夀棄市春上幸甘泉冬左二殺五單于爭立更相殘滅冬匈奴呼遫累單于春上幸雍秋匈奴楃衍單于爲其衆所叛自封爲列侯率衆來降三國都尉以處匈奴降者春上幸河東置河西屬四奴呼春匈卒什二大司農丞耿夀昌奏言故事歳漕闗韓邪稱臣遣弟谷蠡王入侍以邊塞無寇減戍輔弘農河南上黨太原郡足給京師可減闗東東穀四百萬斛以給京師用卒六萬人宜糶三半從之漕卒之甘露元子右賢王入侍呼韓邪兄左賢春上幸甘泉呼韓邪單于遣呼韓邪單于遣弟左賢王來朝賀王自立爲郅􅑢單于亦遣子入侍冬二郡亂夏春珠崖張禄擊之遣䕶軍都尉三郅􅑢所破稱臣入朝遣衞將軍春上幸甘泉呼韓邪單于爲城郅􅑢初以呼韓邪不能復還乃西收右地聞車騎將軍將萬六千騎送單于還幕南保光禄偈堅昆丁令而都之漢兵至懼引兵西滅呼四黃龍元泉呼韓邪春上幸甘罰官不數遷是以吏稱其職民安其業單于來朝冬帝崩帝綜覈名實信賞必元帝奭初元元年轉雲中五原穀二萬斛以給之春立皇后王氏匈奴來告饑爲光禄大夫及宗正劉更生皆寵任用事以太子太傅蕭望之爲前將軍少傅周堪戌甲二書令石顯譖蕭望之下獄自殺及周堪劉春上幸甘泉夏立子驁為皇太子冬中下畏顯皆重足而立更生皆被廢逐公卿已三捐之議廢其郡夏春珠崖反用待詔賈衛士令就農旱罷建章甘泉四泉河東春上幸甘五支單于怨漢擁春上幸雍郅韓邪益强乃西奔康居王以女妻郅支尊禮之䕶呼韓邪殺漢使者谷吉自以負漢深又聞呼國罷鹽鐵官欲倚其威以脅諸永光元甘泉春上幸二遣右將軍秋西羗反帝與之萬二千人不克益王六萬人乃克之馮奉世擊之奉世請兵四萬人期一日可克三足復鹽鐵官冬以用度不四祖宗廟在郡國者春帝幸雍冬罷五泉遂至河春帝幸甘毁太上皇孝恵廟園東冬幸長楊大獵建昭元幸雍春帝申甲二帝春魏郡太守京房譏刺石顯顯譖殺之幸甘泉遂至河東冬大雪深五尺三益强郅支詔發城郭軍兵四萬人襲擊郅支獲閼氏太子西域皆長服之冬都䕶甘延夀副校尉陳湯矯史及石顯皆害其功軍還賞不行名王以下六十餘人威振西域丞相御四討郅春以祠郊廟支功告五祖宗園廟舊祀秋帝寢疾盡復竟寧元于來朝請罷春呼韓邪單帝優游不斷漢業始衰太子即位尊王皇后為備邊卒郎中令侯應以為不可乃止夏帝崩大將軍領尚書事王氏始專政太后以太后弟衛尉鳯為大司馬成帝驁建始元年内侯冬作長安南北郊罷甘夏封舅譚商立根逢五人為闗東后土祠泉泰畤河二后許氏夏大旱春罷雍五畤立皇三四十餘日秋闗中雨四金堤兖豫諸郡冬河隄使者王延世塞之二春罷中書宦官初置尚書員五人初河決而成十六日河平元賢王伊祈黄渾來朝伊祈黄渾春匈奴復株累單于新立遣右以為不可受從之果詐降者乞降光禄大夫谷永議郎杜欽午甲二三四王商之賢誣以罪商嘔血死春單于來入朝王鳯嫉丞相陽朔元兆尹冬京合浦自是天下莫敢譏斥王氏王章言王鳯過惡章坐死妻子徙二三川鐵夏穎討平之秋王鳯薨以鳯從弟音為大司馬車官徒申屠聖等百八十人劫庫兵為羣盜遣使鳯不薦譚而薦音自代也騎將軍秉政鳯弟譚素倨故四鴻嘉元幸昌春帝作昌陵陵初二豪傑五千餘户于昌陵春帝幸雲陽徙郡國三姊為媚道冬許后坐姊弟專妬帝由是絶嗣廣漢人鄭躬作亂廢陽阿公主侍者趙飛燕及其女弟始得幸辰甲四躬黨浸廣至萬餘人冬詔發廣漢蜀郡二秋河決勃海青河用李尋議遂不塞鄭滅之萬兵擊永始元飾名譽士多稱之立趙飛燕夏封舅曼子莾為新都侯莾善昌陵作數年不成府庫空竭天下徧被其勞爲皇后女弟為昭儀封太后姊子淳于長為侯昌陵秋罷二商為大司馬輔政春王音薨以鳯弟三陽鐵官徒蘇令皆冬尉氏人樊竝山復甘泉太畤河東后土雍五畤祠劫略吏民賊殺長史詔討平之四泉河東春帝幸甘元延元馬時人多譏切王氏帝亦疑焉故丞春帝幸雍冬王商薨弟根代為大司誤人帝由是不疑王氏是歳後宫許美人曹相張禹常為帝師帝虚心問禹禹曰鄙儒亂道昭儀妬殺之才人皆生子趙二楊縱胡人校獵烏孫末振春帝幸甘泉河東冬幸長將叚㑹宗誅其太子畨丘將殺大昆彌而病死右中郎三幸雍春帝四河東甘春帝幸私事趙后昭儀及王根三人皆欲自託爭稱譽泉帝以定陶王子欣為賢王祖母傅太后亦之綏和元丞相御史大夫官置三公冬王根春立欣為皇太子帝幸雍夏廢代根為大司馬乃折節散財交士以立名聲傾病免王莾告淳于長及紅陽侯立罪而去之莾刺史置州牧諸父焉初罷寅甲二崩趙昭儀自殺哀帝春帝幸甘泉河東還暴定陶恭王為恭皇祖母傅太后為恭皇太后母即位尊王太后為太皇太后趙后為皇太后父稍黜王莾以病免王根王立皆以罪廢逐丁太后為恭皇后於是下傅用事而王氏哀帝欣建平元年上馮太后自殺馮氏死者十七春傅太后誣中山馮太后祝詛人二夏尊恭皇太后曰帝太太后恭皇后曰帝春罷司空及州牧復御史大夫刺史官朱博自殺帝屢誅大臣欲强主威以則武宣太后尋崩秋待詔夏賀良以妖妄誅丞相賞罰益紊矣而嬖幸用事三王雲與后祝詛上皆自殺冬待詔息夫躬誣告東平四幸夏庫禁兵上方珍寳其上等皆在賢家乗輿所服臣董賢封為髙安侯上為賢起第如天子禮武太后為皇太太后乃其副尊帝太元夀元欲益封董賢丞相王春皇太太后崩帝賢為大司馬領尚書事勢傾海内單于求朝嘉封還詔書上大怒收嘉下獄嘔血死秋以董諌乃許之帝不許楊雄二夏復置三公官帝崩無嗣春匈奴單于烏孫大昆彌來朝自殺元后以莾為大司馬迎元帝孫中山王衎元后召新都侯莾委以尚書事及殿中兵董賢自殺平帝年九歲太后臨朝稱制立之孝成趙后孝哀傅后皆廢絀平帝衎元始元年公莾乃奏紹封諸侯惠賜庶民春羣臣請尊王莾為太傅安漢禮樂致太平上以欺太后下以惑衆庶權與人以取恱上下之人又引劉歆等為羽翼云欲興矣主侔二莾遣人諭說江湖賦令自出又賂單于夏旱安漢公已下獻田宅賦貧民秋太后下至旁側長御方故萬端令改名遣女入侍所以誑耀媚事三為皇后春納莾女莾世子宇非莾隔絶衛氏以血灑莾門莾殺宇夏莾奏定上下車服及田宅之制學校之禮紅陽侯立皆殺之死者以百數海内震恐盡誅衛氏因連引郡國豪傑不附已者及子甲四令獻地置西海郡増法五十條犯者徙西海春立皇后秦氏加莾號曰宰衡莾諷西羗名制度天下多事吏不能犯吏民上書亟請加徙者以千萬數民始愁怨又更易百官及郡縣十八萬七千餘人賞於莾者前後四五宣帝曽孫之子嬰年二歲春加莾九錫帝崩莾取文告安漢公莾為皇帝於是吏民爭獻符瑞元託云卜相最吉是月前煇光立之謝囂奏瑞石稱攝皇帝禮儀一如天子吏民皆稱臣后怒而力不能沮乃令莾如周公故事漢孺子嬰居攝元年夏安衆侯崇起兵欲誅莾攻春立嬰為皇太子曰孺子羗反逐西海太守宛不克而死西二羗夏改造錯刀契刀大春䕶羗校尉竇况擊破西爲天子衆十餘萬三輔盜賊趙明霍鴻等竝起錢秋東郡太守翟義起兵誅莾立嚴鄉侯信之意遣王邑等八將軍擊信義滅之衆且十萬莾皇懼作大誥言將復辟初始元邑春即真矣冬莾以符命進稱假皇帝以應天命還軍擊斬明鴻等於是莾自以獲天人之助謀天璽金䇿莾遂即皇帝位以十二月爲正月云俟孺子加元服復于明辟梓潼人哀章又獻新王莾建國元年不得私賣買田及奴婢有敢非春莾封孺子爲定安公令人裔於是農商失業民涕泣於道路又改易蠻夷井里聖制及挾五銖錢言大錢當罷者流諸四始怨叛印綬匈奴二劫畧吏民自稱漢大將軍亡入匈秋戊巳校尉史陳良終帶殺校尉劉歆子棻復獻符命莾怒殺之連坐死者數百奴更名匈奴單于曰降奴服于甄豐子尋人三問以治河之術卒無所施行河決清河召能治水者數百人四五后元耆叛殺都尉崩西域焉戌甲天鳯元郡監置州牧二減吏禄冬以災害更相奏舉章交道路莾不能察其是非獄訟連莾多遣中郎繡衣執法監察州郡其人乗權勢受成茍免因縁為姦競為貪苛穀糴常貴百姓年不決莾自以專權得漢政不委信臣下有司盜賊焉窮困始為三者害動者不害夫坤其動也闢其春地震莾下詔曰地有動有震震也山崩壅涇水羣臣上夀以為土填水匈奴滅静也翕一翕一闢萬物生焉其自誣飾皆此類從䛕亦如之亡之兆羣下四起兵殺縣長琅邪女子吕毋五起兵於莒時琅邪人樊崇探湯侯田况殺萬餘人所過殘滅號曰赤眉青徐盜賊螽起皆附於崇衆至數萬人擊破六三百日糧欲同時出塞逐匈奴内之丁令分其莽遣大司馬嚴尤等十三將軍將四十萬衆齎伎術之士以萬數師乆屯不行運轉不已天下地立呼韓邪十五子嚴尤苦諌免為庶人又募終不能出塞騷然以至於亡地皇元歲作九廟提封百頃黃莽自言受命三萬六千萬卒徒死者以萬數南方饑饉緑林賊起數帝廟方四十丈髙十七丈餘廟半之費用巨百八千人月至七二至亡萬餘時民皆饑愁州郡不能慰秋闗東大饑緑林賊破荆州收還田况發兵擊之多所摧破况請毋出大將以擾安又不得擅發兵以故盜賊寖多唯翼平連率必可平莾疑况召之還民唯選牧尹明其賞罰賊三林散為下江新市蝗饑民相食緑輔亷丹擊赤眉丹戰死漢宗室劉縯起兵春平林兵莾遣將孔仁嚴尤陳茂擊下江等兵王縯於小長安縯弟秀説下江平林下之陵新市平林皆附之莾將甄阜梁丘賜破漢淮陽王玄更始元年新市平林共立劉聖公漢梁王永淮南王李憲元昆陽郡縣爭應漢旬月徧天下隗囂起隴右爲帝夏劉秀大破莾將王尋王邑兵百萬於殺劉縯秋三輔豪傑共殺王莾公孫述起蜀更始拔宛聴譖臣光曰髙祖奮布衣提三尺劒八年而成帝業其收功之速如是何哉惟其知人善任使而已故髙祖自謂鎮國家撫百姓不如蕭何運籌䇿决成敗不如子房戰必勝攻必取不如韓信三者皆人傑吾能用之所以取天下韓信亦曰陛下不善將兵而善將將斯言盡之矣吕氏之亂漢氏不絶如綫然而卒不能為患者外有宗藩之强内有絳灌之忠也文景之時天下家給人足㡬致刑措後世皆知稱慕莫能及之夫民之情何嘗不欲安樂而富壽哉文景能勿擾而已矣孝武喜淫侈慕神僊宫室無度巡㳺不息窮兵於四夷嚴刑而重賦迹其行事視秦皇何逺哉止以崇儒重道求賢納諫故其成敗若此之殊也孝昭以童稚之年辯霍光之忠確然不可動何天資之明也然光猶專政而不歸此則光之罪矣孝宣綜覈名實信賞必罰使吏稱其職民安其業方之孝武功烈優焉孝元優㳺不斷漢業始衰孝成荒於酒色委政外家孝哀狠愎不明嬖幸盈朝陵夷至於孝平以㓜冲嗣位王莾因之遂移漢祚莾恃其詐慝煩民玩兵罪盈怨積而天下叛之矣思莾朝以劉秀為大司馬狥河北卜者王冬更始北都洛陽政令無紀諸將恣横民皆廬江太守李憲自稱淮南王郎稱帝於邯鄲燕趙皆應之申甲二述元成公孫郎更始召秀還秀不應命殺尚書令謝躬略有春更始遷都長安隗囂入朝夏劉秀擊滅王狥闗中梁王劉永與青徐賊張步董憲連兵河北之地冬赤眉西趣長安劉秀亦遣鄧禹孫述自稱蜀王據東方公司馬溫公稽古録卷之十二
