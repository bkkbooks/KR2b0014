front:
  text: 司馬溫公稽古録卷之五
  hash: sha256:7cec235121501ad9da2ae8837b8d05f4f9317dcd3107df6e25a065e776081b19
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_SBCK_005-1a}
body:
  text: 夏后氏下舜受禪使禹宅百揆舜老以位傳禹曰朕居帝位三十有三載耄期倦于勤汝惟不怠總朕師厭倦萬機汝不懈怠于位稱總我衆欲使攝師衆也八十九十曰耄百年曰期頥年巳耄老禹辭帝曰克勤于邦克儉于家不自滿假惟汝賢宫室而盡力為民執心謙沖不自盈大滿謂盈實假大也言禹惡衣菲食卑其汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功失其能不有其勞而不失其功所以能絶自賢曰矜自功曰伐言禹推善讓人而不人衆天之曆數在汝躬汝終陟元后也大君天子陟升也元大人心惟危道心惟微惟精惟一允執厥中難安危則其難安然道之大要莫若信執其中微則難明精所以明其難明一所以安無稽之言勿聽非詢之謀勿庸終必無成故戒勿聽用無考無信驗不詢專獨可愛非君可畏非民衆非元后何戴后非衆罔與守邦可畏言衆戴君以自存君恃衆以守國民以君為命故可愛君失道民叛之故而立相須禹拜稽首固辭帝曰母惟汝諧惟汝能諧毋禁止辭之任和元后禹乃受命攝行天子事如舜之初舜崩禹三年喪畢即天子位會諸侯於塗山執玉帛者萬國又會諸侯於會稽長狄防風氏後至禹戮之禹命遠方圖物之物而獻之圖畫山川奇異貢金九牧牧貢金使九州之鑄鼎象其州之物著之於鼎象所圖物百物而為之備使民知神姦形使人逆備之圖鬼神百物之故民入川澤山林不逄不若也若順魑魅魍魎魅怪物魍魎魑山神獸形神水莫能逄之禹崩壽百年孔子曰禹吾無間然矣堯之崩也天下諸侯不歸丹朱而歸舜舜之崩也天下諸侯不歸商均而歸禹禹崩子啓賢天下諸侯皆曰吾君帝禹之子也相帥歸之啓乃即天子位有扈逆命兆鄠縣扈今京啓征扈滅之享諸侯於鈞臺有鈞臺陂陽翟縣南啓崩子太康立王太康尸位也尸主以逸豫滅厥德黎民咸二乃盤遊無度畋于有洛之表十旬弗反有窮后羿國窮君之因民弗忍王之惡拒于河王不得入國遂廢之立其弟仲康而相之夏室微弱王仲康崩子相立王相之時羿遂代夏政相失國依於同姓諸侯斟灌及斟鄩氏羿恃其善射不修民事而淫于原獸獵好佃棄武羅伯囚髠熊龍圉子四賢臣皆羿之而用寒浞寒浞伯明氏之讒子弟也明伯名寒君伯明后寒棄之夷羿收之氏夷信而使之以為巳相浞行媚于內人內宫而施賂于外愚弄其民之欺罔而娛羿于畋遊畋樂之以樹之詐慝以取其國家也樹立外內咸服詐信浞羿猶不悛也悛攺將歸自畋家衆殺而烹之以食其子靡奔有鬲氏夏靡有鬲國名遺臣事羿者浞因羿室妃妾就國生澆及豷切豷許澆五呌切醫恃其讒慝詐偽而不德于民使澆用師滅斟灌及斟鄩氏殺夏后相處澆于過處豷干戈后緍方娠逃出自竇懷身也音身后緡相妻娠歸于有仍有仍后緍女氏生少康焉為仍牧正之長牧官澆使椒求之臣椒澆逃奔有虞為之庖正虞思於是妻之以二姚有思以二女妻少康虞君也虞思自而邑諸綸邑綸虞有田一成有衆一旅五百人為旅方十里為成能布其德而兆其謀始兆以收夏衆撫其官職靡自有鬲氏收斟灌斟鄩之遺民以滅浞而立少康祀夏配天不失舊物也物事王少康立夏道中興少康崩子杼立王杼崩子槐立王槐崩子芒立王芒崩子泄立王泄崩子不降立王不降崩弟扃立王扃崩子廑立王廑崩不降之子孔甲立王孔甲之時夏德衰諸侯多叛之孔甲崩子臯立王臯崩子發立王發崩子癸立是為桀王桀都安邑滅德作威敷虐于萬方百姓用兵伐有施得其女末喜嬖之荒淫無度有以危亡為諫者桀自恃天命指日曰是日何時喪乎豫及汝偕亡關龍逄強諫桀殺之諸侯多叛桀歸商湯桀囚湯於夏臺欲殺之既而釋之湯乃與伊尹興師伐夏與桀戰于鳴條克之桀奔南巢夏后氏遂失天下夏有王與無王用歲四百三十二司馬溫公稽古録卷之五
