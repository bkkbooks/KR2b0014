front:
  text: 司馬溫公稽古錄卷之七
  hash: sha256:ffaa52017263b98c5c1669d47d40590d3d3381802fd7a67ba9fb1bda4f47b409
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_SBCK_007-1a}
body:
  text: 殷下王武丁思復興殷道亮隂三年不言羣臣咸諌王曰予恭黙思道夢帝賚予良弼我良佐夣天與乃以形求于天下傅說築傅巖之野惟肖州平陸界傅傅巖在今陜築此道以供食肖似也說賢而隱代胥靡刑人王召與語果聖人也爰立作相置諸左右曰啓乃心沃朕心若藥弗瞑眩厥疾弗瘳極其病乃除欲其出切言以自警開汝心以沃我心如服藥必瞑眩若跣弗視地厥足用傷言欲使爲巳視聽跣必視地足乃無傷說曰天立后王君公承以大夫師長不惟逸豫惟以亂民上言立之王使治民不使有位者逸豫民又曰惟治亂在庶官治失人則亂言所官得人則又曰無耻過作非文之遂成耻過誤而非大又曰非知之艱行之惟艱王曰若作酒醴爾惟麴蘖若作和羹爾惟鹽梅蘖過太甘調羹者釀酒者麴過太苦懲勸寛猛凡區處施設若大酋之釀酒膳夫之鹽過太鹹梅過太酸必求和適爲難良相治國冝乃爲善調羹曲盡其爾交修予罔予棄予惟克邁乃訓也言我能行政敎交非一之義邁行說曰王人惟學于古訓乃有獲得有所道積于厥躬王曰股肱惟人良臣惟聖有良人乃成聖手足具乃成人惟后非賢不乂惟賢非后不食賢須君食言君須賢治高宗祭成湯有飛雉升鼎耳而雊鳴也古后切祖巳曰惟先格王正厥事遭變異正事言至道之王消而異自高宗從之不敢荒寧嘉靖殷邦至于小大無時或怨人無是有怨者言無非善謀殷國至于小大之故享國五十九年崩號高宗祖庚立王祖庚崩弟甲立王甲時殷復衰甲崩子廩辛立王廩辛崩弟庚丁立王庚丁崩子武乙立王武乙復去亳徙河北王武乙崩子太丁立王太丁崩子乙立王乙崩子受德立受德一曰辛是爲紂王紂王都朝歌資辯捷疾聞見甚敏材力過人智足以距諫言足以飾非矜人以能以爲皆出巳下播棄黎老眤比罪人敬眤近也布棄不禮爲天下逋逃主萃淵藪平居弗祀上帝神祇宗廟恃其强大喜用兵百戰皆克伐有蘇得其女妲己惟妲己之言是用作奇技淫巧以悅之淫湎肆虐作炮烙之法膏銅柱下加之炭令有罪者行焉輙墮炭中以取妲己笑刳切庳胡剔切天易孕婦斮切側角朝渉之脛其脛耐寒斬而視之冬月見朝渉水者謂醢九侯脯鄂侯囚西伯於羑里酉羑音乆乃赦之既而西伯戡黎侯戡勝也近王圻之諸祖伊恐奔告于王王曰嗚呼我生不有命在天祖伊反曰嗚呼乃罪多參在上乃能責命于天參列在上天誅且至乃恃反報紂也言汝罪惡衆多天乎命于紂終不悛比于强諫紂怒曰吾聞聖人之心有竅剖比干心箕子懼乃佯狂爲奴紂又囚之微子恐殷絶祀遂奔周紂專任嬖臣飛廉惡來知政事於是周武王伐紂殷之士女皆篚其幣帛迎周師紂率其衆如林㑹戰于牧野紂卒皆不戰前徒倒戈攻于後以北紂走登鹿臺自焚死周遂滅殷自成湯受命至是凡六百二十九年司馬溫公稽古錄卷之七
