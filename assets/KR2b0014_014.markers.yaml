  - {type: variant, offset: 1426, length: 0, content: '', WYG: 主夏後秦將軍魏掲飛反時前秦主猶在安定後秦自以兵二千擊掲飛滅之令秋帝以倖臣王國寳為中書國寳專權恣横十六冬前秦主及後秦主戰於安定前秦敗魏主滅劉衛辰盡收其故地攻擊鄰國所向輙克魏於是悉降河南諸部衛辰子勃勃奔薛于部十七春句町王翟釗攻燕燕主擊破釗于滑臺盡有其衆釗奔長子依慕容永冬以黄門郎殷仲堪為荆州刺史仲堪及王恭尚書令王珣皆有寵於帝道子及王國寳惡之十八春涼王以鮮卑禿髪烏孤為河西鮮卑大都督兵冬後秦主萇殂太子興立前秦主聞之喜大赦起擊後秦魏王擊薛于部破之薛于送勃勃于後秦甲午十九前秦主崇延初後秦文桓帝興皇初元夏燕主攻慕容永滅之毛後秦將尹緯大破前秦主於廢橋前秦主走入馬山秋後秦主攻前秦主殺之前秦太子崇奔湟中}
