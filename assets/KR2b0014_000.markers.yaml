  - {type: variant, offset: 1031, length: 1, content: 溫, WYG: 光撰光既撰資治通鑑又有舉要厯有目録有厯年圖有百官表厯年圖仍依通鑑起于三晉終于顯徳百官表止著宋代是書則上溯伏羲下訖有宋靡不備載而為書不過二十巻葢以各書巻帙繁重又厯年圖刻于他人或有所增損亂其巻帙故芟除繁亂約為此編而諸論則仍厯年圖譜之舊陳振孫書録解題曰越本彚聚諸論于一巻潭本則分係于各代之後此刻次第葢依潭本較越本易于循覽朱子甚重其書嘗曰可備講筵續六經讀之雖推之未免少過然觀其諸論于厯代興衰治亂之故反覆開陳靡不洞中得失其言誠不悖于六經通鑑文繁猝不易究是編言簡而義該洵讀史者之圭臬也南渡以後龔頤正嘗續其書今永樂大典所載尚有全本然頤正人品遜光逺甚持論未允是非頗乖于}
