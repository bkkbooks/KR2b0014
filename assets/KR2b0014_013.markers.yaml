  - {type: variant, offset: 8440, length: 0, content: '', WYG: 能走漠北冬公孫淵斬呉使者首以獻呉主攻新城不克甲寅二春山陽公薨蜀諸葛亮以十萬衆自斜谷入寇呉主亦舉兵寇合肥襄陽廣陵司馬懿與亮相拒於渭南秋亮卒蜀師退蜀尚書令蔣琬代亮秉政帝幸壽春呉師亦退呉潘濬平五溪蠻三春郭太后崩蜀楊儀有罪自殺帝大治宫室羣臣楊阜等切諌雖不之罪亦不聽冬帝幸許昌幽州刺史王雄遣人刺殺軻比能鮮卑由是衰散立皇子芳為齊王芳實非帝子四春呉張昭卒冬帝幸許昌景初元春改定魏歴以建丑月為正秋呉朱然寇江夏冬全琮襲六安皆不克呉諸葛恪招撫山越得甲士四萬公孫淵反自稱燕王幽州刺史毌丘儉討之遇雨而還毛后以罪賜死二漢延熙呉赤烏元春遣司馬懿擊公孫淵秋拔襄平斬淵冬帝寢疾立皇后郭氏詔燕王宇及夏侯獻曹肇等輔齊王芳為嗣中書監孫資劉放惡獻肇以曹爽司馬懿代之蜀蔣琬}
