  - {type: variant, offset: 2524, length: 0, content: '', WYG: 王貲元冬魯侯齊人宋人陳人蔡人伐衛納惠公九衛惠公十二夏衛惠公入放敖黔牟于周殺二公子甲午十十一齊侯使連稱管至父戍葵丘過期請代弗許公孫無知有寵於僖公襄公絀之二人因以作亂冬弑襄公而立無知管夷吾召忽奉僖公子糾奔魯十二齊桓公小白元春齊雍廩殺無知夏魯侯伐齊納子糾桓公自莒先入秋魯師敗于乾時鮑叔使魯殺子糾而囚管仲以歸薦于桓公曰使相可也十三春魯用曹劌謀敗齊師于長勺秋荆敗蔡師于莘以蔡侯獻武歸十四十五宋閔公靳南宫長萬秋萬弑閔公及仇牧太宰督而立子游冬蕭叔大心及戴武宣穆莊之族以曹師伐之殺子游立莊公之子御説南宫萬奔陳宋人請而醢之僖王胡齊元年宋桓公御說元二夏鄭傅瑕殺鄭子而納厲公厲公入遂殺傅瑕又使讓原繁原繁曰臣無二心天之制也莊公之子猶有八人若皆以官爵行賂勸貳而可以濟事君其若之何乃縊而死秋荆入蔡三鄭厲公後元春諸侯㑹于鄄齊侯霸也四晉武公稱二十八曲沃伯滅晉冬王命曲沃伯一軍為晉侯}
