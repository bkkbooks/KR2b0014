body:
  text: 第一卷伏羲氏十年一百一神農氏十年一百四有熊氏年一百金天氏四年八十高陽氏八年七十高辛氏年七十第二卷陶唐氏一年一百第三卷有虞氏上五十年合下卷第四卷有虞氏下夏后氏上四百三十二年合下卷十七主第五卷夏后氏下第六卷殷上六百二十九年合下卷三十主第七卷殷下第八卷周上第九卷周下是以後年始可譜至共和初十一主自共和之初諸侯所自出魯公濞至愼齊公壽至武晉冝曰至靖侯秦仲至秦楚勇至熊宋公至僖衛侯至僖陳公寧至幽蔡侯至武曹伯喜至夷第十卷共和十四年元年至宣王六年四十幽王年十一平王一年五十桓王三年二十莊王年十五釐王年五惠王五年二十襄王三年三十頃王年六匡王年六定王一年二十簡王年十四靈王七年二十第十一卷景王五年二十敬王三年四十元王年八貞定王八年二十考王年十五威烈王四年二十安王六年二十烈王年七顯王八年四十愼靚王年六赧王九年五十秦昭王年五孝文王年一莊襄王年三始皇七年三十二世年三第十二卷西漢高祖年十二惠帝年七高后年八文帝三年二十景帝年十六武帝五年四十昭帝年十三宣帝五年二十元帝年十六成帝六年二十哀帝年六平帝年五孺子年三王莾年十四淮陽王年二第十三卷東漢光武三年三十明帝年十八章帝年十三和帝年十七殤帝年一安帝年十九順帝年十九冲帝年一質帝年一桓帝一年二十靈帝二年二十獻帝年三十魏文帝年七明帝年十三邵陵厲公年十四高貴鄉公年六元帝年五晉武帝五年二十惠帝年十七懷帝年六愍帝年四東晉元帝年六明帝年三成帝年十七康帝年二穆帝年十七第十四卷哀帝年四西海公年五簡文帝年二孝武帝四年二十安帝二年二十恭帝年一宋武帝年二營陽王年一文帝年三十教武帝年十明帝年八蒼梧王年四順帝年二齊高帝年四武帝年十一明帝年五東昏侯年二和帝年一梁武帝八年四十簡文帝年二元帝年三敬帝年二陳武帝年三文帝年七臨海王年二宣帝年十四長城煬公年六隋文帝年十六煬帝年十二恭帝年一唐高祖年九第十五卷太宗三年二十高宗四年三十則天后一年二十中宗年五睿宗年二玄宗四年四十肅宗年七代宗年十七德宗五年二十順宗年一憲宗年十五穆宗年四敬宗年二文宗年十四武宗年六宣宗年十三懿宗年十四僖宗年十五昭宗年十五哀帝年二梁太祖年六均王年十唐莊宗年三明宗年八潞王年二晉高祖年七齊王年四漢高祖年二隱帝年二周太祖年四世宗年五第十六卷歷年圖序第十七卷本朝太祖開實八年建隆三年乾德五年太宗淳化五年太平與國八年至道三年雍熙四年端拱二年第十八卷真宗天禧五年乾興一年咸平六年景德四年大中祥符九年第十九卷仁宗寶元二年康定一年天聖九年明道二年景祐四年第二十卷仁宗至和二年嘉祐八年慶曆八年皇祐五年英宗治平四年司馬溫公稽古録目録進稽古録表臣光言竊以九州四海一日萬幾將祭知民物之性情蓋布在文武之方策雖歷年多而舉其大要則用力少而見夫全功恭以皇帝陛下富有春秋敉寧方夏念終始典於學於緝熙單厥心延登老成親近觀講發論語章句探經蓻之同歸誦寶訓丁寧憲祖宗之不易有本如是實惟濫觴惟稽古堯舜之舊章惟信史春秋之成法高山可仰覆轍在前其興亡在知人其成敗在立政或當艱難之運而不能師用賢智或有惻隱之意而無以照知忠邪載籍之編患乎太漫鑒觀之主力不暇遑敢用芟夷略存體要由三晉開國迄于顯德之末造臣既具之于歷年圖自六合為宋接乎熙寧之始元臣又著之于百官表乃若威烈丁丑而上伏羲書契以來對越神人可用龜鏡悉從論纂皆有慿依總而成書名為稽古録二十卷因仍書局繕寫奏篇茲冒昧以下陳助聰明之遠覽臣光中謝恭惟太皇太后陛下定九鼎以守天下之重器乘六龍以御古今之正權思齊之功啓佑聖學過物之濟燕及宗祧至於法弊於涼而攺為官非其人而變置御戎之䇿上下措國之勢安危據舊以鑒新去彼而取此陶成萬化簡在兩宮七廟乘無疆之休微臣與不杇之業干冒宸扆無任正議大夫守尚書左㒒射兼門下侍郎上柱國河內郡開國公食邑四千一百戶食實封一千五百戶臣司馬光上進朱文公與鄭知院書熹鄉在長沙嘗得溫公稽古録正本别為刋刻殊勝今越中本欲待成書奏御未竟而來又欲靣奏行下取索則又未及而去每念此書溫公所以碩忠君父之志更歷三朝然後成就其論人君之德有三而才有五者尤為懇切不可不使聖主聞之不知可以一言及之行下本縣取索投進否然不必及熹姓名恐罪纍之跡延及先賢反致忠言不得聞逹也聞中司巳兼讀官幸更與議之同君舉子壽諸公共白之也朱文公語録中語溫公之言如桑麻榖粟且如稽古録極好看又曰稽古録一書可備講筵官僚進讀小兒讀六經了令接續讀去亦好
