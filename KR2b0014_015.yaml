front:
  text: 司馬温公稽古錄卷之十五唐太宗民世貞觀元年岌討斬之分天下為十道春涇州都督羅藝反統軍楊畜多死或勸帝擊之帝不許突厥部落離散國中大雪六二多賣子者詔春關中饑民帥梁師都斬之以其地為夏州秋放宫人數出御府金帛贖之右衞將軍柴詔擊延安賊為真珠可汗頡利始懼請稱臣尚主千使還家遣使拜薛延陁君長夷男三空裴春司於太極殿突厥頡利可汗舉兵攻突利突利寂流静州夏太上皇徙居大安宫上始聽政二道伐突厥突利率衆來奔來告急冬詔李靖李勣將兵四三千自馬邑直春李靖以驍騎乗其無備襲之俘斬十餘萬頡利奔沙鉢羅部抵惡陽嶺頡利大驚遁入鐵山請舉國内附靖縣屬於唐以突利為順州都督追擒之以獻於是大漠以南皆為州五國因高西域諸許之秘書監魏徴諌乃止昌王文泰上書請入朝上六萬口請内屬党項羗三十七午甲八邊詔李靖侯君集討之吐蕃賛普始遣冬右僕射李靖以疾辭位吐谷渾數盜貢使入九渾於牛心堆追至破邏真谷吐谷渾可夏太上皇崩李靖侯君集大破吐谷國人所殺國内亂詔侯君集復將兵往定之立汗伏允自殺其子順來降立以為可汗冬順為曷鉢其子諾十孫皇后崩夏文德長十一新禮上如洛陽春房喬上新律令及襲封刺史倣古諸侯夏詔以宗室功臣為十二觀䀋澤道蒲州歸春上自洛陽過砥柱二十萬上拜其二子為小可汗以分其勢突厥既亡薛延陁東遷盡有漠北之地勝兵十
