body:
  text: 三利弟結杜率作亂夜襲御營入四重幕折衝春停襲封刺史夏上幸九成宫突厥突可汗使建牙於河北之外諸胡在河南者皆使孫武開擊斬之秋立頡利族人思摩為突厥塞從出十四書侯君集擊之秋軍至磧石文泰病高昌王文泰恃逺驕倨春詔吏部尚擊破吐谷渾冬進冦松州詔侯君集擊之吐蕃死子智盛請降以其地為安西都護府吐蕃賛入謝懼遣禄東十五夏彗星見而止薛延陀可汗春上幸洛陽將以明年封泰山討之冬上還長安大度設走李勣追破之夷南遣子大度設屯白道川將攻突厥詔李勣罪請與突厥和親於諾真水夷南懼謝十六其君建武立其兄子高麗大臣蓋蘇文弑相之藏而十七賜死魏王奉隂結朝臣謀代太子春魏徴卒齊州都督齊王祐謀反子為庶人徙黔川徙魏王於鄖鄉立晉王治承乾太子懼與侯君集謀攻大内事覺夏廢太恪長孫無忌固争乃止為太子既又欲立吳王辰甲十八高麗蓋蘇文冬上幸洛陽怒欲自征之羣臣諫不聽詔發天下甲士十萬數侵伐新羅上遣使諭解之蓋蘇文不奉詔上子承乾卒於徙所皆㑹平壤故太十九子監國留居定州夏拔春上自將征高麗詔太秋攻安市城不拔班師薛延陁拔灼冦州夏蓋牟及白岩城高麗高延壽等以衆十餘萬降紇所殺兵敗為囬二十夏王道宗及李勣等出塞討薛春上自幷州還長安秋詔江來降置六都督府七州以撫之北荒悉平上延陀餘黨皆滅之鐵勒諸部及囬紇等十三姓冬還長安幸靈州二十一水而止夏上幸翠微宫春詔以來年封禪㑹山東大史那社爾等討焉耆冬詔左驍衞大將軍阿二十二秋房喬卒春上幸玉華宫黎布失畢延安西都護於龜兹兼綂于􅞔踈冬上還長安阿史那社爾拔馬耆虜其王訶之四鎮勒謂二十三上崩長孫無忌禇遂良受遺夏上幸翠微宫李勣卒勣為右僕射同中書門下三品詔輔政太子還長安即位秋李高宗治永徽元年冦車鼻可汙虜之分突厥地置春右驍衞郎將高侃擊突厥餘十餘年冬西突厥賀魯擊射匱可汙滅之單于瀚海二都護府以統之自是北邊無寇三二大將軍梁建方發回紇五萬擊之秋西突厥賀魯冦庭州詔左武侯三房大破春梁建為太子冬魏王泰卒於徙所西突厥於牢山秋立陳王忠四房遺愛柴令春駙馬都尉景呉王恪賜死江夏王道宗流象州武寧州刺史薛萬徹謀反伏誅荆王元寅甲五漲犯寢殿秋帝還長安春上幸萬年宫夏山水暴六敬宗中書舍禮部尚書許忌僕射禇遂良切誎司空李勣曰此陛下家事人李義府勸上立武昭儀為皇后太尉長孫無督令廢皇后王氏立武昭儀為皇后羣臣何敢與知秋貶禇遂良為潭州都顯慶元子秋左衞大將軍程知節擊破西突厥賀魯太子忠以非皇后子廢為梁王立代王弘為太劾中書侍郎李義府義方坐貶至怛篤城而還侍御史王義方二洛陽詔春上行如譖侍中韓瑗中書令來濟於桂州都督禇遂良右屯衞軍蘇定方擊賀魯秋李義府許敬宗逺州刺史謀反皆貶三其地置二都護府以故突厥小可春上還長安蘇定方擒賀魯分真分領之汗稱射步四無忌於黔州侍中于志寧亦坐免夏許敬宗誣長孫無忌謀反上徙所殺長孫無忌及韓瑗禇遂良皆以反法籍其冬上行幸東都許敬宗李義府使人即貶家五庶人徙黔州蘇定方破百濟虜其王義春上幸幷州夏還東都秋廢陳王忠為郡為五都督府慈分其地三十七龍朔元契苾何力左武衞大夏詔左驍衞大將軍任雅相三道伐高麗將軍蘇定方兵部尚書二方破高麗於葦島圍春上幸同州蘇定含元殿成上徙居之更命故宫曰西内平壤不克夏上還長安初作大明宫三右春疾政事皆委之武后時人謂之二聖上寖不能相李義府坐贓流嶲州上自顯慶以後苦風忿之制内甚子甲麟德元上官儀宻謀廢武后后知冬上與西臺侍郎同三品上毎聽朝政武后常垂簾於後政無大小皆與之上急歸罪於儀而殺之又殺故太子忠自是之聞二請封禪冬行幸泰山春上幸東都皇后上書乾封元泰山禪春上封襲位其弟男建男産攻之男生自拔來歸冬梁甫夏還洛陽高麗相蓋蘇文卒其子男生兵擊高麗詔李勣將二總章元高麗遣男産入朝勣進春李勣渡遼拔安市城地一百七十城六十九萬餘戸置安東都護府圍其王城秋拔之虜高麗王藏及男建悉定其之之以治二勣薨冬李咸亨元白州等十八州及安西四春吐蕃擊破吐谷渾夏陷欽陵大破仁貴於大非川遂滅吐谷渾吐谷渾鎮詔右威衛大將軍薛仁貴討之秋吐蕃將論餘衆入居靈州可汗諾曷鉢以二洛陽春上幸三長安冬還四戌甲上元元三品劉仁軌擊之秋上始稱天皇皇后高麗百濟既亡新羅寖强不受制春詔同號冬上幸洛陽稱天后又加祖宗謚二里城新羅王法敏降上春劉仁軌破新羅於七中書侍郎李義琰諌乃止夏太子弘薨廟號赦之上疾甚欲使天后攝政同三品郝處俊王賢為太子義宗立其弟雍儀鳳元長安夏上還二其地北際松吐蕃益强盛同三品劉仁軌中書令李敬真更將兵討之皆涼南及嶲茂方萬餘里數為冦於邊詔左僕射克不三審禮圍敬真於承風嶺將軍黒齒常之擊秋吐蕃破李敬真於青海虜副大總管劉使吐蕃由是不敢犯塞破之以常之為河源軍調露元西突厥匐延都春上幸洛陽北突厥德温傳及奉職反單于府二十四州皆支及遮匐反秋吏部侍郎裴行儉襲虜之冬兵三十萬討之應之詔裴行儉將永隆元黒山殺真可汗泥孰春行儉大破突厥於疑非天后子天后惡之乃廢賢立其弟英王顯匐虜奉職而還秋吐蕃寇河源太子賢自上還長安爲太子冬開耀元反其族人伏念自立爲可突厥餘衆復奉德温傳以多縱反間伏念執德温傳以降汗以應之秋詔裴文儉討之行儉永淳元幸東夏上突厥骨篤禄收餘衆反寇北邊都秋吐蕃寇柘松翼緒州弘道元寇定州春突厥遺詔軍國大事有不決者取天后處分中宗媯州圍單于都護府又寇蔚州嵐州冬上崩欲謀革命乃自臨朝稱制即位尊天后爲太后太后申甲申甲則天后曌光宅元年徙於均州立其弟豫王旦春太后廢中宗爲廬陵王巴州秋骨篤禄寇朔州詔将軍程務捉擊之爲帝常居别殿不得與政事故太子賢卒於使將軍李孝逸擊斬之侍中裴炎勸太后歸栁州司馬徐敬業罪狀太后起兵廣陵太后酷吏來俊臣等治之羣臣族滅者不可勝紀政太后斬之於是大開告宻之門賞以官爵使垂拱元王於房州春遷廬陵二奏冬同三品武承嗣譖春初置銅匭以受吏民章流儋州李孝逸三大總管黒齒常之擊走之秋骨篤禄寇朔州燕然道四堂夏春作明皇秋博州刺史琅邪王冲起兵欲誅諸武尋敗武承嗣使人詐為寳符獻之太后始稱聖母神岑長倩擊誅之遂誅韓王元嘉魯王靈䕫霍王死其父豫州刺史越王貞亦起兵太后使内使相繼夷滅殆盡元軌唐之宗室永昌元言魏玄同賜死冬右武秋内史張光輔棄市納誅皆酷吏周興所誣也衞大將軍黒齒常之族天授元為正月秋沙冬初以十一月浮提主太后始自稱大周聖神皇帝以睿宗為門法明偽造大雲經上之云神皇當代唐為閻封兄子承嗣三思等為王皇嗣賜姓武氏立武氏七廟二嘉福洛州人王秋鳳閣舍人張倩請治嘉福等罪冬長倩坐事誅突厥可汗慶之上書請立武承嗣為皇太子同三品岑長弟黙啜自立為可汗骨篤禄卒其子㓜弱長壽元孝傑大破吐蕃復冬武威軍總管王平章事李昭德收慶之杖殺之餘黨始息四鎮之地王慶之上書不已鳳閣侍郎二復春又譖皇嗣左右謀反太后使來俊臣推之皆自置安西都護府或譖皇嗣妃劉氏妃坐賜死嗣不反太后乃命停推秋太后自稱金輪皇誣服太常工人安金藏自刳腹出五藏以明皇帝午甲延載元天樞秋鑄天冊萬歲元慈氏越古金春太后自稱明堂火輪聖神皇帝萬歲通天元室王孝傑及吐蕃冬太后封嵩高禪少造明堂成夏營州契丹李盡忠孫萬榮反詔將論欽陵賛婆戰於素羅汗山孝傑不利更軍武攸宜擊之吐蕃寇涼州殺都督許欽明將軍張遇擊之秋遇敗沒於黄麞谷又詔大将代領其衆冬陷冀州李盡忠死孫萬榮神功元萬及契丹戰于東春王孝傑兵十八懿宗將兵二十萬討契丹不克契丹遂陷趙州峽石孝傑敗死夏鑄九鼎成詔大將軍武榮破斬之冬誅僧薛懐義突厥黙啜與奚合兵襲擊孫萬聖曆元用平章春太后太后使武延秀往受之黙啜怒曰安用武氏子事狄仁傑言迎廬陵王還洛陽黙啜請薦女為太子以討黙啜黙啜悉阬趙定民亡去秋發兵寇媯檀陷趙定二州乃立廬陵王二封春悉弄殺其相論欽陵夏欽陵弟賛婆率所部三皇嗣為相王初置奉宸府吐蕃賛普器怒帳來降千五百久視元復以正月為十一月秋内史狄仁傑薨冬長安元少卿張易之所譖自殺是時易之及弟昌宗得春改元大足秋太子長思郡王重潤為衞疾之冬太后幸長安幸太后勢傾海内中外二鹽夏州春黙啜冦三還東都冬太后辰甲四后有疾羣臣莫得進見唯張易之兄弟冬以秋官侍郎張柬之同平章事太黨援以自固常侍左右隂引中宗顯神龍元年暉司刑少卿桓彦範袁恕已大春柬之及平章事崔暐左丞敬於太子徙居上陽宫以恕已同三品暉彦範為將軍李多祚以羽林兵誅張易之等太后傳位韋后韋氏及帝女安樂公主上官昭容干預政納言尊太后曰則天皇帝復國號曰唐立皇后之等為王罷其政事尋又出為刺史冬太后事黨於諸武武氏權復振共譖柬之等夏封柬去帝號崩遺制二反法誅之置員外官二千餘人春駙馬都尉王同皎謀殺武三思以五王流嶺南殺之冬帝幸長安黙啜寇靈秋立子重俊為太子武三思復譖張柬之等死者三萬遂寇原㑹州州敗大總管沙叱忠義景龍元蕃安樂公主夏以宗女妻吐李多祚以羽林兵誅武三思攻玄武門不克而欲上廢太子重俊立已為皇太女秋太子與首祭三思死上以太子二城於漠南冬突騎施可汗娑春朔方總管張仁亶築三受降置東西都四銓斜封墨勑濫官不可勝紀葛攻安西都護呂牛素牛師奨殺之入寇邊州三西都護秋娑葛請降冬上祀南郊皇后春上與大臣觀宫女大酺以郭元振為安將蘇禄收餘衆自立為可汗爲亞獻黙啜擊娑葛虜之其睿宗旦景雲元年立温王重茂為帝韋后臨朝稱夏韋后與安樂公主鴆殺中宗基與前朝邑尉劉幽求等勒兵入宫誅韋后安制又欲殺相王及太平公主相王子臨海王隆位將立大子長子宋王成器以隆基有功固讓樂公主及韋武親黨少帝傳位於相王相王即薛訥大破吐蕃殺獲不可勝計蕃冦洮蘭鄯州冬隴右防禦使三太子西突春立子瑛為失畢五俟斤相繼來降厥十姓五咄六啜五弩四擊九姓拔曵固破之夏太上皇崩黙啜特勒殺黙啜諸子立其兄小殺用暾欲谷為謀恃勝輕歸拔曵固散卒追斬黙啜骨篤祿子闕來降冬改天后聖帝號為則天皇后主突厥復振囬紇同羅霫勃曵固五部五幸東春上都六臣可突干所逐奔營州都督許欽澹與奚冬上自東都還長安契丹王娑固為其酺皆死可突干立娑固從弟鬰干為王王李大酺合兵擊可突干不勝娑固大七八請西發拔悉宻東奚契丹掩襲其庭拔悉宻貪秋突厥俘契宓部落以歸冬朔方道總管王晙滅之因入冦涼州盡有黙啜之衆利先期至小殺用暾欲谷謀盡擊九同三司姚秋開府儀薨崇十南都護詔内侍楊思朂討平之慶州降春上幸東都秋安南賊帥梅叔馬陷安胡五萬於許鄧諸州空朔方之地省鎮兵二十胡康願子反朔方節度大使䛫説討斬之遷降入諸王公主外戚之門萬詔非至親毋得出十一州宴父老給復五春上自東都幸潞上脩漢武故事祀后土於汾隂尋還長安年遂幸幷州以幷州為北都中書