休代之秋欽州蠻黄少卿冬䞇罷相為太子賓客得幸於上陸䞇極言其姦十一䞇貶忠州上欲夏裴延齡譖陸子司業劉濟擊奚王啜利破之河東帥李以延齡為相諫議大夫陽城欲裂其麻坐改國冬横海將程懷信逐其帥程懷直而代之自良卒以司馬李説代之秋侍中馬燧薨十二霍仙鳴為左右神䇿軍中尉上自漢中還稍夏田緒卒子李安代之初以中官竇文塲萬榮卒以東都留守董晉代之裴延齡卒稍罷諸宿將不令典兵而以中官代之秋李十三之後事無大小皆自決之宰相奉行文書夏韋臯破吐蕃克雋州上自陸䞇罷相京兆尹李實翰林學士韋執誼等毁譽任情賞而已然所詢謀倚信者皆纖邪之人裴延齡及市强買人物京師苦之罰益紊焉又令中官掌宫十四逐神䇿行營帥夏長武城軍亂崇文為長武兵馬使全義鎮夏州韓全義都虞侯高崇文遏定之以十五卒宣武春董晉逸凖尋卒以衙將韓弘代之秋陳許帥曲環軍亂殺司馬陸長源以宋州刺史劉逸凖為帥討之朔方等道副元帥渾瑊薨十六道軍不卒吳少誠遣兵攻掠臨頴圍許州詔十六道軍於小殷水相統壹自潰十六諸軍皆屬焉全義無將略以春以韓全義為淮西招討使陳州河北宣武軍皆逃歸徐泗帥張建封卒賄結中官得之夏諸軍潰於五樓全義退保克卒以愔為留後又復吳少誠官爵軍中立其子愔詔淮南杜佑討之不十七全義春韓甚厚或告浙西觀察使李錡謀反上執送錡班師上不知其敗而以招降吳少誠為功寵賜麟州鹽州大掠而去韋臯大破吐蕃於雅州燒殺之王武俊卒子士真代之秋吐蕃陷十八維州吐蕃相論莾熱救之臯擒莾熱以獻春韋臯遣其將陳洎擊破吐蕃拔七城圍之十九時棊待詔王叔文得幸於太子與執誼秋韋執誼譖左補闕張正一等皆坐貶等結為死友疑正一言其朋黨故毀逐之及朝士陸淳呂温韓曄韓泰栁宗元劉禹錫申甲二十之上毎除節度使常遣中使探其軍情春昭義帥李長榮卒以衙將盧從史代情所附用之太子始得風疾不能言所附者用之從史隂賂中使奏云為軍順宗誦永貞元年朝以韋執誼為平章事王叔文春德宗崩順宗即位疾不能視朋黨勢傾海内夏立子純為太子程懷信為翰林學士待詔王伾為散騎常侍相與建置俱文珍等與韋臯共請使使太子監國秋詔傳卒子權代之王叔文等謀奪中官兵權中官皆貶死韋臯卒副使劉闢代之位太子自稱太上皇叔文伾執誼皆憲宗純元和元年發兵攻陷東川平章事杜黄裳春太上皇崩劉闢求領三川金討斬之夏李師古卒弟師道代之秋高薦高崇文使討之靈夏楊惠琳反衙將張承兩川皆平崇文擒劉闢二張文良等討擒之秋浙西李騎反衙將三卿降赦夏黄少日久德宗優容之聞上英武懼而入朝上初即之秋以山南東道帥于頔同平章事頔跋扈使之心陛下必欲天下治宜稍裁以法度上從位杜黄裳曰貞元中節度使皆出於軍士與中稍可制御之故藩鎮四棣二州許之夏度支使李巽卒春王士真卒子承宗自立請獻德薛昌朝虜之詔中尉吐突承璀討承宗立子巽善治財賦過於劉晏冬王承宗獻德棣襲申州刺史吳少陽代之寧為太子吳少誠卒以五承宗而隂與之通盧從史建議討王承宗因言為從史所賣乞昭洗詔許之秋劉夏衙將烏重胤執從史以聞吐突承璀久無功昭舉族入朝詔左庶子任迪簡代之濟子聰弑濟而代之冬易定張茂六天寳以夏詔以寡廩給日多悉令詳定減併冬太子寧薨來中原宿兵至八十餘萬内外官萬員財賦日七年十一冬魏博軍亂逐懷諫以衙將田弘正立子桓為太子秋田季安卒子懷諫伐之書舍人裴度宣慰之軍中大悦代之弘正因獻籍請吏上令中八貶恩王傅春于頔坐事逐其帥李進賢詔夏州張煦代之秋併天威入神䇿軍冬振武軍亂午甲九吳秋平章事李吉甫䇿不授節鉞以山南東道帥嚴少陽卒子元濟自領軍務出兵攻掠鄰境上用中事委平章事武元衡及中丞裴度李師道王綬為招撫使合諸道兵討之吉甫尋卒上以軍元濟上不許承宗屢請赦十擊傷度或請罷度官以安二鎮夏師道承宗使賊殺武元衡幷西益急秋師道復遣賊入東都謀亂留守呂元心上怒曰如此姦討得行即拜度平章事討淮以韓弘為淮西都討代之膺討誅之嚴綬為元濟所敗十一北軍討王承春詔河東河敗朝議多欲罷兵上曰豈可以一將失利便沮宗王太后崩夏唐鄧帥高霞寓為元濟所數人羣臣乃不敢言冬易定帥渾鎬為王承成計但當議討賊方略耳又貶將相請罷兵者蠻陷扈州宗所敗黄十二軍土亦厭兵欲赦元濟裴度夏以國用不足罷討承宗諸李逢吉欲沮度事上罷逢吉相專任度度至悉以為不可秋以度為淮西宣慰處置使平章事李愬夜入蔡州擒元濟淮西悉平罷監軍督諸將進戰屢捷冬唐鄧帥十三權請春程贖上許之李師道請獻三州既而悔之秋詔罷鎮入朝王承宗納二子及徳棣二州以自事時上稍驕侈鎛以聚斂得幸冬靈夏平涼宣武等五鎮討之户部侍郎皇甫鎛同平章蕃克復原州三道大破吐十四降分十三州為淄青鄆濮沂春淄青將劉悟殺李師道以皇甫鏄譖裴度出鎮河東秋沂州軍亂殺其海三道夏詔諸州兵皆屬刺史罷其鎮將入朝為中書令田弘正朝請留不許帥王遂詔棣州刺史曹華代之韓弘十五服上貶皇甫鏄崖州尊母郭妃為太后冬王金丹多躁忿春中官陳弘志弑上穆宗即位正代之徙承元鎮義成吐蕃党項寇涇州承宗卒軍中立其弟承元承元請帥詔以田弘寇雅州吐蕃又穆宗恒長慶元年二鎮以帝妹太和公主嫁囬夏劉總納地請爲僧分范陽爲靖又襲瀛莫取之成德將王廷湊殺田弘正紇登邏可汗秋范陽將朱克融囚其帥張弘圍深冀帥牛元翼於深州冬以裴度爲幽鎮招魏博帥李愬卒詔弘正子布代之王廷湊許帥李光顔代之朝廷力不能兼討兩賊乃討使督諸將討之滄德帥杜叔良敗於博野以靖赦之專討王廷湊以朱克融不殺張弘二衙將史憲誠代之以春魏博軍亂田布自殺地武寧副使王智興逐其帥崔羣秋宣武將國用匱竭幷赦王廷湊廷湊逐牛元翼而取其之冬上有疾立子湛爲太子韓弘薨李㝏逐其帥李愿詔韓弘弟充鎮宣武討平三寅甲四􅍬李逢吉爲相而踈裴度是以再失河春上崩上喜宴遊爵賞多濫以崔植元譖户部侍郎李紳貶端州尊母王氏為太后朔憲宗之業衰焉初上卽位年十六李逢吉敬宗湛寳曆元年留後僕射李絳請除近澤潞將秋昭義帥劉悟卒子從諫求為密使王守澄固請以節鉞授之帥代悟令倍道之官李逄吉及樞二帥裴度同春詔興元海帥李全略卒子同捷代之幽州軍亂殺其平章事李逢吉之黨百計毁之上不聽夏横明等弑上李絳王悟王守登等討誅之立江王帥朱克融以都將李載義代之冬軍將蘇佐無度故及於禍昻敬宗輕佻逰戯文宗昻大和元年烏重胤代之同捷不受詔冬詔夏徙李同捷鎮兖海以天平帥厚為相頗革兩朝弊政既而多疑少決中外失諸道討之上初即位恭勤庶務以裴度韋處望二取滄景數出兵侵鄰道以沮撓官軍冬詔秋王智興攻李同㨗拔棣州王廷湊謀其衆作亂義成帥李聰擊破之韋處厚薨諸軍討廷湊魏博將亓志紹為廷湊所誘以三朝詔李聰代之分磁相衞三州為别鎮聰至舘夏横海帥李祐破李同捷斬之史憲誠請入授進滔節鉞仍赦王廷湊冬南詔蠻反陷戎陶魏博軍亂殺憲誠逐聰立衙將何進滔秋詔州外郭大掠而去嶲卭雅四州反益四詔左丞温造代之秋裴春興元軍亂殺其帥李絳也僧孺宗閔素與義成帥李德𥙿有隙争植朋度以病出鎮襄州平章事牛僧孺李宗閔惡之去河北賊易去朝中朋黨難黨迭相傾軋上不能治而歎曰五志誠逐其帥春范陽將楊上患中尉王守澄專權隂與平章事宋申錫謀李載義上用平章事牛僧孺言以志誠代之湊謀反貶申錫開州注始用事衣冠往往附之去之守澄用其客鄭注謀誣申錫與上弟漳王六以城降西川帥李德𥙿請乗釁取之牛僧孺冬立子永為太子吐蕃維州守將悉怛謀悔將何及詔悉縳還賛普賛普烹之由是德𥙿曰得一維州而失大信若吐蕃因此名以入寇益甚怨僧孺七章事牛僧孺李宗閔皆罷相春以兵部尚書李德𥙿同平寅甲八訓善講易上悦之范陽將史元忠逐其帥楊春上有風疾鄭注始以醫得見因薦其黨李訓訓注奸邪訓注乃薦興元帥李宗閔為相以德志誠而代之上欲授李訓鄭注官李德𥙿言湊卒子元逵代之𥙿鎮浙西王廷九貶上以中官太盛元和夏李德𥙿李宗閔皆坐事謀誅之秋以注鎮鳳翔以訓同平章事罷王守弑逆之黨尚在左右畏而惡之隂與李訓鄭注甘露降謀伏兵誅中官不克中尉仇士良率兵澄兵柄酖殺之中官禁軍畏之側目冬訓詐為二族京師大駭以僕射鄭覃户部侍郎李石同殺訓及宰相王涯賈餗舒元輿等幷鄭注凡十三表請王涯等罪名中官稍沮平章事於是中官益横劉從諫開成元帥蕭洪秋鄜坊后弟賜死坐詐稱蕭太二三石懼求罷相出鎮荆南春仇士良使盜擊傷李石於上前上亦不能有所是非也秋莊恪太子是時楊嗣復陳夷行李珏鄭覃為相且相詆斥欲立安王溶李珏非之乃止永以憂薨楊賢妃譖之也賢妃四度薨遺表以春中書令裴坐詐稱太后弟流嶺南鄭覃陳夷行坐與楊儲嗣未定為憂金吾將軍蕭本泉州人蕭弘敬宗子陳王成美為太子嗣復李珏不叶罷相秋立五仇士良魚弘志春上冇疾中尉宗即位誅陳王及楊賢妃安王秋知樞宻劉矯詔立頼王炎為太弟廢太子為陳王上崩武州李珏貶昭州復以華州刺史陳夷行淮南弘逸薛季稜謀廢立不克而死楊嗣復貶潮何進滔卒何弘敬代之帥李德𥙿同平章事冬武宗炎㑹昌元冬雄軍使張仲武討誅之以張仲秋幽州將陳行泰殺其帥史元忠州武鎮幽二回紇焚蕩殆盡烏介可汙劫太和公春回紇薛特勒可汙死黠戞斯大破赤心寇幽州張仲武擊破之别將温沒斯殺赤主南渡漠上用李德𥙿䇿慰撫之秋回紇將河東劉沔及張仲武討之心以降烏介侵掠振武詔三大破烏介奪公春河東將石雄鉞李德𥙿請討之羣臣多言不可上用徳裕䇿主以歸烏介奔室韋夏劉從諌卒兄子稹求節與諸軍討之二鎮皆聽命秋李宗閔貶郴州遣使諭魏鎮以澤潞與河北不同不當承襲令子甲四之還言弁有十五里光明甲李德𥙿知春河東將李弁逐其帥李石上遣使視軍呂義忠斬弁以獻秋昭義將郭誼斬劉稹其詐言於上曰寧赦劉稹不赦楊弁上從之監幷誅之冬牛僧孺貶瑞州以降詔以誼首為稹畫反計五上好神仙術道春王太后崩道滌煩耳至於軍國政事當問卿及次對官雖士趙歸真得幸李德𥙿諫上曰朕聊欲與之談寺四千餘所省僧二十六萬餘人百歸真無能惑也夏詔廢天下六士藥得疾春上服方鄭氏為太后以翰林學士白敏中同平章事李不能言立光王忱為太子上崩宣宗即位尊母士等多疾之宣宗亦惡其權盛故罷相德𥙿出鎮荆南德𥙿用事久白敏中及朝宣宗忱大中元年太后崩拜黠戞斯為英武可春復天下佛寺及僧尼夏蕭貴威倖臣犯法絲毫無借由是中外肅然常曰汗上性明察勤於政理重惜官爵未嘗輕授朕安敢專之高祖太宗之法二太后郭氏崩回紇烏介可春李德𥙿貶潮州夏太皇先奔磧西自稱可汗歲時朝貢無復昔時之盛汗死弟阿捻代之黠戞斯虜之以歸其甥龐勒三七關内附詔涇原帥康季榮靈武帥朱叔明春吐蕃相論恐熱以秦原威三州及石門等武卒子直方代之秋吐蕃維州内附李德邠寧帥張君緒出兵應援悉定其地夏張仲亂逐其帥張直方𥙿貶崖州幽州軍四允仲為節度使秋以幽州衙將張五户夏臣無敢請立太子者謩獨首以為言且泣上甚部侍郎魏謩同平章事先是累朝非上有意羣瓜沙伊肅等十一州内附詔置歸義軍以義潮感之然不能用秋吐蕃沙州刺史張義潮以盡復河湟之地為節度使於是六大和以後轉運使非其人姦夏以轉運使裴休同平章事什無三四大隳劉晏之法休作漕法十餘歲漕吏盜切沈溺歲漕江淮米四十餘萬石入渭者萬石更無敗溺入渭者一百二十七戌甲八九十十一川王光逵卒詔其子紹鼎代之秋又卒弟紹春平章事令狐綯惡魏謩切直譖之謩出鎮西之懿代十二刻羣獠故獠引蠻入寇攻掠州縣夏林邑蠻寇安南時都護李涿侵十三長等立少子䕫王上崩左軍中尉王宗實立秋上寢疾大臣莫得見遺詔内樞宻使王歸后党項寇邠寧以翰林學士渾諴鎮邠寧諭長子鄆王漼爲帝誅歸長等尊帝母眺氏爲太之降懿宗漼咸通元年賊仇甫攻陷州縣觀察使王式春令狐綯坐招權罷相浙東諫被誅軍旅數起百姓愁怨唐室由是遂衰討平之上奢侈無度崇尚佛敎嬖倖用事忠二禁軍及江西湖廣兵擊之連年不克自是諸秋林邑蠻攻陷安南詔神䇿將軍康承訓率天下騷動矣道發兵不絶三寧軍亂逐其帥温璋𥘉王智興春分嶺南邕廣為東西道秋武牟親為之把板唱歌日費萬計猶喧訴無厭憚召募頑獷數千人為衙兵驕不可制節度使田以兵還鎮悉收掩衙兵誅之璋嚴而逐之詔王式鎮武寧四申甲五蠻寇邕夏林邑率禁軍㑹諸道兵討之管詔徐州經略使高駢六於邕州遂復安南諸夏高駢大破林邑蠻親為賛唄以栴檀為二高座賜安國寺僧其餘州冬太皇太后鄭氏崩上好奉佛於禁中此類奢靡皆七鼎子景崇代之春王紹懿卒詔紹八州武寧軍士冬南詔蠻陷嶲主掠潭湘北還徐州淮南將李湘白其帥令狐戍桂州者過期不得代因作亂推判官龐勛為徐軍合則不可制綯不從綯請邀擊之曰若過淮與九其帥崔彦曽散庫秋龐勛陷徐州殺討之冬勛遣兵陷徐和濠三州淮南皆𬒳其害財募兵至十萬遂圍泗洲表求節鉞詔諸道兵十為勛所敗秋招討使馬舉代之賊宿將張玄春徐泗招討使康承訓督兵七萬討龐勛屢耶赤心討勛有功以為振武軍節度使賜姓李稔降與舉合攻徐州勛走死渙水中沙陀朱卒子全皥代之名國昌何弘敬十一平章事上愛女同昌公春翰林學士韋保衡同之秋同昌公主薨毉官皆族誅平章事劉瞻主婿也魏博將韓允忠殺其帥何全皥而代不克是時上幼弱政事出於羣下南衙北司互夏長垣賊帥王仙芝陷濮州天平帥李穜討之饉徐兖江淮盜賊羣起州縣莫能制相乖戾選任非材賞罰散亂因之饑三陷曹州王仙芝許襄鄧虜人為兵衆號三十萬又陷汝州攻唐詔將軍齊克讓鎮兖海以討之仙芝引兵入陳守所過殘滅邑落無遺鄧安黄諸州皆閉城拒四招討草賊使冤句春以平盧帥宋威為請致仕子可舉代之秋黄巢自沂海趣頴蔡賊帥黄巢攻陷鄆州逐其帥薛崇夏李茂勲東幽州昭義王鎮討之冬王仙芝攻江陵陷與王仙芝合攻陷隨州李國昌寇雲朔詔河郭外五威擊斬之其將尚讓收餘衆歸黄巢詔平春李國昌陷遮虜軍王仙芝攻洪州宋東西道陷福建諸州秋李國昌陷岢嵐軍章事王鐸為都統討之巢陷虔吉饒信州自浙昭義帥李鈞於洪谷鈞死冬李克用破河東帥崔季康六崔季康詔司馬春河東軍亂殺平章事鄭畋請以廣南授巢盧攜曰浙東帥高康傳圭代之黄巢陷桂州廣州求天平節鉞上前忿爭罷相冬以高駢為江西招討使復以駢智勇無雙使綂諸軍賊不足平夏畋攜皆坐相攜為廣明元鄭從讜代之黄巢軍大疫逆掠春河東軍亂殺康傳圭詔平章事以高駢代之夏李可舉與吐渾赫連鐸大破湖南江西陷潭州殺王鐸將李係鐸奔襄陽詔黄巢巢請降駢奏罷諸道兵巢遂擊殺張璘引李克用克用父子奔逹靼高駢將張璘屢破潼闗上幸興元巢入長安自稱齊帝兵北渡駢嚴兵自固巢遂陷東都破中和元河春畋破賊將尚讓於龍尾陂傳檄藩鎮王師復振中將王重榮逐其帥李郁而代之鳳翔帥鄭都統昭義將孟方立據郉州稱留後鄭畋李克用寇太原秋上幸成都復以王鐸為行在病赴二入城賊偽遁去還擊處存敗之賊因屠春諸道援兵集長安義武帥王處存先平帥曹全晸殺之詔赦李克用使之討賊長安秋賊將朱晃以同州降冬韓簡攻太代之鄭畋薨王景榮卒子鎔三代之夏李克用及諸軍大春魏博將樂彦貞殺韓簡而州春陵人以克糧食淮西帥秦宗權降賊秋破黄巢克長安巢南走轉掠鄧許汴洛徐兖等帥李國昌卒忠武將鹿弘晏陷興元以克用鎮河東朱晃鎮宣武冬鴈門辰甲四泰山秦宗權稱帝李克用還過汴朱晃謀夏李克用㑹關東諸軍討黄巢大破之巢走死冬鹿弘晏陷許州殺周擊秦宗權擊殺之殺之不果朝廷和解之秋官軍拔興元光啓元内三蜀而已杭州刺史董昌殺浙東帥春上還長安時藩鎭䟦扈朝廷所制惟關田令孜與王重榮爭鹽池率邠寧帥朱玫以劉漢宏夏幽州將李全忠殺李可舉而代之令孜軍敗上幸鳳翔討之李克用救重榮冬二夏玫立襄王煴爲帝春朱玫反上幸興元之冬詔朱晃兼鎮義城邠寧將王行瑜殺赦克用重榮使討玫秋李全忠卒子匡威代孫儒逐河陽帥諸葛仲方玫降煴走死河中秦宗權三殺其帥周寳春浙西將劉浩宣州帥秦彦為帥秦宗權圍汴州天平帥朱上還鳳翔夏雄南將畢師鐸殺其帥高駢迎重榮以兄重盈代之冬盧州刺史楊行宻攻拔瑄兖海帥朱瑾救之宗權走河中軍亂殺王走歸孫儒揚州彦師鐸文德元衙將羅弘信代之立壽春上還長安樂彦貞卒帥李罕之罕之引河東兵攻全義朱晃擊却之王曄為太弟上崩河南尹張全義逐河南行宻走宣州朱晃拔蔡州斬秦宗權遣其將丁㑹鎮河陽孫儒陷揚州楊昭宗曄龍紀元年敬瑄夏郉洛帥孟方立卒弟春壁州刺史王建攻西川帥陳虔裕擊却之杭州刺史錢鏐攻拔潤州殺劉遷代之李克用使李罕之攻遷朱晃使兵將王錢浩大順元鐸鐸與朱晃李匡威同請討之夏以春李克用虜孟遷又攻雲州帥赫連孫揆殺之冬克用將李存信敗濬於隂地遂拔平章事張濬為招討使討克用克用擒澤潞帥詔復克用官貶濬連州晉絳掠河中朝廷震恐二魏博拔十縣孫儒春宣武將龐師古攻復入揚州夏王建克成都殺陳敬瑄而代之圍楊行宻三年不克其衆執儒以降行密行密威軍使李順節討之復恭奔商州朱晃攻武詔中尉楊復恭致仕復恭擁兵不受詔詔天傳破之寧帥時景福元順節斬之冬楊復恭走依興夏中尉劉景宣西門重遂誘李國帥韓建等請討守亮上不許李茂貞擅出兵元帥楊守亮鳳翔帥李茂貞邠寧帥王行瑜鎮之楊復恭守亮走死乾元攻抜興元以其子李繼宻鎮二李匡威救之弟春克用攻鎮州州殺時傳以其將龐師古守之秋置鎮海軍匡籌自立而逐匡威死於鎮州夏朱晃拔徐之不利茂貞逼京師上殺平章事杜讓能而以於杭州李茂貞求兼興元上不許發禁兵討授之興元寅甲乾寧元存孝使其將馬師素守之春李克用拔邢州殺其帥李克用拔雲州執赫連鐸使其將薛志勤守之冬夏孫儒將劉建峯陷潭州自稱湖廣節度使李鎮之李匡籌走死於景城又拔幽州使幽州將劉仁恭二珂代之浙東春王重盈卒子貞王行瑜韓建使舉兵詣闕殺平章事韋昭度帥董昌自稱羅平王平章事崔昭緯召李茂幸南山踰月而還詔克用先討行瑜冬拔邠州李磎秋李克用舉兵討二鎮邠岐兵謀劫上上瑜斬行三代之鎮海帥錢鏐攻斬董昌詔鏐兼夏湖南軍亂殺劉建峯邵州刺史馬殷兵向闕上將幸河東至渭北韓建迎上幸華州鎮兩浙李克用攻魏博不克秋李茂貞舉謝罪請修宫闕許之茂貞遂焚長安冬茂貞四瑄又拔兖州朱瑾奔春朱晃拔鄆州殺朱王典禁兵惡之乃囚諸王悉散禁軍二萬餘人淮南於是河南諸州多為晃所有韓建以親將龎師古攻楊行宻行密使朱瑾擊擒之劉秋盡殺諸王立皇子𥙿為太子冬朱晃使其克用於安塞仁恭大破李光化元威以其子守文代之夏春劉仁恭逐滄景帥盧彥磁三州取之秋上還長安羅弘信卒子紹立皇后何氏宣武將葛從周攻李克用邢洺據澤潞降於朱晃威代之李罕之二州進攻魏州朱晃使其將春劉仁恭将兵十萬屠貝黄夏宣武將氏叔琮攻河東不克陜州將張存敬葛從周救之與羅紹威大破仁恭於内友謙殺璠而代之遂以陜歸朱晃李璠殺其帥王拱而代之冬别將朱三攻抜梓夏王建三鎮兵攻王鎔鎔請和晃遂逐易定帥王郜以州殺其帥顧彦暉詔建兼鎮兩川秋朱晃合冬中尉劉季述幽上於東内立太子𥙿為帝神易定將王處直代之平章事崔胤抑損宦官攻季述斬之䇿將孫德昭天復元朱晃攻河中王珂降之春上返政廢太子為德王晃欲悉誅宦官冬全誨劫上幸鳳翔胤趣晃迎是時中尉韓全誨善於李茂貞崔胤隂結朱翔上詔晃還鎮晃退攻邠寧帥李繼徽取之鑾駕晃進攻華州韓建降之遂入長安進至鳳二破之遂進拔汾州圍晉陽不克而還夏朱春河東将周德威攻磁隰宣武將朱友寧擊襲鄜坊帥李周彜取之於是茂貞大懼斬韓全晃以兵五萬自河中進圍鳳翔冬宣武將孔勍晃和親誨等與三劉潯拔兖州夏楊行宻攻鄂兵帥春上還長安盡誅諸宦官平盧將盧帥王師範楊行宻救之殺友寧朱晃復追將杜洪荆南帥成汭救之汭敗死朱友寧攻平師晃屯河中崔㣧募六軍晃惡而殺之楊師厚攻師範冬師範降李茂貞逼京子甲哀帝祝天祐元年衞士李茂貞與邠寧帥楊崇本春朱晃逼昭宗遷都洛陽悉坑昭宗立輝王柷為帝冬晃南擊楊行宻以侵擾關中秋晃自討之隂令樞宻使蔣玄暉弑隱為節度使廣南衙將劉二殺昭宗子九王夏又殺朝士裴春楊行宻拔鄂州殺杜洪朱晃南帥趙匡明取之以其將高季興鎮荆南匡明樞等於白馬秋晃自將攻襄鄧帥趙匡凝荆壽州不克晃殺蔣玄暉弑何太后奔西川王建始得䕫峽之地冬晃攻三晃羅春朱州劉仁恭求救於李克用冬克用使將周德威紹威攻滄景誅魏愽衙兵八千家秋晃急攻滄略晃聞之乃還楊行宻卒子渥代之李嗣昭攻澤潞帥丁㑹取之以嗣昭鎮澤梁太祖晃開平元年川天復七夏受唐禪河東鳳翔淮南天祐四西臣光曰髙祖舉晉陽精兵承亡隋之弊席卷長驅奄有關中命將出師掃除亂略遂降李密係建德禽世充芟武周翦黑闥夷蕭銑六年之中海内咸服何成功之速哉蓋以太宗爲之子也太宗文武之才高出前古驅䇿英雄罔羅俊又好用善謀樂聞直諫拯民於湯火之中而措之祍席之上使盗賊化爲君子呻吟轉爲謳歌衣食有餘刑措不用突厥之渠係頸闕庭北海之濱悉爲郡縣蓋三代以還中國之盛未之有也惜其好尚功名而不及禮樂父子兄弟之間慙德多矣高宗沉溺宴安仁而不武使天后斵喪唐室屠害宗枝毒流縉紳迹其本原有自來矣中宗久罹幽辱備甞險阻一旦得志荒淫不悛糞土之牆安可汚也睿宗鑒前之禍立嗣以功所謂可與權矣明皇能斷有謀再清内難開元之初憂勤庶政好賢樂善愛民利物海内富庶四夷賓服浸淫於正觀之風矣及天寳以降自以為功成治定無復後艱志欲既滿侈心乃生忠直寢踈讒諛竝進以娛游為良謀以聲色為急務以李林甫楊國忠為周召以安禄山哥舒翰為方虎癰疽結於心腹而不悟豺狼游於藩籬而不知一旦變生所忽兵起邊隅廟堂執檄而心醉猛將望塵而束手腥膻汚於伊洛流血染於河潼乗輿播蕩生民塗地禍亂竝興不可救藥使數百年之間干戈爛漫而不息嗟乎靡不有初鮮克有終安之不可恃治之不可保如此夫肅宗以國之元子收兵靈武反斾而東不失舊物代宗分命羣帥翦除凶醜使大河南北復為唐臣其功皆不細矣然此二君者武不足以决疑明不足以燭理向無郭子儀之忠李光弼之智因僕固懷恩以用囬紇之師則天下已非唐有矣夫以肅宗之孝慈而制於李輔國不能養其父惑於張后不能庇其子則其武可知矣以代宗之寛仁而聽讒臣之言使光弼不敢入朝慙憤而死懷恩招引外冦幾再亡國則其明可知矣而又不思經逺之謀專為姑息之政盗賊據州郡者因用為牧守士卒殺主帥者因授之旌鉞使強暴縱横下陵上替積習成俗莫知其非唐之紀綱大壞不可復振則肅代之為也德宗憤積世之弊憫王室之卑南面之初赫然有撥亂之志而識度闇淺資性猜愎親信多非其人舉措不由其道賦斂煩重果於誅殺故關外之冦未平而京師之盗先起矣於是困辱於奉天播遷於山南公卿拜於賊庭鋒鏑集於黄屋尚頼陸䞇盡心於内李晟渾瑊輸力於外故能誅夷元凶還奉宗社自是之後消剛爲柔刓方爲圓逮其晩節偷懦之政甚於祖考矣順宗不幸嬰疾奸邪肆志而能委政冡嗣以安社稷足爲賢矣憲宗聰明果決得於天性選任忠良延納善謀師老財屈異論輻輳而不爲之疑盗發都邑屠害元宰而不爲之懼卒能取靈夏清劒南誅浙西俘澤潞平淮右復齊魯於是天下深根固蔕之盜皆狼顧䑕拱納質効地稽顙入朝百年之憂一旦廓然矣而怠於防微變生胕腋悲夫穆宗蒙已成之業承既平之緒授任非才為謀不臧使狎中之虎復縱暴於原野網中之魚得自脱於深淵元和之功於兹墜矣寳歴既易荒縱自貽顛覆文宗優游不斷受制家臣雖有好賢之心文雅之美皆不足稱也武宗英敏特逹委任能臣克上黨如拾芥取太原如反掌饗國日淺功業未究惜哉宣宗少歷艱難長年踐位人之情僞靡不周知盡心民事精勤治道賞簡而當罰嚴而必故方内樂業殊方順軌求諸漢世其孝宣之流亞歟懿宗驕奢無度賊虐不忌輔弼之任委於寵嬖四海之財竭於淫樂民怨不知神怒不恤李氏之亡於兹決矣且唐自至德以來近習用權藩臣跋扈譬如羸病之人以糜粥養之猶懼不濟又况飲之毒酒其能存乎及僖昭嗣位天禄已去民心已離盜賊徧於寰區蓬蒿塞於城闕漂泊幽辱寄命諸侯當是之時雖欲救之其將能乎知新攻湖南爲馬殷所虜劉仁恭子守光囚楊渥攻江西帥鍾匡時取之又遣其將劉存陳安圍潞州築夾城守之仁恭而代之將軍李思二春晉王李克用薨蜀高祖王建成武元攻灃朗帥雷恭彦取之淮南將張顥殺楊渥子存朂嗣夏晉王大破梁兵於夾城馬殷李茂貞於幕谷秋晉王侵晉絳上幸晉州立其弟渭别將徐温殺顥匡國帥劉知俊大破稱帝王建三來降淮南將周本拔撫信吉州夏春上幸河中王景崇將高萬興以鄜延李茂貞上幸河中招討使劉潯楊師厚襲長安錢鏐敗淮南兵於蘇州劉知俊以關西諸州降破梁兵於興平茂貞復振取之知俊奔鳳翔冬知俊四知爲閩王秋上春封福建帥主審上遣將杜廷隱襲王鎔深冀二州取之因命振幸洛陽因止都之羅紹威卒子周翰代之王自將救鎔王處直以兵㑹之討使王景仁伐鎔鎔求救於晉冬乾化元平元蜀永州而還秋上幸魏州劉守光光自稱燕帝冬春晉王大破王景仁於栢鄉遂圍魏州破澶弟龔代之攻下邕容交等州盡有嶺南之地晉王遣周德威合鎮定兵攻劉守光劉隱卒二大敗而還夏晉將周德威大破劉守光取春上自將救劉守光至棗强遇晉將符存審弑上及殺上養子博王友文又欲誅河中朱友其瀛順等州上晩年淫虐尤甚子友珪懼誅陽以楊師厚鎮魏博徙羅州翰鎮滑州謙友謙以所部降晉冬晉王敗梁兵於平均王瑱三年等殺友珪即帝位因留都汴夏淮春東京留守均王瑱與宿衞將趙巖之冬晉王抜幽州擒劉守光父子歸殺之南將李濤攻錢鏐鏐子元瓘敗濤於臨安擒戌甲四反招討使牛存節劉潯討平之晉王及春晉王始開府置行臺秋武寧帥蔣殷租庸使趙巖及后兄張歸霸等用事賣官鬻獄王鎔攻郉州楊師厚與戰于張公橋敗之是時素有謀略踈廢不得用政治日亂平章事敬翔貞明元用趙巖䇿分澶春楊師厚卒上昭德衙兵張彦作亂囚其帥賀德倫以降于晉相衛為昭德軍以張筠鎮之分魏博衙兵以隷冬上弟康王友欽反誅上由是踈忌宗室夏晉王入魏州誅張彦劉鄩軍華縣以禦之二蜀蜀主用知俊為將攻茂貞興鳳隴成階州下蜀通正元春茂貞將李繼崇劉知俊以泰降以竒兵襲晉陽不克晉王大破劉潯於故元之遂圍鳳翔不克茂貞由是遂衰將軍王檀戴思逺張筠皆走河北盡入于晉契丹陷蔚城潯退保黎陽秋郉洛帥閻寳降晉滄憬帥州三將盧文進引契丹圍幽州晉將李澶擊走蜀天漢南漢高祖劉龔乾亨元年春新州抜楊劉城蜀主殺劉知俊徐温徙治升州之夏劉龔稱漢帝冬上幸洛陽晉王濟河四章敗於碭州朱瑾殺淮南副使徐知訓知蜀光天元春晉王侵鄆濮夏軍使謝彦子衍好酒色欲廢之衍與其張格鴆殺蜀主訓父温殺瑾以假子李吴代知訓蜀主以太於胡栁殺周徳威既而壞復為晉軍所敗晉遂徐温攻錢鏐拔䖍州冬招討使賀瓌敗晉兵師大恐拔濮州京五義元春晉將符存審夾河築徳蜀公徳呉宣帝楊渭武吳師於狼山殺其將彭彦吴與兩浙和親冬勝二城夏徐温立楊渭為吳王錢元瓘破楊村蜀主親廵利閬晉王敗招討使王瑣於六其弟丹陽王溥朱夏吳宣帝殂徐温立符存審大破潯浩於同州皓譖鄩而殺之友謙襲據同州詔劉鄩尹皓討之秋晉將龍德元鎔而代之晉王使閻寳討之秋文禮卒子處吳睿皇溥順義元春成德將張文禮殺王州王處直使子郁召契丹以救鎮州假子都殺瑾代之冬晉王破戴思逺於戚城遂北攻鎮圍幽州攻易定處直自立契丹遂二奔至幽州戴思逺襲魏州春晉王破契丹於定州追乆不下名將李嗣昭等多死秋監軍段凝拔衞拔成安急攻楊劉晉王還救之晉人攻鎮州殺張處瑾晉監軍張承業卒州梁兵復振晉將符存審拔鎮州唐莊宗朂存同光元年王稱帝於魏州李亶襲梁鄆春澤潞李繼韜降于梁夏巖等惡彦章以段凝代之上用樞宻使郭崇韜州取之梁將王彦章拔德勝急攻楊劉幾拔趙於中都梁主自殺諸藩鎮皆降䇿自鄆州直趣大梁擒王彥章臣光曰太祖始以黄巢降將秉旄宣武逞其詐力蠶食東夏地廣兵强威權日熾志欲無厭遂遷唐祚淫虐不悛禍自内興不得其死宜矣均王膏梁之子材不過人棄恭翔王彦璋而用趙巖張歸霸以與莊宗為敵能無亡乎遷都洛陽上入汴尋申甲二益驕淫伶人宦官用事劉后春立皇后劉氏上既滅梁日卒子從曮嗣秋蜀主遊青城契丹寇幽州及隂狡上畏而惑之四方解體夏秦王李茂貞蔚州鎮定嵐三州李亶擊走之上幸魏州塞酸棗蜀咸康南漢白龍元春契丹寇幽蜀主將遊秦州至利州圍之奔還蜀城邑皆奔決河秋曹太后崩魏王繼岌郭崇韜伐蜀西川閩王王審知卒子延翰嗣潰冬蜀主降以北都留守孟知祥鎮明宗亶天成元年天雄衙兵皇甫暉反推衙將春莊宗以讒誅郭崇韜朱友謙刼亶與在禮合莊宗將幸汴州亶先入據之莊趙在禮爲主攻陷魏州詔總管李亶討之軍士州魏王使於渭南亶入洛卽帝位秋契丹阿宗還洛夏軍校郭從謙反弑莊宗劉后死於幷假子延禀攻殺之璘自立以延禀鎮建州保機寇幽州王延翰驕恣弟鏻及審知二乾吳討之不克冬上幸汴州宣武帥朱守殷反討元貞春高季興擅取䕫峽州詔襄州帥劉訓都統鎮昇州吳王溥初稱帝平之徐温卒子知詢代爲副三春契丹陷南漢大有元秋契丹將楊隱救鎮州晏球大敗之徐知詢平州夏王都謀反詔宋州帥王晏球討之之昇賢而好士國人悦之高季興卒子從誨與李昪爭權冬昪誘知詢入朝奪其兵柄兼領之代四樞宻使安重誨惡錢鏐之僭秋詔鏐致仕吳大和元春王晏球攻定州殺王都雪乃復其官爵鏐令子元瓘自長興元立皇后曹氏上假子潞春徙李從曮鎮宣武之又惡孟知祥及東川帥董璋割其支郡夏知王從珂鎮河中安重誨惡之使其將楊彦温逐之不克冬楚王馬殷薨子希聲嗣祥及璋俱反詔上婿天雄帥石敬瑭討二丹主春契安重誨恣横使出鎮河中尋族誅之重誨曰臣德光之兄賛華來奔石敬瑭糧盡引還上惡王延禀襲福州王鏻擊殺之上族董璋家而死不恨但不為國家誅潞王他日必為患夏是疑知祥背已不誅孟氏璋由三攻知祥至漢州敗死詔知祥春詔赦兩川知祥聽命璋怒黔為五嶺吳越王錢鏐薨子元瓘嗣夏馬鎮兩川封蜀王許行墨勑知祥乃分利閬遂䕫河東冬吳李昇出鎮昇州留子景知政事希聲薨弟希範嗣以潞王鎮鳳翔石敬瑭鎮四或請立太子上不悦夏上疾秦王從榮請見閩惠宗王鏻龍啓元春王鏻自稱閩帝朱弘昭馮贇孟漢瓊等擊斬之上崩召少子宋不得疑上崩而左右匿之勒兵將入宫樞宻使州而立之王從厚於魏午甲潞王珂從清泰元年知祥稱蜀帝朱昭等徙潞王蜀高祖孟知祥明德元春孟鳳翔幾克㑹軍士亂潰思同走死王整衆而東鎮河東王不受命詔西京留守王思同討之圍劉氏鴆殺閔帝興元帥張䖍釗洋州帥孫漢所向崩潰閔帝奔衞夏州王入汴即帝位立后契丹寇雲應州詔石敬瑭屯代州以備之韶皆降蜀秋蜀主知祥殂子昶立冬二天吳州秋以晉州帥張敬達副總管以分石敬瑭祚閩永和元蜀秦國公昶夏契丹寇新代應弑其主鏻立其子昶之權冬閩將李倣晉高祖瑭敬天福元年徙石敬瑭鎮天平敬瑭稱疾閩康宗昶通文元夏清泰帥劉延皓詔宣武帥范延光討誅之秋張達不行清泰詔張達討之天雄將張令昭逐其主自將五萬騎救之達敗退保晉安契丹圖之圍晉陽敬瑭稱臣求救於契丹誓為父子契丹鈞救晉安清泰幸懷州冬趙德鈞延壽屯團栢詔樞密使趙延壽天雄帥范延光幽州帥趙德州所管及新武雲應朔州以賂契丹諸將殺張隂與契丹通求為漢帝契丹立敬瑭為帝割幽驅而南清泰奔還舉室自焚達以降德鈞父子亦降上遂長臣光曰武皇以沙陀㣲種奄有河東黄巢之亂有大功於唐室上源之變訟於朝廷而不能自直遂與朱氏治兵相攻紏紛不解流血成川僵尸蔽野至其晩節鋒銳益衰窮居一隅僅能自保莊宗自弱齡襲位麾下諸將皆白首行陳與武皇竝轡齊驅之人乃能以恩信結其心英果折其氣莫不竭力致命頤指如意遂服真定從中山取漁陽兼魏博䇿馬渡河而梁氏失國當是之時天下莫不震動諸侯陸梁踞肆者皆􅌓眙相顧莫敢保其土地王衍恃其險逺辭禮倨慢偏師西指而劒閣不守觀其行兵可謂能矣惜其器小志近驕心易生矜功自喜御衆無法便嬖是説婦言是用纔及三年隕身亡族悲夫明宗無取國之心而為衆所附資性寛厚克終天禄清泰於危難之中坐受神器得之非難失之孔易負扆未安家為煨燼十年之中易姓者四禍福相尋何其速哉吳封李昇為齊王上幸洛陽上入洛陽安州盧文進奔吳二昇昇元元唐烈祖李州京畿廵檢使張從賓反自河陽入東都殺夏范延光反詔親軍將楊光逺討之進圍魏討誅之冬李昪受呉禪稱唐帝上子重信重義詔親軍將杜重威三秋范延蜀廣政元為東京長安為晉昌軍光降赦之冬復以汴州四氏閩主昶貪虐秋唐主始復姓李之立其叔父曦閣門使連重遇弑五安州李金全叛入于唐閩景宗曦永隆元夏六冬襄州帥安從進反攻鄧州親軍將李建崇秋上幸魏州錢元瓘薨子佐嗣河決滑州朝詔杜重威擊之大破重榮於宗城遂圍鎮州擊破之成德帥安重榮反將兵數萬聲言入七滑州決河夏漢王龔殂子昻嗣上疾命漢煬帝昻光天元春拔鎮州斬重榮塞矯詔立上兄子齊王重貴延廣使告哀於契丹平章事馮道立幼子重睿上崩親軍將景延廣隙秋拔襄州殺安從進稱孫不稱臣契丹始有齊王貴重八年王延政天德元春上自魏州還汴漢中宗晟乾和唐元宗景保大殷光逹副之約以傳國漢王昻弟晟弑昻自立唐主昪殂子景立以弟齊王遂為元帥燕王契丹和親上不聽冬青州帥楊光逺召契丹入閩主弟延政自稱殷帝侍中桑維翰屢請與寇辰甲開運元城守上幸澶州契丹主至澶州春契丹數道入寇河北諸州皆兖州帥李守貞討楊光逺誅之唐將邊鎬查而還閩指揮使朱文進弑閩主曦來降冬仁翰殺朱文進降於延政文徽攻王延政福州將林二相至榆林而還春契丹寇郉洺磁彦卿擊破之秋唐人拔建州虜王建政福州將上幸澶州契丹圍杜重威於陽城河陽帥符冬樞宻使馮王譖桑維翰罷其政事李孺贇泉州將留逆效皆降於唐三寇定州夏契丹贇兩浙將張筠救之大破唐兵取福州冬契相州帥張彦澤擊破之秋唐陳覺等攻李孺契丹於中渡橋重威與張彦澤皆降契丹彦澤丹瀛州請降上遣杜重威悉率禁兵以應之遇遂降於契丹還兵襲京師帝漢髙祖暠天福十二年遷晉帝於黄龍春契丹主入汴臣光曰高祖以地尊勢重迫於猜嫌親執臣子之禮以事戎狄賂之土田藉其兵力以取天下夫羽翼未成不可以高飛國家未治不可以應敵齊王舍桑維翰之深謀信景延廣之狂策内政不脩而外挑强鄰使黎民塗野草胡騎汚宫闕生為降虜死為覉魄非不幸也丹主懼留其將蕭翰鎮汴而還夏殂於欒城兄河東帥劉暠即帝位於晉陽河南北盜起契從益而去帝留弟旻鎮河東入汴殺從益馬子元欲自立囚述律太后蕭翰立唐明宗子嗣冬衙將明進思廢倧立其弟俶希範薨弟希廣嗣錢佐薨弟倧乾祐元崩子春上都郭威史弘肇輔之河中帥李守貞及鳳翔周王承祐立年十八平章事蘇逢吉樞宻使楊威討之冬高從誨薨子保融嗣將王景崇永興將趙思綰反秋詔郭隱帝祐承二年沙不克乞師於唐趙思綰降殺之夏馬希廣庶兄永州刺史希蕚襲長契丹寇北邊詔郭威禦之秋拔河中殺李守貞冬三景崇兩浙敗唐春拔鳳翔殺王留守秋馬希蕚攻弟希廣殺之自立冬帝兵於福州虜其將查文徽夏以郭威為鄴都威威擁兵入朝帝戰敗自殺威迎劉崇子贇於倖臣李業等譖殺楊邠史弘肇等又遣使殺郭澶州還兵内向以太后令廢贇以威監國徐州而立之未至契丹冦洺州威北伐至臣光曰高祖擁精鋭之兵居形便之地屬胡騎北旋中州乏主故雍容南下而天下歸之豈其才徳之首出哉乃㑹其時之可爲也夫根踈者不固基薄者易危隱帝雖有南靣之名而政非已出民不知君輕信羣小之謀欲除跋扈之臣禍不旋踵自然之勢也父子相繼四年而滅自古饗國之短未有若兹者也周太祖威廣順元年卽帝位以養子榮鎮澶州北漢世祖劉旻乾祐四春與弟希崇爭國唐將邊鎬擊虜之遂滅湖南榮柴皇后兄子也劉旻稱漢帝秋馬希蕚攻晉州不克冬漢主引契丹二將擊誅之因幸曲阜拜祀孔春兖州帥慕容彦超反上自表請節鉞詔言鎮湖南徙治朗州子朗州將劉言襲長沙逐邊鎬上三疾樞宻春上有秋湖南軍亂囚其帥劉言迎潭州王逵代之使王竣坐專恣貶商州以晉王榮為開封尹守王允中冬誅鄴都留寅甲顯德元馬上崩晉王即位春以晉王判内外兵親軍將樊愛能何徽先遁斬之幷其軍使以上漢王引契丹寇潞州世宗自將禦之戰於高平代七州天雄帥符彦卿及契丹戰敗於折口乃遂大破漢兵夏進圍晉陽拔遼憲嵐石沁沂帝大閱諸軍務精不務衆班師冬漢主旻殂子承釣立世宗榮二年攻蜀秦鳳成州拔之冬平章事李北漢主承鈞乾祐八鳳翔帥王景唐將劉仁贍於夀州榖率十二將伐唐圍三將伐唐親軍將李重進春築東京外城上自暉親軍將韓令坤拔揚州江北諸州降者甚衆斬唐將劉彦於正陽太祖拔滁州擒其將皇甫夏太祖破唐府王逹於六合湖南將潘叔嗣唐主稱臣請獻六州以和上欲盡得江北不許還時天暑糧且盡戰數不利諸將皆棄所得州殺其帥王逵迎潭州周行逄代之上自渦口州不克幷兵圍壽四唐兵於紫金山劉仁贍以壽州降比漢天㑹元春上復伐唐大破濠泗楊秦四州上還冬復伐唐拔五遂幸迎鑾欲濟江唐主大唐交泰元春上屠楚州朔上乃班師唐大弟遂固請讓位唐主乃立懼去帝號稱國主請盡割江北十四州用周正唐殺其相宋齊丘子冀為太子冬六春鑿五丈及惠民河樞南漢恩赦侯鋹大寳元契丹關南三州俱降將攻幽州㑹上有疾而還宻使王朴薨上自將擊契丹夏上至瓦橋關訓即位秋漢南主晟殂子鋹立唐太子冀李重進破河東兵於百井上崩梁王宗卒臣光曰太祖負震主之威挾不賞之功措身無所乗危而發雖履天下之籍而家室先覆矣世宗以異姓之親入乗大統知近世之弊起於威令不行下陵上替故高平之役首誅樊何以振軍法遂能變弱為强因敗為功乘勝北逐至于太原歸而簡師習戰幷心進取於是南割江淮西克秦鳳北開闗南攻無堅城戰無强陣又以桴鼓之隙治律歴興禮樂審法令脩政事收賢才養百姓可謂能知治安之本矣大功未成中道而夭蓋太平之業天將啓聖人而授之固非人謀之所及也司馬温公稽古録卷之十五
