front:
  text: 司馬溫公稽古録卷之一
  hash: sha256:c8b4a0be6fd321e6287e4343775c42d53b9170e6753ab3367de83f8b276cb8bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_SBCK_001-1a}
body:
  text: 伏羲氏太昊伏羲氏天下之號也惟天生民有欲無主乃太昊有天下之號伏羲氏其所以有不足於衣食則能養之衣食足矣或不知禮義亂必立聰明之君長以司牧之何謂司牧蓋民威之由是民愛之如父母仰之如日月信之如相侵漁則能教之教之備矣或頑嚚不從則能小者所服寡聰明之大者所服衆所服寡者為四時畏之如雷霆莫不悅服推而尊之聰明之君一國者是為諸侯天下為國位均力敵或相聚邑之長為士大夫卿所服衆者為一國之君拔乎其萃聰明照萬事威令行四海天下無不侵陵吞噬莫能相治必待天生聖人出乎其類諸侯者一國父母天子者萬國父母人之至尊歸往而率服然後為天子夫天地者萬物父母前為天子者其有無不可知也如天皇地皇人無與為比惟父事天母事地故曰天子伏羲之不經見臣不敢引獨據周易自伏羲以來敘之皇有巢燧人之類雖於傳記有之語多迂怪事風姓所自生也姓者人之以木德繼天而王都宛丘州是今陳也仰則觀象於天俯則觀法於地於是始作八卦象之始畫八卦曰乾坤震巽坎離艮兌太昊之時有龍負圖出於河太昊法而以通神明之德雷巽為風坎為水離為火艮為山兌神明謂造化也乾為天坤為地震為也作八卦以通導造物之德使人知之也為澤造化萬物皆由此八者而生成通導以順萬物之情也離麗也艮止也兌説也萬物之情乾健也坤順也震動也巽入也坎陷八者無出此作結繩而為罔罟以佃以漁獵取禽獸佃音田佃魚也也漁取上古之民處於草野未知農桑但逐捕禽獸食其肉衣其皮禽獸飛走非人所及制之甚難無以禦飢寒故太昊教之為罟罔以羅禽獸漉水物又教民豢養六畜馬牛羊豕犬雞無逐捕之勞可以充庖且以為犧牲享神祇故號伏羲氏亦號庖犧氏神農氏炎帝神農氏薑姓繼伏羲以火德王天下是時民益多禽獸益少炎帝乃教民播種百穀斫木為耜揉木為耒春耕夏耘秋穫冬藏民食以充故號曰神農氏炎帝以一人所為不足以自養必通功易事貿遷有無乃教民日中為市致天下之民聚天下之貨交易而退各得其所有熊氏黃帝有熊氏姬姓曰軒轅有熊國君少典之子生而神靈弱而能言幼而徇齊速也徇疾齊長而敦敏成而聰明炎帝既沒子孫德衰蚩尤始作亂延及于平民罔不冦賊姦宄奪攘矯虔曰冦殺人羣行攻劫自來而取曰攘矯詐虔殺也不忌曰賊在外曰姦在內曰宄黃帝乃治五兵以征之與蚩尤戰于涿鹿之野禽而殺之涿州涿鹿諸侯皆去神農氏歸黃帝黃帝與炎帝子孫戰于阪泉之野三戰然後得其志諸侯咸尊黃帝為天子代神農氏黃帝以民生有欲衣食雖備茍無禮義則強陵弱衆暴寡智欺愚勇苦怯於是始制軒冕垂衣裳貴有常尊賤有等威使上下有序各安其分而天下大治作舟楫以濟不通服牛乘馬引重致遠正名百物天下有不順者征之平者去之邑于涿鹿之阿遷徙往來未嘗寧居在位百年而崩年百一十歲有二十五子其得姓者十四人為十二姓姬酉祁巳滕針任荀僖姞儇依儇呼緣切姞其訖切金天氏少昊金天氏巳姓曰摯亦曰青陽黃帝之子繼黃帝以金德王天下故號金天氏都曲阜州今兖高陽氏顓頊高陽氏黃帝之孫也父曰昌意高陽氏以水德王天下都濮陽靜淵而有謀疏通而知事養財以任地履時以象天北至幽陵南暨交趾西蹈流沙東極蟠木動靜之物小大之神川神主山日月所照莫不平服先是帝王皆以天瑞為官師之名至高陽氏始為民師而命以民事在位七十八年壽九十一歲高辛氏帝嚳高辛氏黃帝之曾孫玄囂之孫蟜極之子也都亳號南亳今穀熟普施利物不於其身聰以知遠明以察微順天之義知民之急仁而威惠而信修身而天下服其色郁郁其德嶷嶷其動也時其服也衷執中而遍天下日月所照風雨所至莫不從化在位七十年壽百有五歲司馬溫公稽古録卷之一
