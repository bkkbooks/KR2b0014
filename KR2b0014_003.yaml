front:
  text: 司馬溫公稽古録卷之三
  hash: sha256:5af152e0c925d2c683732189a972d73ceedecfdc1c50c5a69c1b568ce218157a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_SBCK_003-1a}
body:
  text: 有虞氏上帝舜有虞氏姚姓曰重華其先出於高陽氏祖曰牛父曰瞽瞍舜濬哲文明溫恭允塞也其德信濬深哲智上下充塞父母弟頑嚚不友日以殺舜為事舜耕于歷山以失愛於父母日號泣于旻天不敢怨懟失子道負罪引慝以事祇見瞽瞍夔夔齊栗側齊切皆瞽亦信而順之弟象亦化之不至於大惡至德升聞堯既妻以女試之乃命以位舜舉伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸八元也元善使布五教于四方子孝亦曰五典典常也五教父義母慈兄友弟恭五典克從內平外成舉蒼舒隤切徒回敳切五開檮桃音戭演音大臨龎降庭堅仲容叔逹八愷也愷和使揆百事百揆時序地平天成流共工歡兜切都侯三苗鯀四凶于四裔而天下咸服四門穆穆美也穆穆美德無凶人也諸侯來朝者皆有隂陽和順烈風雷雨弗迷堯知舜功德大成欲使陟帝位舜辭不受乃使舜攝行天子事代巳巡守朝四嶽諸侯舜察璿旋音璣機音玉衡以齊日月五星之行度以考正曆數二十有八載堯乃殂落舜服喪三年畢始即天子位都蒲阪中府今河明四目達四聰方使天下無廣視聽於四塞壅命禹宅百揆百揆之官宅居也居棄為后稷播時百穀種百穀播布也布契作司徒敷五教布也敷亦臯陶作士典五刑惟明克允刑期于無刑無犯者刑期於無雖或以殺止殺終刑所垂共工益作虞掌山澤草木鳥獸用之有節取之有時伯夷作秩宗典三禮夔典樂教胄子擊石拊石百獸率舞蕭韶九成鳯皇來儀儀有容儀韶舜樂名龍作納言出納惟允舜上循堯道下任衆賢恭巳南面無為而治舜好問而好察邇言之言淺近隱惡而揚善善者宣揚而行之人言惡者隱而不彰執其兩端用其中於民臨下以簡御衆以寬罰弗及嗣賞延于世及延及其賞道德之衆也父子罪不相及而宥過無大刑故無小所犯過誤故犯雖小必刑雖大必宥不忌罪疑惟輕功疑惟重賞疑從重刑疑附輕之至忠厚與其殺不辜寧失不經之罪不枉不辜之經常也寧失不常之道善仁愛君臣常相警戒於朝禹曰后克艱厥后臣克艱厥臣政乃乂為臣不易則其政治乂治也能知為君難益曰任賢勿二去邪勿疑果於去惡一意任賢罔違道以干百姓之譽名古人賤之于求也失道求罔咈佛音百姓以從巳之欲犯衆興禍故戒之咈戾也專欲難成臯陶曰在知人在安民禹曰知人則哲能官人安民則惠黎民懷之此帝堯所難臯陶曰亦行有九德亦言其人有德乃言其行事以驗之曰寬而栗能莊栗性寬大而柔而立能立事和柔而願而恭恭恪慤願而亂而敬而能謹敬亂治也有治擾而毅果為毅擾順也致直而溫氣溫和行正直而簡而廉大而性簡隅有廉剛而塞塞實剛斷而彊而義動兵合義無所屈撓彰厥有常吉哉變至於彰著此真吉士可用哉彰明吉善也其人行此德有常不三德有家可以為卿大夫九德之中有其三六德有邦諸侯可以為翕受敷施九德咸事俊乂在官之德而用之以布施翕合也能合受三六如此則俊德治能之士並在官政教使九德之人皆用事謂天子兢兢業業一日二日萬幾吉凶之先見者也王者戒懼於事兢兢戒愼業業危懼幾者動之微巳亂巳危則難為功一日二日之間幾微之事微小之時制治於未亂保邦於未危則易為力不可不察至有萬端無曠庶官天工人其代之非其人為曠空也位不可以天官私非其才空官言百官代天理物天聰明自我民聰明用自命之天視聽人君之行用民為聰明也言天因民而降之福民所歸者天天明畏自我民明畏叛者天討之是天明可畏之效天威可畏亦用民成其威民所帝曰臣作朕股肱耳目若身言大體豫違汝弼汝無面從退有後言面從我違而退有言我不可弼我違道汝當以義輔正我無得禹曰萬邦黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸冝以時舉其秀者先使布納其獻賢也萬國衆賢共為帝臣帝試之以事以明辨衆言之虛實必待其功效顯為治之言察其是非能言者未必能行故未冝服爵命面用之著然後賜之車司馬溫公稽古録卷之三
