body:
  text: 二二月發曹單民夫數萬浚五丈渠江南正月發開封陳許民夫數萬導蔡渠入于頴寇麟州四月癸巳朔日食六月甲午太后主景遷都南昌三月丙申內酒坊火河東喪還金陵八月詔武懷節執孫行友送闕下杜氏崩江南主景卒於南昌子煜立七月以明憲皇后于安陵詔竊盜贓錢滿三千者死九月甲子契丹解利等來降十月丙午葬三卒以代之二月庚寅初令文班常參官舉正月甲戌發民廣皇城東北隅罷遞夫募路晉二州守將擊走之三月初令大辟秦案幕職令録有罪連坐詔百官轉對河東寇鎡襲位四月衙將陳洪進誣紹鎡謀歸兩浙執刑部詳覆以止藩鎮專殺留從效卒養子紹子繼沖襲位五月增修大內六月秦州屬送江南立大將張漢思為留後高保朂卒兄尚波干降七月癸巳初定編勑二十條周羌尚波于拒命詔歸江南降兵數千九月訟事皆歸令尉鎮將唯得掌郭下是歲周鄭行逢卒子保權襲位十二月詔諸縣盜賊鬬州刺史張文表作亂來乞師王居于房陵周保權上言衡乾德元慕容延正月命延釗等至荆南高繼沖請舉族歸朝延釗等進釗等將兵討文表未至文表為湖南所擒二月州悉平為荆湖路癸酉定常行杖法笞杖徒克潭州三月拔嶽州朗州周保權出降兩道諸行應天曆鑿講武池初置諸州通判以分流各有數置義倉每稅一石别輸一斗四月知諸州張漢思諸子謀殺陳洪進洪進廢漢節度使刺史之權或節度使有闕則以文臣權斌等擊河東俘數千人八月辛巳行新定刑思而代之六月初命朝臣知縣七月王全九月河東反契平定軍守將拒却之十月統王全斌等攻河東樂平縣拔之置平定軍州留後陳洪進請內屬許之仍以詔諭江南庚辰詔天下造版籍及户帖户鈔十一月泉二月甲申皇后王氏崩河東寇府州折德扆甲子上始親祀圓丘配以宣祖大赦改元十甲勢稅簿敗之初置子甲二不限冬集發民夫治鄆正月初聽選人四時參選將郝貴超於城下遼州降三月河東將周審王州遙堤二月李繼勳等攻河東遼州敗河東河南安陵乙丑初置參知政事六月河南等來降四月乙卯改葬宣祖及昭憲皇后於務令商旅入金帛於京師執引詣緣江給茶北陜西蝗八月詔於京師及緣江各置榷貨以其子御勳知府州事自是世襲知府州西川九月丁德𥙿等攻廣南郴州拔之折德扆卒一月甲戌命王全斌等將兵三萬自鳳州道劉主孟昶遣間使以蠟書遺河東謀連兵入寇十涼州來請帥詔以麴彥饒為之王全斌等拔光乂等將兵二萬自歸州道伐西川十二月招討使韓保貞副使李進興州敗西川兵於三泉獲其三拔夔州殺其節正月劉光乂等遂破利州及劒門又破西川並拔劒州擒其知度使高彥儔王全斌等破西川兵於大漫天光又等拔萬施開忠遂五州西川主昶出降蜀樞密院事王昭逺馬步軍都指揮使趙崇韜劉殺西川降兵二萬餘人於成都三月蜀中盜地悉平得州四十五為西川路二月王全斌月甲辰以昶為中書令秦國公太子大臣皆除賊羣起詔所在討之五月丙戌孟昶入見六武九月河決澶州發兵治之美官庚戍昶薨八月河決陽四丁德𥙿等將正月丁亥詔靜陽三月廢義倉四月契丹豐州節度使兵討蜀中餘盜二月羅彥環等敗河東兵於養一子河決觀城七月聽州縣官各置俸干延來降六月詔內侍年三十無養父方許發夫卒數萬人塞決河是歲初用和峴議以户月輸錢五百八月河決靈武遣韓重贇等王朴樂一律景表尺造律下五夫數萬治河隄三月丙辰正月戊戌發畿內及鄰州民唐寨降六月戊午朔日食丙子詔諸州通河東石盆寨降五星聚于奎五月河東鴻州河溢入城殺數百人九月庚子李彜興卒判鈐轄都監等毋得受節度使添給八月衛辰禁惡錢及行濫縑帛子光睿襲位十二月丙開寶元畿內民夫治正月甲午發三月甲辰鎮州奏破河東馬鞍山寨五月東京城丁未河東偏城寨將任恩帥衆來降鎮州奏河東烏玉寨主胡遇帥衆降河東王丁未賜江南糧十萬斛以救其飢七月內午兵擊河東九月庚子繼勳奏敗河東軍於洞渦鈞卒養子繼恩立八月戊辰詔李繼勳等將郭元為殺霸榮立繼恩弟繼元十月丙子吳水口河東供奉官侯霸榮弒其主繼恩平章事一月癸卯上祀圓丘大赦改元越王錢俶遣其子惟睿入貢十二命使者十正月壬寅黨進等先將兵伐河東甲子上發東京三八人調軍食詣河東行營二月乙卯遣曹彬戍上至太原辛丑發諸縣民夫數萬赴城下月乙未李繼勳奏敗河東軍於太原城下戊決晉水灌太原四月辛亥遣海州刺史孫方癸卯河東憲州判官史昭文以州降丙午契丹於陽曲北擒其武州刺史王彥符五月進圍汾州契丹救河東己未何繼筠奏敗水灌太原戊子𥘉令獄官於盛暑清滌杻械癸未韓重贇奏敗契丹於定州北甲申引汾丙午楊重勳折御勳來朝閏月戊申劉繼元貧者給食甲午河東嵐州刺史趙文度降於山東會暑雨疾疫庚申分諸軍屯鎮潞壬戌殺其平章事郭無為己未還河東民萬餘户貢癸巳上至東京十月契丹藏才千酋長上南還六月辛卯江南主煜遣其弟從謙入置封州以處之王甲帥衆來降三治河隄四月辛卯朔日食正月癸丑發畿內民夫數萬務七月丙辰減州縣官員數上命江南主庚子詔開河北鹽禁聽通商收稅置便錢月己亥朔命潘美等將兵伐廣南甲辰詔修煜招諭廣南主劉鋹鋹不聽囚其使龔慎儀九破廣南兵拔富州十月庚寅拔賀州十一月壬完前世帝王陵為亂兵所毁者乙卯潘美等十二月辛亥潘美等破廣南兵拔連州癸巳寅拔昭桂二州癸亥邉將破契丹於遂城二萬治河隄發畿內民夫四二州二月己丑奏克番禺擒正月癸丑潘美等拔廣南英雄詔以幕職州縣官闕多人少初令特放選仍聽廣南主鋹廣南悉平得州四十一為廣南路練繫劉鋹獻之釋以為恩赦侯王甲卒以其超折注擬五月乙未朔上御明德門諸將以亥朔日食十一月己未上祀圓丘大赦癸子承美知豐州事自是世襲知豐州十月癸河決澶淵泛數州澶州通判姚恕坐死亥川班直四十人撾鼓訴賞薄悉斬之五月五河決陽武汴決穀熟戊申命曹翰發民夫三辛未河決濮陽廢廣南媚川都六月庚寅萬塞濮陽決河八月己亥廣州奏破羣獠於萬六千卒一萬五千塞陽武決河又發卒夫數己未廣州奏破羣獠於英州大飢容州九月丁巳朔日食十一月六酉發民正月癸恭帝四月癸丑初選令録簿尉為堂後官夫治魏縣河堤三月房州奏周鄭王殂諡曰六月癸未朔隰州奏將兵入河東境拔七寨五月己巳交趾丁璉始遣使內附授以官爵戌甲七朝辭不至而繕完自守九月命曹彬等二月庚辰朔日食上詔江南主煜入江南兵丙辰拔池州十一月丙子破江南兵於將舟師自荆南沿江而下伐江南閏月己酉破全興以書答之十二月辛亥曹彬等破江南采石作浮梁濟江契丹來請和命知雄州孫於江北卾州兵八丁丑知晉州武守琦奏破河東兵於正月甲戌朔破江南兵於新林港己亥契丹初遣其臣克妙骨慎思入見辛未洪洞二月壬戌曹彬奏拔升州關城三月南兵於江州六月辛亥澶州奏河決頓丘發吳越王俶拔江南常州四月乙巳王明破江遣郝崇信使于契丹八月封丁璉父部領為丁夫數萬塞之七月辛未朔日食庚辰初治西京內十一月辛未江南遣其臣徐鉉入交趾王九月乙酉江南潤州降十月丁巳江南悉平得州十九為江南路見乙未曹彬克金陵擒江南主煜大宗太平興國元年太祖釋以為違命侯三月正月辛未曹彬遣使獻李煜不允丁巳作禮賢宅以待吳越王俶己未俶辛卯羣臣三上表請加尊號太祖以燕晉未平廟丙子發東京庚辰謁安陵辛巳至西入朝辛未辭歸太祖將幸西京壬申先饗太還辛亥至東京丙寅曹翰奏拔江州擒江京四月庚子雩祀于圓丘大赦丙午東寅破河東兵辛巳郭進奏得山後諸州民三南將宋德明八月丙辰發兵伐河東九月戊弟晉王諱即皇帝位乙卯大赦李光睿奏破萬七千餘口十月癸丑太祖崩于萬歲殿皇十一月戊辰罷天下俸户十二月甲寅上御河東吳保寨詔諸場務不聽人添額置撲赦改元乾元殿大二人及第皆除京官通判以興文教正月擢進士呂蒙正等百三十三上改今名初置江南榷茶場四月甲午置抑武事二月廢江南鐵錢悉用銅錢庚子月河決溫縣又決滎澤又決頓丘發夫卒塞之威勝軍於亂栁乙卯葬太祖於永昌陵七丙寅陳洪進入朝初令藩鎮支郡悉屬京師諸道大水發潭州兵擊梅山洞蠻八月小錢者死十一月丁亥朔日食長吏得專奏事九月丁酉詔私鑄三午詔絳正月甲開漕渠自襄漢抵京師渠成而水不行二月州浚汾河發唐鄧民夫數萬人及諸卒萬人走之三月己酉吳越王俶入朝四月己卯丙辰朔秦州奏酉羌寇邊使者任德明將兵擊發夫卒塞之五月吳越王俶表獻所有州十陳洪進獻所有州二庚辰懷州奏河決獲嘉戊申秦州判官李若愚之子飛雄謀反族誅三為兩浙路壬寅李光睿卒子繼筠襲位內民夫塞汴口十月置內藏庫掌藏經費之六月汴渠決寧陵詔發宋亳民夫塞之又發畿十一月丙申上祀圜丘配以太祖大赦是歲餘以待非常之用河決靈武發夫卒塞之國編敇行太平興四河東二月甲子上自將發東京三正月庚寅詔先遣潘美等將兵伐東郭進邀擊大破之四月壬戌上發真定折御月庚辰朔至真定乙未分兵攻嵐州契丹救河庚午上至太原壬申上幸城西督諸將攻城五卿奏破岢嵐軍乙丑諸將破隆州己巳破嵐州河東路庚子上發太原六月甲寅詔發河北月甲申河東主繼先出降河東悉平得州十為上發真定丁卯至易州刺史劉宇降戊辰涿州京東芻粟赴北面行營欲乘勝取幽州庚申未督諸將攻城不克甲申班師乙巳上至東京降庚午上至幽州破契丹衆于城北七月癸將兵屯三交口以備契丹汴渠決宋城發民李繼筠卒弟繼捧襲位八月癸亥詔潘美兵屯定州以備契丹初聽銅錢入蜀十月夫塞之九月河決汲縣乙酉詔何紹勍等將十一月己亥嵐州奏破契丹於三交口關南庚午關南奏破契丹於遂城西徐鮑二水間契丹奏破五月岢嵐軍奏雜虜二百五十户內屬正月發民夫治衛澶濮三州河隄二馬步軍都指揮使李重誨閏月三交奏雜虜三月癸巳代州奏破契丹殺其侍中蕭咄李禽餘戶內屬上以丁璉阻兵專地七月丁未遣二百十户內屬四月戊子代州奏雜虜二百將兵屯國南蔡玉等將兵屯定州盧漢贇等將孫全興等將兵討之十月戊寅命楊重進等黎桓幽丁氏宗族專制國事十一月桓以璿表兵屯鎮州以備契丹丁璉卒弟璿尚幼大將為寇自將擊之壬子發東京癸丑關南奏破契求襲兄位稱藩入貢不報己酉上以契丹數辰上南還乙酉至東京辛卯交州行營奏破丹戊午上至大名雄州奏契丹遁去十二月庚兵交趾六戌交州行營奏破交趾兵於白藤江口正月辛亥易州奏破契丹兵三月壬奏破契丹兵七月丙午詔諭渤海共擊契丹五月己未以歲旱大赦六月丙子平塞軍詔郭贄等考校在京京朝官功過材器遇中九月乙未朔日食丙辰易州奏破契丹兵丘大赦孫全興為交趾所敗丁巳坐誅書須人送贄等定差十一月辛亥上祀圓七盧多遜及秦王廷美連坐者甚衆五月辛丑三月癸巳朔日食丁璿遣使謝罪四月貶朝詔遷其族於京師其弟繼遷叛入地斤澤高陽關奏破契丹於唐興口己酉李繼捧入朔州六月河決臨濟初置譯經院七月辛亥三交奏破契丹己未府州奏破契丹於奏擊李繼遷破之河決武德行乾元曆河決濟口八月己卯罷劒南榷酤十月夏州日利等十一族七萬餘帳內附王承美擊契丹十二月戊午朔日食閏月庚寅豐州奏契丹度使葦太破之禽其節八奏破契丹兵分三司各置使二月戊子朔日食三月豐州徐州入淮發卒數萬民夫十餘萬治之黎桓五月河決房村灌澶濮曹濟諸州東南流至月甲午河南奏穀洛伊瀍水溢溺死者以萬計廢丁璿自稱交州三使留後始遣使入貢六後官十二月癸卯滑州奏房村決河已塞秋諸路十水六月置都進奏院罷諸州知歲初命著作佐郎呂文仲侍讀經史戊申宥州奏李繼遷入寇擊走之是申甲雍熙元之羣臣請封禪四月甲午詔許之五三月己未滑州奏河復決發卒數萬人塞禪十月庚寅夏州奏擊李繼遷破之俘一千月丁丑乾元文明二殿災六月壬寅詔罷封丁卯上祀圓丘復配以宣祖大赦改元十二月四百餘帳獲繼遷母妻獨繼遷遁去十一月悉罷嶺南采珠場壬辰立妃李氏為皇后二奏破李繼遷黨悉利四月丁酉夏州行營雜虜四十七族內屬羅賦等九十四族拒命族獲其代州刺史折羅遇六月辛卯麟州奏廢為庶人十二庚子朔日食擊破之庚戌楚王元佐坐縱火三詔曹彬崔正月庚寅高麗王治發兵西會官軍壬子詔潘美楊業將彥進將兵出雄州田重進將兵出飛狐二月詔契丹于固安新城降丁丑田重進破契丹于兵出雲應朔州以擊契丹三月癸酉曹彬破庚辰寰州刺史趙彥辛降辛巳曹彬拔涿州飛狐北潘美自西陘入追契丹至寰州破之未田重進破契丹禽其西南面招安使大鵬翼潘美圍朔州節度副使趙希贊舉城降癸應州節度副使艾正舉城降辛卯田重進圍乙酉曹彬破契丹于涿州南丁亥潘美至拔雲州田重進破契丹于飛狐壬寅曹彬米飛狐防禦使呂行德舉城降四月辛丑潘美蔚州左右都押衙李存璋舉城降五月存璋悉信之師破契丹于新城東北乙卯田重進至州庚午曹彬等至岐溝關北為契丹所敗還殺契丹帥城中老弱來奔詔田重進還軍定民於河東許汝間六月戊戌朔日食秋契軍易州上召彬等還丁丑詔徙雲應寰朔州吏據雲應朔州十月授黎桓官爵十二月己丹陷寰州潘美等敗於陳家谷楊業死契丹復廷讓與契丹戰于君子館全軍敗沒亥田重進奏攻拔岐溝關丙午劉四寅置三七月庚院班端拱元月癸巳詔緣邊戍兵無得輒恣侵掠正月乙亥上耕籍田大赦改元四使還鎮夏州招討李繼遷十一月己丑鎮奏務令安靜五月辛未賜李繼捧姓名趙保忠繼遷請降以繼遷為銀州刺史繼遷竟不至破契丹於唐河十二月辛未趙保忠言李二辰上御乾元樓大赦大旱十月置入中倉二月癸亥命陳恕等為諸路營田使八月丙稱已為不可朕欲稱王但嫌與諸子同耳十二月庚申上命省去尊號曰皇帝兼淳化元繼遷兵五月辛卯置刑部詳覆官六員御正月戊寅朔改元四月戊申夏州奏破李李繼遷於安慶澤又奏破繼遷於玉庭鎮史臺推勘官二十員八月趙保忠奏破二月正三月己巳上以蝗旱欲自焚未幾而雨五月丙子命翟守素將兵屯夏州助趙保忠守禦督衛士負土塞之宋州奏汴渠決宋城詔近乙巳置折博倉六月乙酉汴渠決浚儀上自繼遷請降授以官爵賜姓名趙保吉八月己縣民夫塞之亳州奏汴渠決東流七月李十一月丙申朔詔百官次對卯置審刑院以覆大理所斷獄三日食五月二月乙丑朔置常平倉十月壬午命王沔等磨勘京朝官癸丑作祕書閣六月丁丑黑風晝晦辛卯己亥許王元僖薨選人班行十一月四以宣祖太祖並配大赦正月辛卯上祀圓丘初青城民王小波等起為羣盜三月壬子發二月己未朔日食丙戌改磨勘京朝官院稻田命屯田使何承矩領之五月戊子詔所河北諸州戍兵萬八千人開河北緣邊塘泊種月丙辰朔日食十月河決澶州西北流入永舉官改節者聽陳首合三司復為一使八名府城濟渠浸大午甲五隆將兵擊之趙保忠奏稱已正月趙保吉寇靈州詔李繼吉徙綏州民於平夏左都押衙高文岯擊走之與保吉解仇請罷兵上怒命繼隆移兵擊之保隆克夏州禽保忠送闕下保吉逺遁漢北乙酉以綏州內屬四月保忠為保吉所襲脫身走繼死其徒李順攻掠州縣遂陷成都僭稱尊號詔詔廢夏州故城遷其民於綏銀等州王小波門入拔劒州五月甲寅又奏破李順萬餘衆於王繼恩等將兵討之壬寅行營奏官軍自小劒戊辰西川行營奏官軍克成都擒李順六月老溪復閬綿巴三州丙寅趙保忠入見釋之王治為契丹所攻遣使乞師上以北邊甫寧不峽路行營奏殺順餘黨蜀地悉平七月高麗繼恩有功奏除宣徽使上曰此乃執政之漸八欲興兵優詔遣之自是不復入貢中書以王謝罪詔撫納之八月初行淳化編敕九月月置宣政使以授之趙保吉遣弟延信入貢大赦壬申至道元契丹入寇折御卿破之於子河汊正月戊申朔改元甲子府州奏趙保吉訴屬羌掠其所部詔禁之六月丙戌四月乙酉雄州奏契丹入寇何承矩擊破之月置江淮兩浙發運使八月壬辰立壽王諱為上遣使諭保吉欲徙鎮鄜州保吉不奉詔七姓名洛苑使白志榮部送芻糧為李繼遷所皇太子大赦九月趙保吉寇清逺軍詔復其正韓鎮符獻銅渾儀置之司天臺敗僅以身免十二月庚辰秋官二上祀圓丘正月辛亥陜西民運芻糧詣靈州渡沙磧為虜所殺掠及大赦五月癸卯李繼遷帥萬餘衆攻靈州發決榖熟乙丑發民夫塞之命李隆等將兵自飢渴死者不可勝紀七月壬子宋州奏汴渠廷召奏敗繼遷於烏白池繼隆等出塞十餘日環慶延夏麟五路擊李繼遷九月己卯王超范而還不見虜三遷單騎遁去辛丑上不豫三月癸二月庚子靈州行營奏破李繼遷繼赦尊皇后為皇太后五月丁亥立夫人郭氏巳上崩于萬歲殿太子即皇帝位四月乙未大則驅逐去則勿追以寬陜西之民八月西川為皇后七月詔西邊將吏嚴烽堠李繼遷來丙午楊瓊奏破李繼遷於合河鎮己丑葬太戍兵劉旰作亂招安使上官正討斬之十月氏為元德皇太后别立廟李繼遷請降復賜宗於永熙陵十二月丙申追尊上母賢妃李是歲分天下為十五路其後又增三路姓名趙保吉以夏綏銀宥靜五州與之司馬溫公稽古録卷之十七
