front:
  text: 司馬溫公稽古録卷之十七申庚太祖建隆元年鄭王乙巳改元大赦契丹正月甲辰上受周禪奉周帝為皇太后三月辛酉追尊高祖曰僖祖曽祖曰寇定州邊將擊却之二月尊太夫人杜氏為筠叛降河東襲澤州殺刺史張福而據之癸巳順祖祖曰翼祖考曰宣祖四月浚蔡渠李己未上自將討李筠河東主劉鈞軍干太平詔石守信等諸軍討筠五月己亥朔日食帥其衆南下與石守信等遇于長平守信等大驛遣其平章事衛融宣徽使盧贊將兵救筠筠月己巳朔上至澤州辛巳克之筠自焚死獲衛破之盧贊溺死筠走保澤州諸軍進圍之六降釋之河東主鈞聞之遁歸折德扆破河東融釋之乙酉上進攻潞州丁亥筠子守節以城立夫人王氏為皇后九月李繼勳擊河東焚沙谷寨七月戊申上還至東京八月甲申己未詔石守信等諸軍討之甲子縱邊將所平遙李重進叛降江南江南主李景不敢受襲位十月河決厭次晉州鈴轄荆罕儒襲獲河東民數萬口還其國高保融卒弟保朂月丁未上至揚州即日克之重進自焚死乙河東汾州戰沒庚寅上自將討李重進十一其子從鎰入貢十二月丁亥上還至東京卯江南主李景遣其臣嚴績來犒師庚申復遣
