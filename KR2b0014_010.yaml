body:
  text: 五夷侯元楚熊嚴蔡六七弟疆立曹夷伯薨八疆元曹幽伯九十十一孝元陳僖公十二覸元宋惠公十三十四王厲王無道天下蕩蕩無綱紀文章百姓離散四夷死周公召公舉太子靖而立之共和罷先是厲鰥寡靡不得所錫命諸侯㑹之蒐狩天下喜於交侵宣王即位側身修行勞來安集其民至於人美之焉王化復行詩戌甲宣王靖元年霜元楚熊二弟鮮立曹幽伯薨三觧元曹戴伯四無忌元齊厲公五六弟爭立仲雪死叔熊逃難于濮晉獻侯藉元荆子熊霜薨三資之兵使伐西戎破之乃賜以大駱犬丘之田國人立季紃西戎殺秦仲王召秦仲子莊公七熊紃元秦荘公楚八九十弟敖立魯愼公薨申甲十一敖元魯武公十二爲太子樊仲山甫諫曰不順必犯魯武公以子括與戲見王王立戲聽魯侯歸而薨太子戲立齊厲公暴虐國人犯必誅是自誅王命也誅亦失不誅亦失王不立誅弑君者弑之太子赤十三文公赤元魯懿公戲齊十四十五僖䘙武公復修康叔之政百姓和集詩人美之侯薨太子共伯早死立其弟和是爲武公十六和元衛武公十七蓂生元晉穆侯十八十九所事元蔡信侯二十午甲二十一二十二王封弟友于鄭魯人魯侯伯御鄭桓公友元之子伯御弑懿公立括二十三二十四二十五公說齊成元二十六二十七二十八公元宋哀二十九熊楚公立元鄂宋戴三十辰甲三十一三十二伯御立懿王伐魯殺從是而不睦公之弟稱諸侯三十三雉魯孝公稱元陳武公靈曹惠伯三十四購元齊莊公三十五三十六三十七三十八儀元楚若敖三十九之戎王乃料民于太原樊穆戰于千畝王師敗績于姜氏之時脩其職則少多生死出入往來皆可知也仲諫曰古者不料民而知其多少若立其官使王不聽又何料焉四十寅甲四十一四十二四十三四十四叔元晉殤四十五四十六愼徽接下王崩王能外攘夷狄命尹吉甫北伐玁狁方叔南征蠻荆用賢使能羣臣無不自盡以奉其上內脩政事周室中興焉復文武之境土幽王官元年姓愁怨不以禮信待諸侯賞罰不當王沉湎淫泆讒謟竝進賦役煩重百怨叛諸侯二洛竭岐山崩伯陽父知周將亡晉文侯仇陳夷公說元涇渭三申女王娶乃廢申后放太子于申以褒姒爲后伯服爲太以爲后生太子宜臼又得褒姒嬖之生子伯服燎之方揚寧或滅之赫赫宗周褒姒滅之子褒姒驕縱王惑之詩人知其必亡剌之曰四弟爕立陳夷公薨子甲五平公爕元秦襄公陳六七八公爲鄭栢將弊寄帑於虢鄶之間司徒用史伯之言知周九始騷王室十十一興西申侯臼是爲平王平王東徙洛邑以避狄難自是周戎攻周殺幽王於驪山之下申侯復立太子宜更相併吞而齊楚秦晉始大室微弱政令不行諸侯交爭平王臼宜元年公擊之取其十邑因徙居之鄭武公元虢鄶叛鄭鄭武二三弗湟元魯惠公戌甲四五六公司空元秦文公宋武七八坎元楚霄敖九十興元蔡共侯十一立弟武殺而代之曹惠伯薨子石甫十二穆公武元蔡戴公曹十三申甲十四莊公楊元楚蚡冐眗衛十五終生元曹桓公十六十七圉元陳文公十八十九二十二十一有之北至岐岐以東歸之王秦文公大敗戎師收周餘民二十二偕論元蔡宣侯二十三午甲二十四力元宋桓公二十五二十六始亂封文侯弟成師於曲沃師服晉昭侯伯曲沃桓叔成師元晉侯也而建國本既弱矣其能乆乎於是沃盛强曰國家之立也本大而末小是以能固今晉甸詩人爲之賦揚之水及椒聊昭侯微弱國人將叛而歸沃二十七鮑元陳桓公二十八母武姜使居京祭仲曰都城過百雉國之鄭莊公寤生元鄭莊公之弟段有寵於必自斃子姑待之段多才而好勇不義而得衆害也不如早爲之所無使滋蔓公曰多行不義詩人剌之莊公不禁二十九三十殺蚡冒之子而自立荆子蚡冒薨弟熊通三十一通元楚武王三十二弑昭侯而納曲沃桓叔晉孝侯平元晉潘父其子孝侯不克晉人立三十三辰甲三十四三十五三十六上僣夫人失位詩人爲之賦碩人及綠衛莊公娶於齊曰莊姜賢而不荅嬖妾曰臣聞愛子教之以義方弗納於邪去順効逆衣嬖人之子州吁有寵而好兵公弗禁石碏諌莊公薨太子完立焉所以速禍也弗聽是歲三十七完元衛桓公三十八三十九四十四十一沃莊伯鮮元齊僖公禄父曲四十二與夷而立弟和宋宣公薨舍其子四十三和元宋穆公寅甲四十四四十五四十六四十七翼弑孝侯曲沃伯伐弟鄂侯晉人立其四十八子允㓜長庶子息姑攝位晉鄂侯郤元魯惠公薨太四十九武姜將啓之莊公使公子吕伐京太叔魯隱公息姑元夏鄭太叔段將襲鄭克段于鄢譏教失也出奔共春秋書鄭伯五十五十一帥師取温夏鄭祭足孔艾而屬殤公焉使其子馮出居于鄭穆公薨之麥秋又取成周之禾宋穆公疾召大司馬皆歸于魯伯取郜及防八許讓鄭鄭伯受而不敢有以與秋齊侯魯侯鄭伯滅許齊魯以子知息之將亡以其不度德量力冬魯公子許叔君子以爲有禮息侯伐鄭大敗而還君翬懼反譛隱公於桓公而弑之翬請殺桓公將求太宰隱公不許九元春魯魯桓公允枋田鄭卒易十其妻殤公怒督懼遂弑殤公春秋以宋莊公馮元春宋督殺孔父而取督召莊公于鄭而立之齊魯陳鄭皆有賂遂相督爲有無君之心而後動於惡故先書弑其君於宋臧僖伯諫不聴宋公夏魯取郜鼎十一沃武公伐翼獲哀侯晉小子侯元春曲謂之小子侯晉人立其子十二戌甲十三子佗殺太子免而春陳桓公薨文公人從王伐鄭戰于繻葛王卒大敗祝聃射王中代之王奪鄭伯政鄭伯不朝秋蔡人衛人陳肩十四公弟躍楚武王侵隨隨少師請追楚陳厲公躍元秋蔡人殺陳佗而立桓而君逞欲不可隨侯懼而修政楚不敢伐夏師季梁曰小之能敵大也小道而大淫今民餒忽救齊敗戎師比戎伐齊鄭太子十五小子侯殺之冬曲沃伯誘晉十六侯晉失也夏楚子伐隨隨侯不用季梁之言敗於速緍元隨少師有寵楚鬪伯比曰讎有覺不可晉秦寧公薨三父廢太子而立少子出公𣏌楚獲少師以歸冬王立晉哀侯之弟緍于十七公元秦出十八伯伐魯戰于郎冬齊侯䘙侯鄭十九姑元夏曹莊公射人誘鄭祭仲而執之使立突太子忽奔䘙鄭莊公薨公子突之母宋雍氏之女也秋宋二十諸右公子生壽屬諸左公子宣姜與公子朔鄭厲公突元冬䘙宣公薨宣公生急子屬其旌以先盜俱殺之故二公子怨惠公構急子公使諸齊使盜待諸萃壽子載二十一莊公林元䘙惠公朔陳二十二無常鮑叔牙曰君使臣慢冬齊僖公薨襄公立政令秦三父弑出公復立故太子亂將作矣奉僖公子小白出奔莒申甲二十三其壻雍紏叛之不克夏厲公出奔蔡太子忽復齊襄公諸兒秦武公元鄭祭仲專攻厲公使王辛伯曰竝后匹嫡兩政耦國亂之本也歸于鄭秋厲公復入于櫟王子克有寵於莊王仲元年洩右公子職立公子黔牟衛公奔齊衛黔牟鄭昭公忽元冬衛左公子二立之鄭昭公惡高渠彌懼冬弑昭公而立夏蔡桓侯薨無子蔡人召桓侯弟季于陳而公討三父夷三族其弟公子亹秦武三春魯侯及夫人文姜蔡哀侯獻舞鄭子亹元殺魯侯秋齊侯誘鄭子亹及高渠彌殺之祭如齊申繻諫不聽齊侯通於文姜使公子彭生謀弑王立王子克不克而死仲立昭公弟子儀周公黒肩四鄭子儀元魯莊公同五杵臼元陳宣公六紀季以酅入于齊宋閔公捷元秋七去其國夏紀侯大八文楚曹赤莊公子也出奔陳赤歸于八之族偪盡殺之冬晉獻公患桓莊九赤元衛懿公侵晉虢人再寅甲十得勝於我必棄其民無衆而伐晉侯將伐虢士蒍曰不可若驟所畜也虢弗畜也亟戰將饑之欲禦我誰與夫禮樂慈愛戰十一姜生太子晉獻公齊奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁申生大戎狐姬生重耳小戎子生夷吾驪姬生沃重耳居蒲夷吾居屈唯二姬之子在絳五與東闗嬖五使言於公出太子使居曲十二十三尹自毁其家以紓楚國之難秦宣公秋楚殺其令尹公子元鬬穀於菟爲令公立薨弟成十四公元秦成十五慶父季友請立太子般秋魯莊公疾叔牙請立公之庶子開慶父叔牙季友皆桓公子也冬乃酖殺叔牙公薨慶父使賊殺子般齊人立莊邢狄伐十六邢夏齊仲孫湫如魯有難歸桓公魯閔公開曹昭公班元春齊人救也國將亡本必先顛晉侯作二軍以滅耿滅問曰魯可取乎對曰不可猶秉周禮禮所以本耿賜畢萬魏魏滅霍賜趙宿十七弑閔公季友立閔公之兄衛戴公申元秋魯慶父取而殺之冬狄滅衛殺懿公齊宋收其遺民申而誅慶父夫人哀姜與於亂故出奔邾齊人公鄭棄其師秦成公薨弟任好立立宣公之孫戴公戴公尋薨又立其弟文十八公以諸侯救邢夏邢遷於夷儀諸侯城之凡侯魯僖公申秦穆公任好衛文公燬元春齊桓討罪禮也伯救患分災十九文公務材訓農授方任能衞春諸侯城楚丘而封衛焉衛道于虞以伐虢夏虞師晉師城下陽春秋先書更冨昌詩人美之晉用荀息之謀以璧馬假故也虞賄子甲二十二十一侵蔡蔡潰遂伐楚次春齊侯以諸侯之師冬晉驪姬寘毒於胙以譛太子申生申生自于陘責楚包茅不入夏楚子使屈完來盟於師吾曰皆知之殺遂譛重耳夷二十二王欲廢太子鄭而立春晉公子重耳出奔狄周也秋晉復假道於虞以伐虢宮之奇諫曰寵子帶夏齊桓公以諸侯㑹太子於首止謀寧冬晉滅虢還舘於虞遂襲虞滅之虢虞之表也虢亡虞必從之不聽二十三公子春晉許冬許男面縳請服于楚夷吾出奔梁秋楚子圍二十四寗母鄭太子秋諸侯盟于以禮與信屬諸侯而以姦終之乃止冬王崩華請去洩氏孔氏齊侯將許之管仲曰不可君不發喪而告難于齊襄王畏太叔帶之難二十五諸侯盟于洮謀王曹共公襄元春位而後發喪室也襄王定襄王鄭元年公薨冬里克鄭欲納文公乃殺奚夏齊桓公㑹諸侯于葵丘秋晉獻吾重賂秦以求入秦伯與齊納夷吾齊荀息立卓子里克又殺之郤芮使夷二公夷晉惠皆背之賂秦伯以河外列城五旣而不與又責吾宋襄公兹父元晉惠公許賂中大夫既而郤芮欲以出晉君而納重耳不克而死里克以弑君之罪而來之丕鄭使秦伯誘三戎夏帶召之也伐京師王子四帶秋王子帶奔齊王以戎難故討子戌甲五公欵陳穆輸粟于晉丕豹請伐晉秦伯日其君是惡其民元冬晉饑乞糴于秦秦伯用子桑百里之言罪何六施幸災民所棄也近猶讎之况敵怨乎冬秦饑乞糴于晉晉侯不與慶鄭曰背七晉侯以歸秦穆姬以死請乃舍之巳而復歸晉蔡莊公甲午元冬秦伯伐晉戰于韓原生獲東置官司焉侯始征晉河八子華冬鄭九晉河東齊桓公內嬖夏晉太子質于秦秦歸貂易牙嫡庶不明冬公疾竪貂易牙作亂立長如夫人者六人皆有子公不用管仲之言近竪不歛䖝流出尸太子昭奔宋庶子無虧公乏食而薨三月十春宋襄公以諸齊孝公昭元而還冬邢人狄人伐衛衛侯以國讓父兄子侯伐齊齊人殺無虧夏宋敗齊師于甗立孝公而後出師狄師還弟及朝衆衆不可十一夏盟諸侯于曹南用鄫春宋襄公執滕子嬰齊公諸修好於諸侯以無忘齊桓之德梁伯好子于次睢之社欲以屬諸侯諸侯不從陳穆取梁春秋書曰梁亡君自取之也土功亟城而不處民疲而不堪秦遂十二十三也秋楚子㑹諸宋公于盂執宋公以伐宋冬宋人求諸侯于楚公子目夷曰小國爭盟禍以釋之㑹于薄十四陸渾之戎於伊川晉太子圉自春魯侯伐邾取湏句秋秦晉遷師于井陘宋公伐鄭楚子伐宋以救鄭宋公秦逃歸王子帶自齊復歸京師秋邾敗魯敗于泌公傷股不用子魚之謀冬申甲十五有功子文使爲令秋楚成得臣伐陳自狄之衞之齊之曹之鄭之宋之楚遂之秦尹晉惠公薨冬懐公殺狐突晉公子重耳先十六重耳于晉殺懷公于高梁吕師作亂秦伯晉文公重耳宋成公王臣元春秦伯納不聽王子帶通於隗氏王絀之秋狄人奉叔帶誅之夏王使狄伐鄭因以其女爲后富辰諫於汜叔帶居于溫以伐王王出適鄭處十七名罪滅同姓夏晉春衞侯滅邢春秋書之陽樊温原攅茅之田晉始啓南陽秋秦晉文公用狐偃之言納王取叔帶于溫殺之王與之曰信國之寳也得原失信所亡滋多伐鄭冬晉侯圍原命三日不降命去十八成衛卽晉楚得臣伐宋魯以楚師伐齊取穀寘桓公鄭元夏齊伐魯秋楚人滅夔宋叛楚楚申叔戍之公子雍於穀十九而代立冬楚于及諸侯圍夏齊孝公薨潘殺孝公子軍謀元帥趙衰曰郤縠可說禮樂而敦詩書乃宋宋告急于晉晉侯將救宋乃蒐于被廬作三將中軍使郤縠二十衞侯出居于襄牛晉侯入曹執曹齊昭公潘元春晉侯侵曹伐衞晉襄公及姜戎敗秦師于殽獲二帥文嬴請而公蘭元春秦師及滑鄭人覺之城渭而還夏之過也秋晉侯敗狄於箕先軫死冬楚子免之秦穆公悔過自責作秦誓不替孟明曰孤侵蔡上伐鄭二十六戚先且居使晉侯朝王衞魯文公興元夏晉侯伐衞取君齒未也而又多愛黜乃亂也弗聽既又欲立孔逹伐晉楚成王將以商臣爲太子子上曰王請食熊蹯不許而死職冬商臣以宫甲圍成王二十七元春秦孟楚穆王商臣成子曰秦師又至必將避之念德不怠庸可敵明伐晉敗於彭衙秦伯猶用孟明増修國政趙不書卿爲穆公故尊秦也乎冬晉先且居伐秦春秋二十八晉濟河焚夏秦伯伐覇西戎用孟明也舟取王官及郊遂二十九滅江秋楚人三十滅六冬秋楚人蓼滅三十一夏秦穆公薨以三良殉秋晉襄春晉蒐于夷舍二軍趙盾始爲國政蔑士㑹如秦秦逆公于雍賈季使召公子樂于公薨靈公少晉人以難故欲立長君趙盾使先殺陽處父而奔狄陳趙孟殺諸郫賈季三十二公罃元夏宋穆晉靈公夷臯秦康子以啼於朝趙宣子患之乃立靈公而禦秦師襄之族殺公孫固公孫鄭晉穆嬴日夜抱太先蔑士㑹奔秦敗秦師於令狐三十三歸戚田于衞夏秦人宋昭公杵臼元春晉人作亂殺大司馬公子卬伐晉取武成冬宋襄夫頃王士臣元年克晉人討而殺之楚人伐鄭侵春晉先都士縠箕鄭父作亂殺先及楚平陳陳鄭皆辰甲二冬楚子陳侯蔡侯鄭伯次曹文公壽元夏楚殺子西子以田於孟諸于厥貉宋公逆楚三承匡冬魯叔孫得臣敗夏魯叔彭生㑹晉郤缺於長狄僑如狄于鹹獲四晉取羈馬晉及秦師戰于河曲春郕伯朱儒奔魯冬秦伯伐五曰利於民不利於君邾子曰民苟利矣孤必與夏晉以詐取士㑹于秦邾文公卜遷于繹史於繹焉遂遷六夫人魯姬無寵生子舍無威公弟商楚莊王旅陳靈公平國元齊昭公自立秋趙盾納捷菑于邾弗克納楚鬭克人驟施于國而多聚士夏昭公薨商人弑舍而弗克而死公子爕作亂匡王班元年侯㑹諸侯盟于扈將爲魯討齊既而齊懿公商人元秋齊侯侵魯冬晉文子曰齊侯其不免乎已則無禮而討有禮取賂而還齊侯復侵魯遂伐曹討其朝魯也季二蠻庸麋百濮皆叛之用蒍賈潘尫之謀羣蠻蔡文公申元春魯及齊平秋楚大饑戎於國人冬襄夫人攻昭公殺之而立鮑皆服遂滅庸宋昭公無道公子鮑禮三公鮑宋文殺君猶立文公而還卿不書於春秋失其所也元春晉荀林父以諸侯之師伐宋討曰何故四近之夏二人弑懿公齊人立桓公子元魯春魯文公薨齊懿公無禮於閆職邴歜而嬖而私事襄仲冬襄仲殺視及惡而立宣公魯文公元妃出姜生惡及視二妃嬴氏生倭嬴民子僕弑莒公而奔魯公室由是遂微莒太五秦共公稻元秋楚魯宣公倭齊惠公元晉侯侈趙宣子驟諫而不入故不競於楚子鄭人侵陳遂侵宋晉趙盾帥師救陳於是寅甲六爲無道欲殺趙盾盾出亡秋趙穿攻殺靈春鄭公子歸生伐宋獲宋華元晉靈公其君宣子逆文公子黒臀於周而立之公宣子未出山而復太史書日趙盾弑定王瑜元年戎遂觀兵扵周疆定王使王孫滿勞晉成公黒臀元春楚子伐陸渾之輕重滿曰在德不在鼎楚子楚子問鼎之大小二公子宋與公子歸生鄭靈公夷元夏鄭之春秋書歸生弑其君君子曰仁而不武無能謀弑靈公歸生不可宋反譛歸生歸生懼而從椒作亂殺司馬蒍賈楚子謀而殺之逹也鄭人立穆公子堅秋楚令尹鬬三公堅鄭襄元四公元秦桓五六盟呉越而還夏楚子滅舒蓼七父以諸侯秋晉荀林姬詩人剌之洩治諫冬公殺洩冶鄭伯敗楚之師伐陳晉侯薨于扈乃還陳靈公通於夏子良憂曰是國之灾也師于柳棼國人皆喜唯八元夏陳靈公飲酒晉景公孺衞穆公遫徵舒射而殺之於夏氏夏姬之子九春楚子伐鄭及櫟鄭及齊頃公無野陳成公午元徵舒因縣陳用申叔時之諫乃復封陳召靈公楚成遂侵宋冬楚子討陳夏氏亂入陳轘夏旣受楚盟又徼事于晉太子午于晉而立之鄭子甲十鄭伯肉袒牽春楚子入鄭戰曰楚德刑政事典禮不易不可敵也先縠曰羊以逆楚子舍之夏晉荀林父救鄭士㑹不欲死晉侯用士渥濁之言使復其佐冬楚子滅不可遂與楚師戰于邲晉師大敗荀桓子歸請蕭十一先縠冬晉殺十二鄭宋人殺楚行人申舟春衛殺孔逹夏晉侯伐圍宋秋楚子十三晉人不救宋及楚平夏晉荀林曹宣公廬元春宋人告急於晉伯氏矣王札子殺召伯毛伯秋晉魏顆敗父帥師滅赤狄潞氏晉侯賞士伯曰微于吾喪輔氏秦師于十四辰始將中軍盜奔于秦秋王孫春晉士㑹滅赤狄甲氏及留吁鐸人復之蘇奔晉晉十五之郤克怒請伐齊晉侯不許晉春晉郤克召㑹于齊齊婦人笑歸秋士㑹請老使郤克爲政侯㑹諸侯于斷道齊高固逃十六春晉侯伐蔡景侯固元三桓以張公室與宣公謀而聘於晉未返冬宣齊秋邾人戕鄫子于鄫魯公孫歸父欲去氏歸父奔齊公薨魯逐東門十七春晉侯平成於王劉康魯成公黒肱楚共王審元王師敗績于茅戎公徼戎無備遂伐之十八師於新築晉郤夏齊師伐魯還敗衛且歸魯衛之侵地冬楚令尹子重侵衞及魯魯克伐齊大敗齊師于鞌齊侯使國佐受盟於晉竊與楚盟于蜀衛及諸侯之大夫十九春晉侯以諸侯伐鄭宋共公瑕衛定公臧元齊侯朝于晉冬晉作六軍戌甲二十不禮魯侯欲求成於夏魯侯朝于晉晉侯許晉欒書伐鄭楚子反敕鄭鄭伯與許男訟楚季文子曰晉未可以貳乃止冬鄭伯伐二十一夏梁山崩許靈公訴鄭伯於楚鄭伯鄭悼公費元晉趙同趙括放趙嬰於齊盟於蟲牢宋殺公子圍龜請成於晉冬晉侯與諸侯簡王夷元年楚子重伐鄭冬晉欒書救鄭楚師宵呉子壽夢元夏晉遷於新田秋戰而還呉子壽夢立始大稱王潰晉遂侵蔡楚師救蔡欒武子不二元春呉鄭成公睔同盟于馬陵楚子反子重殺申公巫臣之族伐郯秋楚子重伐鄭諸侯救鄭囚楚鐘儀遂伐楚伐巢伐徐入州來蠻夷屬服於楚者呉盡巫臣爲晉通使於呉教之戰陣敎之叛楚呉始孫林父奔晉取之冬衛三諸侯由是貳於晉晉欒書侵春晉侯使魯歸汶陽之田于齊殺之武從姬氏畜於公宫韓厥曰成季宣孟不蔡遂侵楚獲沈子楫夏晉趙姬譛趙同趙括而反其田焉可忘也乃立武四賂求鄭鄭伯從楚秋晉人執春諸侯同盟于蒲楚人以重冬晉侯使鍾儀求成於楚鄭人用公孫申之謀鄭伯使欒書伐鄭楚子重侵陳遂伐莒莒潰楚公子成如晉脩好圍許示晉不急君也五子班立公子繻夏鄭人齊靈公環元春鄭公諸侯伐鄭鄭人賂晉侯以求成鄭伯歸殺公孫殺須立髠頑晉侯有疾立太子州蒲爲君而㑹申六又善於欒武子冬華元如楚遂如晉合晉晉厲公州蒲元宋華元善於令尹子重伯不肯渉河周公楚出奔晉楚之成秦晉爲成將盟於令狐秦七楚公子罷晉士爕㑹楚莅盟冬楚公子罷如晉莅盟盟于宋西門之外秋晉郤至如八侯朝王遂從春晉侯以諸於師庶子負芻殺太子而自立公子欣時將亡劉康公成肅公伐秦秦師敗績夏曹伯廬卒罪且請焉乃反而致其邑國人皆將從之成公懼告申甲九元夏衞孫曹成公負芻之不哀也曰天禍衞國也夫吾不獲鱄也使主林父自晉歸于衞冬衞定公薨定姜見太子衎之無不聳懼社稷大夫聞十諸侯于戚執曹伯將立欣時辭秦景公衞獻公衎元春晉㑹夏楚子侵鄭及衞秋宋蕩澤殺公子肥華元曰聖達節次守節下失節敢失守乎遂奔宋宗諸侯大夫㑹呉鍾離許遷于葉討而殺之魚石奔楚冬晉三郤殺伯十一平宋鄭范文子不欲戰曰自非聖人外寧必有內憂公成元春鄭叛晉從楚夏晉侯伐鄭楚子救秋晉人歸曹伯晉人執魯季孫行父冬魯弗聽遂敗楚師于鄢陵射共王中目楚殺子反魯殺公子偃叔孫僑如奔齊十二同盟於柯陵秋齊用聲夏諸侯從尹子單子伐鄭冬晉厲公欲盡去羣大夫而立其左右殺郤孟子之譛刖鮑牽逐高無咎國佐殺慶克以叛中行偃殺胥童而執厲公錡郤犫郤至而立胥童欒書十三偃弑厲公逆春欒書中行治舊政晉復覇齊人殺國佐夏楚人納宋襄公曽孫周於京師而立之悼公卽位脩百官遇楚師於靡角楚師還冬諸侯盟於虚朾魚石於彭城晉侯以諸侯之師救宋圍彭城十四宋五大夫在彭城者歸夏晉韓厥伐鄭魯襄公午晉悼公周元春彭城降晉晉以靈王泄心元年大夫㑹于戚遂城虎牢鄭人乃行春齊侯伐菜秋晉師侵鄭諸侯成二鄧廖夏單子㑹諸侯同盟於雞澤楚鄭僖公髠頑元春楚子重伐呉呉人獲求成晉侯之弟楊于亂行魏絳戮其僕晉侯令尹子辛侵欲於小國陳侯疾之使袁僑如㑹民使佐新軍以爲能以刑佐三喪而止陳人不聽命臧武仲春陳成公薨楚人將伐陳聞魏絳之謀始和諸戎邾子莒人伐鄫魯臧紇曰陳必亡冬魯侯如晉請屬鄫許之晉用敗于狐駘救鄫侵邾四辛諸侯㑹于戚㑹呉且命戍陳陳哀公溺元秋楚人殺令尹子尹晉范宣子曰我喪陳矣冬子囊伐陳諸侯救也魯以屬鄫爲不利復歸之楚子囊爲令陳午甲五冬齊侯滅萊秋莒人滅鄫六侯㑹于鄬以救之冬楚子囊圍陳諸公而以瘧疾赴於諸侯陳慶虎慶寅以楚難故鄭僖公如㑹子駟相僖公不禮焉子駟夜弑僖陳侯逃歸召陳侯于㑹七子駟子駟殺之鄭子國子耳鄭簡公喜元夏鄭羣公子謀邢丘以命朝聘之數復文囊之業冬楚子囊侵蔡獲蔡公子爕晉悼公㑹諸侯之大夫于子駟不可遂從楚伐鄭子展欲待晉八囊曰晉君明臣忠不可敵春宋災秦乞師于楚子于戲楚子伐鄭鄭及楚平晉侯用魏絳之言省也秋秦人侵晉冬諸侯圍鄭鄭人行成同盟楚不能與爭用息民三駕而九陽夏楚鄭伐宋晉伐秦春諸侯㑹呉子于柤遂滅偪耳侵魯還圍蕭侵宋諸侯伐鄭冬盜殺鄭子國鄭皇耳侵衛衛人敗之獲皇耳秋楚子囊鄭子鄭諸侯還鄭復從楚王叔奔晉子駟子耳鄭及楚平楚子囊救十季孟叔孫三春魯作三軍行成同盟于亳楚子秦師伐鄭鄭伯逆之遂伐分公室各有其一夏鄭侵宋諸侯伐鄭鄭人晉晉侯賞魏絳以金石之樂冬秦敗晉師于宋諸侯悉師以復伐鄭㑹于蕭魚鄭自是服于櫟十一季札賢將立之季札曰君義嗣也誰敢秋呉子乗薨太子諸樊既除喪以其弟室而耕乃舍之干君固立之棄其十二士匄將中軍以讓荀偃呉子遏元夏晉侯命楚養由基敗諸庸浦獲公子黨其下皆讓君子美之秋呉侵十三元春諸楚康王昭于棫林而還衛獻公不禮於孫林父寗殖二侯㑹吳于向夏諸侯之大夫從晉侯伐秦至秋楚子囊伐呉呉人敗之冬諸侯㑹于戚子作亂獻公奔齊二子立公孫剽晉舍新軍十四齊侯伐魯圍成秋邾人伐魯衞殤公剽元春王逆后于齊夏辰甲十五執莒子邾子以其侵魯故也齊高厚逃歸晉平公彪元春晉平公㑹諸侯于湨梁夫伐許秋齊侯伐魯齊侯伐魯夏諸侯之大十六夏衞石買伐曹春宋人伐陳伐魯宋華臣出奔陳秋齊侯伐魯冬邾人十七買秋齊侯伐夏晉人執衞石子光諌而止鄭子孔將召楚師以去諸大夫魯冬晉平公以諸侯圍齊齊侯將走郵棠太蟲牢子孔不敢㑹楚師楚令尹子庚伐鄭至于十八諸侯盟于祝柯晉曹武公滕元春高厚宿沙衞牙以爲太子夏齊侯病崔杼微人執邾子齊靈公愛少子牙遂東太子光使齊侯薨乃還秋鄭殺子孔以子産爲卿逆光而立之殺高厚宿沙衛晉士匄伐齊聞十九伐邾蔡公子爕欲與晉蔡人殺之蔡公子齊莊公光元夏諸侯盟于澶淵秋魯人其子喜使納獻公以掩其耻履出奔楚冬衛寗殖卒遺命二十以漆閭丘春邾庶其楚冬晉㑹諸侯于商任錮欒氏也奔魯晉范匄逐欒盈秋盈出奔二十一盈自秋欒干沙隨復錮欒氏也楚殺令尹子南楚適齊晏嬰諌齊侯不聽冬晉㑹諸侯二十二諸曲沃盈以曲沃之甲入絳不克反奔曲沃夏陳殺慶虎慶寅齊莊公以藩載欒盈納行張武軍於熒庭而還冬魯臧孫紇出奔邾晉人圍之滅其族秋齊侯伐衞遂伐晉登太傷股而退齊侯襲莒二十三伐齊齊侯懼求援于楚冬秋晉㑹諸侯于夷儀將以齊人爲王城郟楚子伐鄭以救齊二十四莊公適子崔杼之妻春齊崔杼伐魯齊諸侯于夷儀以伐齊齊人以莊公說鄭入陳夏崔杼弒莊公立靈公庶子杵臼而相之晉㑹冬呉子諸樊伐楚門于巢卒弟餘祭立秋衛獻公入于夷儀楚滅舒鳩寅甲二十五其君剽衞孫林父入于戚以叛衞侯衎復齊景公杵臼呉子餘祭元春衞寗喜弑寗喜及衞侯殺寺人伊戾譖太子痤殺之歸于衛夏楚子侵鄭晉㑹諸侯于澶淵執衞侯晉人歸二十六殺之公弟鱄以公無僖出奔晉衞獻公後元寗喜專夏衞侯子木欲彌諸侯之兵以爲名乃合晉楚及諸侯終身不仕宋向戍善於趙文子又善於令尹慶封殺崔杼并其家之大夫盟於宋秋齊二十七胡子沈子白秋朝夏齊侯陳侯蔡侯齊慶封好田而耆酒與慶舍政而田于萊冬公于晉魯侯宋公陳侯鄭伯如楚宋之盟故也之慶封伐齊不克奔魯又奔呉孫蠆公孫竈與陳鮑攻慶舍殺司馬溫公稽古錄卷之十
