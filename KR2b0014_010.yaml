front:
  text: 司馬溫公稽古錄卷之十申庚共和元年宜臼十八年秦仲楚熊勇七宋僖魯愼公濞七齊武公夀十晉靖侯三曹夷伯喜二十四共伯和行周政厲王太公舉十八衛僖侯陳幽公寧十四蔡武侯二十公虎之家子靖居于召二司徒元晉僖侯三四弟熊嚴立楚熊勇薨子甲
