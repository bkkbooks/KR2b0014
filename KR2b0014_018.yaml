front:
  text: 司馬溫公稽古録卷之十八真宗咸平元年令飢民劫窖者減強盜法五月正月辛酉朔改元三月壬申𥘉犯杖送軍頭司十月丙戌朔日食十二月戊午朔日食七月丙戌初令惡民再犯徒三獄以聞行新編敕丁酉初令大辟疑者具二位放逋欠物千餘萬二月催欠司奏自即其振討平之七月甲申詔外任官各給職田釋繫囚三十餘萬溪蠻冦奉節施夔巡檢侍萬九月庚辰朔日食癸卯傅潛奏破契丹蠲其稅八月丙寅大閲於城東北步騎二十太宗並配大赦契丹冦北邊上自將擊之於廉良路十一月丙戌上祀圓丘初以太祖州張旻奏敗契丹于城南甲子幸大名丁十二月甲寅發東京丙午幸澶州己未知冀兵八萬屯定州畏懦不戰契丹遂冦祁趙逰騎未府州奏折御昌等擊契丹破之傅潛等擁牧司總內外馬政至邢洺是歲置羣三趙延順反殺鈐轄符昭正月己卯朔益州戍卒州直抵劒門知劒州李士衡擊却之康保裔壽逐知州牛冕奉都虞侯王均為主辛巳陷漢淄青而去庚寅范廷召等奏追契丹至莫州北與契丹戰於瀛州敗沒契丹遂自德棣濟河掠騎八千討王均庚子上還東京二月辛酉大破之甲午上發大名詔雷有終等將步偽遁雷有終入益州為均所敗三月戊寅朔西川都巡檢張思鈞奏破王均復漢州乙丑均月乙卯改葬元德皇后雷有終等敗王均於日食丙申雷有終奏破王均於彌牟鎮四侍閻承翰等塞之九月雷有終等克益州石益州城下遂圍之五月甲辰河決王陵命內十一月壬子詔百官轉對普追王均至富順監斬之四賢良方正得查二月丙寅詔舉行儀天曆四月壬子初令審官磨勘京朝官道王曙等三月辛巳分川峽為四路庚寅萬五千餘人八月丙寅趙保吉寇清逺軍九引對罷郊祀遷官六月省天下冗吏十九保捷辛卯曹璨敗趙保吉於栁撥川契丹月乙亥陷之庚寅詔陜西家出一丁充保毅授西涼六合酋長藩羅支官令討趙保吉十入寇十月甲寅張斌敗契丹於長城口乙卯奏契丹遁去一月丙子王顯五靈州四月庚午初令軍職三月己酉西邊奏趙保吉陷契丹互市契丹入寇乙酉廣北邊方田以有闕即時遷補不俟三年置榷場於雄州與壬申趙保吉圍麟州丁丑知州衛居實擊却之梗虜騎五月壬寅籍河南民丁為兵六月請輸榖於邊九月西蕃寇鎮戍軍知軍李繼七月甲午朔日食詔以鹽給施黔州蠻蠻直昭文館趙保吉寇金明都監李繼周擊却和擊却之戊申以終南處士种放為左司諌辟十一月壬寅上祀圓丘大赦之十月戊寅初令州官同録問大六州路轉四月夔之趙保吉寇洪德蕃將慶香等擊破之丙運使丁謂奏生蠻入寇高州蠻田承進等擊破五月壬寅罷雄州榷場十一月趙保吉陷子契丹入寇己卯王繼忠與戰於望都南敗績吉中流矢還死於靈州之境子德明襲位西涼府潘羅支詐降襲擊保吉大破之保辰甲
