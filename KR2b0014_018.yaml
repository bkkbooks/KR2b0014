body:
  text: 景德元奏契丹言泥酋長拔黃帥三百餘帳內正月丙戌朔大赦改元己丑麟府路趙德明請降三月乙酉朔魏能奏破契丹於屬癸卯石隰州奏河西四十五族內屬二月自嘉山引徐河入沙河種稻於水北五月命長城口己亥太后李氏崩四月閻承翰奏禮院奏以懿德明德二后並祔太宗廟從之向敏中安撫西邊受趙德明降與之議立條約潘羅支遣兄邦迪支入見九月減三司吏員六月知鎮戍軍曹瑋奏敗西戎於石門川河決橫隴閏月禮院奏殯明德太后於壬上聞契丹將入寇議親征寇凖等請幸澶州寇威虜順安軍保州契丹主及其國母寇定州地俟吉歲乃葬先作主祔廟契丹統軍撻覽州威虜北平軍引兵入契丹境以分其兵勢契遣使以王繼忠表授石普求和十月命麟府保西涼諸胡立其弟厮鐸督詔殿直曹利用齎丹寇瀛州國信使奏潘羅支為迷般囑所殺十一月契丹以瀛州知州李延渥等擊走之書詣契丹許其和黎桓遣其子明提入貢甲戍契丹至澶州城下撻覽中連弩而死契詔德清軍吏民棄城保澶魏庚午上發東京契丹遣使求瓦橋關南之地上不許但約歲以丹引却丙子上至澶州渡河登北城戊寅朔日食契丹陷通利軍甲辰契丹復遣使請絹二十萬匹銀一十萬兩遺之十二月庚辰北鄙寧息甲午上發澶州戊戌至東京和願以兄禮事上上許之自是不復為寇二月正五月别試河北舉人遭胡寇不及試期者賜范庚戌朔大赦復置榷場於雄霸州安肅軍稅黎桓卒子龍鉞立弟龍廷殺之自立七昭等及第初以近邊間田給弓箭手永蠲其科九月癸丑趙德明始遣使入貢十月行月甲子增置博通墳典等科並賢良方正凡六月丁巳上祀圓丘大赦農田敕民間便之十一三使知州皆領勸農二月丙子詔轉運民李琰謀反并其黨族誅四月乙未詔朝臣使併入內內侍諸司為入內內侍省京兆屬六月黎桓諸子爭立國大亂羣臣多請伐轉對己巳渭州奏妙娥等族萬七千餘口內臣撫安之上自明德太后之喪雖從易月之之上曰未加弔恤而伐其喪豈王者所為命邊始許之七月壬戌緣海安撫使邵曄上雍州制自非凱旋郊廟不舉樂羣臣屢以為請戊戌守而已安用勞民以貪無用之土乎若封略之至交州水陸路圖上曰祖宗開疆如此其大慎貢上以年豐事簡九月庚戌詔羣臣不妨公內有叛亂者則不得不除耳未幾黎龍廷請入月庚午朔授德明官爵丁酉葬明德皇后務勿禁逰從丁卯趙德明遣使獻誓表十四陵二月己巳至西京己卯幸龍門辛卯發西京正月己未上發東京丙寅至永安鎮丁卯謁諸五月丙申朔日食六月乙卯葬莊穆皇后三月己亥至東京四月辛巳皇后郭氏崩七月丙寅陳進陷栁城遂陷栁州戊辰初今宜州登海軍校陳進殺知州劉永規舉兵反曹利用將兵討陳進乙亥黎龍廷遣其弟明見任京朝官及三年方得磨勘遷官甲戌詔置諸路提點刑獄八月陳進寇象州九月昶入貢辛巳授龍廷官爵賜名至忠癸丑初在外四分甲申曹利用敗陳進於武仙追至壬申詔文武官俸應折支者給實錢在朝六分貴州十二月曹利用追討悉平之象州斬之十月進餘黨黎有育等陷太中祥符元年鴟尾戊辰大赦改元發卒修東京外郭正月乙丑皇城使奏天書降於左承天門自禁中始六月丁酉王欽若奏天書降泰山四月作玉清昭應宫五月禁銷金等侈物戌登泰山辛亥祀上帝封玉牒壬子禪社首祭靈液亭十月辛卯上發東京丁未至乾封庚申謁太廟加上太祖太宗諡諸路大稔地祗癸丑大赦十一月丁丑還至東京甲二丁巳置紏察在京刑獄司黎雅州轡拒命遣四月癸卯詔自今所舉官犯贓與同罪七月監各置天慶觀十一月乙卯上作文武七條文思副使孫正辭等招安之十月詔州府軍國母蕭氏卒遣使弔祭賜外官十二月契丹三至忠卒弟明提明昶二月廣南西路奏黎使入貢三月授公藴官爵九月河決白浮圖爭立大校李公藴發兵皆擊殺之自稱留後遣之村塞四丁巳至寶鼎辛酉祀后土於睢上封玉正月丁酉上發東京二月癸丑次河中未至永安丙申謁諸陵四月甲辰朔至東京己册壬戌大赦戊辰自河中東還己卯次西京乙七月壬申朔免南方民丁身錢酉謁太廟五月乙未加五嶽帝號五決棣州正月河作會靈觀十月戊午聖祖降延恩殿己未大聶家口塞之八月丙申朔日食九月丁亥司命保生天尊大帝十一月甲辰詔增文武赦閠月乙丑朔上聖祖尊號曰上靈高道九天宫丁亥立德妃劉后為皇后百官俸十二月戊辰作景靈六大辟情可憫四月丙戌詔尊老君曰混元上德皇帝戎蠻寇淯井監討者奏覆五月乙巳迎聖像入昭應宫八月太宗廟十二月戊午朔日食平之十月辛酉升元德皇后祔寅甲七壬寅正月天府為南京二月辛酉上還東京壬申恭謝上發東京丙午至真源己酉謁太清宫以應月作會靈觀十月昭應宫成十二月廣南天地大赦八月河決澶州發夫卒塞之九寇欽州奏交趾八元執符御曆含真體道玉皇太天帝正月壬午朔上玉皇聖號曰太上開藏崇文院六月己酉朔日食閏月己卯朔大赦四月壬申夜榮王宫火延及朝元殿內赦大九七月廣南奏撫水蠻寇融州又寇宜州州五月趙德明攻慶州屬羌屬羌擊却之囉等寇伏羌寨曹瑋擊敗之於三都谷斬首數兵擊却之八月己卯行新編敕宗哥唃厮以年勞遷官十一月乙卯改來年元千級九月戊辰初令京朝官在外任者亦天禧元二月丁丑初選諫官御史各六員不兼正月庚戌上朝饗六廟辛亥祀天地大赦東西河北河東陜西蝗十一月曹瑋奏破鬼他職專掌諫爭曹瑋奏討宗哥族破之京平之章族二之閏月知辰州錢絳奏將兵討儒猛破正月下溪蠻彭儒猛寇辰州州兵擊却五月彭儒猛請降兩京訛言有物如席帽夜之獲其子仕漢有泉出拱聖營作祥源觀旦八月甲辰立升王諱為皇太子大赦飛入人家為妖人相聚操兵自衛喧噪逹三月三官軍不利命曹瑋往安撫寇凖奏天書降乾戊午朔日食壬申慶州奏趙德明寇柔逺寨濟至徐州入淮羣蠻寇辰澧鼎州八月丁祐山中六月乙未河決滑州城南灌澶濮鄆未上祀圓丘大赦亥大赦十一月辛四州金明監押李士彬擊正月宥州羌臘兒寇延州南決河二月丁酉奏已塞上不豫四月斬之命馮守信發兵六萬夫二萬餘人塞滑七月癸酉周懷政坐與御藥使朱能偽造符丁亥黑風晝晦六月丙申河復決滑州西北安捕能能殺使者擁兵走衆潰自殺上體小瑞謀殺大臣復用寇凖事覺斬之遣中使詣長應取旨者如故外自餘常事委太子與兩府於康九月丁卯大赦十一月庚午詔諸司事九百七十餘萬口二千二百七十餘萬資善堂會議施行訖奏是歲天下户五甲戌七月食朔日乾興元大赦戊午上崩于延慶殿太子正月辛未朔改元二月庚子朔太后處分己未大赦文武京朝官各遷一資即皇帝位遺詔尊皇后為皇太后軍國事權取書入宮丁卯貶道州司馬寇凖為雷州司户丁謂雷允恭計專權不令太后御殿但進文山陵物伏誅丁謂尋亦貶官連坐者甚衆七連坐者甚衆庚申雷允恭以擅移皇堂及盜州屬羌慶香帥衆叛歸趙德明十月己酉葬月上始與太后同御便殿垂簾聽政八月環月甲戌涇原奏唃厮囉求內附十二月順州真宗于永定陵唃厮囉數與趙德明相攻十一寇施州蠻田彥晏司馬溫公稽古録卷之十八
