front:
  text: 司馬溫公稽古録卷之十六臣光拜手稽首曰臣聞商書曰與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后周書曰我不可不監于有夏亦不可不監于有商我不敢知曰有夏服天命惟有歷年我不敢知曰不其延惟不祗厥德乃早墜厥命我不敢知曰有商受天命惟有歷年我不敢知曰不其延惟不祗厥德乃早墜厥命蓋言治亂之道古今一貫歷年之期惟德是視而已臣性愚學淺不足以知國家之大體然竊以簡䇿所載前世之迹占之輒敢昧死妄陳一二夫國之治亂盡在人君人君之道有一其德有三其才有五何謂人君之道一曰用人是也蕞爾之國必有正直忠信之士焉必有聰明勇果之士焉正直忠信之謂賢聰明勇果之謂能彼賢能者衆民之所服從也猶草木之有根柢也得其根柢則其枝葉安適哉故聖王所以能兼制兆民包舉宇內而無不聽從者此也凡用人之道采之欲博辨之欲精使之欲適任之欲專采之博者無求備於一人也收其所長棄其所短則天下無不可用之人矣辨之精者勿使名眩實僞冒真也聽其言必察其行授其任必考其功則羣臣無所匿其情矣使之適者用不違其才也仁者使守明者使治智者使謀勇者使斷則百職無不舉矣任之專者勿使邪愚之人敗之也苟知其賢雖愚者日非之而不顧苟知其正雖邪者日毁之而不聽則大功無不成矣然後為之高爵厚祿以勸其勤為之嚴刑重誅以懲其慢賞不私於好惡刑不遷於喜怒如是則下之人懷其德而畏其威樂為用而不敢欺譬如乘堅車御良馬執六轡奮長策以立于康莊之塗惟意所適安有不至者哉此人君之要道也何謂人君之德三曰仁曰明曰武仁者非嫗煦姑息之謂也興教化修政治養百姓利萬物然後可以為仁明者非巧譎苛察之謂也知道義識安危别賢愚辨是非然後可以為明武者非强亢暴戾之謂也惟道所在斷之不疑姦不能惑佞不能移然後可以為武是故仁而不明猶有良田而不能耕也明而不武猶視苖之穢而不能藝也武而不仁猶知穫而不知種也三者皆備則國治强闕一則衰闕二則危皆無一焉則亡此人君之三德也何謂人君之才五曰創業曰守成曰陵夷曰中興曰亂亡創業者智勇冠一時者也王者經綸之初土無定所民無定分英雄相與角逐而爭之才相偶則為二相參則為三愈多則愈分故非智勇冠一時莫能一天下也守成者中才能自修者也王者動作云為得之近而所利逺失之微而所害大故必兢兢業業以奉祖考之法度弊則補之傾則扶之不使耆老有歎息之音以為不如昔日之樂然後可以謂之能守成矣陵夷者中才不自修者也習於宴安樂於怠惰人之忠邪混而不分事之得失置而不察茍取目前之佚不思永逺之患日復一日使祖考之業如丘陵之勢稍頽靡而就下曾不自知故謂之陵夷也中興者才過人而善自强者也雖以帝王之子孫而能知小人之艱難盡羣下之情僞其才固已過人矣又能勤身克意尊賢求道見善則遷有過則改如是則雖亂必治雖危必安雖已衰必復興矣亂亡者下愚不可移者也心不入德義性不受法則舍道以趨惡棄禮以縱欲讒諂者用正直者誅荒淫無厭刑殺無度神怒不顧民怨不知如是而有敵國則敵國喪之無敵國則下民叛之禍不外來必自內興矣此人君之五才也夫道有失得故政有治亂德有高下故功有小大才有美惡故世有興衰上自生民之初下逮天地之末有國家者雖變化萬端不外是矣三王之前見於詩書春秋愚臣不敢復言今採戰國以來至周之顯德凡小大之國所以治亂興衰之迹舉其大要集以為圖每年為一行六十行為一重五重為一卷其天下離析之時則置一國之年於上而以朱書諸國之君及其元年繫於其下從而數諸國之年則皆可知矣凡一千三百六十有二年離為五卷命曰歷年圖敢再拜稽首上陳於黼扆之前庶幾觀聽不勞而聞見甚博善可為法惡可為戒知自古以來治世至寡亂世至多得之甚難失之甚易也恭惟國家承百王之弊接五伐之亂㝢縣分裂干戈日尋藩臣驕恣元元憔悴太祖宵衣旰食櫛風沐雨勤求賢俊明慎誅賞收支郡任文臣以消方鎮之權舉公廉除貪汚以厲州縣之吏選精鋭嚴階級以治戰鬭之士省賦役恤刑罰以撫農桑之民內政既成乃修外事近者既悅乃詰逺人故傳檄而下荆湖顧盼而克巴蜀叱咤而平嶺表指麾而定江南大勳未集太宗繼統述修前緒閩越句吳皆獻地入朝西登太行而晉人自縛蓋自宋興二十年然後大禹之迹復混而為一以至於今八十有五年矣朝廷清明四方無虞戎狄順軌羣生遂性民有自高曽以來未嘗識戰鬬之事者蓋自古太平未有若今之久也易曰君子安不忘危存不忘亡治不忘亂周書曰制治於未亂保邦於未危今人有十金之産者猶知愛之况為天下富庶治安之主以承祖宗光大完美之業嗚呼可不戒哉可不慎哉
