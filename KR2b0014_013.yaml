front:
  text: 司馬溫公稽古録卷之十三漢光武帝秀建武元年龍興元夏帝即位於鄗漢劉盆子建世漢盧芳成赤眉克長安殺更始冬帝都洛陽鄧禹入隗囂逃還天水赤眉立劉盆子為帝秋永公孫述安定盧芳皆稱帝關至栒邑竇融起河西劉二安西掠郡縣春赤眉焚長睢陽劉永走張步請降赤眉復入長安鄧禹鄧禹入長安秋漁陽太守彭寵反蓋延拔將赤眉食盡大掠東還出屯雲陽帝遣馮異代禹三步元春帝自邀燕王彭寵齊王張彭寵自稱燕王夏劉永復入睢陽以張步赤眉於宜陽赤眉不戰而降馮異進定關中斬劉永永子紆保垂惠來歙説隗囂下之為齊王步復叛從永秋岑彭平揚州蓋延稱帝李憲四馬成圍李憲隗囂使馬援見帝援漢劉紆元秋將軍馬武王霸圍劉紆遣子入侍歸盛稱帝美五師韓利殺午以降夏秦豐降春彭寵為奴所殺其子午立國冬耿弇擊張步大破之帝幸劇張步降岑彭帝征龎萌董憲破之吳漢拔郯虜劉紆太學治經典盧芳入塞居九原説交址牧鄧讓與諸郡皆降初立六囂元春朔寧王隗數騰書隴蜀説以禍福公孫述使田戎任滿侵馬成斬李憲吳漢獲龎萌董憲帝益厭兵破弇等囂欲徇三輔不克遂稱臣於蜀蜀封囂荆州夏帝遣耿弇等自隴道伐蜀隗囂發兵拒王朔寧七言觀行明試以功於是吏稱其職民安帝以天下漸平乃革王莾偽薄之化察全梁守洛陽漢兵不得進其業風俗淳厚焉隗囂將八陽斬全梁隗囂春來歙襲取洛保西境竇融及河西五太守將兵與帝會髙平攻之數月不拔夏帝自征囂至漆囂衆大潰走救囂囂復入冀諸將食盡還屯長安頴川盜賊起秋帝還平頴川冬蜀兵九隗春破蜀將王輔田弇諸縣悉降以馬援為隴西囂卒子純立隴右飢冬來歙馮異入天水吳漢討盧芳不克太守逐羌虜出塞午甲十帝自征隗純純降朔寧王純元秋芳亡入胸奴其衆皆降吳漢擊破盧芳平城下十一吳漢岑彭臧宫春帝幸南陽使斬任滿夏來歙拔武都走王元蜀遣人刺殺歙自荆門來歙蓋延自武都伐蜀漢等擊走田戎又刺殺之吳漢自夷陵入犍為冬岑彭乘勝長驅至武陽蜀人十二破公孫述春吳漢擊吉以兵十餘萬出戰敗死久之漢食盡欲還用從弟永於魚涪津還進逼成都秋述將謝豐袁岑而死岑以城降竇融及五太守來朝上印張堪䇿毀軍以誘述述出戰被創歸以兵屬延綬十三十四十五郡上谷民於中山以避春吳漢以兵徙鴈門代胸奴入髙栁胡盧芳自十六真日南合浦羣盜起盧芳春交址女子徵側徵二反九代王降封為十七有寵生東海王莊郭皇后怨恚上夏帝幸滎陽頴川章陵隂貴人隂貴人為后怒冬廢郭后立十八臧宫擊平之夏伏波將春蜀郡人史歆反詔吳漢帝幸南陽盧芳復亡入胸奴死胡中軍馬援擊交址至浪泊側二等走冬十九馬春廢內不自安固請避位上狐疑久之乃聽冬封援斬側二進擊九真等皆平之太子強以母皇太子帝幸南陽強為東海王立莊為辰甲二十右北平秋胸奴寇二十
