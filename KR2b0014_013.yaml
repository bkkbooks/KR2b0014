body:
  text: 一車等十六國請置都護上以中國初定不許秋鮮卑寇遼東太守祭肜大破之鄯善莎二十二將臧宫等爭請擊之帝不許春帝幸長安胸奴國內亂諸二十三王比自稱南單于請修舊約入居塞內稱臣人春南部蠻夷反將軍劉尚擊平之胸奴日逐奴始分冬武溪蠻反殺劉尚朝許之比擊北單于却地千里胸二十四二十五遣馬援馬武耿舒擊武豀蠻春烏桓大人郝旦等內附冬二十六馬春者多耿舒等共譖援上大怒遣梁松代之未至援大破蠻軍于臨鄊攻壺頭會夏熱吏士疫死詔降賊賊即共斬大帥降均為置長吏而還而援卒軍士死者太半謁者宋均勒兵成列稱二十七二十八客劉鯉殺式侯恭輔坐繫獄春始遣諸王就國沛王輔賓客死者千餘人三日由是捕諸王二十九寅甲三十南冬復幸春幸魯濟魯三十一為王是時南北單于更相攻伐而鮮鮮卑大人於仇賁率種人貢獻封賁強盛卑始中元元幸長安起明堂辟雍靈臺春上登封太山降禪梁父夏二與政尊尚儒術百姓乂安太子即位以母弟春帝崩帝既定天下精勤為治保全功臣不令中郎將竇固及馬武擊之東平王蒼輔政西羌反遣明帝莊永平元年謹帝遇之益厚兄弟之間始終春東海王強薨強自廢絀尤恭餘種悉降徙之三輔無間秋西羌破走二冕服皆用周制立皇春上初祠明堂登靈臺以私家干朝廷太子賈貴人之子帝令后母養后馬氏子炟為太子后援之女恭儉不妬忌不辟雍養三老五更幸長安之慈孝皆如所生冬上臨三南陽冬上幸四五請歸藩許之冬上幸鄴春東平王蒼以輔政久固六幸魯冬上子甲七八九十南陽夏上幸十一十二遣司空掾王吳夏發卒數十萬乘海口千餘里期年而成修汴渠築隄自滎陽東至千十三巡汴渠遂至春上幸滎陽窮治其獄連年內及京師諸侯外連州郡豪傑太行幸上黨冬楚王英謀反廢徙丹陽自殺者以千數坐死及徙十四十五及魯東平定陶冬胸春上幸彭城又幸琅邪河西奴寇十六奴固出敦煌至蒲類海耿秉出居延春遣竇固等四將軍各將萬騎擊胸固遣假司馬班超使西域西域皆歸附因留居度漠六百里祭肜吳常出朔方九百餘里而還鎮撫之盤槖城以戌甲十七車師車師王請降固遂奏冬竇固耿秉將萬餘騎擊巳校尉恭屯金蒲城寵屯栁中城相去千餘里復置西域都護以陳穆為都護耿恭關寵為戊彌子入侍烏孫大昆十八耆龜兹共攻殺陳穆耿恭徙居春詔竇固罷兵還北胸奴率焉師以敕恭秋帝崩帝勤儉好禮館陶公主為竦勒城胸奴圍之詔耿秉發敦煌酒泉兵擊車能不墮光武之業天下治安其子求郎不許而賜錢十萬故章帝炟建初元年迎耿恭等還西域遂絶有詔召春耿秉擊破車師分兵至疏勒涕泣不聽超還超復屯西域班超還超至于闐王侯已下皆二封諸舅為侯夏有司奏請治之秋盧水羌反遣車騎將軍馬防長水校馬太后不許諸外戚有干禁者太后輒以法按擊破之尉耿恭三憲景篤瓌始有寵賞賜日盛班超春立皇后竇氏融曽孫后兄弟四人徐幹將千人詣超上書求助詔假司馬四明德馬太后崩夏立皇子慶為太子五六七貴人竇后惡之誣以巫蠱賜死遂廢夏廢皇太子慶為清河王慶母曰宋梁竦殺之貴人以憂卒秋上幸河內魏郡西慶而立梁貴人子肇為皇太子后又構貴人父安幸長八國淮陽頴陽冬上幸陳留梁辰甲元和元陵冬幸江秋上幸章陵二登大行班超發諸國兵擊莎車降之春上幸泰山及魯東平遂幸魏郡河內三掖隴西金城冬西羌寇張章和元出塞遇害秋上幸九江春護羌校尉傅育追叛羌者十餘萬南單于上言願與耿秉等出兵破北又幸彭城及壽春冬北胸奴為鮮卑所破降之憂帝欲從之師未出而帝寢疾成南并為一國令漢家長無北顧二明敏寬和春帝崩帝竇太后臨朝將軍竇憲內管機密三弟並據大東京繼體之治稱明章焉太子即位年十歲三萬騎擊胸奴大臣袁安等固爭不能得位憲大作威福權侔人主冬憲與耿秉將和帝肇永元元年里斬首大獲銘燕然山而還即夏竇憲耿秉自朔方出塞三千兄弟皆列九卿拜憲為大將軍二涿邪山月氏攻班超破之夏耿秉出塞大破北胸奴於烏桓鮮卑共擊殺北單于衆逺遁漠北北胸奴秋竇憲出屯涼州北單于請入朝南單于及王為單于置兵擁護袁安固諫乃止地遂空竇憲欲立北胸奴降者谷蠡三長安冬上幸校尉竇氏宗黨驕橫帝隂與清河王慶及宦龜兹等國皆降以班超為西域都護復置戊巳謀之者鄭衆四北宫閉城門捕竇憲壻射聲校尉郭夏帝幸北宫召百官使執金吾衛南憲及弟景篤皆自殺宗族免歸故郡帝始親政舉衛尉鄧疊誅之收憲印綬令與兄弟皆就國宦官用權自此始事以鄭衆為大長秋五午甲六單于安國起兵秋京都旱南將兵誅之立師子為單于帝後知崇徽擾亂胸攻其左賢王師子中郎將杜崇度遼將軍朱徽乃誅崇徽奴致其背誕七人討焉耆尉黎誘焉耆王廣尉春班超發龜兹等八國兵七萬使諸國西過條支臨西海而還黎王泛斬之西域遂平遣椽甘英八隂氏秋春立皇后蝗九塞執金吾劉尚將三萬騎擊平之秋蝗章德竇太后崩隴西羌犯十十一十二十三還以校尉任尚代之冬班超上書求代詔召十四貴人鄧氏為皇后后鄧禹孫也夏皇后隂氏坐巫蠱廢冬立十五章陵冬上幸辰甲十六元興元始衰帝數失皇子皇子冬帝崩帝柔而不立漢道勝有痼疾幼子隆始生百餘日鄧后乃引兄隲生者養於民間及崩鄧后收皇子於民間長子位鄧后為太后臨朝封勝為平原王等定䇿禁中立隆為皇太子是日即帝殤帝隆延平元年太后立清河王慶子祜為帝年夏鄧隲為車騎將軍秋帝崩勒退保龜兹冬清河王慶薨十三西域諸國反任尚自疏安帝祐永初元年西羌叛鄧隲率師擊之初上春青兖豫徐冀并六州飢夏后及上而立平原王事覺自殺騎都尉王仁立非大臣意冬司空周章謀誅鄧隲兄弟廢太入塞遂棄西域將兵迎任尚等還二詐降既而復叛侵擾邊郡冬鄧隲與羌戰于平襄羌重位郎中杜根諫太后不宜久攝政太后怒並涼遂虛詔召隲還迎拜隲大將軍諸弟皆據而復蘇亡命民間以縑囊撲殺之已三師飢人相食夏以用度春王仁將兵討􅋽州京冬南單于擅叛行車騎將軍大司馬何熙討不足令吏民入錢各為關內侯烏桓寇代郡之降四不足鄧棄􅋽州郎中虞以為不可乃止春胸奴寇常山時西北有事民飢國用薨鄧隲等棄官行服遂罷輔政西羌寇漢中夏太后母新野君五六七寅甲元初元玄莵太守姚光請擊之尚書陳忠髙句麗王宫卒先是宫數寇幽部讓赦罪從之句麗請服以為不若弔恤其孤因責二秋西羌寇三輔右夏立皇后閻氏任尚將兵屯三輔是時三輔屯兵二十萬民棄扶風种皓南安大守杜佐皆戰沒冬遣中郎將共市一馬以與羌戰大破之餘種悉降農桑戶無聊生懷令虞詡説尚令二十人三四鄧氏指自殺夏司馬袁敞失五寇代郡秋鮮卑六鮮卑入塞北單夏京師旱秋有北道諸國以軍司馬班勇為西域長史屯樓于與車師後部王攻敦煌長史索班殺之遂略王大破之斬後部王及胸奴使者蘭勇發鄯善及車師前部兵擊後部永寧元立夏為閻后所殺西羌寇張掖皇子保為太子太子母李氏建光元寇玄莵春髙句麗鄧氏宗族皆歸故郡鄧隲自殺帝始親政事宦和熙鄧太后崩或譖鄧太兄弟嘗謀廢立乃免卑髙句麗寇玄莵冬西羌寇張掖武威者李閏江京及乳母王聖皆用事秋鮮延光元冬鮮卑寇鴈門又寇九原秋髙句麗王降羌寇􅋽州二張璫上平西春敦煌太守制胸奴從之夏封王聖為野王君聖女壻劉域三䇿陳忠亦以為宜增四郡屯兵以撫西域震上書極諫不從瓌為朝陽侯司空楊子甲三魏郡河內中常春帝幸泰山東平江京譖太子乳母殺之太子思戀不已聖等懼侍樊豐譖大尉楊震䇿免震自殺豐又與王聖子為濟隂王冬帝幸長安與閻后兄顯共譖太子秋廢太四疾道崩閻春帝幸宛有為車騎將軍誅王聖樊豐冬北鄉侯薨閻顯后立章帝孫北鄉侯懿閻后臨朝秉政以閻顯濟隂王誅顯及京遷太后於離宫濟隂王即帝江京等更召諸王子欲立之中常侍孫程等奉十一位年順帝保永建元年譖司隸校尉虞詡下獄浮陽侯春安思閻后崩中常侍張防諌秋免程等官皆就國孫程祝阿侯張賢等切二域長史班勇請兵擊春鮮卑寇遼東西三千人詣之無功而還焉耆詔發河西四部兵三寇漁陽秋鮮卑四五師旱夏京六陽嘉元為侍中屯騎校尉冬鮮卑寇遼春立皇后梁氏梁竦曽孫也父商東二歲以錢千萬給阿母而勿加封爵不從夏爵乳母宋娥為山陽君尚書左雄請戌甲三冬寇武都秋羌寇漢陽四大將軍輔政夏以梁商為永和元陵太冬武漢民尚書虞詡以為不可弗聽守上書蠻夷懷漢恩請入貢比二以貢非舊約春武陵蠻夷交址刺史議者欲遣大將軍發荆楊兖豫兵四果反夏宋娥有罪歸里舍秋日南蠻反敗精擇牧守委任而責成功從之交址獲安冬萬人擊之李固以為遣將發兵煩擾無益不如長安帝幸三四五降之單于謝罪中郎將陳龜夏南單于寇河西帝遣使諭護羌校尉馬賢為征西將軍討之冬遣護胸遣令自殺龜下獄誅秋羌寇金城及三輔以者斬首二千餘級叛者請降奴中郎將將兵討南胸奴叛六姑射山而還春馬賢討羌至羌寇武威冬遣行車騎將軍執金吾張喬屯兵秋梁商薨以商子河南尹冀為大將軍輔政輔三漢安元寵盛梁冀兄弟權侔人主宗族滿朝夏立胸奴立義王為南單于梁后議遣八使張綱杜喬等按行州郡澄汰長吏貪二千石多非其人盜賊縱橫諫議大夫周舉建雖信網言亦不罪冀汚者綱因劾奏梁冀帝二囚犯大逆以下皆出冬令郡國中都官繫罪縑贖申甲建康元曰虞姬秋徐揚州盜賊羣夏立皇子炳為太子太子母之初立宦官之力也由是寵之遂專政事太起遣御史中丞馮放督州郡兵討之帝崩帝梁太后臨朝子即位年二歲沖帝炳永嘉元年最有名德太尉李固等欲立之春帝崩清河王蒜年二十餘迎章帝曽孫之子建平侯纘立之年八歲夏鮮梁冀欲立幼主以久其權乃與太后定䇿禁中代郡卑寇質帝纘本初元年崩李固杜喬復欲立清河王羣帝聰警頗言梁冀跋扈遂遇鴆帝孫蠡吾侯志為帝時年十五冀專秉大政臣皆以為然冀與太后謀先䇿免固乃立章桓帝志建和元年九月甘陵人劉文謀立清河王秋立皇后梁氏太后之妹也冀因誣李固杜喬與文通謀皆下獄死天下冤蒜蒜閉門拒之事覺文伏誅蒜坐徙桂陽自殺之二用親黨遍於天下所在貪暴過於盜賊四秋京師大水梁冀廣納賂大治苑第所其次愛監奴秦宫勢振百僚刺史二千石皆謁方調發貢獻半入冀家先輸上第而乘輿乃得之辭三和平元稱制順烈梁皇后崩春太后詔歸政於帝帝始元嘉元二永興元午甲二永壽元僟人相食春司冀大將張奐擊降之夏胸奴叛中郎二寇雲中秋鮮卑三延熹元都蝗夏京二者單超等謀誅梁冀秋帝御前殿勒兵誅冀夏鮮卑寇遼東秋皇后梁氏崩帝與宦為之一空立鄧貴人為皇后封單超等五及其宗族公卿以下坐冀親黨或死或免朝廷帝幸長安西羌寇邊人為侯以超為車騎將軍三校尉假潁等討平春羌寇張掖護羌冬中郎將宗資討平之之秋泰山賊盜羣起四陽武威中郎將皇甫夏羌寇金城安定漢貪者皆抵罪羌人聞之喜一時降者二十餘萬規大破之規因奏案􅋽州刺史太守倚貴戚為悺譖規下獄坐論論功未畢宦官左五馮緄討之冬武陵蠻夷降夏武陵蠻夷反車騎將軍六辰甲七荆州刺史度尚討大破之秋武陵蠻夷反寇掠數郡八鄧氏以春皇后度尚擊之冬立皇后竇氏驕妬廢夏胸奴寇邊中郎將九武為大將軍夏以后父竇是時宦官親黨布滿內外所在貪暴太尉陳鮮卑烏桓寇邊護胸奴中郎將張奐討平之告膺等結為朋黨誹謗朝廷連諸名士范滂等蕃司隸校尉李膺等戮力救時舉善黜惡宦者三百餘人下獄免官者永康元菟冬帝崩無嗣竇武召春西羌寇三輔夫餘寇玄侯宏武乃與太后定䇿禁中遣使迎宏於河間御史劉倏謀之倏盛稱章帝曽孫之子解瀆亭時年十二立以為嗣靈帝宏建寧元年官太后不聽其謀頗泄中常侍秋竇武及太傅陳蕃謀去諸宦蕃及其宗黨冬鮮卑寇幽州自是每歲犯塞曹節等脅太后取璽綬請帝御前殿勒兵誅武二陽蠻夷反宦官因陳竇之謀諷有司奏諸春尊帝母董貴人為孝仁皇后秋江夏丹餘人凡海內賢俊之士皆被禁錮郭泰聞之私鉤黨者請下州郡考治於是誅李膺范滂等百國殄瘁漢室滅矣慟曰人之云亡邦三四后宋氏秋立皇喜平元思竇夏桓崩后二寅甲三四五訟黨人曰謀反大逆尚夏永昌太守曹鸞上書於是申黨人之例父子兄弟門生故吏皆免官蒙赦宥黨人何罪獨不開恕鸞坐檻車送棄市錮禁六出塞討之故護羌校尉田晏因王甫求為夏鮮卑寇邊烏桓校尉夏育請發幽州兵卒萬餘人三道出擊鮮卑大臣多以為不便不將甫建議使晏與胸奴中郎將臧旻及育各將大敗死者萬數聽秋晏旻育兵光和元為尺牘詞賦及工書篆春初置鴻都門諸生能為尚書侍中冬皇后宋氏以無寵廢者皆得充員至數千人或出典州郡入二奴中秋胸單于張修抵罪黃門令王甫大長秋曹節專郎將張修擅斬單于呼徴更立右賢王羌渠為熲下獄誅又欲收節節譖球於上而殺之權任勢大尉假熲附之司隸校尉楊球奏收甫三兄進為河南尹苗為越騎校尉春赦冬立皇后何氏以后異母四驥廏調春置騄夏赦冬帝幸廣成苑郡國馬一匹至百萬五民言舉刺史二千石春大疫詔三公以者夏旱貪汚為蠡害六間弟子十餘萬人青徐幽冀荆巨鹿張角以鬼道惑衆十餘年賜等請禁捕以絶亂源不聽揚兖豫之人皆奉之司徒楊子甲中平元與其春角甫嵩朱俊發州郡兵擊之夏榜鴻都門賣公黨所在起兵天下震動號黃巾賊遣中郎將皇張角兄弟皆死然自是盜賊競起朝廷不能制卿以下官皇甫嵩朱儶大破黃巾斬首數萬邊章韓遂反冬金城人二賦民田畝十錢以修宫室冬春邊章韓遂反羌胡寇三輔為私藏積私錢至數千萬羣臣及州郡爭為貢司空張溫中郎將董卓擊破邊章韓遂帝好不堪命皆相聚為盜賊獻刻剝齊民發十獻一民三四國反秋詔發夏狄道人王山相張純率烏桓以反幽州人爭附之衆十餘幽州烏桓使涿令公孫瓚將之以擊源州故中萬五而死國遂圍漢陽殺太守傅燮秋置西夏涼州刺史耿鄙合六郡兵討王國不勝觀躬儇甲胄既罷以兵屬大將軍何進詔左園三軍及典軍校尉冬帝大發兵講武平樂卓屯右扶風以討王國將軍皇甫嵩前將軍董六夏帝崩皇子辨立春王國張純皆敗死讓假圭殺進黨袁紹袁術勒兵悉誅諸宦官讓何進謀誅諸宦官召並州牧董卓秋中常侍張少帝立其弟協鴆殺何太后卓自為相國圭劫少帝幸小平津讓圭赴水死董卓尋至廢獻帝協初平元年州刺史孔胄兖州刺史劉岱勃春後將軍袁術冀州牧韓馥豫郡太守橋瑁長沙太守孫堅驍騎校尉曹操等海太守袁紹陳留太守張邈廣陵太守張超東諸軍憚卓兵強觀望莫進頃之食盡衆散諸將皆起兵以討董卓推紹為盟主卓懼遷都長安南陽太守張咨袁術表堅為豫州刺史堅擊破更相猜二劉岱殺橋瑁孫堅殺荆州刺史王睿表為荆州刺史屯襄陽董卓軍進屯大谷詔以劉二牧劉虞為帝虞大春袁紹欲立幽州使人説韓馥以兾州讓紹秋紹領兾州牧以怒不許夏董卓西入關孫堅入洛陽袁紹堅攻劉表將黃祖擊殺之曹操為東郡太守袁術使孫三與董卓將吕夏司徒王允安殺王允吕布走傕汜稠共秉朝政濟屯弘農布共殺卓卓將李傕郭汜樊稠張濟合兵陷長巾入兖州殺劉岱州人迎曹操為刺史公孫瓚南攻袁紹大破瓚於界橋黃四袁春謙殺曹操父嵩秋操攻謙破其兵於彭城下術入陳留為曹操所敗奔夀春徐州刺史陶不能克反為所殺冬劉虞攻公孫瓚戌甲興平元未還張邈及操曹操再攻陶謙屯鄄城布屯山陽益州牧劉焉卒子璋嗣位將陳宫迎吕布為兖州牧操還擊布不克操退州刺史劉繇取江東袁術使孫䇿攻楊二相攻連月傕劫帝幸其李傕殺樊稠因與郭汜追敗王師於曹陽白波帥李樂河內太守張楊營張濟自陜來和傕汜帝得東歸既而傕悔之劉備為刺史吕布敗走歸備迎帝幸安邑陶謙卒州人迎建安元等送帝夏張楊用荀彧計迎帝都許以操為司空袁術以劉還洛陽沮授説袁紹迎帝都鄴紹不從秋曹操史備敗奔曹操孫䇿克會稽備爭徐吕布乘虛襲下邳自稱刺二張濟子繡春曹操討大將軍都督冀青幽并四州於宛繡擊敗之秋以袁紹為三敗死曹操春李傕郭汜北擊公孫瓚荀彧説曹操因此時取吕布秋曹圍張繡於穰夏以劉備為豫州刺史袁紹督關中諸軍事撫諭諸將皆遣子入侍袁術操圍布於下邳布求援袁術術不救鍾繇都壽春稱帝於四操擊破袁術術走病死袁紹選精春曹操擒吕布袁紹滅公孫瓚曹操拒袁紹於官渡紹求援於劉表表不應亦不兵十萬將攻許沮授諌不聽冬張繡降曹劉備屯下邳與董承謀誅曹操助操孫䇿攻拔廬江豫章廬陵五董承劉春曹操殺説袁紹乘虛襲許紹不從夏孫䇿出畋為其備據徐州叛操自將擊拔之備奔袁紹田豐操冬操擊紹大破之紹僅以身免操由是威振讎所傷以兵授弟權而死秋袁紹濟河擊曹下天六劉表表使備屯新野備聞處士諸葛亮賢劉備為袁紹寇掠汝南冬操擊劉備備奔欲立為後乃出長子談為青州刺史沮授諫不三就其廬見之遂以為謀主袁紹愛少子尚始此矣聽曰禍其七為嗣談自稱車騎將軍屯黎陽談夏袁紹卒别駕審配矯紹命立尚曹操擊袁談尚始有隙秋八秋曹操擊劉表袁談攻袁尚春談兵敗操追至鄴而還操以請救操自西平還救談冬操至黎陽尚解不勝走平原尚就圍之談遣别駕辛毗乞降於夏太守黃祖破之圍還鄴孫權擊江申甲九鄴復攻談曹操進春袁尚留審配守尚走中山操拔鄴斬審配操自為冀州牧屯於軍圍鄴決漳水灌之秋尚還救鄴操擊大破之兄熙曹操責談以負約而討之談奔南皮鄴袁談略州郡攻袁尚尚走故安就其十曹春將所攻走烏桓夏黑山賊帥張燕降烏桓反操拔南皮斬袁談兾州悉平袁熙袁尚為其甥并州刺史髙幹反曹操擊平之冬袁紹十一幹奔劉表不至死春操擊幹拔壺關袁尚頻入寇烏桓踏頓與十二塞五百餘里秋大破踏頓夏曹操北征踏頓出盧龍尚送首初董卓以康父度為遼東太守度見天於白狼山斬之袁熙袁尚奔遼東公孫康斬熙康襲位孫權擊黃祖虜其人民下亂遂自稱平州牧用天子禮度卒十三操為春曹為嗣以長子琦為江夏太守秋曹操征表未至丞相孫權拔江夏斬黃祖劉表立少子琮號八十萬勢震江東冬孫權用其將周瑜計與表卒琮以荆州降操擊劉備於當陽敗之操兵壁立劉琦為荆州牧備合兵大破操於赤十四陵仁棄城走劉琦卒春周瑜圍曹仁於江周瑜勸權徙備於吳權不從瑜又欲因曹操敗劉備自為荆州牧孫權以妹妻備備至京口謝秋曹操征孫權軍合淝冬還軍譙西取蜀未行會病卒薦魯肅代十五魯肅屯孫權使以馬騰為衛尉留其子超屯槐里陸口劉備以關羽屯江北曹操十六馬超韓遂操留夏侯淵鎮長安孫權徙治建鄴益州反屯潼關秋曹操擊遂超破之遂超走還涼州張魯從事王纍等固諌不聽備將萬人入蜀璋别駕張松隂與劉備謀取益説劉璋使召備討使討魯益其兵十七擊孫權荀彧卒於夀春劉備夏孫權城石頭及濡須冬曹操皆克諸葛亮張飛趙雲自荆州泝江取白帝及屯葭萌張松謀泄劉璋殺松備還兵攻璋所向陽江十八魏公加九錫置百官秋聘操三女為春曹操攻濡須不克而還夏封操為涼州刺史韋康曹操使夏侯淵討之貴人馬超率羌胡擊隴上郡縣殺午甲十九備夏侯淵擊韓遂遂走劉備圍成都數十春韋康故吏楊阜等攻馬超超奔張魯又奔劉淵斬抱穻賊朱建皇后與父完謀誅操操殺日劉璋出降遷於公安劉備入成都冬夏侯族百餘人后及皇子并完二十斬韓遂秋曹操擊張魯春立曹操女為皇后夏不與權使吕蒙擊取之備自至公安權屯陸口魯降孫權求長沙零陵桂陽三郡於劉備備親冬曹操留夏侯淵屯漢中而還未戰備聞曹操拔漢中乃復與權和二十一進夏秋南單于朝魏魏留之使右賢王監其國曹操爵為王曹操殺尚書崔琰囚僕射毛玠擊孫權冬曹操二十二仁屯居巢而還冬曹操立子春攻濡須孫權請降操留從弟欲立之太中大夫賈詡等諌乃止丕為太子初操愛少子臨災侯植二十三醫令春太死夏代郡上谷烏桓反曹操使其子鄢陵侯告本等起兵許中攻丞相長史王必營不克而秋曹操西擊備至長安彰擊破之劉備攻漢中二十四夏侯淵曹操春劉備襲殺漢中秋備自稱漢中王還成都關羽圍曹自長安南擊備備拒險不戰纍月操還備遂取晃救仁孫權使吕蒙襲公安斬關羽遂取荆州仁於樊于禁等七軍皆沒冬操自至摩陂使徐魏文帝丕黃初元年延康夏酒泉張掖反金城春太祖薨太子嗣王位改元將孟達降冬王受漢禪徙都洛陽封漢帝為太守蘇則討平之秋王南征次于譙劉備公山陽臣光曰新室之末民心思漢如渴之望飲飢之待餔也是以諸劉奮臂一呼而逺近響應曾未期年元惡授首更始入洛之初天下已服矣而素無人君之器紀綱不修諸將暴橫不旋踵而亡固其宜也光武以仁厚之德濟英傑之志昆陽之役驅烏合之衆掃滔天之敵使海內幡然變而為漢宜陽之師不戰而赤眉束手百萬之盜一朝而散皆希世之奇功也至於待王郎劉盆子止於不死取良吏卓茂以為太傅戒馮異以安集關中不務戰攻取勝雖當草創之際可謂有帝王之逺略矣天下已定不失舊物乃偃武修文崇德報功勤政治養黎元興禮樂宣教化表行義勵風俗繼以明章守而不失於是東漢之風忠信廉耻幾於三代矣及孝和以降政令寢弛外戚專權近習放恣然猶有骨鯁忠烈之臣忘身以徇國故雖衰而不亡豈非建武永平之餘烈歟至於桓靈而紀綱大壞廢錮英俊賊虐忠正嬖幸之黨中外盤結鬻獄賣官濁亂四海何進見殺袁紹不勝其憤遂燔燒宫闕肆行誅殺外召董卓以脅朝廷於是虺蛇雖除而虎貙入室矣卓貪愎殘忍廢主遷都州郡紛然稱兵以討之卓死而天下大亂漢室遂亡哀哉二徙治武昌甄夫人死蜀張飛為左右所漢昭烈帝備章武元夏劉備稱帝孫權遜拒之軍於夷陵權遣使來稱藩詔封權吳殺秋蜀主自將擊孫權軍於秭歸權遣將陸冬帝東巡王加之九錫三昌夏吳陸遜大破蜀軍於猇吳大帝孫權黃武元春幸許后郭氏冀州飢帝責吳任子不至遣將軍亭蜀主僅以身免秋蜀將黃權來降立皇蜀復和親蜀漢嘉守黃元反曹休等擊吳冬帝幸宛吳四禪建興元漢安樂思公永安太子禪立年十七丞相亮秉政秋帝幸春曹休等罷還蜀人斬黃元夏蜀主殂於昌許辰甲五廣陵吳人為疑城以拒之帝還秋帝幸許昌為水軍以擊吳至六蜀春之并州刺史梁習討鮮卑軻比能大破之諸葛亮渡瀘水擊牂牱益州越巂永安四郡平氷舟不得入江而還吳番陽彭綺反冬帝復為水軍以擊吳至廣陵大寒水七疾甚夏帝懿等受遺詔輔政明帝即位自親政事以真等立甄夫人子睿為太子帝崩大將軍曹真司馬吳諸葛瑾張霸寇襄陽司馬懿擊破之斬霸為三公或以方任處之秋吳王圍江夏不克魏明帝睿大和元年出屯漢中以圖中原冬立春吳人獲彭綺蜀諸葛亮太守孟達反遣司馬懿擊之毛后吳將韓琮來降新城二諸葛亮寇邊春斬達蜀軍張郃擊破亮於街亭亮誅其將馬謖而還天水南安安定皆應之關中震動帝幸長安將亮圍陳倉不克遼東公孫淵囚其叔父恭秋曹休與吳陸遜戰敗於石亭冬蜀諸葛三帝與蜀約中分天下秋吳徙都建業使陸遜吳黃龍元春蜀人取武都隂平夏吳王稱守武昌佐太子登四尚書諸葛誕等官議考課法春作合肥新城詔禁絶浮華免卞太后崩秋遣曹真自斜谷司馬懿自漢吳廷尉隱蕃叛誅五溪蠻侵吳吳潘濬討之師帝幸許昌水擊蜀會大雨班五馬懿鎮關中以禦之懿軍春蜀諸葛亮寇祈山遣司秋初聽諸侯王入朝蜀中都護李平有罪敗於鹵城亮食盡而退張郃追亮至木門戰死州刺史王凌迎之為吳所敗徙梓潼冬吳將孫布詐降揚六春帝愛女淑吳嘉禾元朝吳主因留建業秋帝幸摩陂治許昌宫薨為之厚葬立廟帝幸許昌吳太守登入守田豫擊取之吳陸遜寇廬江不克冬吳主遣使詣公孫淵至成山汝南太靑龍元燕王加九錫遣使者張彌許晏將萬人詣淵春帝幸摩陂公孫淵稱臣於吳吳主封淵能走漢比冬公孫淵斬吳使者首以獻吳張昭等諫不聽將軍秦元明擊破鮮卑軻比出屯漢中蜀蔣琬三通才故俗尚刻薄賤守節焉太春帝崩帝及文帝皆勤吏治而好司馬懿為大傅爽兄弟並典兵侍從勢震四方子即位年八歲曹爽用其黨何晏等計陽尊復以建寅月為正懿謝病以避之冬魏邵陵厲公芳正始元年張嶷討平之冬吳飢春旱蜀越嶲反太守二諸葛瑾取柤中征東將軍王凌破全琮於芍夏吳全琮寇淮南諸葛恪攻六安朱然圍樊司馬蔣琬欲自漢沔以舟師伐魏蜀人以為不陂司馬懿救樊吳師還吳太子登卒蜀大止可乃三為魯王秋吳陸凱討朱崖儋耳春吳王立子和為太子封少子霸四吳春漢中還住涪以費禕為大將軍諸葛恪寇六安冬蜀蔣琬自子甲五之黨以春曹爽侯玄自駱谷擊蜀蜀人守險不戰師不得進夏爽素無威名勸爽發兵十餘萬與征西將軍夏下益惡爽蜀董允守尚書令糧盡而還關中為之虛耗由是天六陸遜卒春吳丞相七郡髙句麗王宫出走秋吳分荆州為二郡春吳朱然寇柤中毌丘儉擊髙句麗屠九允卒蜀主始親聽政宦人黃皓用事使吕岱諸葛恪督之冬蜀蔣琬董八與涼州蜀費禕録尚書事刺史薑維共九出屯漢中夏蜀費禕嘉平元從帝出謁髙春曹爽兄弟及其黨悉誅之秋蜀薑維寇雍州將軍郭淮平陵司馬懿發兵閉門奏爽罪惡帝還懿收爽立楚王彪以討司馬懿不果陳泰擊走之王凌謀起兵二太子和而代之吳魯王霸謀去亮為太子將軍王昶出江陵王基出西陵州全公主亦譖和秋吳主廢和賜霸死冬立少子師還蜀薑維寇西平不克泰出秭歸以擊吳吳陸凱拒之三夏王凌事覺吳太元元楚王彪死悉集諸宗室置鄴吳立潘后秋司馬懿自水道奄至夀春凌窮迫出降自殺賜召諸葛恪於武昌委以國政蜀費禕北駐漢司馬懿卒以其子師録尚書事冬吳主寢疾壽四大帝殂太子亮立年九歲冬吳太傅諸葛吳候官侯亮建興元春立張后夏吳遵諸葛誕圍東興與諸葛恪戰於東關遵誕兵恪修東興隄詔王昶出江陵毌丘儉出武昌胡敗大五二十萬寇淮南夏蜀薑維寇狄道陳泰春郭循刺殺蜀費禕吳諸葛恪復發兵秋引兵去吳侍中孫峻誘恪殺之又殺故太子禦之維退諸葛恪圍新城士卒病死以萬數奮於章安和徙齊王戌甲魏髙貴鄉公髦正元元年令李豐后父緝及夏吳五鳯元春中書寇隴西帝與左右謀誅司馬師不克秋師廢侯玄謀殺司馬師皆族誅廢張后夏蜀薑維孫髙貴鄉公帝迎立文帝二文欽反渡淮據項城司馬師擊春鎮東將軍毌丘險揚州刺史許昌以師弟昭為大將軍秋蜀薑維圍雍州殺儉吳孫峻襲壽春文欽降吳司馬師卒于泰鄧艾救之維去刺史王經於狄道陳甘露元大將軍薑維寇祈吳太平元秋蜀寇青徐會孫峻卒以政事付從弟綝綝召據等山將軍鄧艾大破維於假谷吳吕據及文欽綝擊殺據又殺大司馬滕胤還據聞綝代峻大怒不受命冬二大將軍諸葛夏詔召鎮東文欽入壽春司馬昭奉太后及帝將兵二十六誕為司空誕據壽春叛降吳吳將全懌全端及蜀薑維出駱谷將軍司馬望鄧艾禦之萬以討誕圍壽春破吳將朱異冬懌端出降三諸軍拔壽春斬誕蜀軍聞之亦退吳主與太漢景耀吳景帝休永安元春諸葛誕殺文欽稽王立其兄琅邪王休為吳主冬吳主與將軍常全尚謀誅孫綝尚泄其謀秋綝廢吳主為會誅滅綝張布共四魏元帝奐景元元年司馬昭不克崩於軍中昭迎夏髙貴鄉公率殿中兵以誅湖浦里塘吳黜會稽王亮為候官侯亮自殺燕王宇之子常道鄉公奐立之吳作丹陽二南將軍王基基知而不逆由果不至春吳人使其將鄧由等詐降以誘征三宋后及秋吳立維與黃皓有隙因留沓中不敢歸蜀罷漢中太子雨單冬蜀薑維寇洮陽鄧艾敗之於侯和勑青徐兖豫荆楊作船謀以伐蜀諸國詔以鍾會為鎮西將軍四夏吳交漢炎興元薑維於強川維退守劍閣會不能進會欲還艾趾吕興叛詔鍾會鄧艾伐蜀會拔漢中艾破蜀破蜀將諸葛瞻於綿竹蜀主出降吳師退不可冬吳丁奉寇壽春鄧艾自隂平入臣光曰昭烈以敗亡之餘羇旅漢南而能屈體英傑要結同志摧沮勍敵因敗為功顚沛之際不忘德義美矣劉璋昧弱侮而兼之遂奄有巴蜀君臨一隅安樂公才雖下中然委任賢相抗衡中國及薑黃用事面縛為虜宜矣申甲咸熙元鄧艾殺之司馬昭奉帝幸長安吳歸命侯皓元興元春鍾會譖帝殂大臣濮陽興張布立太子和之子皓皓既鍾會尋反死吳陸抗圍巴東不克秋吳景日南九真皆來降立族誅興布交趾晉武帝炎泰始元年炎嗣為晉王吳主殺景后吳甘露元秋太祖薨太子徙都武昌冬王受魏禪封魏帝為陳留王朱氏及其二子使大臣丁固諸葛靚守建業臣光曰漢室不綱羣雄麋擾乘輿播蕩莫之收省太祖獨奉迎而相之披荆棘以立朝廷則其名義固足以結民心矣加之英威明略過絶於人驅䇿賢豪糞除姦宄於是張繡屈膝吕布授首公路野死本初覆亡劉琮獻地韓馬遁逃中原肅清戎狄請服然則魏取天下於盜手而非取之于漢室也惜其狹中多詐猜忌賢能此海內所以不盡服也及文帝受禪明帝繼業內綏外禦不廢前功而明帝於彌留之際姦臣牽率嗣子幼弱寄托非人曹爽驕戇黨與輕佻禍自內興遂衰微不振以至於易姓悲夫二賊施但等劫吳主弟永安侯謙以攻建業丁吳寶鼎元春立皇后楊氏冬吳永安山殺吳王還都建業固諸葛靚擊破之謙自三夏吳主作顯明宫開春立子衷為太子以下皆入山督木石苑圃起土山二千石四使丁奉寇合肥秋吳主出東關五衡元吳建守以謀伐吳冬吳丞相陸凱卒吳監軍虞春以僕射羊祐鎮襄陽祐薦王濬為巴郡太自建安擊交趾汜自荆州李朂六不通引軍還坐族誅春吳李朂以建安道七主自春吳破交趾殺晉所置吏役取交趾日南九真將大衆出華里欲入寇遇大雪而還虞汜八夏益州牙將張松殺刺史皇甫晏詔以王濬吳鳯皇元春納車騎將軍賈充女為太子妃以西陵來降吳陸抗擊殺之為刺史擊平之秋吳將步闡九侍中韋昭非吳主好祥瑞人面皮人有忤視者輒鑿其目民不聊生之怒殺昭吳主奢淫無度愎諌好殺或剝午甲十女帝許之吳大司馬陸抗卒秋楊后崩遺言請納叔父駿之咸寧元册元吳天中書令賀劭吳主燒鋸殺二楷來奔冬立皇后楊氏駿吳天璽元秋吳京下督孫也女三紀元吳天四尹杜預都督荆州冬羊祜卒以河南五伐吳太尉賈杜預王濬請用華言冬遣琅邪王胄出徐州將軍王渾出牛充太傅荀顗以為不可中書令張華以為可帝陵王渾下巴蜀凡二十餘萬衆伐吳渚王戎出武昌胡奮出夏口杜預趣江太康元夏水潦疾疫方作請班師預固執不可夏王渾春王濬所向城戍皆下杜預拔公安諸將以嚮吳主詣濬降渾與濬爭功立相論奏帝兩無所大破吳兵於板橋斬其丞相張悌王濬入石頭非是臣光曰孫破虜以孤逺之兵決忠憤之志首犯賊鋒深蹂洛川汛掃陵寢有足多者討逆以童子提一旅之衆揮馬箠而下江東耆儒宿將狼狽失據開地千里真英才也大帝承父兄之烈師友忠賢以成前志赤壁之役決䇿定慮以摧大敵非明而有勇能如是乎遂奄有荆楊傅於南海傳祚纍世宜矣候官景帝皆明慧敢決有先世之風歸命驕愎殘虐浮於桀紂求欲不亡得乎二言荀顗及尚書令荀朂常保護之故得不廢太子暗弱不辨菽麥侍中和嶠衛瓘屢以為德人所屬望朂惡之文帝子齊王攸有俊三司馬都督青州遣之國冬朂言於帝以攸為大四曰妬者婦人之常情乃止齊王攸憂憤嘔血春太子后賈氏手殺孕妾帝怒欲廢之楊后薨辰甲五于襄陽秋杜預卒六七八九慕容廆春鮮卑都督廆徙居青山請內屬拜廆鮮卑十惠帝衷永熙元年太傅輔政帝自平吳以來沉湎夏武帝崩遺詔以后父楊駿為而鄙經術禮法之士識者知天下將亂云惠帝酒色不思國家久逺之䇿俗以老莊放誕相髙子遹為太子即位秋立元康元遷太后於金墉以汝南王春賈后殺楊駿及其親黨王瑋殺亮瓘因而誅瑋秋以梁王􅊮録尚書事亮為太宰與太保衛瓘對掌朝政賈后又思楚二賈謐尚書郭章用事朝士爭附之春楊太后乏食崩賈后黨侍中三寅甲四徙居大棘冬慕容廆五火武庫六氐帥齊萬年及羌胡反寇春張華為司空掌朝政秋將軍周處等討之涇陽衆號十萬冬遣七敗死於六陌春周處及氐戰八謀害賈后子入朝因録尚書事執賈后廢之華不從太子左衛率劉卞説張華以四率兵奉太九賈冬氏益甚趙王倫諂事賈郭得車騎將軍或説倫后誣太子謀反廢徙金墉城由是人間疾惡賈受福不久矣不如先之倫秀告張華華不可腹心孫秀曰朝廷人人欲為太子報讎公輩永康元􅊮領兵入宫誅賈謐郭章賜賈后死斬張春賈后殺太子於許昌夏趙王倫梁王子之子臧為太孫秋淮南王允發兵誅倫不華倫為相國如宣帝輔魏故事􅊮為太宰立太立皇后羊氏克而死冬永寧元墉殺太孫臧齊王囧河間春趙王倫篡位遷帝於金孫秀迎帝復位賜倫死詔以囧為大司馬輔政王顒成都王頴共起兵以誅倫夏將軍王輿殺以張軌為涼州刺史益州刺史趙廞反詔太安元李庠庠兄特攻秋趙廞殺巴人尚於成都自稱益州牧秋立皇弟子覃為太殺廞詔以羅尚為益州刺史尚欲誅特夏特攻齊王囧長沙王乂執囧殺之子冬河間王顒起兵以討二初元春羅尚成景帝李特建子雄雄遂逐尚據成都河間王顒成都王頴破斬李特特弟流代領其衆秋流卒以衆付特洛陽詔令不出四門冬東海王越執乂殺之表長沙王乂罪惡又劫帝與顒頴相攻兵交子甲永興元元春以頴為太弟秋越奉帝攻頴漢光文帝劉淵元熙成武帝雄建興都督幽州王浚共攻頴頴奉帝奔洛陽胸奴敗於湯隂越奔下邳頴以帝歸鄴東瀛公騰及冬河間王顒劫帝幸長安立皇弟熾為太弟劉淵據離石稱大單于李雄稱成都王二刺史茍晞討斬藩廣陵相陳敏起兵據揚州秋頴將公師藩汲桑羯胡石勒起兵趙魏兖州王睿為安東將軍領揚州劉淵陷河東平陽冬頴衆入洛陽東海王越以宣帝曽孫琅邪李雄稱帝徙都蒲子光熙元將宋胄逼洛陽成都王頴走成晏平元春東海王越遣白山夏帝還洛陽冬遇毒崩頴顒皆為人所殺河北胄引兵西迎大駕河間王顒兵敗走入太懷帝熾永嘉元年海王越出鎮許昌以南陽王春陳敏為其將顧榮所殺東睎擊殺桑琅邪王睿自下邳徙建康賊帥模鎮長安東瀛公騰鎮鄴汲桑攻鄴殺騰秋茍皆降劉淵石勒王彌二擊破彌於七里澗彌自軹關奔劉漢永鳯元夏王彌逼洛陽諸將樂平冬劉淵稱漢帝張軌感風疾作子茂攝淵淵以彌為征東大將軍石勒為平東將軍居事州三景拔黎陽夏石勒略巨鹿常山衆十餘漢河瑞元春劉淵徙都平陽漢將劉劉聰劉矅劉景王彌合兵圍洛陽越擊走之萬以張賓為謀主東海王越還京師冬四討諸兄弟弟聰殺和自立石勒南侵洛陽遂漢昭武帝聰光興元秋劉淵卒子和立欲盡東海王越自將討勒索頭猗盧自雲中入鴈門至襄陽欲保據江漢張賓以為不可乃還冬以五縣處之并州刺史劉琨五王越薨于寧平石勒追擊其漢嘉平成玉衡元春東海塵于平陽秋漢將趙染陷長安殺南陽王模軍盡屠夏王彌劉曜石勒合兵陷洛陽帝蒙五州置百官石勒攻荀晞王彌取之將軍索綝賈匹履取長安琅邪王睿督六司春秋漢將劉粲攻劉琨拔晉陽索頭猗盧救琨空荀藩奉武帝孫秦王子業入長安立為太子遇霖雨還徇河北取襄國居之又擊王浚將段敗漢兵琨表猗盧為代公石勒引兵至淮南禽之六春愍帝業子建興元年臣有哭者聰惡之遂害帝夏春劉聰使懷帝著青衣行酒舊勒欲取王浚先卑辭厚禮以事之許推為天子太子即位石勒以從弟虎為魏郡太守鎮鄴戌甲二擊破趙染染走染又與劉曜入寇敗麴春石勒襲幽州取王浚斬之夏索綝軌尋薨子實襲位賊帥杜韜寇掠汝南允於馮翊詔以張軌為涼州牧西平公三建漢州刺史甘卓擊韜斬之敦始自選置荆揚江湘元元秋鎮東將軍王敦遣荆州刺史陶侃相盧為代王食代常山郡劉聰拜石勒為陜東交廣六州長史寢有跋扈之迹詔以代公猗牧守列侯以下伯得專征伐封拜四姬淡將兵二萬討石勒淡漢麟嘉元春劉琨遣將史假匹磾冬劉矅圍長安城中食盡帝出降兵敗琨長史李弘以并州降勒琨走依幽州刺不忠斬之矅以索綝為臣光曰宣帝始以重望髙才䇿名魏室西却諸葛東舉公孫若以忠順終之足為良臣矣遭爽晏忌疾乘間而發專制朝柄誅鉏異已平昔之美掃地盡矣及景文相繼遂遷魏祚武帝席卷全吳纘禹舊服恃其治安荒於酒色以開基之始不為逺圖崇尚浮華敗棄禮法惠帝昏愚不辨菽麥譬如萬金之寶委之中衢無人守之安得不為他人有乎禍生於閨闥成於宗室骨肉相殘而胡羯氐羌鮮卑爭承其弊剖裂中原齏醢生民積骸成丘流血成淵幾三百年豈不哀哉殺國人立其弟子鬱律􅊨代王猗盧為其子六修所元帝睿建武元年驃騎將軍録尚書事劉聰幸春初稱晉王置百官以王導為冬劉聰害愍帝以劉矅為相國臣郭掎王沈譖太弟又殺之太興元矅光初前趙劉段匹磾殺劉琨秋祖逖督諸軍屯雍丘以圖元春王即位立子紹太子劉聰卒子粲立自立冬劉矅石勒合兵討凖滅之矅自立為帝中原漢司空靳凖譖諸大臣而殺之因弒劉粲二石勒為太宰封趙王既而悔之殺勒使者始晉王保建康後趙明帝石勒元春劉矅以趙王大單于使張賓執朝政石虎督諸軍帝與勒絶夏曜徙都長安改稱趙冬石勒自稱隙南陽王保稱晉王於祁山引劉隗刁協為腹心始與王敦有三厭次冀州春石虎攻春所殺别將陳安殺春降劉曜秋梁州刺史周刺史邵續出戰為虎所禽晉王保為其將張以備王敦張實為妖人劉弘所殺弟茂襲位訪卒以甘卓代之又以譙王氶為湘州刺史四戴淵都督兖豫冀雍并五州鎮夀陽丹陽尹春石虎拔厭次執段匹磾以歸秋以僕射逖略定河南地聞王劉構隙知功不成冬憤恚劉隗都督青徐幽平四州鎮泗口豫州刺史祖約代領其衆而卒詔以弟永昌元導將兵拒之導兵敗於栗春王敦舉兵向闕帝命王外敦殺周顗及戴淵晉王保將陳安自稱涼州刁協死劉隗奔石勒詔以敦為丞相都督中王氶及甘卓帝以憂崩王夏王敦還武昌殺譙明帝紹太寧元年出敦門四方貢獻皆入敦府夏王敦徙屯蕪湖將相嶽牧皆攻斬陳安進臨張茂茂稱藩於矅秋石虎拔青州殺刺史曹嶷劉矅申甲二石春駿襲位王敦病甚帝用丹陽尹溫嶠謀下詔虎寇兖州刺史劉遐退保泗口夏張茂卒兄子兵三萬會敦卒其衆自潰錢鳯王含王應皆死討之秋敦遣將錢鳯將兵逼建康帝兵五千敦祖約退保壽陽冬石生屯洛陽三勒將石良寇兖州殺刺史春立子衍為太子夏石雍梁荆湘四州帝崩帝明敏有斷時年二十自淮以北司豫兖州皆沒於勒以陶侃都督亮秉政先是王導為政寬和亮以嚴猛代之衆七太子即位年五歲庾太后臨朝后兄中書令懼頗怨於冀州五萬落臣光曰劉淵以丐奴遺種乘晉室之衰奄有河汾天下蜂起之衆輻湊而歸之石勒王彌皆北面為臣聰承其故業遂陷兩都執辱二帝矜夸淫縱殘暴無親幸以病終墳草未生家為屠肆矣矅以疏族屢建大功專制關中遭靳凖之亂興師討賊遂承漢業及揚戈隴阪則陳安授首投甲西河則張茂稱藩亦戎狄之雄俊也然始與靳氏約降則非義終滅其家則非信使石勒因而自絶則非智乃知二三其德而能成功者鮮矣及乘髙堠之捷以圍金墉一戰而跌生為禽虜雖其輕易以取禍亦不幸而夭亡也殺江州刺史劉胤冬將軍郭默矯詔五陶侃討郭默斬之侃徙趙建平元夏飢疫帝位使營鄴宫以其子宏為大單于石虎為中鎮武昌石勒稱大趙天王行皇帝事秋勒即不從冬趙郭祇拔襄陽太守周撫走還武昌山王虎自以功多怨怒徐光程遐勸勒除之勒六旱夏大七復取襄陽以宣為荆州刺史復修祖夏大水秋陶侃使將軍桓宣擊趙帝遷居新宫逖之政冬八夏慕容廆薨子皓弟仁據遼春蜀李壽陷寧州取南中之地劉氏勒子堪太子弘請讓位不許冬石生據東以叛秋石勒卒石虎殺徐光程遐及勒后擊滅之石聰以譙來降長安石明以洛陽叛虎皆午甲九延熙元夏趙海陽王弘以兄子李班為嗣冬石虎廢弘而殺之自稱陶侃薨庾亮代鎮武昌秋李雄卒舍其子而期期以李越為相國以從父漢皇壽鎮涪假居攝趙天王李雄子李越殺李班而讓其弟於栁城蘭破慕容皓咸康元幽公期王恆元夏石虎趙武帝虎建武成卭都還秋旱冬慕容皓乘凍攻慕容仁殺之代寇厯陽石遇圍襄陽京師大震虎兵遇飢疫而之子紇郍翳槐奔趙人逐翳槐而立猗色二冬石虎作大武殿基髙春立皇后杜氏旱與外同虎荒于酒色國事皆委之太子邃二丈八尺教宫人占星及馬射百工伎巧皆三虎謀殺之秋虎誅邃以宣為太子冬慕容皓春石虎稱大趙天王太子邃以其弚宣有寵於段氏會段遼攻薊虎自將兵十餘萬伐之自稱燕王置百官遣使稱藩於趙請兵以伐四元春虎大破段遼拔令攴遣將納翳槐於代漢昭文帝壽漢興代昭成帝拓跋什翼犍建國栁城皓遣子恪擊破之又破趙將麻秋於密雲紇郍奔燕虎以慕容皓不會令支移兵討之圍期自立更號曰漢代王翳槐卒弟什翼犍立山李期驕暴欲殺李壽壽起兵襲破成都廢五太子宣為大單于建天子旌旗遣將夔安寇秋王導卒中書監庾冰代導秉攻石虎以亮卒庾翼代鎮武昌石虎將伐燕治兵于鄴沔南將軍毛寶戰沒安掠七萬户而還冬庾十萬戎士五六捷册封皓為燕王皓又伐髙句麗髙春慕容皓破趙石城於邊西遣使獻請和句麗七虜三萬餘戶而還遷都栁城更命曰龍春杜后崩燕王皓襲趙幽州入髙陽出走虜其母妻及民五萬餘口城又伐髙句麗焚九都髙句麗王八王稱臣於春髙句麗易世之後親屬愈疏請以帝弟琅邪王嶽為嗣燕以請和夏帝疾甚庾冰以皇子丕幼且懼石虎大發諸州兵百餘萬將入寇帝許之帝崩嶽立冬立皇后禇氏康帝嶽建元元年罷遣其將張伏都擊張駿駿主春石虎用太史趙攬言大閲而郡皆叛入于趙宇文歸將莫淺渾伐燕燕王簿謝艾擊破之秋李壽卒蜀建寧上庸等五之皓擊破辰甲二皓以慕容翰為前鋒伐宇文歸漢歸義侯勢太和元春燕王稽王昱何充請立皇子𣆀帝崩𣆀即位年一歲歸走漠北拓地千里秋帝有疾庾冰欲立會六州兵將與燕涼共伐趙聞帝崩冰卒乃還屯禇太后臨朝以昱録尚書冬庾冰卒庾翼發口夏穆帝𣆀永和元年秋庾翼卒以徐州刺史桓溫春以禇太后父裒為兖州刺史許大將鮮思明諫勢怒殺廣及思明思明曰國代鎮武昌李勢弟廣以勢無子求為太弟不我在也之不亡以二桓溫率所督六州之兵伐漢張漢嘉寧元漢將李奕反死冬重華立駿卒子三抵成都李勢降秋趙麻拔攻涼州春桓溫留大兵於彭模以七千人直人晝夜修城死者數萬太子宣出祭山川從戎謝艾擊破之石虎用沙門吳進言發六十萬復何愁宣弟秦公韜有寵於虎宣惡之卒八萬虎曰我父子如此非天崩地陷當四宣秋幼子世年十歲其母劉矅女也虎愛之乃舍其使盜殺韜欲因虎臨喪而弒之事覺虎燒宣虎為后故東宫衛士皆謫戍涼州燕王皓薨長子燕公武彭城公遵而立世為太子以劉氏五宫衛士作亂姚弋仲擊斬之虎卒子世立夏趙太寧燕景昭帝俊元春石虎即帝位東殺世而立遵奪蒲洪雍州洪怒據枋頭自稱三世兄遵與姚弋仲蒲洪冉閔自河內率兵入鄴欲殺冉閔冬閔殺遵立其弟鑒鑒復欲殺閔閔秦王秋禇裒聞趙亂伐趙大敗而還石遵殺諸胡遂囚鑒盡六閔永興元春冉閔殺石鑒稱魏趙新興王祇永寧魏悼武天王冉魏將王泰擊敗之符洪為麻秋所鴆其子健帝於鄴石祇稱帝於襄國夏祇使石琨擊魏趙將杜洪據長安殺秋因率衆入關逐七秦符健自稱秦天王冉秦明帝符健皇始元姚襄救之閔敗奔還鄴祇追之反為閔所敗閔圍襄國石祇求救於燕及姚弋仲燕恱綰及殺祇降魏夏趙將劉顯臣光曰石勒以胡羯餓隸崛起皂櫪之間連百萬之衆橫行天下斫喪晉室東禽茍晞北取王浚西逐劉琨南舉兖豫皆如俯拾地芥劉矅席戰勝之威長驅伊洛有并吞山東之志勒舉鞭一麾矅惛然就縳遂兼其國奄有中區羌氐咸服其才不有過人者能如是乎虎以悍戾之資濟貪狡之志賊虐其孤而剽奪其位恃其詐力以凌人暴物窮奢極欲不可盈饜自以為非天崩地陷則抱子弄孫無復後憂及夫父子相殘兄弟相攻尸浮漳濱家無噍類積惡不已捨滅亡何適哉馬勳伐秦不克梁州刺史司八虜冉閔殺之姚弋仲卒其燕元璽元春慕容恪伐魏伐秦及秦主戰頴上尚襄大敗乃留襄屯淮南子襄為秦所破來降夏豫州刺史謝尚與襄共智冬燕王俊初稱帝徙都鄴秋燕慕容評拔鄴虜魏太子九殷浩伐秦以冬中軍將軍兵大敗走保譙城襄收其資仗屯芍陂桓溫表姚襄為前鋒既而疑襄遣使止之襄反擊浩浩廢重華子矅靈而自立殺謝艾免浩官冬張重華卒其庶兄祚寅甲十寧侯涼長政引殷浩為宰相欲以敵桓溫溫因浩敗奏免祚和平元春張祚稱涼帝初會稽王昱輔上三輔郡縣皆降會食盡反為萇所敗乃還秋浩官而自伐秦夏破秦太子萇於藍田進次霸弟生為太子萇卒秦主立萇十一公玄靚建興四十三夏秦越厲王生壽光元涼沖祚惡其將張瓘宋混欲殺之瓘混起兵攻姑臧姚襄自稱大單于秦主健卒太子生立張牧西平公瓘為撫軍將軍秉政殺祚復立重華之子玄靚為涼州十二以讒殺春秦主臣下皆朝不謀夕姚襄寇許昌汝南秋桓溫司空王墮秦主猜忌殘暴勳舊忠良害之略盡入洛陽修復陵廟遣將軍毛虎戍之而還冬自江陵討之大破襄兵於伊水襄奔平陽溫遂固虜假龕慕容恪拔廣升平元元夏姚襄合諸羌進據秦宣昭帝堅永興燕光壽衆降秦秦主忌眉之功殺之又欲殺堅堅與其黃落秦廣平王眉東海王堅擊斬之襄弟萇率自立秋立皇后何氏將吕婆樓等共弒秦主而二自討降之以平子春秦張平反秦主強譖之秦主怒斬強由是人無能間者秋遣蜓為將秦主任處士王猛以國政太后弟茍平諸葛攸屯武陽以圖北伐中郎將謝萬屯下蔡郤曇屯髙三夏涼張瓘謀秦甘露元令秉政冬謝萬等與燕大司馬慕容恪戰萬殺宋混廢張玄靚而自立混攻殺瓘混為尚書敗等大四暐立朝廷聞之以為中原可圖桓溫曰燕幽帝暐建熙元春燕王俊殂太子燕王而自立恪不從又勸燕王誅恪因欲篡位慕容恪在憂方大耳燕太師慕容根説恪廢殺之燕王五后復立成帝子琅邪王丕秋立皇后夏涼宋混卒弟澄代為政帝崩禇太玄靚叔父天錫復殺雍而代之何氏涼張雍殺宋澄而代之冬張司馬溫公稽古録卷之十三
