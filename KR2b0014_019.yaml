body:
  text: 戌甲景祐元知州齊宗矩出戰兵敗為元昊所七月河決橫隴趙元昊冦環州壬申出美人尚氏楊氏九月上良愈甲辰立皇執既而遣還八月戊辰上不豫辛未大赦發運使命淮南轉運使兼領之后曹氏十月庚申罷江淮制置二校理李照二月集賢二律其黃鍾才應仲呂請更定新樂許之五言國朝所用王朴樂比古樂高五律比胡樂高庚子禮院言太祖太宗真宗廟皆萬世不毁月甲午廣南東西路奏獠寇高竇雷化等州月乙亥廣南西路奏獠莫陵降七月李照其祀天地太祖定配太宗真宗迭配從之六東節度推官阮逸進士胡瑗議定新樂八月作新樂成用今尺為律其言迂誕罷之更命鎮自是河東北行不復歸故道詔句當御藥院壬子朔詔寬强盜刑名戊辰罷塞橫隴決河之己酉作睦親宅以聚皇族詔中丞杜衍自今選內臣入仕三十年以上纍有勞績者為朝士在京師者十一月戊子故后郭氏薨等沙汰三司吏十月辛亥朔作朝集院以處十二月壬子授唃厮囉官癸丑詔內侍都知乙未上祀圓丘大赦初聽宗室換南班官句當皇城司親戚毋得句當御藥院押班落職者毋得復任其見任者毋得三三司二月二人於沙門島二十餘人於逺州五月丙戌吏數百擁杜衍宅投瓦礫肆醜言乙卯流後行坐貶者數人辛卯復令商旅入錢京師給南以范仲淹離間君臣榜朝堂集賢校理余靖等詔罷塞橫隴河口更治金隄七月乙未初置方茶入芻糧於邊者給京師及諸州錢丙午延及開先殿阮逸等所議尺律考之古今終太宗正司以宗室領之庚子太平興國寺災月戊寅保慶太后楊氏崩不合九月悉罷之十一四皇后七月戊申二月己酉葬莊惠震壞廬舍欣州尤甚覆壓死者萬九千餘人民夜衆星西南流數刻乃止冬欣代並三州地下户一千六十餘萬口二千三百二十餘萬皆露處或地裂湧泉出火連年不止是歲天寶元元八月丁卯復置江淮制置發運使二月廣南西路奏安化軍蠻寇融宜州河南地內屬具言元昊反狀郭勸執還之十九月己酉鄜延路奏趙元昊叔父山遇等請以祚十一月庚戌上祀圓丘大赦改元十二月甲戍元昊自稱大夏皇帝改元天授法延告詔削元昊官爵除屬籍發兵備西邊癸酉進月丙寅鄜延路奏趙元昊遣使奉表納旌節敕使擊元昊唃厮囉官二降五月癸卯詔張若谷等減省正月癸亥廣南西路奏安化州蠻勤等擊却之環慶鈐轄高繼隆等攻元昊後橋冗費十二月元昊寇保安軍延州鈐轄盧守之寨破康定元破金明寨執都監李士彬遂圍延正月丙辰朔日食元昊寇延州大雪解圍去詔陜西諸州悉完城為守備州甲戌大敗官軍於三川口執劉平石元孫㑹有輦官千餘人應戍邊遮兩府馬喧呼不遜張二月丙午改元三月丙子黑風晝晦五月陷塞門安逺寨六月甲辰詔陜西河北河東士遜馬驚墜地詔斬二人流二十餘人元昊元昊寇鎮戎軍三川寨丁卯敗都監劉繼宗等京東京西皆籍民為鄉弓手强壯九月丙寅豹城克之破四十一族浙東軍士鄂郝等殺陷乾溝乾河趙福三堡庚午任福襲元昊白詔自今有內降遷官並差遣者令中書樞密院巡檢使張懷信剽掠州縣逃入海十月戊子正月上旬出兵擊元昊巴蜀江浙饑執奏十二月乙巳詔鄜延涇原兩路以司馬溫公稽古録卷之十九
