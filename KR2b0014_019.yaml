front:
  text: 司馬溫公稽古録卷之十九仁宗天聖元年等以景德校天禧用度裁減冗費正月丙寅朔改元癸未命劉筠申減諸宫觀清衛卒分隸諸軍辛卯行崇天二月壬戌省天下齊醮十存一二三月甲藥於內地謂貼射閏月甲午詔婦人有罪免曆初聽商旅入芻糧於邊者給錢及茶鹽礬寇凖卒田彥晏請降配針工庚子雷州司户子甲二司成十一十月新修三乙酉立皇后郭氏月丁酉上祀圓丘大赦三攻堡寨十一月庚八月涇原屬羌舉兵三物於榷貨務謂之三說罷貼射法辰初令商旅入河北芻糧者給香茶錢四知鎮正月申朔初置上御藥供奉四人五月壬午詔大戍軍王仲寶等討原州康奴族破之二月戊駁閏月戊申初定江淮發運司歲漕米課六辟有可憫及疑而奏者雖不應奏法官毋得舉九月庚申初聽舉人能講三經者特奏名百萬斛六月京東西及河北江淮以南大水朔日食十月甲戌五擊敗之七月丁巳詔發民夫三五月趙德明寇金明都監李士彬奏已塞十一月上祀圓丘大赦􅊨萬卒二萬餘人塞滑州決河十月丙申六罷提正月奏李公藴殺掠鄉民六月己卯又奏公藴卒㸃刑獄三月丙申朔日食五月廣南西路決王楚發夫卒塞之八月甲戌澶州奏河七者甚衆六科及武舉正月曹利用貶官連坐官轉對四月庚寅大赦乙未置萊州采金久廢閏月壬子復置之得富弼等癸未詔百行新令六月丁未玉清昭應宫災八月丁場辛亥授李公藴之子德政官爵五月己巳丙午初舉縣令亥朔日食十月八八月庚子初令知縣通判正月作㑹聖宫於永安一月戊辰上祀圓丘大赦􅊨兩任無私罪者得門升十九稅什之一六月正月減畿內田􅊨十月施州言蠻覃彥綰寇永寧寨己卯契丹主隆緒卒子宗真立明道元丁卯二月行天聖編敕八月壬戌夜禁中火焚崇德等以上母順容李氏為宸妃是日薨三月戊子卯大赦十一月大內成甲戌上恭謝天地于八殿癸亥上與太后寓居延福宫更修大內丁資壬辰延州言趙德明卒癸巳授其子元昊天安殿謁太廟大赦改元文武京朝官名遷一爵官二丁未上籍田于東郊大赦三月太后二月乙巳太后服衮衣儀天寇朝饗太廟楊氏為太后軍國大事與太后內中裁制諫官有疾庚寅大赦甲午太后崩遺誥尊皇太妃申朔詔刪遺誥之語壬寅追尊故宸妃李氏上言上春秋已長不應復使政出宫壼四月丙祈恩澤凡傳宣內批有司未得即行皆審取處為皇太后壬子詔宗戚毋得於禁中通表奏外州六月甲午朔日食七月京東西河北分癸丑罷上御藥官出副都知江德明等於莊懿太后十月丁酉葬莊獻莊懿皇后十河東陜西蝗草木殆盡作奉慈廟别祀莊獻許之賜號淨妃丁巳詔改明年元大饑二月復置提㸃刑獄乙卯皇后郭氏請入道
