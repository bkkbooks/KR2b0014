front:
  text: 司馬溫公稽古録卷之九
  hash: sha256:671abcd58215b8099b159dcf12dc1c04ac0dd4d4aa087e4c4f473089e2e1379a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_SBCK_009-1a}
body:
  text: 周下恭王崩子懿王囏立間切囏居懿王崩恭王弟孝王辟方立孝王崩復立懿王太子夷王燮夷王時王室卑下堂而見諸侯夷王崩子厲王胡立厲王淫昏無道召穆公作詩刺之不敢斥言借商紂以言之曰殷鑒不遠在夏后之世榮夷公好專利有寵於王芮良夫諫曰夫利百物之所生也天地之所載也而或專之其害多矣天地百物皆將取焉所怒甚多胡可專也王人者將以導利而布之上下者也匹夫專利猶謂之盜王而行之其歸鮮矣王不聽國人謗王王怒得衛巫使監謗者神靈有謗必知之監察也王以為巫有以告則殺之國人莫敢言道路以目王喜告召公曰吾能弭謗矣召公曰防民之口甚於防川川壅而潰傷人必多王不聽後三年民不堪命作亂流王于彘太子靖匿於召公之家召公以其子代之乃得免大臣共和行政自是以後年始可譜共和之初諸侯所自出魯文武克商定天下食采於周武王崩成周公旦姬姓周文王之子武王之弟佐政成王成王命周公子伯禽就封於魯王幼周公攝行天子事七年致太平復豐魯公伯禽後七君至愼公濞曲阜都曲阜留周公自輔為太師周公薨於州今兗齊為四嶽封於吕太公事周為文武師佐太公望薑姓其先出於神農氏堯時嘗留鎬京與周公夾輔成王後五世至胡武王滅商號尚父封於齊都營丘太公淄獻公薨子武公壽立營丘在今青公靜徙都薄姑胡公弟獻公山徙都臨界臨淄在青州界州界薄姑在棣州晉王封叔虞於唐在河汾之東叔虞子燮唐叔虞姬姓周武王之子成王之弟成至靖侯宜臼為晉侯又四世秦治水為舜虞其後裔有飛廉飛廉生惡仲嬴姓其先出於高陽氏至伯益佐禹孫曰造父以御得幸於周穆王封於趙來革皆以材力事紂與紂俱死飛廉玄王主馬于汧渭之間馬又蕃息孝王邑城為趙氏惡來革五世孫非子為周孝生秦仲秦仲始大秦今秦州之秦曰秦嬴秦嬴生公伯公伯楚辛氏火正有功德號祝融黎死弟吳回芉姓其先出於高陽氏有子曰黎為高之際為顯諸侯巳姓昆吾董姓豢龍彭代為祝融其後子孫蕃衍為八姓夏商曹姓鄒莒斟姓無後吳回之孫曰季連姓彭祖豕韋秃姓舟人妘姓塢鄶逼陽苖裔曰鬻熊事周文王鬻熊曽孫熊繹為芉姓楚之祖也世居蠻荆為君長其八君至熊勇芉音弭事成王封為楚子熊繹後宋誅武庚祿父以微子代殷後封於宋世微子啓殷帝乙之子紂之庶兄周公既後六君至僖公舉宋今應天府為周客微子薨弟衍立號微仲微仲衛叔蔡叔以殷餘民封康叔於衛康叔後康叔封姬姓周公之弟也周公既伐管衛今衛州八世至僖侯陳大姬妻胡公而封諸陳賜姓媯氏後五胡公滿帝舜之後周武王克殷以元女陳今陳州世至幽公寧蔡諸郭鄰其子胡率德攺行周公復封諸叔度周公之弟也流言諫周公周公囚武蔡今蔡州蔡蔡仲後世至曹後五世至夷伯喜曹今曹州叔振鐸周文王之子武王封於曹司馬溫公稽古録卷之九
