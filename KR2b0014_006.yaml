front:
  text: 司馬溫公稽古錄卷之六
  hash: sha256:cc13d2d1d0e3dd3d46aa00a6536e65911831b892f8de13a4db0c13c199538d03
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_SBCK_006-1a}
body:
  text: 殷上殷而受命故二號亦號商又封商湯居殷湯子姓曰履其先出於高辛氏帝嚳生契契爲舜司徒封於商陽今商州商在大華之契生昭明昭明生相土相土居商丘天府今應相土生昌若昌若生曹圉曹圉生冥冥生振振生微微生報丁報丁生報乙報乙生報丙報丙生主壬主壬生主癸主癸生天乙世爲諸侯天乙是爲成湯自契至成湯八遷湯始居亳從帝嚳居湯不邇聲色不殖貨利言清潔不貪邇近也殖生也德懋懋官功懋懋賞用人惟巳攺過不吝者則勉之以賞用人之言若自勉於德者則勉之以官勉於功吝惜所以能成王業巳出有過則攺無所居上克明恕言理爲下克忠竭誠事上與人不求備檢身若不及如不及恐有過使人必器之常爲夏方伯葛伯不祀奪餉者黍肉湯始征之歸市者不止耕者不變誅其君而恤其民自是東征西夷怨南征北狄怨言則近者著矣西夷北狄舉遠以曰奚獨後予攸徂之民室家相慶曰徯予后后來其蘇待我君來其可蘇息湯所往之民皆喜曰伊尹有元聖之德耕於有莘之野以樂堯舜之道湯使人以幣聘之使三返然後至湯任之以政伊尹以爲桀雖無道君也湯雖有聖德臣也不可捨君而輔臣乃去亳適夏既而知桀不可輔復歸于亳乃與湯謀伐桀勝之放桀於南巢諸共推湯爲天子湯以堯舜皆以揖讓傳天子已獨以干戈得之有慙德仲虺乃爲之作誥言天錫湯勇智表正萬邦夏桀昏德民墜塗炭無救之者若陷泥墜火非德言所能諫德善言德言道不可不伐之意湯攺紀夏政代虐以寛又自誥諸侯曰爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心赦已罪以其簡在所以不蔽善人不故天心其爾萬方有罪在予一人不至自責化予一人有罪無以爾萬方言非所及無以爾萬方諸侯由是歸之湯爲天子十三年而崩太子太丁未立而卒立太丁之子太甲王太甲既立不明欲敗度縱敗禮伊尹屢諫不聽恐王習不義遂成性欲困苦以革其心乃放王于桐宫伊尹攝行天子事王於是悔過遷善三年伊尹復奉王歸于亳復王位還其政太甲不怨而德之伊尹申戒于王曰有言逆于汝心必求諸道必以道義求其意人以言咈違汝心逆之勿拒有言遜于汝志必求諸非道汝心必以非遜順也言順以自臧道察之勿太甲由是能保惠于庶民克終湯業享國三十三年崩號祖甲子沃丁立王沃丁崩弟太庚立王太庚崩子小甲立王小甲崩弟雍巳立王雍巳崩弟太戊立王太戊時伊尹之子陟爲相巫咸佐之亳有祥桑穀共生于朝一暮大拱手搤之曰拱祥妖怪也兩太戊懼伊陟曰妖不勝德太戊從之桑穀枯死太戊治民祇懼不敢荒寧殷復興享國七十五年崩號中宗子仲丁立王仲丁遷于嚻仲丁崩弟外壬立王外壬崩弟河亶甲立王河亶甲居相殷復衰河亶甲崩子祖乙立王祖乙時相爲水所毁遷于耿祖乙崩子祖辛立王祖辛崩弟沃甲立王沃甲崩祖辛之子祖丁立王祖丁崩沃甲之子南庚立王南庚崩祖丁之子陽甲立王陽甲崩弟盤庚立王盤庚時復避水災南渉河遷于亳從湯居行湯政殷復興盤庚崩弟小辛立王小辛時殷復衰小辛崩弟小乙立王小乙崩子武丁立司馬溫公稽古錄卷之六
