front:
  text: 司馬溫公稽古録卷之四
  hash: sha256:6a3886bfa19c40b53120b68c184d9b59f1f03d40cc95583057a7ab410af13f1e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_SBCK_004-1a}
body:
  text: 有虞氏下帝作歌曰股肱喜哉元首起哉百工熙哉君也元首官之業乃廣言君得良臣乃能致治股肱之臣喜樂盡忠君之治功乃起百臯陶賡之曰元首明哉股肱良哉庶事康哉人君選任賡續也言天下衆事無不安者言治安之本在君明之明則股肱大臣無不忠良大臣忠良則又歌曰元首叢脞哉股肱惰哉萬事墮哉無大略明叢脞細碎百事荒君既不知治要躬親細務則大臣無所主好要暗主好詳主好要則百事詳主好詳則非一人可治故皆墮壞事事皆解體不為用萬事舜老有子商均亦不肖不足傳天下乃命禹攝行天子事舜命禹征有苖三旬苖民逆命益贊于禹曰惟德動天無遠弗屆佐禹欲其修德致逺贊佐屆至也益以此義滿招損謙受益時乃天道人益之是天之常道自滿者人損之自謙者至諴感神矧兹有苖神况有苖乎言易感諴和也矧况也至和感禹拜昌言曰俞班師振旅之遂還師兵入曰班振言整衆昌當也以益言為當故拜受而然帝乃誕敷文德文德以來之逺人不服大布舞干羽于兩階楯干舞文舞干賔主階間抑武事羽翳也皆舞者所執修闡文教七旬有苖格而討御之者必有道不服不討自來明舜生三十徵庸試用始見二十在位位二十八年歷試二年攝五十載而崩一在五十之數故舜服堯喪三年其五十年為天子壽百一十二歲禹封舜後於虞而客之及周武王克商封舜後胡公於陳賜姓媯氏孔子曰後世雖有作者虞帝弗可及也巳矣夏后氏上夏后姒姓曰文命高陽之孫鯀之子也堯命鯀治水功不成舜臣堯殛鯀干羽山舉禹使代父治水堯舜之道廢父興子天乃錫禹洪範九疇類也洛出書洪大範法疇之以成九類一五行二五事三八政四五紀五神龜負文而出列于背有數至于九禹因而第八庶徵九五福六極皇極六三德七稽疑禹治水順五行之性循天地之理不墮山不崇藪壅者決之滯者導之行水於其所無事故功易成禹治水勤勞陸行乘車水行乘舟泥行乘橇箕樀行泥上子絶切形如山行乘梮施之履下以上山不蹉跌也紀録切以鐡如錐頭長半寸娶塗山氏女歷辛壬癸甲四日復往治水塗山氏女生子啓禹過門聞啓􅈱􅈱孤音而泣不入視之時下民昏墊念丁言困水災切昏瞀墊陷艱食食難得禹隨山刋木斬木通道隨行山林與益得禽獸佐民食決九川距四海濬畎澮距川尺深尺曰畎方百里之間廣二尋深二仞曰距至也決九州名川通之至海一畝之間廣至川亦入海澮澮畎濬之平田無水與稷教民播種百穀濬川得魚鱉佐民食其流濬深蒸民乃粒萬邦作乂食米由此為治本曰粒言天下禹分天下為冀兗青徐揚荆豫梁雍九州任土作貢定其貢賦之差任其土地所有九州攸同四隩既宅巳可居四方之宅九山刋旅九川滌源九澤既陂已滌除泉源無壅塞矣九州之澤巳陂障無九州名山巳槎木通道而旅祭矣九州之川矣決溢四海會同九州同風萬國共貫四海之內會同京師庶土交正底愼財賦所愼者財貨貢賦言取之有節用之交俱也衆土俱得其正謂壤墳壚致度有咸則三壤成賦中邦三品成九州之賦明水皆法壤田上中下大較除害又以天下近遠分甸侯綏要荒五服辨諸侯職守東漸于海西被于流沙朔南暨聲教也被漸入與王者聲教而朝見及也此言五服之外皆訖于四海堯乃錫禹玄圭告厥成功司馬溫公稽古録卷之四
