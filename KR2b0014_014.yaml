馬消難以州入于周夏而任尚書令楊愔為政内外清肅逃歸齊王脩廣三臺淫湎暴虐三夏齊王周武成元司空周文育而反侯安都破王琳兵於左里悉誅諸元三千餘人北江州刺史熊曇朗殺立子伯宗為太子冬齊文宣帝殂晉陽王帝崩以兄子臨川王蒨為嗣秋周王稱帝大雷琳冦文帝蒨天嘉元年侯瑱大破王琳琳及蕭莊奔齊齊孝昭帝演皇建元春太尉之於江夏周晉公護鴆殺明帝立其弟邕誅熊曇朗武帝子衡陽王昌來自長安沈演廢殷自立立大子百年冬周將獨孤盛寇齊王殷幼弱叔父常山王演殺宰相楊愔等秋湘巴二周將殷亮以湘州來降夏初與齊和親周武帝邕保定齊武成帝湛太寧元春孝昭帝殂廢其太子百年立弟長廣王湛縉秋破周將賀若敦復取武陵等六郡冬齊空侯安都討之州刺史留異反司三春齊主立太子緯梁齊河清梁明帝巋天保元來自長安留異奔晉安東陽平夏齊婁太宣帝殂江州刺史周迪反帝弟安成王頊彦反大司馬段韶討擒之后殂秋齊冀州刺史高歸四刺史陳寳應納春周迪奔閩州賜死秋周迪冦臨川將軍章昭逹擊走之之夏帝捨身於太極前殿侯安都以驕慢萬伐齊幷州齊主自如晉陽禦之冬周柱國楊忠與突厥合兵二十申甲五大敗春齊人歸宇文護之母于周秋突厥伐齊幽州周師于晉陽城西夏齊殺樂陵王百年齊陽如洛陽太師段韶大敗周師尉逈走章昭周晉公護伐齊使尉逈圍洛陽冬齊主自晉異擒之閩州平逹討陳寳應留六逆突厥女為后夏齊武成齊温公緯天統元春周主帝軍國太事咸以聞秋獲周迪斬之帝以災變傳位於太子緯自稱太上皇天康元㓜弱政事皆決於司徒安成王頊周天和元夏帝崩太子伯宗即位臨海王宗伯光大元年周將元定將兵助之遂入郢夏湘州刺史華皎叛入於周破之皎奔江陵虜定以歸州秋大將軍淳于量擊大二冬章太后下令秋齊始與周和親殂武成奢淫無度齊政始衰廢帝立安成王頊齊武成帝宣帝頊大建元年將軍歐陽紇據廣州反春立子叔寳為太子冬二武齊太子恒齊以中領軍和士開為尚書令是時平元春章昭逹討歐陽紇斬之秋齊主立權恣横異姓王者百餘人開府千餘人至於犬齊主荒縱士開及嬖臣高阿那肱穆提婆等用役重民不聊生馬皆受官爵賦繁三秋齊琅邪王儼殺和士開尋夏齊段韶攻周汾州拔之與周和親被誅冬初四親萬機勵精為治中外翕然周周建德元夏周主誅晉公護始齊僕射祖珽復加譖毁秋齊主殺斛律光廢斛人將伐齊而患齊丞相斛律光乃以謠言間之又廢之立穆后律后立胡后尋五遣開府呉明徹略地北邊屢春齊高阿那肱為丞相帝州冬拔壽陽斬王琳破齊兵取秦涇和合四午甲六高思好反尚書春濟朔州行臺之䘮夏周主斷佛道二敎立通道觀以壹聖令唐邕討斬之周叱奴太后崩武帝行三年主如雲陽衞王直反於長安誅死人之道諸將侵齊淮北秋周七詔數齊主秋周主下橋齊高阿那肱救之㑹周主有疾而還所得三罪惡大興兵自河南伐齊逼洛陽破河隂焚浮徹大破齊師於呂梁十餘城皆棄之吳明八子贇西廵遂伐吐谷齊隆化元春周太之圍晉州垂克以馮淑妃故棄軍先還晉陽齊渾冬周主自河春伐齊拔晉州齊主自晉陽救守晉陽而奔鄴延宗自稱帝周主攻拔之師大潰周主乗勝逐之齊主留安德玉延宗九師克鄴齊主奔青州又使太子傳位於任城王齊幼主恒承光元春齊主傳位於太子恒周王湝據州不下周齊王憲討平之周封齊主為湝齊王將東奔高阿那肱引周兵追擒之任城殺之温公尋臣光曰神武以高世之略平爾朱之亂功大勢盛為魏武所疑雖有逐君之慙而能惓惓盡恭以事静帝沒身不怠此其可稱者也文襄有俊才而無重德悖慢無禮終隕身於奴隷文宣淫湎殘暴甚於桀紂而能信用賢臣委之以政威加鄰敵終其天年蓋亦有以得之矣孝昭明逹愷悌實有齊之令主享國不永惜哉武成驕淫奢縱齊業始衰後主繼之昏狂尤甚誅翦忠良信用讒邪十年而亡已爲幸矣攻周徐州冬吳明徹十軌戰於呂梁明徹大敗將卒三萬周宣政元春吳明徹及周將王周武帝自將五道擊突厥至雲陽遇疾殂武帝皆沒帝懼始繕完以備周夏突厥伐周幽州帝即位殺齊王憲立后楊氏英武勤儉四方畏服周宣十一象元春周周静帝闡大奢狂恣立五皇后悉遣親王之國建東京發兵宣帝殺王軌傳位於太子闡自稱天元皇帝驕冬周將韋孝寛拔壽陽梁士彦拔廣陵江北作洛陽宮脩長城民不堪命夏突厥伐周幷州入周地皆十二周宣帝殂静帝尚幼御正劉眆内史春周𣏌公亮反韋孝寛討平之夏召諸王入朝稍稍誅之相州總管尉遲逈鄖州鄭譯矯詔以太后父隋公楊堅受遺輔政堅悉堅使鄖公韋孝寛擊逈楊公王誼擊消難蔣公總管司馬消難益州總管正謙皆起兵討堅秋死消難來奔梁睿擊謙逈謙十三春周主禪位于隋隋文帝楊堅開皇元臣光曰文帝以關中之衆東迎孝武收疲敗之兵撫貧困之民任賢使能列官布職明部分務農桑以輔魏室雖以高氏之强不能陵也其所為典法施於後世可不謂賢乎武帝以英傑之資受制强臣恭黙端拱十有餘年須其罪盈惡熟為衆所棄一旦除之若撥䵄振槁可謂知剛知柔智勇兼備者矣然後親統六師以征東夏齊之險阻不守士卒不戰數月之間縛其君臣致於鼓下使有周之境東漸于海南傅于江雖魏室全盛之時不能及也惜乎宣帝恣其淫侈逞其奇譎自絶于天結怨于民不及三年而為異姓所有悲夫厥沙鉢略稱臣上表於隋遂與阿波分爲二國寳反夏州將陳景詳斬之夏梁明帝殂突文徹擊隋和州爲隋所虜阿波亦伏於隋秋將軍湛四秋隋太子鎮洛梁莒公琮廣運元僕射江總爲尚書令帝日夜與總等文士十人陽隋柱國梁士彦宇文忻劉昉謀反誅冬以事不恤外患刑煩賦重中外離心及張孔二貴嬪賦詩飲酒不親政禎明元人脩春隋江陵梁安平王巖等懼率其民來奔隋主怒廢長城秋梁主琮朝于隋隋主遣將崔弘度戍主曰吾顯行大誅何密之有使投杮於江冬梁主爲莒公遂謀伐陳大作舟艦人請密之隋馮翊隋主如二廣山南行臺秦王俊信州總管楊素春攻隋峽州冬隋淮南行臺晉王海西距巴蜀横亘數千里以高熲爲謀主帝謂等率九十總管兵五十二萬八道入冦東接滄設備奏技縱酒不輟長江必不可渡全不隋文帝開皇九年公韓擒虎抜南豫州所向皆克春襄邑公賀若弼拔京口新議蒋山大破擒之韓擒虎入建業陳主逃于井就陳主以蕭摩訶為都督以拒隋賀若弼與戰於滅陳獲之遂臣光曰武帝與王僧辯同事梁室誅夷侯景乗時伺間以詐力取國然率羸弊之衆當强齊乗勝之勢卒成大功奄有江南斯亦難矣文帝恭勤政事足為良主孝宣值齊之衰而啓土逢周之興而喪師豈非不恃内而恃外者耶夫以陳國區區不能居天下五分之一春宮幸長十七帝幸仁壽宫上柱國王世積討桂春太平公史萬歲擊南寧蠻克之夏桂州人李世賢反大將軍虞慶則討平之州賊李光仕平之夏頒太史令張胄玄新曆以憂薨冬慶則以罪誅秦王俊坐奢侈免官就第十八宮高麗王春帝幸仁壽運不繼士卒疾疫元惶恐謝罪乃班師帝以元寇遼西詔漢王諒將水陸三十萬擊之㑹糧干都藍怒而叛詔蜀王秀擊之宗女妻東突厥都藍可汗弟染十九壽宫夏春帝幸仁干染于來奔冬帝立染干為啓民可汗處於河突厥達頭可汗犯塞史萬歲擊破之都藍攻染所殺達頭代立國内大亂逃奔漠北南夏勝之間發兵擊都藍都藍為其下二十突夏帝及獨孤后晉王廣矯自脩飾帝后皆愛之廣厥達頭犯塞晉王廣擊破之太子勇失愛於以晉王為太子帝晩年猜忌苛細誅夷功臣乃與楊素隂謀譖毁太子冬廢太子勇為庻人皆危懼甚衆人仁壽元珙夏僕射楊素以帝不悦文春突厥逹頭冦恒安敗柱國韓啓民共擊達頭大破之達頭奔吐谷渾啓民悉學希㫖奏廢太學及州縣學冬楊素與突厥衆有其二北水冬詔楊素蘇威牛弘等脩定五春帝幸仁壽宫秋獨孤后崩河南秀廢為庶人幽之深室禮太子及楊素譖蜀王三諒有寵於帝為幷冬河南水漢王焉仍許以便宜行事不拘律令太子廣惡州總管自蒲絳以東黄河以北至于滄海皆屬子甲四嬪亂帝怒召勇欲復立之太子使庶子春帝幸仁壽宫夏帝疾甚太子與妃裴文安説諒直趣長安諒不從煬帝使楊素擊張衡入侍帝尋崩秋漢王諒反於幷州兵曹城稍西作洛陽宫以為東都誅之冬煬帝幸洛陽徙其煬帝廣大業元年下富商大賈數萬家於東都發春立后蕭氏及太子昭徙天渚引河逹于淮造龍舟鳳䑽數萬艘秋帝幸江男女百餘萬開通濟渠引榖洛水逹干河自板二百餘里都舳艫相接二東都秋太子昭薨司徒楊春東都成夏帝自江都還入十餘萬口四千六百餘萬􅊨素薨是歲天下户八百九三夏復出北廵鑿春帝還長安賀若弼等坐誹謗誅發男丁百餘萬築長大行山為御道帝次榆林突厥啓民可汗來朝麗王不至始議伐高麗遂自樓煩還營城死者十五六秋帝出塞幸啓民牙帳召高宫晉陽四水南達于河北通涿郡帝之五原出春發河北男女百餘萬開永濟渠引沁親祠常山河北道郡守畢集突厥啓民可汗塞廵長城秋發民築長城自榆谷而東帝可汗立死子始畢五夏大獵於拔延山長圍周亘二春帝自東都還長安復西廵河右伏允遁降其民十餘萬還遇風雷士卒死者太十里吐谷渾主伏允保覆袁川帝分兵圍之里秋帝入長安冬復幸東都半伊吾吐屯設等獻西域地數千六􅯕大戲春作舟數十里錦綉珠玉填郭所費鉅億萬帝於端門街以誇示四夷來朝貢者絲竹之聲聞江都還幸七自河入永濟渠幸涿郡詔發兵運糧將春帝自江都御龍舟泝通濟渠逹于河役始為盜賊伐高麗民苦征八麗甲士一百一十三萬餽運春帝分軍為十二道親伐高衞大將軍宇文述等敗于薩水九軍並陷將士者倍之旌旗亘千里遂度遼水進圍遼東秋左存者百無一二乃班師歸東都奔還一日一夜行四百五十里九高麗以代王春復發兵伐等趨平壤禮部尚書楊玄感反於黎陽濟河攻侑守西都越王侗守東都夏帝度遼遣宇文述兵擊之兵部侍郎斛律斯政亡入高麗玄感西東都衆十餘萬帝乃還軍遣宇文述等乗傳發時盜賊所在蠭起攻陷郡縣不可勝紀趨關中宇文述等追斬之帝幸博陵是戍甲十阻絶軍多失期高麗亦困弊乃囚送斛律斯政春帝復征高麗百道俱進秋次懷逺鎮時道路入朝終不至帝復幸東都以降冬帝還長安召高麗王十一逹元春楚朱粲昌畢寢盛欲以宗女妻其臣叱吉立為南面可汗突厥始畢來朝帝幸太原秋廵北塞帝以始去冬還東都賊師李子通掠淮南稱楚王朱叱吉不受突厥圍帝於鴈門郡縣赴救突厥解稱楚帝粲據漢南十二府卿元文都等奉越王侗守東秋幸江都使光禄大夫段逹太河東黜陟討捕因以為太原留守都冬右騎衞將軍唐公李淵奉使恭帝侑義寧元年舉泰興魏公李密劉武周天興梁蕭銑鳴鳳涼李軌安樂秦薛樂王馬邑人劉武周據郡稱帝東郡賊李夏竇建德丁丑元春冀州賊竇建徳自稱長将軍王世充擊之不克夏金城校尉薛舉起密陷洛口倉稱魏公河南州郡多附之煬帝使秋武威人劉軌起兵據河西稱帝李宻陷黎兵據隴西稱帝晉陽留守唐公李淵起兵景珎等立羅川令蕭銑爲梁王荆楚皆附之陽倉唐公西度河取馮翊冬岳州校尉董唐公爲丞相總録萬機進爵爲王薛舉使子唐公入長安立代王侑爲帝尊煬帝爲太上皇濟郡賊杜伏威輔公祐渡淮陷洛陽仁杲冦扶風唐公子世民擊走之唐高祖淵武德元年春宇文化及弑煬帝越王稱隋越王侗皇泰夏五鳳元破宻宻來降尋死化及稱帝夏受隋禪帝李宻擊化及走之王世充殺元文都因擊臣光曰文帝於周室非有元功厚德素洽於人直以天元暴崩嗣君幼弱姦臣矯命徼幸得之然明敏儉約勤於政治隨才任官信賞必罰故能取江南三百年之國易於反掌使天下復為一統百姓繁庶衣食豐衍突厥室韋靺鞨林邑高昌女國之屬莫不頓顙稱臣奉珍入貢雖兩漢全盛之時不能過也向使後嗣僅得中才以守之則十世之内未易亡也煬帝以悖逆作謀坐承富强之業志驕氣溢慨然慕秦皇漢武之為人窮侈極欲連兵四夷政煩賦重盜賊蠭起而游幸不息以樂滔憂惡聞直言喜自壅蔽噫率是道也雖禹湯文武之子孫未或不亡况隋無積善之基乎民平隴西蕭銑稱帝秋薛舉卒冬秦王世二子通明政元春竇鄭王世充開明呉李擒李軌王世充弑越王自立劉武周陷幷州建德滅宇文化及朱粲降復叛夏安興貴冬竇建德陷黎陽盡據有北地杜伏威及涿晉州關中震駭秋李子通稱吳帝於江都藝請降州賊羅三建德稱夏王夏秦王擊破劉武周吳王杜伏威元春上幸蒲州竇秦王擊王世充河南州郡多降冬竇建德攻羅將宋金剛幷晉皆平武周走入突厥而死秋逺賊師高開道降藝圍幽州不克懷四將兵十萬救洛陽夏秦春秦王圍洛陽竇建德建德餘黨劉黑闥起兵漳南河南北多應之王擒建德於虎牢王世充降河南北悉平秋江漢嶺外悉平高開道復叛冬李靖自䕫州水道襲蕭銑克之五劉黒闥天夏漢東王厥還兵斬兖州賊徐圓朗夏黒闥復引突厥造元春秦主破黒闥於洛水上黒闥亡入突及秦王擊却之冬太子討黒闥斬之杜復威入冦河北皆應之秋突厥圍幷州太子建成朝羅藝入六太子秦王屯幷州以備之三月罷宋輔公祐天明元秋突厥冦朔州開道引突厥冦幽州輔公祐反稱帝高申甲七部將所殺李春高開道為其二可汗舉國入冦至豳州秦王以百騎往面數靖討斬輔公祐江東悉平秋突厥頡利突利結和而退其負約不戰八禦之不利秦王出屯蒲州突厥秋突厥頡利冦朔州將軍張瑾退九並行太子以秦王功高與齊王謀殺之夏太子秦王齊王元吉皆有寵敎令與詔勅子幽州都督廬江王援反誅秋帝傳位於秦王射殺太子及齊王於殿中詔以秦王為大至便橋太宗親以數騎往責之結盟而退太子自稱太上皇突厥頡利自涇州入冦司馬温公稽古錄卷之十四
