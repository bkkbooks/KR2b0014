body:
  text: 臣光曰慕容氏世爲君長保有海隅及廆始大屬晉室版蕩諸夏之民皆襁負歸之廆拊循勞來收其髦俊以賛國政逺奉王命以示大順務農積榖秣馬厲兵以窺鄰國之釁故能斬將刈旗大啓土宇皩承其遺烈恢大前功於是吞段遼并宇文俘高麗翦夫餘蠶食幽并而與强趙為敵矣及石氏内亂儁乗時而動驅厲精蓄鋭之兵以掃離散土崩之衆無不順風而靡遂走王午服張平戮段龕禽冉閔左縈右拂而幽并青冀悉定矣暐之立也太宰恪佐之内脩政事養士愛民外開封疆威行鄰敵及評為政妬宗室勲賢之人逐之以資鄰敵君闇臣鄙以當符堅王猛之威安得不亡乎簡文帝昱咸安元年伐氐氐主楊纂降冬桓温春桓温斬袁瑾夏秦符雅昱為帝又殺武陵王晞詔加温為丞相入朝用郄超計廢海西公立丞相㑹稽王二秦春相陽平公融為冀州牧秋立皇子昌明為太慕容桓據遼東叛討平之夏秦以王猛為丞温望帝臨崩禪位見遺詔不悦疑侍中謝安子帝崩遺詔以桓温輔政如諸葛亮故事為之王坦之孝武帝明昌寧康元年謝因覺之乃止還屯姑熟疾春温入朝伏甲欲誅王謝冬秦将楊安攻拔成都益州郡縣皆入于秦甚急求九錫安故緩之秋温卒九錫遂不行戍甲二圍成都秋秦鄧羗擊斬之夏蜀民張育楊光率巴獠三疾病秦主夏秦王猛下勿加兵慕容姚氏我之仇讎必為後患宜早為之禱於南郊猛曰晉雖僻逺若王謝在願陛秦人巷陌皆哭除之秋猛卒大元元鎮姑熟夏秦茍萇擊春以桓冲為車騎將軍其子寔君弑什翼犍以降秦人分其國為二部張天鍚天鍚岀降冬秦符洛擊代王什翼犍狐部久之國人共迎立之改稱魏徙都平成使劉庫仁劉衞辰分統之什翼犍子珪奔猛二帝珪元魏道武三秋帝入新宫春作新宫四茍萇入冦抜襄陽春秦長樂公丕及師大震兖州刺史謝玄攻旰𣅿秦師遁去虜中郎将朱序夏拔盱眙虜將軍毛操京五融於中山秦主使步兵校尉呂光擊之光生禽夏秦征北將軍行唐公洛反於和龍圍陽平公徙之涼州秋秦王召陽平公為中書監以子長洛於中山進攻薊斬洛兄北海公重秦主赦洛冀州牧樂公丕為六州大水夏楊荆江七秦主皆赦不殺秋秦東海公陽等謀反慕容垂勸之權翼曰晉未有大釁謝安桓冲皆秦呂光將兵七萬取西域秦主議入寇姚萇羯布滿畿甸今傾國逺去無後患乎皆不聽江表偉人未可也符融曰陛下寵育鮮卑羗八軍謝石謝玄等大破秦師於淝上獲符融秦兵夏桓冲伐秦秋秦主歩騎九十萬入冦冬將町王翟斌反符丕使垂討之垂亦反鮮卑乞死者十八九秦主使慕容垂安輯河北句據隴石伏國仁申甲九萇白雀元春桓冲卒以謝安燕城武帝垂元後秦武眧帝姚弘起東關慕容冲起平陽夏姚萇討泓軍都督十五州慕容垂自稱燕王圍鄴慕容慕容泓爲冲所殺秋冲進遍長安冬慕容暐死敗畏誅亦反吕光擊拔龜兹禇太后崩之救鄴將軍劉牢十乞伏國仁建義元春慕容冲稱前秦哀平帝丕天安西秦宣烈王將軍任權攻秦益州取之慕容冲攻秦主留帝夏劉牢之及慕容垂戰於鄴牢之敗還安秋姚萇執秦主殺之謝安救秦聞秦敗太子宏守長安岀奔五將山宏亦尋走冲入長稱帝于鄴吕光自西域還至姑臧聞秦王敗自乃還安卒帝弟㑹稽王道子代安秉政符丕州剌史稱爲涼十一興涼懿武帝吕光太安魏登國元前秦高帝登太初後秦建初燕䢖稱帝夏慕容永稱帝於長子冬前秦主兵春燕王稱帝慕容冲爲其將所殺姚萇于燕前秦符登稱帝於隴東敗走東垣將軍馮該斬之鄴降十二以乞伏國春前秦主世子太豫起兵攻吕光光遣其將彭晃擊斬之仁爲苑川王秋立子德宗爲太子張天鍚秦雍州剌史徐嵩殺之冬後秦將姚方成擊前十三歸太初元春西秦武元王乾河南王冬前秦主圍後秦主營不充謝玄卒夏乞伏國仁卒弟乾歸立稱十四麟涼界自将攻安定秋後秦主襲大界獲其輜重及嘉元春呂光稱涼帝前秦主留輜重於大禮帝荒耽酒色委政道子道子亦荒淫國政毛后冬以㑹稽王道子為丞相揚州牧加殊亂殽十五夏後秦將軍魏揭飛反時前秦主猶在春以中書令王恭都督青幽等五州臣光曰石氏之强也氐羗之屬無不内徙而為臣一朝失馭而角立為患理固然也符洪徘徊枋頭有虎據中原之志以犍為不肖然猶西取關中幷姚襄却桓温遂為强國堅以雄才英略加之慈惠忠信舉王猛於布衣任之以政勲舊不能離親戚不敢妬非至明能如是乎故能吞强燕舉河西兼巴蜀包漢沔俘索頭屠龜兹奄有天下十分之九五胡之盛未有如堅者也觀其舉百萬之衆以攻晉先為之除宫築第以待其君臣意以為羅中之禽往無不獲也及一戰而敗遂顛沛不振昔之俘囚降虜皆起而為敵數月之間冦讎徧於四方戎馬塞於郊甸以至身死人手子孫殄滅何哉論者咎堅寵信羗與鮮卑而伐晉彼皆睹其迹而言之未逹其本也要之堅恃其强大易而無備此其所以敗亡也夫西秦王涼遷於樂都冬乞伏乾歸攻殺崇自稱二十寳擊魏魏人徙春燕主使太子破之始貳於涼燕師還不設備冬魏王襲擊河西以避之秋秃髪烏孤擊乙弗折掘二部禿髮烏孤卒弟利鹿孤立冬桓玄擊殺殷仲夏元顯始輔政秋慕容德攻拔廣國都之恩䧟三吳青兖州刺史劉牢之破之涼懿武殂堪奪其荆州又殺楊佺期奪其雍州妖賊孫兄纂殺紹自立太子紹立紹庻四建和西涼武昭王李暠庚子南燕建平南涼康王利鹿孤孫恩復入餘姚殺謝琰秋秦主擊乞伏乾歸元春涼主弟弘反死夏李暠自稱涼公降秦慕容德稱帝乾歸奔南涼既而五公隆神鼎北涼武宣王沮燕昭文帝熙光始涼建康秦至河東夏孫恩冦丹徒護國司馬劉裕擊渠蒙遜永安元春秦遣乾歸還苑川魏伐涼吕隆弒涼主自立秋燕叚輿作亂燕主誅之盧水胡沮渠蒙遜殺段業自稱涼州牧立燕主叔父熈冬元顯欲誅桓玄玄反𬒳傷而殂太后欲立長君乃廢太子定而元興元為前鋒討玄玄與牢之連和元顯兵敗死玄南涼景王傉檀弘昌元春元顯以劉牢之之自殺秃髪利鹿孤卒弟傉檀立夏秦姚徙道成於成安自為丞相録尚書奪牢之兵牢州刺史魏主大破秦兵碩伐涼呂隆降復以為涼二冦東陽劉𥙿擊走春孫恩妹婿盧循秦冬桓玄簒位國號楚遷帝于潯陽之秋呂隆畏秃髪傉檀之逼納地於辰甲三玄大破桓謙於覆舟山玄劫帝走江陵裕以司魏天賜元春劉𥙿起京口劉毅起廣陵以討八州夏裕推武陵王遵承制封拜何無忌攻徒王謐錄尚書立留臺謐以裕為都督揚徐等州别駕王康産奉帝返正於江陵桓振桓謙襲拔潯陽劉毅及玄戰於崢嶸州玄敗走死荆靈谿盧循䧟廣州殺康産擊破劉毅於義熙元上西涼建初元南燕北海王超太反自稱成都王桓振復入江陵尋敗死劉𥙿春劉毅拔江陵振謙走帝還京師蜀人譙縱髮傉檀爲涼州剌史冬李暠徙治酒泉南出鎮京口夏以盧循爲廣州剌史秦以秃兄子超立燕獻武殂二人與之秦主始崇尚佛敎廣建秋南燕主稱藩於秦以請其母秦者十室而九塔廟州郡事佛三惠懿帝高雲正始元夏秦夏武烈帝赫勃勃龍升後燕秃髪傉檀破之秋燕主熙出塟其后符稱氏安北将軍赫連勃勃據朔方叛自大夏天王擊子高雲為燕主執熙殺之冬王謐卒秦主將軍馮跋先有罪亡在外潛入龍城立望之養留太子熾盤監其國召乞伏乾歸為尚書四裕為揚州刺史鋅尚書南涼嘉平元春以劉盡而還冬秃髮傉檀初稱涼王夏将軍劉敬宣討譙縱至黄武糧五成帝馮北燕文燕冦淮北夏劉裕伐南燕乞伏乾歸逃歸苑跋太平西秦更始魏明元帝嗣永興元春南姚强還冬燕婎班弑其主雲馮跋誅班因自川秦姚强救南燕㑹夏王勃勃敗秦兵秦追弑國人殺紹立紹兄嗣立魏道武為其子紹所六南燕主超斬之春劉裕拔廣固執臣光曰慕容垂以美才茂功不容於昏亂之朝自歸於秦秦主以國士遇之淮南之役不乗人之約亦足以少償其愧矣垂之去燕燕人如失其父兄及其還也人向之如趨市故數年之間掉馬箠從容而取故業自然之勢也寳不克負荷開門延敵坐而待攻又不能固守中山無故遁逃朞年之間蹙國待盡子弟親戚翦為仇讎進退失據卒隕其身何其愚也盛以孺子孤窮自投於仇人之懷終踞其喉而剚其腹以成其志而復其位自非智勇過人能如是乎不幸遇盗而夭熙以一婦人之故遂亡其國彼何人哉徳以燕室至親居方伯之任總南夏之師敵至不能禦民散不能安君窮不能救盡䘮其田而奪人之田以居之其智仁勇皆無足稱者然禮賢納諌以保全青土可謂善敗者不亡矣超以聲伎之故輕犯强敵又不能用善謀自取滅亡惜哉循乗虛入冦殺何無忌取江州夏劉裕還京沮渠蒙遜敗南涼王於窮泉南涼遷樂都盧秋沮渠蒙遜敗西涼世子歆於馬廟秦苟師盧循進至蔡州僕射孟昶自殺循退屯潯陽之盧循冦荆州道規又破之冬劉裕遣将林桓謙㑹譙縱之師冦荆州刺史劉道規擊斬破盧循於左里循走孫處自海道取番禺裕七南涼王遣子為質以春沮渠蒙遜攻南涼嵩自殺沮渠蒙遜伐西涼西涼世子歆擊破和夏盧循死於交州冬秦楊嵩伐夏軍敗之八裕爲荆州剌史西秦乞伏公甫弒其主比涼玄始西秦王熾盤未康元夏以劉多附之秋𥙿遣其將王鎭惡襲弒之冬沮渠乾歸世子熾盤討斬之劉毅心不服劉裕衣冦自稱西河王蒙遜遷姑臧九史諸葛長民以朱齡石為益州夏鳳翔元春劉裕殺豫州刺斬譙縱梁益皆平刺史秋齡石擊寅甲十唾契汗乙弗叛南涼魏神瑞元夏南涼臺南涼王無所歸乃降西秦西秦鴆殺之魏王自擊之西秦王乗虚襲樂郡虜南涼世子武于秦王迎后十一刺史魯宗之救之夏休之宗之兵劉裕擊荆州刺史司馬休之雍州秦敗于十二以秦師冦襄陽姚興殂子泓立秦主泓永和魏太常元秦魯宗之檀道濟王鎮惡趣許洛沈田子入武關冬大破秋劉裕伐秦僕射劉穆之摠攝内外秋遣將軍裕脩復陵廟置守衛詔加裕九錫裕九秦兵於桓谷秦主弟豫州牧洸以洛陽降十三朱齡石擊却之斬阿薄于秋王鎮惡入長安西涼王歆嘉興元夏魏人師於河上以救秦泓斬之獲秦主臣光曰姚弋仲以西羗酋帥立於二石之朝以鯁直勇果著名而保其耆艾豈非忠信之福也襄才氣豪邁兼資文武有孫策之風然適晉不容攻秦見殺亦其命也萇藉父兄之烈值符氏之衰鳴鼓中原醜類雲集不能報舊君之德乗其窮約而弑之其不仁甚矣興承父之志奄有關中涼夏諸豪靡不率服然處攻戰之世不能收羅英俊以治國訓兵而專率臣民譯經拜佛及泓繼世骨肉内離冦敵外侵遂亡其族雖泓器業之不肖亦興貽謀之未逺也義真鎮長安使王脩王鎭惡沈田子等輔之而裕欲留長安經略趙魏冬劉穆之卒乃留㓜子王暠殂還西涼十四弘之擊却之沈田子殺王鎮惡夏昌武元春夏王冦長安傅州召義真還夏王追破義真於青州擊朱齡石義真殺田子又殺王脩冬宋公以朱齡石鎮雍崩宋公立皇弟琅邪王德文於潼川虜之遂陷關中帝恭帝文德元熙元年夏王勃勃稱帝秋劉裕徙夏真興元春進宋公爵為王陽鎮壽宋武帝裕永初元年春沮渠蒙遜稱藩于夏西涼李恂永建西秦建弘元晉禪封晉帝為零陵王夏晉帝召王入輔遂受臣光曰晉室既衰中原雲擾戎狄腥膻之氣彌漫河洛薰烝岱華宮闕蕪没陵廟隳焚元帝以宗室疎屬遁居江表天下士民有思晉者皆褁糧而歸之國於荆揚之間子孫相承不絶如綫獨明帝英武克清大憝不幸享國不永自餘孱弱孤危外陵内叛寄命於虎狼之口幾遇吞食者數矣然卒能保其位號宗廟血食百有餘年何哉有王導卞壼温嶠陶侃謝安謝幼度為之臣也羣賢