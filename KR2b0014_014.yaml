front:
  text: 司馬温公經進稽古錄卷之十四晉哀帝丕隆和元年北伐不許秋桓温表求興寧元溫大司夏進桓天錫殺玄靚而自立馬都督中外涼張子甲二疾禇太后復覽萬帝因餌長生藥有幾三弈燕太宰恪攻拔洛陽虜将軍沈勁秦建元元春帝崩太后立帝弟琅邪王海西公弈太和元年温移鎮姑熟夏旱秋桓二恪卒臨絶謂夏燕太原王可以少安不然二虜將有窺窬之志秋秦并燕主曰呉王垂有文武長才陛下若任之以國母弟雙皆舉兵反州牧晉公栁及秦主三威世分討柳雙秋皆斬秦主使王猛及將軍楊之四傅評欲奔和龍呉王垂自請擊温大破温夏桓温伐燕破燕將慕容厲於黄墟燕太害之冬垂奔岀秦燕叛秦秦王猛鄧羗攻燕洛於枋頭㑹秦兵救燕温遂遁還評忌垂有功欲於西中郎將袁真陽救之桓温歸罪五尋卒子瑾代之夏秦王春真據夀陽叛降於秦之秋桓温圍夀陽秦王猛拔晉陽冬猛大破評猛將兵六萬伐燕燕太傅評將兵三十餘萬禦助之鄴潰燕玉奔昌黎秦人追而獲之於渭源遂進圍於鄴秦主自將兵六十萬
