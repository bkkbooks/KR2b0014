front:
  text: 司馬溫公稽古錄卷之八
  hash: sha256:cec794b891ac6b011d4670ae64d9db54c597db52a6ee546f65076bd12914de33
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_SBCK_008-1a}
body:
  text: 周上周文王姬姓曰昌其先亦出於高辛氏帝嚳生弃佐禹播時百彀堯封之邰切地來舜命爲后稷后稷薨子不窋立律切窋行夏后政衰棄稷不務不窋用失其官自竄於戎狄之間不窋生鞠鞠生公劉能脩后稷之業務耕種行地宜行者有資居者有積民賴其慶多徙而歸保焉故詩人歌樂思其德公劉生慶節國於豳今邠州豳與邠同慶節生皇僕皇僕生羌弗羌弗生毁隃俞音毁隃生公非公生高圉高圉生亞圉亞圉生公叔祖賴公叔祖賴生古公亶父古公亶父是爲太王復脩后稷公劉之業積德行義國人皆戴之狄人攻之事之以皮幣犬馬珠玉皆不得焉乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞有民立君將以利之君子不以其所養人者害人民之在我與其在彼何異民欲以我故殺人父子而君之吾不忍也二三子何患乎無君我將去之乃與私屬去邠踰梁山邑于岐山之下居焉故號曰周豳人曰仁君不可失也從之者如歸市旁國民亦多歸之古公乃貶戎狄之俗營築城郭室屋而邑別居之邑治也分別而爲民歌樂之肇基王迹古公長子太伯次仲雍次季歷生昌昌有聖德在傅弗勤處師弗煩不聞亦式不諫亦入過失不待人諫言巳先入皆言其生知道義雖所未樂率意行之冥合於法式古公知其必興周家欲立季歷以傳昌太伯仲雍知其指自竄於句切古侯呉以讓季歷太伯猶服端委貌周之禮服玄委玄端委仲雍遂從夷俗斷髮文身以示不可用古公薨季歷立是爲王季王篤於行義諸侯順之王季薨昌立是爲文王都豐文王徽柔懿恭懷保小民以美政恭民故民安之以美和民道故民懷之發政施仁必以鰥寡孤獨爲先無夫曰寡老而無子老而無妻曰鰥老而者天下之窮民而無告者曰獨㓜而無父曰孤此四自朝至于日中􅉴不遑睱食用咸和萬民慮政事用皆和萬民從朝至日映不睱食思文王爲殷西伯下諸侯文王爲西伯掌西方諸侯古之王者擇諸侯之賢者分掌天于時西有昆夷之患北有玁狁之難狁音允玁音儉文王以天子之命命將帥遣戍役以守衛中國遠近之人皆畏而愛之則而象之諸侯大􅀖畏其力小􅀖懐其德虞芮之君相與爭田乆而不平欲質於西伯乃相與朝周入其境則耕者讓畔行者讓路入其朝士讓爲大夫大夫讓爲卿二國之君慙而相謂曰我等小人不可以􅂂君子之庭乃相讓以其所爭田爲閑田而退天下聞之而歸周者四十餘國時紂方無道諸侯多去紂歸文王紂怒囚文王於羑里七年諸侯皆從之囚紂於是懼而歸之文王乃整兵以誅諸侯之不道者伐崇伐宻伐阮伐共伐黎皆勝之文王爲諸侯四十二年更稱元年三分天下有其二以服事殷九年崩壽九十七太子發立是爲武王武王三年喪畢十一年觀兵孟津諸侯不期而㑹者八百餘人皆曰紂可伐武王曰未可退而增德及紂殺比干囚箕子十三年武王帥諸侯復伐紂與紂戰于牧野克之遂滅紂一戎衣天下大定乃反商政政由舊王善政用商先釋箕子囚封比干墓式商容閭紂所貶退式其閭巷封益其土商容賢人憑軾小俛曰式以禮賢在車上散鹿臺之財發鉅橋之粟積之紂所以賑貧民府倉皆散發大賚于四海而萬姓悅服責救乏施舍巳天下皆悅仁服德賙無所謂周有大賚王還至豐乃偃武脩文載戢干戈載櫜弓矢也音高戢聚櫜韜歸馬于華山之陽放牛于桃林之野示天下弗服復乗用示天下不興滅國繼絶世舉逸民垂拱而天下治徙都鎬切戸老封紂子武庚祿父於殷以守湯祀命王弟管叔霍叔蔡叔監之又封姬姓之國五十三通道干爲山是以聖人乾乾日昊愼終如始八尺曰仞喻向成也未成一簣猶不武王卽位四年克商克商七年而崩壽九十三成王誦立成王年十三周公爲冡宰攝行天子事管叔蔡叔霍叔乃流言於國曰公將不利於孺子遂奉武庚祿父淮夷作亂周公帥師東征居東二年罪人斯得殺武庚祿父及管叔囚蔡叔于郭鄰降霍叔于庶人滅淮夷三年而歸卜宅洛邑爲王城使四方入貢道里均又作下都於瀍水東延切瀍澄命曰遷殷頑民教治之然天子猶往來常居鎬京曰宗周夏德既衰戎狄内侵九州之地寖滅周公復唐虞之舊域斥大九州之境王畿之外分五服爲侯甸男采衛蠻夷鎭藩九畿周公攝政凡七年制禮作樂致太平乃復政成王而告老王曰公無困我哉留周公爲太師與召公共輔王室周公作無逸以戒成王曰君子所其無逸念德無有逸豫君子之道所在先知稼穡之艱難乃逸則知小人之依乃謀逸豫則知小人之所依稼穡農夫之艱難事先知之怙又作立政曰拜手稽首告嗣天子王矣可不言不愼宅乃事宅乃牧宅乃凖兹惟后矣汝事謂六宅居也居謂士官皆得其人則此惟居矣言立政在官人卿掌事者牧牧民之官謂九州之長凖平法者文王武王克知三有宅心灼見三有俊心能知文武之人可以任此三官者之心所以能立政灼明擇人居此事牧凖三官之心又能灼然見俊德見左右攜僕百司庶府及百官有司主劵契藏雖左右攜持器物之僕擇人吏亦皆文王惟克厥宅心乃克司牧人以克俊有德遺末乃能司牧人用能俊有德者文王惟其能居心務大略細守本文王罔攸兼于庶言庶獄庶愼惟有司之牧夫所兼知文王無愼擇有司牧夫而巳勞于求才逸於任賢於毁譽衆言及衆刑獄衆所當愼之事惟是訓用違庶獄庶愼文王罔敢知于兹用違法衆獄是萬民順法知於此委任賢能而巳衆愼之事文王一無敢自又作周官命太宰司徒宗伯司馬司宼司空六卿各帥其屬分掌天下之務成王即政三十年崩子康王釗立遥切釗之康王脩文武成王之業四海治安成康之世􅆿措不用者四十餘年康王崩子昭王瑕立昭王時王道微缺昭王南征濟漢沉没不復周人諱之不赴告子穆王滿立穆王將征犬戎祭切側介公謀父曰先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則無震也震懼故先王有威讓之令有文告之辭布令陳辭而又不至則增脩於德而無勤民於遠王不聽得四白狼四白鹿以歸自是荒服者不至穆王肆其心也肆極周行天下將皆必有車轍馬跡焉祭公謀父作詩以止王心曰思我王度式如玉式如金取其金玉重堅􅄱民之力而無醉飽之心其力任如金冶之言國之用民當隨之力去其醉飽過盈之心器隨器而制􅄱故言􅄱民王爲之少息在位五十五年崩子恭王繄扈立司馬溫公稽古錄卷之八
