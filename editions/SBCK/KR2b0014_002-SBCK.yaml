front:
  text: 司馬溫公稽古錄卷之二
  hash: sha256:63e6fda65f4f1e890a33c0e72d4209d38f2ae05292370b5b76ecffe90240ed23
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_SBCK_002-1a}
body:
  text: 陶唐氏帝堯祁姓曰放勛帝嚳之子初封於陶後攺封唐故曰陶唐氏年十六以唐侯升爲天子都平陽州今晉堯欽明文思謂之明經緯天地謂之文道威儀表備謂之欽照臨四方謂之思德純備允恭克讓光被四表格于上下能光充允信克其名聞充溢四外至于天地也格至也既有四德又信恭能讓故克明駿德以親九族高祖下至玄孫等列旁支之親大學所駿大也言堯能脩明其大徳以睦上自後家齊也謂身修然九族既睦平章百姓九族之外臣民百姓國人也言明又著命羲和曆象日月星辰敬授人時後羲氏重黎之㑹十二次曆象其分節謹記天時以授人也和氏世掌天地四時之官星五星辰日月所允釐百工庶績咸熙廣也言定四時成歲曆以告釐治工官庶衆績功咸皆熈百官衆功皆廣時授事則能信治時洪水爲災堯咨四岳建百唐虞度百事四岳分掌四時及四岳諸侯之政官内有百揆四岳如今之宰輔百揆掌揆舉能者使治之四岳舉鯀切古本堯知鯀頑嚚傲狠不可用口不道忠信之言爲嚚心不則德義之經爲頑四岳固請試之堯屈已從之巳從人所謂捨鯀治水九年功用弗成堯老有子丹朱不肖欲遜位于四岳四岳辭以不德堯使明舉有明德之人搜􅀭在側陋者衆乃曰有鰥在下曰虞舜河中府虞鄉縣媯水之汭舜舜年三十未娶故曰鰥虞今也所居帝曰俞予聞如何舜而不用亦任天下之俞然也然其所舉堯聞自任也耳目不岳曰瞽子父頑毋嚚象傲能分別善惡舜父有目不之字傲慢不友言皆惡故時人謂之瞽瞍象舜弟克諧以孝烝烝乂不格姦使進進於善道以至自治不至陷入於姦諧和烝進也言能以至孝和諧頑嚚昏傲無惡不化惡盛德之至帝曰朕其試哉試之者將授以大舜至德升聞堯獨不重愼任不得女于時觀厥刑于二女於是以二女妻女妻刑法也堯女以治家觀治國舜觀其法度接二􅁵降二女于媯汭嬪于虞下降帝女之心使行婦道于虞氏嬪婦也舜爲匹夫能以義理下帝曰欽哉能脩歎舜則其所能者大矣巳行敬以化帝女於是登舜於朝歷試諸難以試難事治民之既有大功遂使攝行天子事堯在位一百一年壽百一十七歲而崩百姓哀慕如喪考妣舜封堯後於唐爲虞賔司馬溫公稽古錄卷之二
