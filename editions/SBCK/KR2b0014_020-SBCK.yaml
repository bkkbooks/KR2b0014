front:
  text: 司馬温公稽古錄卷之二十
  hash: sha256:6e647cb016d733aea09d2e476c866ff5647feaee154b24b9a5a2c3d006ec61af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_SBCK_020-1a}
body:
  text: 慶曆元言乞留鄜延一路母出兵以招元昊夏正月壬戌遣使十五路安撫范仲淹昊寇渭州任福大敗於好水川福及將佐死者竦言如此則涇原兵難以獨出議未決二月元軍合十餘萬人七月壬戌置萬勝軍二十指甚衆己亥豫王昕薨初令諸州募置宣毅圍豐州乙未陷之殺知州王餘慶初令陜西揮戊辰元昊圍麟府州八月退陷寧逺寨又十月初治河北諸州城甲午罷陜西都總管行鐵錢未幾幷河東亦行之聞契丹謀入寇延四路命知秦渭慶延州者領之十一月丙經略安撫招討使分緣邊為秦鳳涇原環慶鄜大赦改元寅上祀圓丘二未詔選河北强壯為義勇三月二月初令河北大脩邊備乙保捷凡一百八十五指揮乙巳契丹遣其臣乙夘選河東鄉弓手為義勇敕陜西鄉弓手為等減省浮費庚辰遣富弼使于契丹五月蕭特劉六符來求關南地四月戊寅命賈昌庚申置京東兩路安撫使命知青鄆州者領之戊午以大名府為北京契丹大集兵於幽州増所遺銀絹各十萬兩匹九月乙丑契丹遣其七月癸亥遣富弼再使契丹不與關南地歲月元昊寇鎮戎軍己夘葛懷敏將兵出禦之壬臣耶律仁先劉六符來致誓書脩好如初閏虜深入至潘原大掠而去十月詔將校戰死辰懷敏大敗於定川寨懷敏及諸將死者甚衆養之禁中妻女無依者三延奏元昊遣其臣賀從朂上書正月辛未鄂王曦薨癸巳鄜通和朝廷以其名分未正遣著作佐郎邵良佐自稱男邦泥定國兀卒曩霄上父南朝皇帝請戊寅詔轉運使皆領按察使歲具官吏能否與從朂俱至其國更議之五月丁夘朔日食虎翼卒王倫等殺忻州廵檢使朱進為羣盜轉以聞丁亥初置武學於武成王廟京東奏母喪不以文武品秩高下竝解官持服閣門掠京東淮南州縣七月甲戌初聴羣臣遭父丁夘上召知雜御史以上於天章閣問以禦戎祗候傅永吉等追討王倫至和州斬之九月知軍韓綱帥衆亡趣興元築順德軍水洛城之䇿十月戊戌光化軍宣毅軍校邵興等逐官陳曙等擊邵興於水擒之十一月丙寅上清宫火供奉申甲四丙子正月州及鎮寧州殺官吏三月乙亥詔諸州皆立南環州進士歐希範立蠻酋蒙趕為王攻陷本始遣使稱臣自號夏國王常寧蠻鄧文志等學以錫慶院為太學尋罷之五月丙戍元昊丁未開寳寺塔災七月癸未契丹遣使來寇桂陽監殺都監廵檢六月文志等詣潭州降殺知州通判奉都監韋貴為主乗城拒守命田告以舉兵討元昊八月甲午保州雲翼軍士况阬其難存者四百餘人朝廷許元昊稱夏况招諭且發旁近兵討之甲寅城中兵皆出降獻誓表十月庚寅賜詔荅之契丹駙馬劉三國主歲賜銀絹茶綵合二十五萬五千元昊乃奏院蘇舜欽等坐宴㑹除名館閣連坐者甚衆嘏來奔甲午詔械送還之十一月甲子監進元昊為夏國主更名曩霄築原州細腰城壬午上祀圓丘大赦十二月乙未冊命五兵京東西淮南兩浙荆湖福建諸州宣毅過三正月罷河東陜西招討使詔選汰諸路羸弱􅂎誘歐希範蒙趕及其黨六百餘人悉屠之百人者毋得更募三月廣南西路轉運使杜以諸路按察使競為苛察罷之自真宗東封十月辛酉升章獻章懿皇后附真宗廟大赦廢庚午上始校獵于楊村十一月歐希範餘以來不復出獵直集賢院李東之言講武不可胡元徐州人孔直温等謀反誅黨唐和等寇桂陽監殺禮賔副使六朔日食三月辛巳月廣南東路奏唐和寇英韶州登州岠嵎山震十日不止十一七曆編敕正月行慶子孫十一月戊戌上祀圓丘大赦是日貝五月唐和等請降九月作廣親宅以處秦王稱東平王國號安陽改元得聖十二月壬寅詔州宣毅王則執知州張得一殺官吏據城反自以明鎬安撫河北發旁近兵討之庚戌八其太子寗令所弑國人正月辛未夏主曩霄爲宣撫使閏月辛丑彦博奏克貝州擒王則送京殺寗令立其弟諒祚丁丑以文彦博爲河北斫傷宫人捕得誅之三月甲寅上幸龍圖天師誅之親從顔秀等作亂夜殺軍校入禁中迎陽門召知制誥以下至臺諫官問之四月章閣問御史中丞以上以天下利病得失又御􅌡定州者領之六月癸酉河決商胡乙未辛􅆗初置河北四路安撫使命知大名真定府常錢一七月幷河東小鐵錢如陜西用之十初令陜西以大銅錢一當常錢三小鐵錢三當詔改明年元丁日詔河北縁邊入芻糧者加月壬午以美人張氏爲貴妃十二月乙丑朔北大水饑人相食流殍甚衆給南鹽謂之四法是歲河皇祐元朔日食正月甲午乙巳廣南西路奏廣源州蠻寇邕州十二月三月己未契丹遣使來告以再討夏國九月聽還農是歲簡汰天下羸兵無慮入萬人壬戍詔陜西保捷年五十以上及短弱者皆二信三番使臣丁未廣南西路奏交趾攻廣源春男子冷青詐稱皇子伏誅五月丙申罷國天地祖宗竝配從祀悉如圓丘大赦文武京朝州蠻酋儂智高九月辛亥上大饗明堂合祀樂官共定大樂戊辰王舉正留班諌張堯佐官各遷一資閏月丁巳詔兩府兩制太常禮太重恩命三見錢於京師如景祐法三月儂智高二月己亥詔河北縁邊入芻糧者竝給固口十月己夘朔詔解鹽聽通商請内屬弗受七月辛酉河決舘陶郭四乙亥正月四月儂智高襲陷横山寨五月乙巳朔陷邕州塞郭固河口二月又議開六塔河以分水勢沿江東下癸丑陷横州丙辰陷貴州庚申陷龔殺知州陳珙等自稱仁惠皇帝改元啓曆引兵丙寅攻廣州不克七月壬戌解圍西還攻賓州州辛酉陷藤梧封州壬戍陷康州癸亥陷端州九月戊申襲殺廣南東路鈐轄蔣偕於太平塲不克與廣南東路鈐轄張忠戰于白田忠敗死州庚午命狄青將兵討智高丁丑智高陷賔州又敗廣南西路鈴轄王正倫于館門驛遂陷昭李德政請發兵二萬􅂇官軍討儂智高十一甲申復入邕州十一月壬寅朔日食交趾曙於金城驛壬辰王洙等報新樂月壬申朔智高敗廣南西路鈴轄陳五未詔止正月丁㑹靈觀火戊午狄青與儂智高戰於歸仁鋪交趾毋出兵己酉狄青至賔州斬陳曙丁巳祥城占渭州青唐􅆧惡之攻破廣吳嶺堡圍啞大破之智高棄邕州奔大理陜西轉運使范宗真宗御容於滁幷澶三夘神御殿閏月戊辰兒峽寨命劉渙將兵擊破之甲子奉太祖太十月丙申朔日食十一月己巳上祀圓丘朔詔自今内侍黄門以上毋得過一百五十人税永減三分十二月丁酉廣南西路奏􅀗儂大赦以曹滑陳許鄭州為輔郡開封府田須年五十以上歷任無贓私罪乃得為之智高母及子弟癸丑詔内侍都知押班午甲至和元成皇后三月庚辰改元四月甲午正月癸酉貴妃張氏薨丁丑追冊為温丑祥源觀火朔日食辛二獻求易御容以代相見篤兄弟四月契丹主遣使以其􅀞像來衙前儂智高死於大理六月乙巳誅其母及之情辛亥初罷諸鄉里正豫以貲産排鄉户辰州蠻酋下溪州刺史彭仕羲之子師寳來奔子弟八月己丑契丹主宗真卒子洪基立不克自是仕羲數入為寇十月癸丑詔本路發荆湖北路轉運使李肅之等以為鄉導擊仕羲官爵十二月戊子命殿中丞李仲昌開六塔兵討之李德政卒十一月乙亥授其子日尊横隴故道渠導河入嘉祐元赦二月甲辰小瘳御延和正月甲寅朔上不豫甲子大悉東入六塔是夕復決如故自是朝廷但治西殿四月壬子朔李仲昌等塞商胡河北流使罷乾元節奏䕃恩例自餘亦省之五月京城堤以衞北京及契丹國信路不復治東堤詔門禦水江河皆溢河北水災􅀹甚八月庚戌大水折安上門關壊官私府舍命兩府分行諸天地于大慶殿大赦改元癸夘詔作木岸以朔日食罷陜西小鐵錢九月辛夘上恭謝水狹汴二西地請禁河東陜西與之和市從之五二月龎籍上言西夏累歲侵耕屈野河麟府軍馬郭恩執走馬承黄道元既而遣還月庚辰夏國寇府州敗官軍於斷道橋求管勾委審官三班舉行八月丁巳詔自今登制科壬寅初令文武京朝官毋得自乞磨勘歲滿置惠倉以備窮乏九月契丹復遣使以新者毋得引舊例超擢丁夘初以户絶田所􅀵曆令十二月戊申詔自今間歲一開舉塲初主畫像來求易御容許之十月甲辰朔初頒士高第人恩例置明經科裁損進三城西八月己亥朔日食正月戊戌穿永通河於京湖北路奏仕羲歸所掠請降十一月己丑罷官軍討彭仕羲久不克遣使招諭之庚申荆寅初令汴􅂳毋得出外江三司河渠司置都水監庚四食丁酉詔以正月丙申朔日淮茶禁聽民自賣通商􅀵税罷十三山塲六􅅦雪寒遣官賜京城貧民錢二月己巳詔開江校舘門書籍癸未詔陜西大銅鐵錢竝當常務庚午廣南西路奏交趾寇欽州命官編十月癸酉上祫饗太廟大赦是歲初以諸錢之二癸酉詔以柴氏子為崇義公奉周祀用餘田賦貧民耕種坊監及諸軍牧馬所五流入金赤河四月丙春韓䞇穿二股渠分河六月邕州蠻引交趾兵入寇知唐州趙尚戍詔均天下田税五月丁酉置寛恤民力司申初置陜西鹽馬司乙酉罷提㸃刑獄武臣寛始勸民墾闢荒田諸路民多歸之八月甲六出身庚戍詔禁契丹於界河内捕魚六五月丙戍賜諸路所敦遣行義之士顏復等壬辰以太宗曽孫右衛大將軍岳州團練使諱月壬子朔日食九月丁丑城故豐州十月固辭不受知宗正寺七四月壬午行嘉祐編敕八月丙正月乙亥詔以太祖定配圓丘丑始入宮九月辛亥上大饗明堂祀昊天上子詔以右衞大將軍宗為皇子復固辭不許辛廣南西路奏火峒蠻儂宗旦等請内屬乙未帝以真宗配悉去圓丘從祀大赦十月乙酉諸路常平倉為糴本詔以錢一百萬緡賜八辛未崩于福寧殿四二月癸未上不豫三月癸酉大赦文武京朝官各遷一資乙亥上不月壬申皇子即皇帝位遺詔尊皇后為太皇后府奏事己亥立皇后高氏五月戊辰上御豫己夘詔請太后權同聽政御内東門小殿兩六歲一遷官至議諌止京朝四歲一遷至前行月九月壬子朔日食癸亥初令待制以上任及有功若特恩皆不用此法夏國寇大順郎中止卿監以七十為定員有缺則補其擢公齎詔責之夏主諒祚謝罪稱邊吏為丁城柔逺寨十月癸未遣西京左藏庫副使何次十一月戊午上不豫十二月壬寅立頴王亥詔自今三年一開舉塲命郭逵宣撫西邊一千二百九十餘萬口二千九百餘萬諱為皇太子癸夘赦天下是歲天下户四月正賜名壽聖丁巳上崩于福寧殿太子即皇帝位辛亥詔民間先私造寺觀及三十間者悉存之太后皇后為皇太后遺詔尊皇太后為太皇右臣於神宗皇帝時所進
