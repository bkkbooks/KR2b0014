  text: 稽古録卷二欽定四庫全書
  hash: sha256:50dd4c4b421838d6a09735c4b44c774d45e573168c4303a74fb528825a2dc3e6
  markers:
  - {type: page-break, offset: 5, content: '', id: KR2b0014_WYG_003-1a, image: WYG0312/WYG0312-0401c.png}
body:
  text: 稽古録卷三宋司馬光撰有虞氏上帝舜有虞氏姚姓曰重華其先出於髙陽氏祖曰橋牛父曰瞽瞍舜濬哲文明温恭允塞濬深哲智也其徳信充塞上下父母弟頑嚚不友日以殺舜為事舜耕于厯山以失愛於父母日號泣于旻天不敢怨懟失子道負罪引慝以事祇見瞽瞍䕫䕫齊栗齊側皆切瞽亦信而順之弟象亦化之不至於大惡至徳升聞堯既妻以女試之乃命以位舜舉伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸八元元善也使布五教于四方五教父義母慈兄友弟恭子孝亦曰五典典常也五典克從内平外成舉蒼舒隤徒回切敳五開切檮音桃戭音演大臨龎降庭堅仲容叔達八愷愷和也使揆百事百揆時序地平天成流共工驩兠都侯切三苗鯀四凶于四裔而天下咸服四門穆穆穆穆美也諸侯來朝者皆有美徳無凶人也隂陽和順烈風雷雨弗迷堯知舜功徳大成欲使陟帝位舜辭不受乃使舜攝行天子事代已巡守朝四岳諸侯舜察璿音旋璣玉衡以齊日月五星之行度以考正厯數二十有八載堯乃殂落舜服喪三年畢始即天子位都蒲阪今河中府明四目達四聰廣視聴於四方使天下無壅塞命禹宅百揆宅居也居百揆之官棄為后稷播時百穀播布也布種百穀契為司徒敷五教敷亦布也臯陶作士典五刑惟明克允刑期于無刑雖或以殺止殺終無犯者刑期於無所刑垂共工益作虞掌山澤草木鳥獸取之有時用之有節伯夷作秩宗典三禮䕫典樂教胄子擊石拊石百獸率舞簫韶九成鳯皇來儀韶舜樂名儀有容儀龍作納言出納惟允舜上循堯道下任衆賢恭已南面無為而治舜好問而好察邇言淺近之言隠惡而揚善人言惡者隠而不彰善者宣揚而行之執其兩端用其中於民臨下以簡御衆以寛罰弗及嗣賞延于世延及也父子罪不相及而及其賞道徳之政宥過無大刑故無小過誤所犯雖大必宥不忌故犯雖小必刑罪疑惟輕功疑惟重刑疑附輕賞疑從重忠厚之至與其殺不辜寧失不經經常也寧失不常之罪不枉不辜之善仁愛之道君臣常相儆戒於朝禹曰后克艱厥后臣克艱厥臣政乃乂乂治也能知為君難為臣不易則其政治益曰任賢勿貳去邪勿疑一意任賢果於去惡罔違道以干百姓之譽干求也失道求名古人賤之罔咈音佛百姓以從己之欲咈戾也專欲難成犯衆興禍故戒之臯陶曰在知人在安民禹曰知人則哲能官人安民則惠黎民懷之此帝堯所難臯陶曰亦行有九徳亦言其人有徳乃言其行事以驗之曰寛而栗性寛大而能莊栗柔而立和柔而能立事愿而恭慤愿而恭恪亂而敬亂治也有治而能謹敬擾而毅擾順也致果為毅直而温行正直而氣温和簡而廉性簡大而有廉隅剛而塞剛斷而塞實彊而義無所屈撓動必合義彰厥有常吉哉彰明吉善也其人行此徳有常不變至於彰著此真吉士可用哉三徳有家九徳之中有其三可以為卿大夫六徳有邦可以為諸侯翕受敷施九徳咸事俊乂在官翕合也能合受三六之徳而用之以布施政教使九徳之人皆用事謂天子如此則俊徳治能之士並在官兢兢業業一日二日萬㡬兢兢戒愼業業危懼㡬者動之微吉凶之先見者也王者戒懼於事微小之時制治於未亂保邦於未危則易為力已亂已危則難為功一日二日之間㡬微之事至有萬端不可不察無曠庶官天工人其代之曠空也位非其人為空官言百官代天理物不可以天官私非其才天聰明自我民聰明自用也言天因民而降之福民所歸者天命之天視聽人君之行用民為聰明天明畏自我民明威天威可畏亦用民成其威民所叛者天討之是天明可畏之效帝曰臣作朕股肱耳目言大體若身予違汝弼汝無面從退有後言我違道汝當以義輔正我無得面從我違而退有言我不可弼禹曰萬邦黎獻共惟帝臣惟帝時舉敷納以言明試以功車服以庸獻賢也萬國衆賢共為帝臣帝宜以時舉其秀者先使布納其為治之言察其是非能言者未必能行故又宜試之以事以明辨衆言之虛實必待其功効顯著然後賜之車服爵命而用之稽古録卷三欽定四庫全書稽古録卷四宋司馬光撰
