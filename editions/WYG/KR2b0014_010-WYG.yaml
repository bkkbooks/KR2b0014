front:
  text: 申共和元年魯愼公濞七齊武公夀十晉靖侯宜臼十八年秦仲楚熊勇七宋僖公舉十八
  hash: sha256:133ce59db017da6f885e39636ab9f25c612bc9028fc57417a99e7e641424211f
body:
  text: 衛僖侯陳幽公寧十四蔡武侯二十三曹夷伯喜二十四共伯和行周政厲王太子靖居于召公虎之家二晉僖侯司徒元三四楚熊勇薨弟熊嚴立甲子五楚熊嚴蔡夷侯元六七曹夷伯薨弟疆立八曹幽伯疆元九十十一陳僖公孝元十二宋惠公覸元十三十四厲王死周公召公舉太子靖而立之共和罷先是厲王無道天下蕩蕩無綱紀文章百姓離散四夷交侵宣王即位側身修行勞來安集其民至於鰥寡靡不得所錫命諸侯㑹之蒐狩天下喜於王化復行詩人美之焉甲戌宣王靖元年楚熊霜元二曹幽伯薨弟鮮立三曹戴伯鮮元四齊厲公無忌元五六晉獻侯藉元荆子熊霜薨三弟爭立仲雪死叔熊逃難于濮國人立季紃西戎殺秦仲王召秦仲子莊公資之兵使伐西戎破之遂賜以大駱犬丘之田七秦莊公楚熊紃元八九十魯愼公薨弟敖立甲申十一魯武公敖元十二魯武公以子括與戲見王王立戲為太子樊仲山甫諫曰不順必犯犯必誅是自誅王命也誅亦失不誅亦失王不聴魯侯歸而薨太子戲立齊厲公暴虐國人弑之太子赤立誅弑君者十三魯懿公戲齊文公赤元十四十五衛僖侯薨太子共伯早死立其弟和是為武公武公復修康叔之政百姓和集詩人美之十六衛武公和元十七晉穆侯費生元十八十九蔡僖侯所事元二十甲午二十一二十二魯侯伯御鄭桓公友元王封弟友于鄭魯人弑懿公立括之子伯御二十三二十四二十五齊成公說元二十六二十七二十八宋哀公元二十九楚熊鄂宋戴公立元三十甲辰三十一三十二王伐魯殺伯御立懿公之弟稱諸侯從是而不睦三十三陳武公靈曹惠伯雉魯孝公稱元三十四齊莊公購元三十五三十六三十七三十八楚若敖儀元三十九戰于千畝王師敗績于姜氏之戎王乃料民于太原樊穆仲諫曰古者不料民而知其多少若立其官使之時修其職則少多生死出入往來皆可知也又何料焉王不聴四十甲寅四十一四十二四十三四十四晉殤叔元四十五四十六王崩王能愼徽接下用賢使能羣臣無不自盡以奉其上内脩政事外攘夷狄命尹吉甫北伐玁狁方叔南征蠻荆復文武之境土周室中興焉幽王宫涅元年王沈湎淫泆讒諂並進賦役煩重百姓愁怨不以禮信待諸侯賞罰不當諸侯怨叛二晉文侯仇陳夷公說元涇渭洛竭岐山崩伯陽父知周將亡三王娶申女以為后生太子宜臼又得褒姒嬖之生子伯服乃廢申后放太子于申以褒姒為后伯服為太子褒姒驕縱王惑之詩人知其必亡刺之曰燎之方揚寧或滅之赫赫宗周褒姒滅之四陳夷公薨弟燮立甲子五秦襄公陳平公燮元六七八鄭桓公為司徒用史伯之言知周將弊寄帑於虢鄶之間九王室始騷十十一申侯與西戎攻周殺幽王於驪山之下申侯復立太子宜臼是為平王平王東徙洛邑以避狄難自是周室微弱政令不行諸侯交爭更相併吞而齊楚秦晉始大平王宜臼元年鄭武公元虢鄶叛鄭鄭武公擊之取其十邑因徙居之二三魯惠公弗湟元甲戌四五六秦文公宋武公司空元七八楚霄敖坎元九十蔡共侯興元十一曹惠伯薨子石甫立弟武殺而代之十二蔡戴公曹穆公武元十三甲申十四楚蚡冒眴衛莊公楊元十五曹桓公終生元十六十七陳文公圉元十八十九二十二十一秦文公大敗戎師收周餘民有之北至岐岐以東歸之王二十二蔡宣侯措父元二十三甲午二十四宋宣公力元二十五二十六晉昭侯伯曲沃桓叔成師元晉始亂封文侯弟成師於曲沃師服曰國家之立也本大而末小是以能固今晉甸侯也而建國本既弱矣其能乆乎於是沃盛强昭侯㣲弱國人將叛而歸沃詩人為之賦揚之水及椒聊二十七陳桓公鮑元二十八鄭莊公寤生元鄭莊公之弟段有寵於母武姜使居京祭仲曰都城過百雉國之害也不如早為之所無使滋蔓公曰多行不義必自斃子姑待之段多材而好勇不義而得衆莊公不禁詩人刺之二十九三十荆子蚡冒薨弟熊通殺蚡冒之子而自立三十一楚武王通元三十二晉孝侯平元晉潘父弑昭侯而納曲沃桓叔不克晉人立其子孝侯三十三甲辰三十四三十五三十六衛莊公娶於齊曰莊姜賢而不答嬖妾上僭夫人失位詩人為之賦碩人及緑衣嬖人之子州吁有寵而好兵公弗禁石碏諫曰臣聞愛子教之以義方弗納於邪去順効逆所以速禍也弗聴是歳莊公薨太子完立焉三十七衛桓公完元三十八三十九四十四十一齊僖公禄父曲沃莊伯鮮元四十二宋宣公薨舍其子與夷而立弟和四十三宋穆公和元甲寅四十四四十五四十六四十七曲沃伯伐翼弑孝侯晉人立其弟鄂侯四十八晉鄂侯卻元魯惠公薨太子允幼長庶子息姑攝位四十九魯隠公息姑元夏鄭太叔段將襲鄭武姜將啓之莊公使公子吕伐京太叔出奔共春秋書鄭伯克段于鄢譏失教也五十五十一夏鄭祭足帥師取温之麥秋又取成周之禾宋穆公疾召大司馬孔父而屬殤公焉使其子馮出居于鄭穆公薨殤公立桓王林元年宋殤公與夷元春衛公子州吁弑桓公而立州吁用兵暴亂與宋陳蔡共伐鄭欲以和其民衆仲曰和民以徳不聞以亂兵弗戢將自焚秋石碏使陳人殺州吁召桓公弟晉于邢而立之二衛宣公晉元春曲沃莊伯伐翼王使尹氏助之鄂侯奔隨曲沃叛王秋王命虢公伐曲沃而立哀侯于翼哀侯鄂侯之子也甲子三晉哀侯光元夏鄭伯侵陳大獲往歲鄭伯請成于陳陳侯弗許五父諫曰親仁善鄰國之寳也不聴冬鄭伯朝王王不禮焉周桓公曰善鄭以勸來者猶懼不至况不禮焉鄭不來矣四冬凡伯聘於魯戎伐之於楚丘以歸秦文公薨太子早卒立太子之子寧公五秦寧公曲沃武公稱元春魯鄭易祊田知天子不能復巡狩也六蔡桓侯封人元七夏齊侯魯侯鄭伯伐宋鄭伯取郜及防皆歸于魯八秋齊侯魯侯鄭伯滅許齊魯以許讓鄭鄭伯受而不敢有以與許叔君子以為有禮息侯伐鄭大敗而還君子知息之將亡以其不度徳量力冬魯公子翬請殺桓公將求太宰隠公不許翬懼反譖隠公於桓公而弑之九魯桓公允元春魯鄭卒易祊十宋莊公馮元春宋督殺孔父而娶其妻殤公怒督懼遂弑殤公春秋以督為有無君之心而後動於惡故先書弑其君督召莊公於鄭而立之齊魯陳鄭皆有賂遂相宋公夏魯取郜鼎於宋臧僖伯諫不聴十一晉小子侯元春曲沃武公伐翼獲哀侯晉人立其子謂之小子侯十二甲戌十三春陳桓公薨文公子佗殺太子免而代之王奪鄭伯政鄭伯不朝秋蔡人衛人陳人從王伐鄭戰于繻葛王卒大敗祝聃射王中肩十四陳厲公躍元秋蔡人殺陳佗而立桓公弟躍楚武王侵隨隨少師請追楚師季梁曰小之能敵大也小道而大淫今民餒而君逞欲不可隨侯懼而修政楚不敢伐夏北戎伐齊鄭太子忽救齊敗戎師十五冬曲沃伯誘晉小子侯殺之十六晉侯緡元隨少師有寵楚鬬伯比曰讐有釁不可失也夏楚子伐隨隨侯不用季梁之言敗於速杞楚獲少師以歸冬王立晉哀侯之弟緍于晉秦寧公薨三父廢太子而立少子出公十七秦出公元十八冬齊侯衛侯鄭伯伐魯戰于郎十九曹莊公射姑元夏鄭莊公薨公子突之母宋雍氏之女也秋宋人誘鄭祭仲而執之使立突太子忽奔衛二十鄭厲公突元冬衛宣公薨宣公生急子屬諸右公子生壽屬諸左公子宣姜與公子朔構急子公使諸齊使盜待諸莘壽子載其旌以先盜俱殺之故二公子怨惠公二十一衛惠公朔陳莊公林元二十二冬齊僖公薨襄公立政令無常鮑叔牙曰君使民慢亂將作矣奉僖公子小白出奔莒秦三父弑出公復立故太子甲申二十三齊襄公諸兒秦武公元鄭祭仲專政厲公使其壻雍糾殺之不克夏厲公出奔蔡太子忽復歸于鄭秋厲公復入于櫟王子克有寵於王辛伯曰並后匹嫡兩政耦國亂之本也莊王佗元年衛黔牟鄭昭公忽元冬衛左公子洩右公子職立公子黔牟衛公奔齊二夏蔡桓侯薨無子蔡人召桓侯弟季于陳而立之鄭昭武公惡髙渠彌彌懼冬弑昭公而立其弟公子亹秦公討三父夷三族三蔡哀侯獻舞鄭子亹元春魯侯及夫人文姜如齊申繻諫不聽齊侯通於文姜使公子彭生殺魯侯秋齊侯誘鄭子亹及髙渠彌殺之祭仲立昭公弟子儀周公黒肩謀弑王立王子克不克而死四魯莊公同鄭子儀元五陳宣公杵臼元六宋閔公捷元秋紀季以酅入于齊七夏紀侯大去其國八楚文王貲元冬魯侯齊人宋人陳人蔡人伐衛納惠公九衛惠公十二夏衛惠公入放敖黔牟于周殺二公子甲午十十一齊侯使連稱管至父戍葵丘過期請代弗許公孫無知有寵於僖公襄公絀之二人因以作亂冬弑襄公而立無知管夷吾召忽奉僖公子糾奔魯十二齊桓公小白元春齊雍廩殺無知夏魯侯伐齊納子糾桓公自莒先入秋魯師敗于乾時鮑叔使魯殺子糾而囚管仲以歸薦于桓公曰使相可也十三春魯用曹劌謀敗齊師于長勺秋荆敗蔡師于莘以蔡侯獻武歸十四十五宋閔公靳南宫長萬秋萬弑閔公及仇牧太宰督而立子游冬蕭叔大心及戴武宣穆莊之族以曹師伐之殺子游立莊公之子御説南宫萬奔陳宋人請而醢之僖王胡齊元年宋桓公御說元二夏鄭傅瑕殺鄭子而納厲公厲公入遂殺傅瑕又使讓原繁原繁曰臣無二心天之制也莊公之子猶有八人若皆以官爵行賂勸貳而可以濟事君其若之何乃縊而死秋荆入蔡三鄭厲公後元春諸侯㑹于鄄齊侯霸也四晉武公稱二十八曲沃伯滅晉冬王命曲沃伯一軍為晉侯楚滅鄧秦武公薨弟徳公立甲辰五秦徳公元秦遷于雍惠王閬元年晉獻公詭諸楚堵敖囏元二秦宣公元秋蒍國五大夫奉莊王子頽以伐王弗克出奔温蘇子奉子頺以奔衛燕師衛師伐周冬立子頺三蔡穆侯肹元春鄭伯和王室不克遂以王歸王處于櫟四夏虢公鄭伯同伐王城殺王子頺及五大夫而納王五鄭文公捷元春陳人殺其太子禦寇陳公子完奔齊齊侯使為卿辭乃使為工正楚堵敖弟惲殺堵敖而自立六楚成王惲元七曹僖公赤元冬戎侵曹曹世子羈出奔陳赤歸于曹赤莊公子也八冬晉獻公患桓莊之族偪盡殺之九衛懿公赤元虢人再侵晉甲寅十晉侯將伐虢士蒍曰不可若驟得勝於我必棄其民無衆而伐之欲禦我誰與夫禮樂慈愛戰所畜也虢弗畜也亟戰將饑十一晉獻公齊姜生太子申生大戎狐姬生重耳小戎子生夷吾驪姬生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東闗嬖五使言於公出太子使居曲沃重耳居蒲夷吾居屈唯二姬之子在絳十二十三秋楚殺其令尹公子元鬬縠於菟為令尹自毁立其家以紓楚國之難秦宣公薨弟成公十四秦成公元十五秋魯莊公疾叔牙請立慶父季友請立太子般乃酖殺叔牙公薨慶父使賊殺子般齊人立莊公之庶子開慶父叔牙季友皆桓公子也冬狄伐邢十六魯閔公開曹昭公班元春齊人救邢夏齊仲孫湫如魯省難歸桓公問曰魯可取乎對曰不可猶秉周禮禮所以本也國將亡本必先顛晉侯作二軍以滅耿滅魏滅霍賜趙宿耿賜畢萬魏十七衛戴公申元秋魯慶父弑閔公季友立閔公之兄申而誅慶父夫人哀姜與於亂故出奔邾齊人取而殺之冬狄滅衛殺懿公齊宋收其遺民立宣公之孫戴公戴公尋薨又立其弟文公鄭棄其師秦成公薨弟任好立十八魯僖公申秦穆公任好衛文公燬元春齊桓公以諸侯救邢夏邢遷于夷儀諸侯城之凡侯伯救患分災討罪禮也十九春諸侯城楚丘而封衛焉衛文公務材訓農授方馬任能衛更富昌詩人美之晉用荀息之謀以璧假道于虞以伐虢夏虞師晉師滅夏陽春秋先書虞賄故也甲子二十二十一春齊侯以諸侯之師侵蔡蔡潰遂伐楚次于陘責楚包茅不入夏楚子使屈完來盟於師冬晉驪姬寘毒于胙以譖太子申生申生自殺遂譖重耳夷吾曰皆知之二十二春晉公子重耳出奔狄王欲廢太子鄭而立寵子帶夏齊桓公以諸侯㑹太子於首止謀寧周也秋晉復假道於虞以伐虢宫之奇諫曰虢虞之表也虢亡虞必從之不聴冬晉滅虢還館於虞遂襲虞滅之二十三春晉公子夷吾出奔梁秋楚子圍許冬許男面縛請服于楚二十四秋諸侯盟于甯母鄭太子華請去洩氏孔氏齊侯將許之管仲曰不可君以禮與信屬諸侯而以姦終之乃止冬王崩襄王畏太叔帶之難不發喪而告難于齊二十五曹共公襄元春諸侯盟于洮謀王室也襄王定位而後發喪襄王鄭元年夏齊桓公㑹諸侯于葵丘秋晉獻公薨冬里克丕鄭欲納文公乃殺奚齊荀息立卓子里克又殺之郤芮使夷吾重賂秦以求入秦伯與齊納夷吾二晉惠公夷吾宋襄公兹父元晉惠公許賂中大夫既而皆背之賂秦伯以河外列城五既而不與又責里克以弑君之罪而殺之丕鄭使秦伯誘郤芮欲以出晉君而納重耳不克而死三夏戎伐京師王子帶召之也四王以戎難故討子帶秋王子帶奔齊甲戌五陳穆公欵元冬晉饑乞糴于秦秦伯用子桑百里之言輸粟于晉丕豹請伐晉秦伯曰其君是惡其民何罪六冬秦饑乞糴于晉晉侯不與慶鄭曰背施幸災民所棄也近猶讎之况怨敵乎七蔡莊公甲午元冬秦伯伐晉戰于韓原生獲晉侯以歸秦穆姬以死請乃舍之已而復歸晉侯始征晉河東置官司焉八冬鄭殺子華九夏晉太子質于秦秦歸晉河東齊桓公内嬖如夫人者六人皆有子公不用管仲之言近豎貂易牙嫡庶不明冬公疾豎貂易牙作亂立長庶子無虧公乏食而薨三月不斂蟲流出户太子昭奔宋十齊孝公昭元春宋襄公以諸侯伐齊齊人殺無虧夏宋敗齊師于甗立孝公而還冬邢人狄人伐衛衛侯以國譲父兄子弟及朝衆衆不可而後出師狄師還十一春宋襄公執滕子嬰齊夏盟諸侯于曹南用鄫子于次睢之社欲以屬諸侯諸侯不從陳穆公請修好于諸侯以無忘齊桓之徳梁伯好土功亟城而不處民疲而不堪秦遂取梁春秋書曰梁亡君自取之也十二十三宋人求諸侯于楚公子目夷曰小國爭盟禍也秋楚子㑹諸侯宋公于盂執宋公以伐宋冬㑹于薄以釋之十四春魯侯伐邾取須句秋秦晉遷陸渾之戎于伊川晉太子圉自秦逃歸王子帶自齊復歸京師秋邾敗魯師于升陘宋公伐鄭楚子伐宋以救鄭宋公不用子魚之謀冬敗于泓公傷股甲申十五秋楚成得臣伐陳有功子文使為令尹晉惠公薨冬懐公殺狐突公子重耳先自狄之衛之齊之曹之鄭之宋之楚遂之秦十六晉文公重耳宋成公王臣元春秦伯納重耳于晉殺懷公于髙梁吕郤作亂秦伯誅之夏王使狄伐鄭因以其女為后富辰諫不聴王子帶通于隗氏王絀之秋狄人奉叔帶以伐王王出適鄭處於汜叔帶居于温十七春衛侯滅邢春秋書名罪滅同姓夏晉文公用狐偃之言納王取叔帶于温殺之王與之陽樊温原攢茅之田晉始啓南陽秋秦晉伐鄭冬晉侯圍原命三日不降命去之曰信國之寳也得原失信所亡滋多十八衛成公鄭元夏齊伐魯秋楚人滅䕫宋叛楚即晉楚得臣伐宋魯以楚師伐齊取縠寘桓公子雍于縠楚申叔戍之十九夏齊孝公薨弟潘殺孝公子而代立冬楚子及諸侯圍宋宋告急于晉晉侯將救宋乃蒐于被廬作三軍謀元帥趙衰曰郤縠可説禮樂而敦詩書乃使郤縠將中軍二十齊昭公潘元春晉侯侵曹伐衛衛侯出居于襄牛晉侯入曹執曹伯楚子使子玉去宋子玉固請與戰夏戰于城濮楚師敗績王享晉侯於踐土命晉侯為侯伯王子虎盟諸侯于王庭衛侯出奔楚使元咺奉叔武以受盟楚殺子玉晉人復衛侯衛侯殺叔武元咺訟諸晉冬晉人執衛侯元咺立公子瑕晉侯召王以諸侯見春秋書天王狩于河陽以其詞逆而意順也晉侯復曹伯二十一陳共公朔元夏王子虎㑹諸侯大夫盟于翟泉二十二秋晉侯釋衛侯衛侯殺元咺及公子瑕晉侯秦伯圍鄭秦私與鄭盟留杞子戍鄭而還子犯請擊秦晉侯不可二十三秋晉作五軍冬衛遷于帝丘二十四春晉楚修好夏衛人侵狄狄請平冬晉文公薨杞子自鄭告于秦使襲鄭蹇叔曰師行千里其誰不知逺主備之無乃不可乎秦伯不聴使孟明西乞白乙出師蹇叔哭之曰吾見師之出不見其入也又曰晉人禦師必于殽甲午二十五晉襄公驩鄭穆公蘭元春秦師及滑鄭人覺之滅滑而還夏晉襄公及姜戎敗秦師于殽獲三帥文嬴請而免之秦穆公悔過自責作秦誓不替孟明曰孤之過也秋晉侯敗狄於箕先軫死冬楚子上伐鄭侵蔡二十六魯文公興元夏晉侯伐衛取戚先且居使晉侯朝王衛孔達伐晉楚成王將以商臣為太子子上曰君齒未也而又多愛黜乃亂也弗聴既又欲立職冬商臣以宫甲圍成王王請食熊蹯不許而死二十七楚穆王商臣元春秦孟明伐晉敗於彭衙秦伯猶用孟明増修國政趙成子曰秦師又至必將避之念徳不怠庸可敵乎冬晉先且居伐秦春秋不書卿為穆公故尊秦也二十八夏秦伯伐晉濟河焚舟取王官及郊遂霸西戎用孟明也二十九秋楚人滅江三十秋楚人滅六冬滅蓼三十一春晉蒐于夷舍二軍趙盾始為國政夏秦穆公薨以三良殉秋晉襄公薨靈公少晉人以難故欲立長君趙盾使先蔑士㑹如秦逆公子雍賈季使召公子樂于陳趙孟殺諸郫賈季殺陽處父而奔狄三十二晉靈公夷臯秦康公罃元夏宋穆襄之族殺公孫固公孫鄭晉穆嬴日夜抱太子以啼于朝趙宣子患之乃立靈公而禦秦師敗秦于令狐先蔑士㑹奔秦三十三宋昭公杵臼元春晉歸戚田于衛夏秦人伐晉取武成冬宋襄夫人作亂殺大司馬公子卬頃王壬臣元年春晉先都士縠箕鄭父作亂殺先克晉人討而殺之楚人伐鄭侵陳陳鄭皆及楚平甲辰二曹文公壽元夏楚殺子西冬楚子陳侯蔡侯鄭伯次于厥貉宋公逆楚子以田於孟諸三夏魯叔彭生㑹晉郤缺於承匡冬魯叔孫得臣敗狄于鹹獲長狄僑如四春郕伯朱儒奔魯冬秦伯伐晉取羈馬晉及秦師戰于河曲五夏晉以詐取士㑹于秦邾文公卜遷于繹史曰利于民不利于君邾子曰民茍利矣孤必與馬遂遷於繹六楚莊王旅陳靈公平國元齊昭公夫人魯姬無寵生子舍無威公弟商人驟施于國而多聚士夏昭公薨商人弑舍而自立秋趙盾納捷菑于邾弗克納楚鬬克公子燮作亂弗克而死匡王班元年齊懿公商人元秋齊侯侵魯冬晉侯㑹諸侯盟于扈將為魯討齊既而取賂而還齊侯復侵魯遂伐曹討其朝魯也季文子曰齊侯其不免乎已則無禮而討有禮二蔡文公申元春魯及齊平秋楚大饑戎蠻庸麋百濮皆叛之用蒍賈潘尫之謀羣蠻皆服遂滅庸宋昭公無道公子鮑禮於國人冬襄夫人攻昭公殺之而立鮑三宋文公鮑元春晉荀林父以諸侯之師伐宋討曰何故殺君猶立文公而還卿不書於春秋失其所也四春魯文公薨齊懿公無禮於閏職邴歜而近之夏二人弑懿公齊人立桓公子元魯文公元妃出姜生惡及視二妃嬴氏生倭嬴氏嬖而私事襄仲冬襄仲殺視及惡而立宣公魯公室由是遂微莒太子僕弑莒公而奔魯五魯宣公倭齊惠公元秦共公稻元秋楚子鄭人侵陳遂侵宋晉趙盾帥師救陳於是晉侯侈趙宣子驟諫而不入故不競於楚甲寅六春鄭公子歸生伐宋獲宋華元晉靈公為無道欲殺趙盾盾出亡秋趙穿攻殺靈公宣子未出山而復太史書曰趙盾弑其君宣子逆文公子黑臀於周而立之定王瑜元年晉成公黒臀元春楚子伐陸渾之戎遂觀兵於周疆定王使王孫滿勞楚子楚子問鼎之大小輕重滿曰在徳不在鼎二鄭靈公夷元夏鄭公子宋與公子歸生謀弑靈公歸生不可宋反譖歸生歸生懼而從之春秋書歸生弑其君君子曰仁而不武無能達也鄭人立穆公子堅秋楚令尹鬬椒作亂殺司馬蒍賈楚子謀而殺之三鄭襄公堅元四秦桓公元五六夏楚子滅舒蓼盟呉越而還七秋晉荀林父以諸侯之師伐陳晉侯薨于扈乃還陳靈公通於夏姬詩人刺之洩冶諫冬公殺洩冶鄭伯敗楚師于栁棼國人皆喜唯子良憂曰是國之災也八晉景公孺衛穆公遫元夏陳靈公飲酒於夏氏夏姬之子徵舒射而殺之九齊頃公無野陳成公午元春楚子伐鄭及櫟鄭及楚成遂侵宋冬楚子討陳夏氏亂入陳轘夏徵舒因縣陳用申叔時之諫乃復封陳召靈公太子午于晉而立之鄭既受楚盟又徼事于晉甲子十春楚子入鄭鄭伯肉袒牽羊以迎楚子舍之夏晉荀林父救鄭士㑹不欲戰曰楚徳刑政事典禮不易不可敵也先縠曰不可遂與楚師戰于邲晉師大敗荀桓子歸請死晉侯用士渥濁之言使復其位冬楚子滅蕭十一冬晉殺先縠十二春衛殺孔達夏晉侯伐鄭宋人殺楚行人申舟秋楚子圍宋十三曹宣公廬元春宋人告急于晉晉人不救宋及楚平夏晉荀林父帥師滅赤狄潞氏晉侯賞士伯曰微子吾喪伯氏矣王札子殺召伯毛伯秋晉魏顆敗秦師于輔氏十四春晉士㑹滅赤狄甲氏及留吁鐸辰始將中軍盜奔于秦秋王孫蘇奔晉晉人復之十五春晉郤克召㑹于齊齊婦人笑之郤克怒請伐齊晉侯不許晉侯㑹諸侯于斷道齊髙固逃歸秋士㑹請老使郤克為政十六蔡景侯固元春晉侯伐齊秋邾人戕鄫子于鄫魯公孫歸父欲去三桓以張公室與宣公謀而聘于晉未返冬宣公薨魯逐東門氏歸父奔晉十七魯成公黒肱楚共王審元春晉侯平戎於王劉康公徼戎無備遂伐之王師敗績於茅戎十八夏齊師伐魯還敗衛師于新築秋晉郤克伐齊大敗齊師于鞌齊侯使國佐受盟于晉且歸魯衛之侵地冬楚令尹子重侵衛及魯魯衛及諸侯之大夫竊與楚盟于蜀十九宋共公瑕衛定公臧元春晉侯以諸侯伐鄭冬晉作六軍齊侯朝于晉甲戌二十夏魯侯朝于晉晉侯不禮魯侯欲求成于楚季文子曰晉未可以貳乃止冬鄭伯伐許晉欒書伐鄭楚子反救鄭鄭伯與許男訟二十一鄭悼公費元晉趙同趙括放趙嬰於齊夏梁山崩許靈公訴鄭伯於楚鄭伯請成于晉冬晉侯與諸侯盟于蟲牢宋殺公子圍龜簡王夷元年呉子壽夢元夏晉遷于新田秋楚子重伐鄭冬晉欒書救鄭楚師宵潰晉遂侵蔡楚師救蔡欒武子不戰而還呉子壽夢立始大稱王二鄭成公睔元春呉伐郯秋楚子重伐鄭諸侯救鄭囚楚鍾儀遂同盟于馬陵楚子反子重殺申公巫臣之族巫臣為晉通使於呉教之戰陣教之叛楚呉始伐楚伐巢伐徐入州來蠻夷屬服於楚者呉盡取之冬衛孫林父奔晉三春晉侯使魯歸汶陽之田于齊諸侯由是貳於晉晉欒書侵蔡遂侵楚獲沈子楫夏晉趙姬譖趙同趙括殺之武從姬氏畜於公宫韓厥曰成季宣孟不可忘也乃立武而反其田焉四春諸侯同盟于蒲楚人以重賂求鄭鄭伯從楚秋晉人執鄭伯使欒書伐鄭楚子重侵陳遂伐莒莒潰冬晉侯使鍾儀求成於楚鄭人用公孫申之謀圍許示晉不急君也楚公子成如晉脩好五齊靈公環元春鄭公子班立公子繻夏鄭人殺繻立髠頑晉侯有疾立太子州蒲為君而㑹諸侯伐鄭鄭人賂晉侯以來成鄭伯歸殺公孫申六晉厲公州蒲元宋華元善於令尹子重又善於欒武子冬華元如楚遂如晉合晉楚之成秦晉為成將盟於令狐秦伯不肯涉河周公楚出奔晉七晉士燮㑹楚公子罷盟于宋西門之外秋晉郤至如楚蒞盟冬楚公子罷如晉蒞盟八春晉侯以諸侯朝王遂從劉康公成肅公伐秦秦師敗績夏曹伯廬卒於師庶子負芻殺太子而自立公子欣時將亡國人皆將從之成公懼告罪且請焉乃反而致其邑甲申九曹成公負芻元夏衛孫林父自晉歸于衛冬衛定公薨定姜見太子衎之不哀也曰天禍衛國也夫吾不獲鱄也使主社稷大夫聞之無不聳懼十秦景公衛獻公衎元春晉㑹諸侯于戚執曹伯將立欣時辭曰聖達節次守節下失節敢失守乎遂奔宋夏楚子侵鄭及衛秋宋蕩澤殺公子肥華元討而殺之魚石奔楚冬晉三郤殺伯宗諸侯大夫㑹呉鍾離許遷于葉十一宋平公成元春鄭叛晉從楚夏晉侯伐鄭楚子救鄭范文子不欲戰曰自非聖人外寧必有内憂弗聴遂敗楚師于鄢陵射共王中目楚殺子反秋晉人歸曹伯晉人執魯季孫行父冬魯叔孫僑如奔齊魯殺公子偃十二夏諸侯從尹子單子伐鄭同盟於柯陵秋齊用聲孟子之譖刖鮑牽逐髙無咎國佐殺慶克以叛冬晉厲公欲盡去羣大夫而立其左右殺郤錡郤犫郤至而立胥童欒書中行偃殺胥童而執厲公十三春欒書中行偃弑厲公逆襄公曽孫周於京師而立之悼公即位脩百官治舊政晉復霸齊人殺國佐夏楚人納宋魚石於彭城晉侯以諸侯之師救宋圍彭城遇楚師於靡角楚師還冬諸侯盟于虛朾十四魯襄公午晉悼公周元春彭城降晉晉以宋五大夫在彭城者歸夏晉韓厥伐鄭靈王泄心元年春齊侯伐萊秋晉師侵鄭諸侯大夫㑹于戚遂城虎牢鄭人乃行成二鄭僖公髠頑元春楚子重伐呉呉人獲鄧廖夏單子㑹諸侯同盟于雞澤楚令尹子辛侵欲于小國陳侯疾之使袁僑如㑹求成晉侯之弟陽干亂行魏絳戮其僕晉侯以為能以刑佐民使佐新軍三春陳成公薨楚人將伐陳聞喪而止陳人不聴命臧魏武仲曰陳必亡冬魯侯如晉請屬鄫許之晉用絳之謀始和諸戎邾子莒人伐鄫魯臧紇救鄫侵邾敗于狐駘四陳哀公弱元秋楚人殺令尹子辛諸侯㑹于戚㑹呉且命戍陳也魯以屬鄫為不利復歸之楚子囊為令尹晉范宣子曰我喪陳矣冬子囊伐陳諸侯救陳甲午五秋莒人滅鄫冬齊侯滅萊六冬楚子囊圍陳諸侯㑹于鄬以救之鄭僖公如㑹子駟相僖公不禮焉子駟夜弑僖公而以瘧疾赴於諸侯陳慶虎慶寅以楚難故召陳侯于㑹陳侯逃歸七鄭簡公喜元夏鄭羣公子謀子駟子駟殺之鄭子國子耳侵蔡獲蔡公子燮晉悼公㑹諸侯之大夫于邢丘以命朝聘之數復文襄之業冬楚子囊伐鄭子展欲待晉子駟不可遂從楚八春宋災秦乞師于楚子囊曰晉君明臣忠不可敵也秋秦人侵晉冬諸侯圍鄭鄭人行成同盟于戲楚子伐鄭鄭及楚平晉侯用魏絳之言省用息民三駕而楚不能與爭九春諸侯㑹呉子于柤遂滅偪陽夏楚鄭伐宋晉伐秦鄭皇耳侵衛衛人敗之獲皇耳秋楚子囊鄭子耳侵魯還圍蕭侵宋諸侯伐鄭冬盜殺鄭子國子駟子耳鄭及楚平楚子囊救鄭諸侯還鄭復從楚王叔奔晉十春魯作三軍季孟叔孫三分公室各有其一夏鄭侵宋諸侯伐鄭鄭人行成同盟于亳楚子秦師伐鄭鄭伯逆之遂伐宋諸侯悉師以復伐鄭㑹于蕭魚鄭自是服于晉晉侯賞魏絳以金石之樂冬秦敗晉師于櫟十一秋呉子乗薨太子諸樊既除喪以其弟季札賢將立之季札曰君義嗣也誰敢干君固立之棄其室而耕乃舍之十二呉子遏元夏晉侯命士匄將中軍以讓䓒偃其下皆讓君子美之秋呉侵楚養由基敗諸庸浦獲公子黨十三楚康王昭元春諸侯㑹呉于向夏諸侯之大夫從晉侯伐秦至于棫林而還衛獻公不禮于孫林父甯殖二子作亂獻公奔齊二子立公孫剽晉舍新軍秋楚子囊伐呉呉人敗之冬諸侯㑹于戚十四衛殤公剽元春王逆后于齊夏齊侯伐魯圍成秋邾人伐魯甲辰十五晉平公彪元春晉平公㑹諸侯于湨梁執莒子邾子以其侵魯故也齊髙厚逃歸齊侯伐魯夏諸侯之大夫伐許秋齊侯伐魯十六春宋人伐陳夏衛石買伐曹秋齊侯伐魯冬邾人伐魯宋華臣出奔陳十七夏晉人執衛石買秋齊侯伐魯冬晉平公以諸侯圍齊師齊侯將走郵棠太子光諌而止鄭子孔將召楚以去諸大夫楚令尹子庚伐鄭至于蟲牢子孔不敢㑹楚師十八曹武公勝元春諸侯盟于祝柯晉人執邾子齊靈公愛少子牙遂疎太子光使髙厚宿沙衛傅牙以為太子夏齊侯病崔杼微逆光而立之殺髙厚宿沙衛晉士匄伐齊聞齊侯薨乃還秋鄭殺子孔以子産為卿十九齊莊公光元夏諸侯盟于澶淵秋魯人伐邾蔡公子燮欲與晉蔡人殺之蔡公子履出奔楚冬衛甯殖卒遺命其子喜使納獻公以掩其耻二十春邾庶其以漆閭丘奔魯晉范匄逐欒盈秋盈出奔楚冬晉㑹諸侯于商任錮欒氏也二十一秋欒盈自楚適齊晏嬰諌齊侯不聴冬晉㑹諸侯于沙隨復錮欒氏也楚殺令尹子南二十二夏陳殺慶虎慶寅齊莊公以藩載欒盈納諸曲沃盈以曲沃之甲入絳不克反奔曲沃晉人圍之滅其族秋齊侯伐衛遂伐晉登太行張武軍于熒庭而還冬魯臧孫紇出奔邾齊侯襲莒傷股而退二十三秋晉㑹諸侯于夷儀將以伐齊齊侯懼求援于楚冬楚子伐鄭以救齊齊人為王城郟二十四春齊崔杼伐魯齊莊公通于崔杼之妻夏崔杼弑莊公立靈公庶子杵臼而相之晉㑹諸侯于夷儀以伐齊齊人以莊公説鄭入陳秋衛獻公入于夷儀楚滅舒鳩冬呉子諸樊伐楚門于巢卒弟餘祭立甲寅二十五齊景公杵臼呉子餘祭元春衛甯喜弑其君剽衛孫林父入于戚以叛衛侯衎復歸于衛夏楚子侵鄭晉㑹諸侯于澶淵執甯喜及衛侯宋寺人伊戾譖太子痤殺之晉人歸衛侯二十六衛獻公後元甯喜専夏衛侯殺之公弟鱄以公無信出奔晉終身不仕宋向戍善於趙文子又善於令尹子木欲弭諸侯之兵以為名乃合晉楚及諸侯之大夫盟于宋秋齊慶封殺崔杼并其家二十七夏齊侯陳侯蔡侯胡子沈子白狄朝于晉魯侯宋公陳侯鄭伯如楚宋之盟故也齊慶封好田而耆酒與慶舍政而田于萊冬公孫蠆公孫竈與陳鮑攻慶舍殺之慶封伐齊不克奔魯又奔呉稽古録卷十
