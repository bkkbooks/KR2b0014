body:
  text: 稽古錄卷十四宋司馬光撰晉哀帝丕隆和元年秋桓温表求北伐不許興寧元夏進桓溫大司馬都督中外涼張天錫殺𤣥靚而自立甲子二帝因餌長生藥有疾禇太后復覽萬幾三秦建元元春帝崩太后立帝弟琅邪王奕燕太宰恪攻拔洛陽虜将軍沈勁海西公弈太和元年夏旱秋桓温移鎮姑熟二夏燕太原王恪卒臨絶謂燕主曰呉王垂有文武長才陛下若任之以國可以少安不然二虜將有窺窬之志秋秦并州牧晉公栁及秦主母弟雙皆舉兵反三秦主使王猛及將軍楊威世分討栁雙秋皆斬之四夏桓温伐燕破燕將慕容厲於黄墟燕太傅評欲奔和龍呉王垂自請擊温大破温於枋頭㑹秦兵救燕温遂遁還評忌垂有功欲害之冬垂出奔秦燕叛秦秦王猛鄧羌攻燕洛陽取之桓温歸罪於西中郎將袁真五春真據夀陽叛降於秦尋卒子瑾代之夏秦王猛將兵六萬伐燕燕太傅評將兵三十餘萬禦之秋桓温圍夀陽秦王猛拔晉陽冬猛大破評於渭源遂進圍於鄴秦主自將兵六十萬助之鄴潰燕王奔昌黎秦人追而獲之臣光曰慕容氏世為君長保有海隅及廆始大屬晉室版蕩諸夏之民皆襁負歸之廆拊循勞來收其髦俊以贊國政逺奉王命以示大順務農積榖秣馬厲兵以窺鄰國之釁故能斬將刈旗大啓土宇皩承其遺烈恢大前功於是吞段遼并宇文俘高麗翦夫餘蠶食幽并而與强趙為敵矣及石氏内亂儁乗時而動驅厲精蓄鋭之兵以埽離散土崩之衆無不順風而靡遂走王午服張平戮段龕禽冉閔左縈右拂而幽并青冀悉定矣暐之立也太宰恪佐之内修政事養士愛民外開封疆威行鄰敵及評為政妬宗室勲賢之人逐之以資鄰敵君闇臣鄙以當苻堅王猛之威安得不亡乎簡文帝昱咸安元年春桓温斬袁瑾夏秦符雅伐氐氐主楊纂降冬桓温入朝用郄超計廢海西公立丞相㑹稽王昱為帝又殺武陵王晞詔加温為丞相二春秦慕容桓據遼東叛討平之皇夏秦以王猛為丞相陽平公融為冀州牧政秋立子昌明為太子帝崩遺詔以桓温輔如諸葛亮故事中温望帝臨崩禪位見遺詔不悦疑侍謝安王坦之為之孝武帝昌明寧康元年春温入朝伏甲欲誅王謝謝因覺之乃止還屯姑熟疾甚急求九錫安故緩之秋温卒九錫遂不行入冬秦将楊安攻拔成都益州郡縣皆于秦甲戍二夏蜀民張育楊光率巴獠圍成都秋秦鄧羌擊斬之三夏秦王猛疾病秦主為之禱於南郊猛曰晉雖僻逺若王謝在願陛下勿加兵慕容姚氏我之仇讎必為後患宜早除之秋猛卒秦人巷陌皆哭大元元春以桓冲為車騎将軍鎮姑熟王夏秦茍萇擊張天錫天錫出降冬秦苻洛擊代什翼犍其子寔君弑什翼犍以降秦人分其國為二部使劉庫仁劉衞辰分統之什翼犍子珪奔獨孤部久之國人共迎立之改稱魏徙都平成二魏道武帝珪元三春作新宫宫秋帝入新四春秦長樂公丕及茍萇入寇拔襄陽虜中郎将朱序𤣥夏拔盱眙虜将軍毛操京師大震兖州刺史謝攻盱眙秦師遁去五夏秦征北將軍行唐公洛反于和龍圍陽平公融於中山秦主使步兵校尉呂光擊之光生禽洛於中山進攻薊斬洛兄北海公重秦主赦洛徙之涼州秋秦王召陽平公為中書監以子長樂公丕為冀州牧六夏揚荆江州大水七秦東海公陽等謀反秦主皆赦不殺秋秦呂光将兵七萬取西域釁秦主議入寇姚萇慕容垂勸之權翼曰晉未有大謝安桓冲皆江表偉人未可也苻融曰陛下寵育鮮卑羌羯布滿畿甸今傾國逺去無後患乎皆不聴八夏桓冲伐秦入秋秦主步騎九十萬冦冬将軍謝石謝𤣥等大破秦師於淝上獲苻融秦兵死者十八九秦主使慕容垂安輯河北句町王翟斌反苻丕使垂討之垂亦反鮮卑乞伏國仁據隴右甲申九燕成武帝垂元後秦武昭帝姚萇白雀元王春桓冲卒以謝安都督十五州冲慕容垂自稱燕圍鄴慕容泓起東闗慕容起平陽夏姚萇討泓軍敗畏誅亦反秋呂光擊拔龜兹慕褚太后崩慕容泓為冲所殺冲進逼長安冬容暐死將軍劉牢之救鄴十前秦哀平帝丕太安西秦宣烈王乞伏國仁建義元春慕容冲稱帝夏劉牢之及慕容垂戰於鄴牢之敗還子將軍任權攻秦益州取之慕容冲攻秦主留太宏守長安出奔五將山宏亦尋走冲入長安卒秋姚萇執秦主殺之謝安救秦聞秦敗乃還安帝弟㑹稽王道子代安秉政聞苻丕稱帝于鄴呂光自西域還至姑臧秦王敗自稱為涼州刺史十一前秦髙帝登太初後秦建初燕建興涼懿武帝呂光太安魏登國元春燕王稱帝慕容冲為其將所殺姚萇稱帝將夏慕容永稱帝於長子東垣軍馮該斬之鄴降于燕冬前秦主兵敗走前秦苻登稱帝于隴東十二春前秦主以乞伏國仁為苑川王起秋立子徳宗為太子張天錫世子太豫兵攻呂光光遣其將彭晃擊斬之徐冬後秦將姚方成擊前秦雍州刺史嵩殺之十三西秦武元王乾歸太初元南春謝𤣥卒秦夏乞伏國仁卒弟乾歸立稱河王冬前主圍後秦主營不克十四涼麟嘉元安春呂光稱涼帝大前秦主留輜重於大界自将攻定秋後秦主襲界獲其輜重及毛后帝冬以㑹稽王道子為丞相揚州牧加殊禮亂荒耽酒色委政道子道子亦荒淫國政殽十五春以中書令王恭都督青幽等五州主夏後秦將軍魏掲飛反時前秦主猶在安定後秦自以兵二千擊掲飛滅之令秋帝以倖臣王國寳為中書國寳專權恣横十六冬前秦主及後秦主戰於安定前秦敗魏主滅劉衛辰盡收其故地攻擊鄰國所向輙克魏於是悉降河南諸部衛辰子勃勃奔薛于部十七春句町王翟釗攻燕燕主擊破釗于滑臺盡有其衆釗奔長子依慕容永冬以黄門郎殷仲堪為荆州刺史仲堪及王恭尚書令王珣皆有寵於帝道子及王國寳惡之十八春涼王以鮮卑禿髪烏孤為河西鮮卑大都督兵冬後秦主萇殂太子興立前秦主聞之喜大赦起擊後秦魏王擊薛于部破之薛于送勃勃于後秦甲午十九前秦主崇延初後秦文桓帝興皇初元夏燕主攻慕容永滅之毛後秦將尹緯大破前秦主於廢橋前秦主走入馬山秋後秦主攻前秦主殺之前秦太子崇奔湟中臣光曰石氏之强也氐羌之屬無不内徙而為臣一朝失馭而角立為患理固然也苻洪徘徊枋頭有虎據中原之志以犍為不肖然猶西取闗中并姚襄却桓温遂為强國堅以雄才英略加之慈惠忠信舉王猛於布衣任之以政勲舊不能離親戚不敢妬非至明能如是乎故能吞强燕舉河西兼巴蜀包漢沔俘索頭屠龜兹奄有天下十分之九五胡之盛未有如堅者也觀其舉百萬之衆以攻晉先為之除宫築第以待其君臣意以為羅中之禽往無不獲也及一戰而敗遂顛沛不振昔之俘囚降虜皆起而為敵數月之間冦讎徧於四方戎馬塞於郊甸以至身死人手子孫殄滅何哉論者咎堅寵信羌與鮮卑而伐晉彼皆睹其迹而言之未逹其本也要之堅恃其强大易而無備此其所以敗亡也夫冬乞伏乾歸攻殺崇自稱西秦王涼遷於樂都二十春燕主使太子寳擊魏魏人徙河西以避之燕秋禿髪烏孤擊乙弗折掘二部破之始貳於涼師還不設備冬魏王襲擊燕師於參合陂大破之死者十七八二十一燕惠閔帝寳永康涼龍飛魏皇始元春燕主自將伐魏拔平城魏王引兵入東隂山夏燕主還殂於上谷置秋帝暴崩魏魏王伐燕悉取并州之地初建臺省百官冬出井陘河北皆應之唯中山鄴信都不下圍之安帝徳宗隆安元年南涼武王禿髪烏孤太初北涼段業神璽元春燕主奔和龍涼将段業自稱涼州牧李嵩稱燉煌太守之夏王恭殷仲堪舉兵討王國寳道子斬國寳以謝乃罷兵冬魏拔中山二燕昭武帝盛建平南燕獻武帝徳魏天興元春魏拔鄴慕容徳奔滑臺自稱燕王夏燕蘭汗弑惠閔惠閔子盛殺汗桓秋魏遷都平城子冬魏初稱帝王恭殷仲堪及温子𤣥皆反道以世子元顯為都督討之恭敗死詔諭釋仲堪等三秦𢎞始燕長樂涼靈帝纂咸寧北涼天璽元春段業自稱涼王攻魏伐南燕拔滑臺髮夏元顯始輔政秋慕容徳拔廣固都之禿烏孤卒弟利鹿孤立雍冬桓𤣥擊殺殷仲堪奪其荆州又殺楊佺期奪其州妖賊孫恩陷三呉青兖州刺史劉牢之破之涼懿武殂太子紹立紹庻兄纂殺紹自立四南燕建平南涼康王利鹿孤建和西涼武昭王李暠庚子元入春涼主弟𢎞反死秦夏李暠自稱涼公孫恩復餘姚殺謝琰秋主擊乞伏乾歸乾歸奔南涼既而降秦慕容徳稱帝五燕昭文帝熙光始涼建康公隆神鼎北涼武宣王沮渠䝉遜永安元冦春秦遣乾歸還苑川擊魏伐秦至河東沮夏孫恩丹徒䕶國司馬劉裕誅之盧水胡渠䝉遜殺段業自稱涼州牧而涼呂隆弑涼王自立廢秋燕段輿作亂燕主被傷殂太后欲立長君乃太子定而立燕主叔父熙冬元顯欲誅桓𤣥𤣥反元興元南涼景王傉檀𢎞昌元春元顯以劉牢之為前鋒討𤣥𤣥與牢之連和元顯兵敗死𤣥徙道成於成安自為丞相録尚書奪牢之兵牢之自殺呂禿髪利鹿孤卒弟傉檀立魏夏秦姚碩伐涼隆降復以為涼州刺史主大破秦兵二春孫恩妹壻盧循冦東陽劉裕擊走之位秋呂隆畏禿髪傉檀之逼納地於秦冬桓𤣥簒國號楚遷帝於潯陽甲辰三魏天賜元破春劉裕起京口劉毅起廣陵以討𤣥大桓謙於覆舟山𤣥劫帝走江陵裕以司徒王謐錄尚書立留臺謐以裕為都督揚徐等八州夏裕推武陵王遵承制封拜何無忌攻拔潯陽產劉毅及𤣥戰於峥嶸州𤣥敗走死荆州别駕王康奉帝返正於江陵桓振桓謙襲殺康産擊破劉毅於靈溪盧循陷廣州義熙元南燕北海王超太上西涼建初元春劉毅拔江陵振謙走帝還京師死蜀人譙縱反自稱成都王循桓振復入江陵尋敗劉裕出鎮京口夏以盧為廣州刺史徙秦以禿髮傉檀為涼州刺史超冬李暠治酒泉南燕獻武殂兄子立二秋南燕主稱藩於秦以請其母秦人與之者秦主始崇尚佛敎廣建墖廟州郡事佛十室而九三夏武烈帝赫連勃勃龍升後燕惠懿帝高雲正始元王夏秦安北将軍赫連勃勃據朔方叛自稱大夏天擊禿髪傉檀破之外秋燕主熙出𦵏其后符氏將軍馮跋先有罪亡在潛入龍城立望之養子高雲為燕主執熙殺之為冬王謐卒子秦主召乞伏乾歸尚書留太熾盤監其國四南涼嘉平元揚春以劉裕為州刺史録尚書黄武糧盡而還夏将軍劉敬宣討譙縱至冬秃髮傉檀初稱涼王五北燕文成帝馮跋太平西秦更始魏明元帝嗣永興元苑春南燕冦淮北夏劉裕伐南燕乞伏乾歸逃歸川秦姚强救南燕㑹夏王勃勃敗秦兵秦追姚强還為冬燕離班弑其主雲馮跋誅班因自立魏道武其子紹所弑國人殺紹立紹兄嗣六春劉裕拔廣固執南燕主超斬之臣光曰慕容垂以美才茂功不容於昏亂之朝自歸於秦秦主以國士遇之淮南之役不乗人之約亦足以少償其愧矣垂之去燕燕人如失其父兄及其還也人向之如趨市故數年之間掉馬箠從容而取故業自然之勢也寳不克負荷開門延敵坐而待攻又不能固守中山無故遁逃朞年之間蹙國待盡子弟親戚翦為仇讎進退失據卒隕其身何其愚也盛以孺子孤窮自投於仇人之懷終踞其喉而剚其腹以成其志而復其位自非智勇過人能如是乎不幸遇盗而夭熙以一婦人之故遂亡其國彼何人哉徳以燕室至親居方伯之任總南夏之師敵至不能禦民散不能安君窮不能救盡䘮其田而奪人之田以居之其智仁勇皆無足稱者然禮賢納諫以保全青土可謂善敗者不亡矣超以聲伎之故輕犯强敵又不能用善謀自取滅亡惜哉沮渠䝉遜敗南涼王於窮泉南涼遷樂都師盧循乘虛入冦殺何無忌取江州夏劉裕還京盧循進至蔡州僕射孟昶自殺循退屯潯陽謙秋沮渠䝉遜敗西涼世子歆於馬廟秦茍林桓㑹譙縱之師冦荆州刺史劉道規擊斬之海盧循冦荆