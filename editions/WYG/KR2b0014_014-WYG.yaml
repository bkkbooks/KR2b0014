楊愔等秋演廢殷自立立太子百年冬周將獨孤盛冦巴湘二周武帝邕保定齊武成帝湛太寧元破春周將殷亮以湘州來降六夏初與齊和親秋周將賀若敦復取武陵等郡冬齊孝昭帝殂廢其太子百年立弟長廣王湛縉州刺史留異反司空侯安都討之三齊河清梁明帝巋天保元反春齊主立太子緯來梁宣帝殂留江州刺史周迪帝弟安成王頊自長安異奔晉安東陽平反夏齊婁太后殂擒秋齊冀州刺史高歸彦大司馬段韶討之四春周迪奔閩州刺史陳寳應納之秋夏帝捨身於太極前殿逹侯安都以驕慢賜死周迪冦臨川將軍章昭擊􅋅之伐冬周柱國楊忠與突厥合兵二十萬齊并州齊主自如晉陽禦之甲申五春齊大敗周師于晉陽城西宇文䕶之母于周夏齊殺樂陵王百年周齊人歸秋突厥伐齊幽州晉公䕶伐齊使尉遲迥圍洛陽冬齊主自晉陽如洛陽太師段韶大敗周師尉遲迥􅋅章昭逹討陳寳應留異擒之閩州平六齊温公緯天統元災春周主逆突厥女為后夏齊武成帝以變傳位於太子緯自稱太上皇帝軍國大事咸以聞秋獲周迪斬之天康元周天和元即夏帝崩太子伯宗位㓜弱政事皆決於司徒安成王頊臨海王伯宗光大元年夏湘州刺史華皎叛入於周周將元定將兵助之遂入郢州秋大將軍淳于量擊大破之皎奔江陵虜定以歸二秋齊始與周和親成冬章太后下令廢帝立安王頊齊武成帝殂武成奢淫無度齊政始衰宣帝頊大建元年春立子叔寳為太子反冬將軍歐陽紇據廣州二齊武平元春章昭逹討歐陽紇斬之令秋齊主立太子恒開齊以中領軍和士開為尚書是時齊主荒縱士及嬖臣高阿那肱穆提婆等用權恣横異姓王者百餘人開府千餘人至於犬馬皆受官爵賦繁役重民不聊生三夏齊段韶攻周汾州拔之初秋齊琅邪王儼殺和士開尋被誅冬與周和親四周建徳元夏周主誅晉公䕶始親萬機勵精為治中外翕然周人將伐齊而患齊丞相斛律灮乃以謠言間之齊僕射祖珽復加譖毁秋齊主殺斛律灮廢斛律后立胡后尋又廢之立穆后五春齊高阿那肱為丞相取帝遣開府呉明徹略地北邊屢破齊兵秦涇和合四州冬拔夀陽斬王琳甲午六春齊朔州行臺高思好反尚書令唐邕討斬之道周叱奴太后崩武帝行三年之䘮夏周主斷佛二敎立通道觀以壹聖人之道直諸將侵齊淮北秋周主如雲陽衞王反於長安誅死七秋周主下詔數齊主罪惡大興兵自河南伐齊逼洛陽破河隂焚浮橋齊高阿那肱救之㑹周主有疾而還所得三十餘城皆棄之於呉明徹大破齊師呂梁八齊隆化元谷春周太子贇西廵遂伐吐渾冬周主自河東伐齊拔晉州齊主自晉陽救之圍晉州垂克以馮淑妃故棄軍先還晉陽齊師大潰周主乗勝逐之齊主留安徳王延宗守晉陽而奔鄴延宗自稱帝周主攻拔之九齊幼主恒承灮元春齊主傳位於太子恒周師克鄴齊主奔青州又使太子傳位於任城王湝齊王將東奔高阿那肱引周兵追擒之任城王湝據州不下周齊王憲討平之周封齊主為温公尋殺之臣光曰神武以高世之略平爾朱之亂功大勢盛為魏武所疑雖有逐君之慙而能惓惓盡恭以事静帝沒身不怠此其可稱者也文襄有俊才而無重徳悖慢無禮終隕身於奴𨽻文宣淫湎殘暴甚於桀紂而能信用賢臣委之以政威加鄰敵終其天年盖亦有以得之矣孝昭明逹愷悌實有齊之令主享國不永惜哉武成驕淫奢縱齊業始衰後主繼之昏狂尤甚誅翦忠良信用讒邪十年而亡已為幸矣冬呉明徹攻周徐州十周宣政元徹春呉明徹及周將王軌戰於呂梁明大敗將卒三萬皆沒帝懼始繕完以備周陽夏突厥伐周幽州周武帝自將五道擊突厥至雲遇疾殂武帝英武勤儉四方畏服齊周宣帝即位殺王憲立后楊氏十一周静帝闡大象元太春周宣帝殺王軌傳位於子闡自稱天元皇帝驕奢狂恣立五皇后悉遣親王之國建東京發兵作洛陽宮脩長城民不堪命夏突厥伐周并州彥冬周將韋孝寛拔夀陽梁士拔廣陵江北地皆入周十二春周杞公亮反韋孝寛討平之以夏周宣帝殂静帝尚幼御正劉昉内史鄭譯矯詔太后父隋公楊堅受遺輔政堅悉召諸王入朝稍稍誅之相州總管尉遲迥鄖州總管司馬消難益州總管正謙皆起兵討堅秋堅使鄖公韋孝寛擊迥楊公王誼擊消難蒋公梁睿擊謙迥謙死消難來奔十三隋文帝楊堅開皇元春周主禪位於隋臣光曰文帝以闗中之衆東迎孝武收疲敗之兵撫貧困之民任賢使能列官布職明部分務農桑以輔魏室雖以高氏之强不能陵也其所為典法施於後世可不謂賢乎武帝以英傑之資受制强臣恭黙端拱十有餘年須其罪盈惡熟為衆所棄一旦除之若撥䵄振槁可謂知剛知柔智勇兼備者矣然後親統六師以征東夏齊之險阻不守士卒不戰數月之間縛其君臣致於鼔下使有周之境東漸于海南傅于江雖魏室全盛之時不能及也惜乎宣帝恣其淫侈逞其竒譎自絶于天結怨於民不及三年而為異姓所有悲夫夏隋主立后獨孤氏及太子勇改周官皆如漢魏命僕射高熲納言蘇威定律令秋隋廢洛陽宫將軍周羅睺拔隋胡墅蕭摩訶伐隋江北隋高熲入冦十四春帝崩始興王叔陵謀弑後主伏誅州歸胡墅於隋以和隋師還益隋主以晉王廣鎮并秦王俊鎮洛州蜀王秀鎮州皆領行臺夏隋作新都於龍首山突冬隋太子屯咸陽備厥長城煬公叔寳至徳元年春隋遷于新都改郡為州金突厥沙鉢略可汗妻周女千公主以周亡數侵隋境突秋隋河間王𢎞僕射高熲虞慶則等數道出塞擊厥大破之因以饑疫突厥遂衰甲辰二春隋主如隴州秋又以闗内饑如洛陽逾年而還將軍夏侯苖叛降隋隋主以通和不納公突厥沙鉢畧可汗為從弟阿波可汗所敗使千金主請為隋主之子晉王廣欲乘釁擊之隋主不可使虞慶則撫納之三春前豊州刺史章大寳反夏州將陳景詳斬之夏梁明帝殂突厥沙鉢略稱臣上表於隋遂與阿波分為二國阿波亦伏於隋秋將軍湛文徹擊隋和州為隋所虜四梁莒公琮廣運元反秋隋太子鎮洛陽隋柱國梁士彦宇文忻劉昉謀誅冬以僕射江總為尚書令帝日夜與總等文士十人及張孔二貴嬪賦詩飲酒不親政事不恤外患刑煩賦重中外離心禎明元春隋人脩長城平秋梁主琮朝于隋隋主遣將崔𢎞度戍江陵梁安王巖等懼率其民來奔隋主怒廢梁主為莒公遂謀伐陳大作舟艦人請宻之隋主曰吾顯行大誅何宻之有使投柹於江冬隋主如馮翊二春攻隋峽州州冬隋淮南行臺晉王廣山南行臺秦王俊信總管楊素等率九十總管兵五十二萬八道入冦東接滄海西距巴蜀横亘數千里以高熲為謀主帝謂長江必不可渡全不設備奏技縱酒不輟隋文帝開皇九年春襄邑公賀若弼拔京口新義公韓擒虎抜南豫州所向皆克陳主以蕭摩訶為都督以拒隋賀若弼與戰於蒋山大破擒之韓擒虎入建業陳主逃于井就獲之遂滅陳臣光曰武帝與王僧辯同事梁室誅夷侯景乗時伺間以詐力取國然率羸弊之衆當强齊乗勝之勢卒成大功奄有江南斯亦難矣文帝恭勤政事足為良主孝宣值齊之衰而啓土逢周之興而䘮師豈非不恃内而恃外者耶夫以陳國區區不能居天下五分之一慄慄危懼猶不能保其社稷况後主荒淫無度以趣之納身眢井不亦宜乎詔天下偃武脩文兵非禁衛邊防皆停罷悉毁民間甲仗十春帝幸并州開秋遣柱國韋􅀈上府王景廵撫嶺南百越皆服内冬江南高智慧等所在作亂攻陷郡縣詔史令楊素討平之十一春以臨穎令劉曠政績尤異擢為莒州刺史不帝勤於政治令行禁止資性節儉天下化之丈夫衣綾綺無金玉之餙衣食滋殖倉庫盈溢故能削平海内四夷賓服十二十三春帝幸岐州初營仁夀宮楊素督役嚴急死者甚衆帝初怒獨孤后為之言乃喜甲寅十四夏太常牛𢎞等議定新樂始頒行之陽狄闗中旱饑帝率户口就食洛冬帝東巡十五春以旱親祀泰山以謝愆咎還幸仁夀宫十六冬帝幸長春宮十七春太平公史萬歲擊南寧蠻克之帝幸仁夀宫上柱國王世積討桂州賊李灮仕平之大夏頒太史令張胄𤣥新厯夏桂州人李世賢反將軍虞慶則討平之薨秦王俊坐奢侈免官就第以憂冬慶則以罪誅十八春帝幸仁夀宮高麗王元冦遼西詔漢王諒將水陸三十萬擊之㑹糧運不繼士卒疾疫元惶恐謝罪乃班師帝以宗女妻東突厥都藍可汗弟染干都藍怒而叛詔蜀王秀擊之十九春帝幸仁夀宫犯夏突厥逹頭可汗塞史萬歲擊破之都藍攻染干染干來奔冬帝立染干為啓民可汗處於河南夏勝之間發兵擊都藍都藍為其下所殺逹頭代立國内大亂逃奔漠北二十夏突厥逹頭犯塞晉王廣擊破之太子勇失愛於帝及獨孤后晉王廣矯自脩飾帝后皆愛之廣乃與楊素隂謀譖毁太子冬廢太子勇為庻人以晉王為太子臣帝晩年猜忌苛細誅夷功甚衆人皆危懼仁夀元春突厥逹頭冦恒安敗柱國韓珙縣夏僕射楊素以帝不悦文學希㫖奏廢太學及州學冬楊素與突厥啓民共擊逹頭大破之逹頭奔吐谷渾啓民悉有其衆二春帝幸仁夀宫詔秋獨孤后崩𢎞河南北水冬楊素蘇威牛等脩定五禮庶太子及楊素譖蜀王秀廢為人幽之深室三冬河南水帝漢王諒有寵於為并州總管自蒲絳以東黄河以北至于滄海皆屬焉仍許以便宜行事不拘律令太子廣惡之甲子四春帝幸仁夀宫太夏帝疾甚太子與妃嬪亂帝怒召勇欲復立之子使庶子張衡入侍帝尋崩秋漢王諒反於并州兵曹裴文安説諒直趣長安諒不從煬帝使楊素擊誅之冬煬帝幸洛陽徙其城稍西作洛陽宫以為東都煬帝廣大業元年春立后蕭氏及太子昭發徙天下富商大賈數萬家於東都男女百餘萬開通濟渠引穀洛水逹于河自板渚引河逹于淮造龍舟鳳艒數萬艘秋帝幸江都舳艫相接二百餘里二春東都成徒夏帝自江都還入東都八秋太子昭薨司楊素薨是歲天下户百九十餘萬口四千六百餘萬三春帝還長安次夏復出北巡鑿大行山為御道帝榆林突厥啓民可汗來朝者賀若弼等坐誹謗誅幸發男丁百餘萬築長城死十五六秋帝出塞啓民牙帳召高麗王不至始議伐高麗遂自樓煩還營晉陽宫四春發河北男女百餘萬開永濟渠引沁水南逹于河北通涿郡而帝之五原出塞巡長城道秋發民築長城自榆谷東帝親祠常山河北郡守畢集突厥啓民可汗死子始畢可汗立五春帝自東都還長安復西巡河右夏大獵於拔延山長圍周亘二十里其吐谷渾主伏允保覆袁川帝分兵圍之伏允遁降民十餘萬還遇風雷士卒死者大半伊吾吐屯設等獻西域地數千里秋帝入長安冬復幸東都六春作角觝大戲於端門街以誇示四夷來朝貢者絲竹之聲聞數十里錦綉珠玉填溢城郭所費鉅億萬帝還幸江都七春帝自江都御龍舟沂通濟渠逹于河自河入永濟渠幸涿郡詔發兵運糧將伐高麗民苦征役始為盜賊八春帝分軍為十二道親伐高麗甲士一百一十三萬餽運者倍之旌旗亘千里遂度遼水進圍遼東秋左衞大將軍宇文述等敗于薩水九軍並陷將士奔還一日一夜行四百五十里存者百無一二乃班師歸東都九春復發兵伐高麗以代王侑守西都越王侗守東都夏帝度遼遣宇文述等趨平壤禮部尚書楊𤣥感反於黎陽濟河攻東都衆十餘萬帝乃還軍遣宇文述等乘傳發兵擊之兵部侍郎斛律斯政亡入高麗𤣥感西趨闗中宇文述等追斬之帝幸博陵是時盜賊所在蠭起攻陷郡縣不可勝紀甲戍十春帝復征高麗百道俱進秋次懷逺鎮時道路阻絶軍多失期高麗亦困弊乃囚送斛律斯政以降朝冬帝還長安召高麗王入終不至帝復幸東都十一楚朱粲昌逹元朝春突厥始畢來其帝幸太原秋巡北塞帝以始畢寖盛欲以宗女妻臣叱吉立為南面可汗叱吉不受突厥圍帝於鴈門郡縣赴救突厥解去冬還東都稱賊師李子通掠淮南稱楚王朱粲據漢南楚帝十二秋幸江都使灮禄大夫段逹太府卿元文都等奉越王侗守東都冬右騎衞將軍唐公李淵奉使河東黜陟討捕因以為太原留守恭帝侑義寧元年梁蕭銑鳴鳳涼李軌安樂秦薛舉泰興魏公李密劉武周天興夏竇建徳丁丑元據春冀州賊竇建徳自稱長樂王倉馬邑人劉武周郡稱帝東郡賊李密陷洛口稱魏公河南州郡多附之煬帝使将軍王世充擊之不克唐夏金城校尉薛舉起兵據隴西稱帝晉陽留守公李淵起兵倉秋武威人劉軌起兵據河西稱帝校李宻陷黎陽唐公西度河取馮翊冬岳州尉董景珎等立羅州令蕭銑為梁王荆楚皆附之公唐公入長安立代王侑為帝尊煬帝為太上皇唐為丞相總録萬機進爵為王郡薛舉使子仁杲冦扶風唐公子世民擊走之濟賊杜伏威輔公祐渡淮陷洛陽唐高祖淵武徳元年隋越王侗皇泰夏五鳳元李春宇文化及弑煬帝越王稱帝宻擊化及走之王世充殺元文都因擊破宻宻來降尋死化及稱帝夏受隋禪臣光曰文帝於周室非有元功厚徳素洽於人直以天元暴崩嗣君幼弱姦臣矯命徼幸得之然明敏儉約勤於政治隨才任官信賞必罰故能取江南三百年之國易於反掌使天下復為一統百姓繁庶衣食豐衍突厥室韋韎􅞘林邑高昌女國之屬莫不頓顙稱臣奉珍入貢雖兩漢全盛之時不能過也向使後嗣僅得中才以守之則十世之内未易亡也煬帝以悖逆作謀坐承富强之業志驕氣溢慨然慕秦皇漢武之為人窮侈極欲連兵四夷政煩賦重盜賊蠭起而游幸不息以樂滔憂惡聞直言喜自壅蔽噫率是道也雖禹湯文武之子孫未或不亡况隋無積善之基乎秋薛舉卒民平隴西冬秦王世蕭銑稱帝二鄭王世充開明呉李子通明政元春竇建徳滅宇文化及自朱粲降復叛陷夏安興貴擒李軌王世充弑越王立劉武周并州晉州闗中震駭秋李子通稱呉帝於江都及冬竇建徳陷黎陽盡據有北地杜伏威涿州賊羅藝請降三呉王杜伏威元武春上幸蒲州并竇建徳稱夏王入夏秦王擊破劉周將宋金剛晉皆平武周􅋅突厥而死攻秋秦王擊王世充河南州郡多降冬竇建徳羅藝圍幽州不克懷逺賊師高開道降四春秦王圍洛陽竇建徳將兵十萬救洛陽夏秦王擒建徳於虎牢王世充降河南北悉平秋建徳餘黨劉黒闥起兵漳南河南北多應之平冬李靖自䕫州水道襲蕭銑克之江漢嶺外悉高開道復叛五夏漢東王劉黒闥天造元兖春秦王破黒闥於洛水上黒闥亡入突厥還兵斬州賊徐圓朗夏黒闥復引突厥入冦河北皆應之討秋突厥圍并州太子建成及秦王擊却之冬太子黒闥斬之杜伏威羅藝入朝六宋輔公祐乾徳元備秋突厥冦朔州公太子秦王屯并州以之三月罷輔祐反稱帝冦高開道引突厥幽州甲申七春高開道為其部將所殺李靖討斬輔公祐江東悉平王秋突厥頡利突利二可汗舉國入冦至豳州秦以百騎徃面數其負約不戰結和而退八秋突厥頡利冦朔州將軍張瑾禦之不利秦王出屯蒲州突厥退九太子秦王齊王元吉皆有寵敎令與詔勅並行太子以秦王功高與齊王謀殺之夏秦王射殺太子及齊王於殿中詔以秦王為太子幽州都督廬江王援反誅州秋帝傳位於太子自稱太上皇突厥頡利自涇入冦至便橋太宗親以數騎徃責之結盟而退稽古錄卷十四
