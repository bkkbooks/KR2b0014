  text: 欽定四庫全書史部二
  hash: sha256:70556edeacc7a4d441da801d227722e616f1df1cbf685e5227e3ee4acfbaa8df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_WYG_000-1a, image: WYG0312/WYG0312-0391a.png}
body:
  text: 稽古録目録編年類巻一伏羲氏一百一十年神農氏一百四十年有熊氏一百年金天氏八十四年髙陽氏七十八年髙辛氏七十年巻二陶唐氏一百一年巻三有虞氏上合下巻五十年巻四有虞氏下夏后氏上合下巻十七主四百三十二年巻五夏后氏下巻六殷上合下巻三十主六百二十九年巻七殷下巻八周上巻九周下至共和初十一主自是以後年始可譜共和之初諸侯所自出魯至愼公濞齊至武公壽晉至靖侯宜臼秦至秦仲楚至熊勇宋至僖公衛至僖侯陳至幽公寧蔡至武侯曹至夷伯喜巻十共和元年至十四年宣王四十六年幽王十一年平王五十一年桓王二十三年莊王十五年釐王五年惠王二十五年襄王三十三年頃王六年匡王六年定王二十一年簡王十四年靈王二十七年巻十一景王二十五年敬王四十三年元王八年貞定王二十八年考王十五年威烈王二十四年安王二十六年烈王七年顯王四十八年愼靚王六年赧王五十九年秦昭王五年孝文王一年莊襄王三年始皇三十七年二世三年巻十二西漢髙祖十二年惠帝七年髙后八年文帝二十三年景帝十六年武帝四十五年昭帝十三年宣帝二十五年元帝十六年成帝二十六年哀帝六年平帝五年孺子三年王莽十四年淮陽王二年巻十三東漢光武三十三年明帝十八年章帝十三年和帝十七年殤帝一年安帝十九年順帝十九年冲帝一年質帝一年桓帝二十一年靈帝二十二年獻帝三十年魏文帝七年明帝十三年邵陵厲公十四年髙貴鄉公六年元帝五年晉武帝二十五年惠帝十七年懐帝六年愍帝四年東晉元帝六年明帝三年成帝十七年康帝二年穆帝十七年巻十四哀帝四年海西公五年簡文帝二年孝武帝二十四年安帝二十二年恭帝一年宋武帝二年營陽王一年文帝三十年孝武帝十年明帝八年蒼梧王四年順帝二年齊髙帝四年武帝十一年明帝五年東昏侯二年和帝一年梁武帝四十八年簡文帝二年元帝三年敬帝二年陳武帝三年文帝七年臨海王二年宣帝十四年長城煬公六年隋文帝十六年煬帝十二年恭帝一年唐髙祖九年巻十五太宗二十三年髙宗三十四年則天后二十一年中宗五年睿宗二年𤣥宗四十四年肅宗七年代宗十七年徳宗二十五年順宗一年憲宗十五年穆宗四年敬宗二年文宗十四年武宗六年宣宗十三年懿宗十四年僖宗十五年昭宗十五年哀帝二年梁太祖六年均王十年唐莊宗三年明宗八年潞王二年晉髙祖七年齊王四年漢髙祖二年隠帝二年周太祖四年世宗五年巻十六厯年圖序巻十七本朝太祖建隆三年乾徳五年開寳八年太宗太平興國八年道雍熙四年淳化五年至三年端拱二年巻十八真宗咸平六年天禧五年景徳四年乾興一年大中祥符九年巻十九仁宗天聖九年康明衜二年元二年定一年景祐四年寳巻二十仁宗慶厯八年祐八年皇祐五年至和二年嘉英宗治平四年臣等謹案稽古録二十巻宋司馬光撰光既撰資治通鑑又有舉要厯有目録有厯年圖有百官表厯年圖仍依通鑑起于三晉終于顯徳百官表止著宋代是書則上溯伏羲下訖有宋靡不備載而為書不過二十巻葢以各書巻帙繁重又厯年圖刻于他人或有所增損亂其巻帙故芟除繁亂約為此編而諸論則仍厯年圖譜之舊陳振孫書録解題曰越本彚聚諸論于一巻潭本則分係于各代之後此刻次第葢依潭本較越本易于循覽朱子甚重其書嘗曰可備講筵續六經讀之雖推之未免少過然觀其諸論于厯代興衰治亂之故反覆開陳靡不洞中得失其言誠不悖于六經通鑑文繁猝不易究是編言簡而義該洵讀史者之圭臬也南渡以後龔頤正嘗續其書今永樂大典所載尚有全本然頤正人品遜光逺甚持論未允是非頗乖于公議陳振孫不取其書誠非無見葢視光所作不可同日語矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀進稽古録表臣光言竊以九州四海一日萬㡬將察知民物之性情蓋布在文武之方䇿雖厯年多而舉其大要則用力少而見夫全功恭以皇帝陛下富有春秋敉寧方夏念終始典於學於緝熙單厥心延登老成親近觀講發論語章句探經藝之同歸誦寳訓丁寧憲祖宗之不易有本如是實惟濫觴惟稽古堯舜之舊章惟信史春秋之成法高山可仰覆轍在前其興亡在知人其成敗在立政或當艱難之運而不能師用賢智或有惻隠之意而無以照知忠邪載籍之編患乎太漫鑒觀之主力不暇遑敢用芟夷略存體要由三晉開國迄於顯徳之末造臣既具之於厯年圖自六合為宋接乎熙寧之始元臣又著之於百官表乃若威烈丁丑而上伏羲書契以來對越神人可用龜鏡悉從論纂皆有慿依總而成書名為稽古録二十巻因仍書局繕寫奏篇兹冒昧以上陳助聰明之逺覽臣光中謝恭惟太皇太后陛下定九鼎以守天下之重器乗六龍以御古今之正權思齊之功啓佑聖學過物之濟燕及宗祧至於法弊於涼而改為官非其人而變置御戎之䇿上下措國之勢安危據舊以鑒新去彼而取此陶成萬化簡在兩宫七廟乗無疆之休微臣與不朽之業干冒宸扆無任司馬光進表欽定四庫全書稽古録巻一宋
