body:
  text: 稽古録卷十三宋司馬光撰漢光武帝秀建武元年漢劉盆子建世漢盧芳成龍興元夏帝即位於鄗隗囂逃還天水赤眉立劉盆子為帝秋赤眉克長安殺更始冬帝都洛陽鄧禹入闗至栒邑竇融起河西劉永公孫述安定盧芳皆稱帝二春赤眉焚長安西掠郡縣鄧禹入長安秋漁陽太守彭寵反蓋延拔睢陽劉永走張步請降赤眉復入長安鄧禹出屯雲陽帝遣馮異代禹將赤眉食盡大掠東還三燕王彭寵齊王張步元春帝自邀赤眉於宜陽赤眉不戰而降馮異進定闗中彭寵自稱燕王夏劉永復入睢陽以張步為齊王步復叛從永秋岑彭平揚州蓋延斬劉永永子紆保垂惠來歙說隗囂下之李憲稱帝四漢劉紆元秋將軍馬武王霸圍劉紆馬成圍李憲隗囂使馬援見帝援歸盛稱帝美遣子入侍五春彭寵為奴所殺其子午立國師韓利殺午以降夏秦豐降帝征龎萌董憲破之呉漢拔郯虜劉紆冬耿弇擊張步大破之帝幸劇張步降岑彭說交阯牧鄧讓與諸郡皆降初立太學治經典盧芳入塞居九原六朔寧王隗囂元春馬成斬李憲呉漢獲龎萌董憲帝益厭兵數騰書隴蜀說以禍福公孫述使田戎任滿侵荆州夏帝遣耿弇等自隴道伐蜀隗囂發兵拒破弇等囂欲徇三輔不克遂稱臣於蜀蜀封囂朔寧王七帝以天下漸平乃革王莽偽薄之化察言觀行明試以功於是吏稱其職民安其業風俗淳厚焉隗囂將全梁守洛陽漢兵不得進八春來歙襲取洛陽斬全梁隗囂攻之數月不拔夏帝自征囂至漆囂衆大潰走保西境竇融及河西五太守將兵與帝㑹髙平潁川盜賊起秋帝還平潁川冬蜀兵救囂囂復入冀諸將食盡還屯長安九春隗囂卒子純立隴右饑冬來歙馮異入天水破蜀將王輔田弇諸縣悉降以馬援為隴西太守逐羌虜出塞呉漢討盧芳不克甲午十朔寧王純元秋帝自征隗純純降呉漢擊破盧芳平城下芳亡入匈奴其衆皆降十一春帝幸南陽使呉漢岑彭臧宫自荆門來歙蓋延自武都伐蜀漢等擊走田戎斬任滿夏來歙拔武都走王元蜀遣人刺殺歙冬岑彭乗勝長驅至武陽蜀人又刺殺之呉漢自夷陵入犍為十二春呉漢擊破公孫述從弟永於魚涪津還進逼成都秋述將謝豐袁吉以兵十餘萬出戰敗死乆之漢食盡欲還用張堪䇿毀軍以誘述述出戰被創歸以兵屬延岑而死岑以城降竇融及五太守來朝上印綬十三十四十五春呉漢以兵徙鴈門代郡上谷民于中山以避胡盧芳自匈奴入髙栁十六春交阯女子徵側徵貳反九眞日南合浦羣盜起盧芳降封為代王十七夏帝幸滎陽潁川章陵隂貴人有寵生東海王莊郭皇后怨恚上怒冬廢郭后立隂貴人為后十八春蜀郡人史歆反詔呉漢臧宫擊平之夏伏波將軍馬援擊交阯至浪泊側貳等走冬帝幸南陽盧芳復亡入匈奴死胡中十九春馬援斬側貳進擊九眞等皆平之太子彊以母廢内不自安固請避位上狐疑乆之乃聽冬封彊為東海王立莊為皇太子帝幸南陽甲辰二十秋匃奴寇右北平二十一秋鮮卑寇遼東太守祭肜大破之鄯善莎車等十六國請置都䕶上以中國初定不許二十二春帝幸長安匈奴國内亂諸將臧宫等爭請擊之帝不許二十三春南部蠻夷反將軍劉尚擊平之匈奴日逐王比自稱南單于請脩舊約入居塞内稱臣入朝許之比擊北單于却地千里匈奴始分冬武溪蠻反殺劉尚二十四二十五春烏桓大人郝旦等内附冬遣馬援馬武耿舒擊武溪蠻二十六春馬援大破蠻軍于臨鄉攻壺頭㑹夏熱吏士疫死者多耿舒等共譖援上大怒遣梁松代之未至而援卒軍士死者大半謁者宋均勒兵成列稱詔降賊賊即共斬大帥降均為置長吏而還二十七二十八春始遣諸王就國沛王輔客劉鯉殺式侯恭輔坐繫獄三日由是捕諸王賓客死者千餘人二十九甲寅三十春幸魯濟南冬復幸魯三十一鮮卑大人於仇賁率種人貢獻封賁為王是時南北單于更相攻伐而鮮卑始强盛中元元春上登封太山降禪梁父夏幸長安起明堂辟雍靈臺二春帝崩帝既定天下精勤為治保全功臣不令與政尊尚儒術百姓乂安太子即位以母弟東平王蒼輔政西羌反遣中郎將竇固及馬武擊之明帝莊永平元年春東海王彊薨彊自廢絀尤恭謹帝遇之益厚兄弟之間始終無間秋西羌破走餘種悉降徙之三輔二春上初祠明堂登靈臺冕服皆用周制立皇后馬氏于炟為太子后援之女恭儉不妬忌不以私家干朝廷太子賈貴人之子帝令后母養之慈孝皆如所生冬上臨辟雍養三老五更幸長安三冬上幸南陽四五春東平王蒼以輔政乆固請歸藩許之冬上幸鄴六冬上幸魯甲子七八九十夏上幸南陽十一十二夏發卒數十萬遣司空掾王呉修汴渠築隄自滎陽東至千乗海口千餘里朞年而成十三春上幸滎陽巡汴渠遂至太行幸上黨冬楚王英謀反廢徙丹陽自殺窮治其獄連年内及京師諸侯外連州郡豪傑坐死及徙者以千數十四十五春上幸彭城又幸琅邪及魯東平定陶冬匈奴寇河西十六春遣竇固等四將軍各將萬騎擊匈奴固出敦煌至蒲類海耿秉出居延度漠六百里祭肜呉常出朔方九百餘里而還固遣假司馬班超使西域西域皆歸附因留居盤槖城以鎮撫之甲戌十七冬竇固耿秉將萬餘騎擊車師車師王請降固遂奏復置西域都䕶以陳穆為都䕶耿恭闗寵為戊巳校尉恭屯金蒲城寵屯栁中城相去千餘里烏孫大昆彌子入侍十八春詔竇固罷兵還北匈奴率焉耆龜兹共攻殺陳穆耿恭徙居疎勒城匈奴圍之詔耿秉發敦煌酒泉兵擊車師以救恭秋帝崩帝勤儉好禮館陶公主為其子求郎不許而賜錢十萬故能不墮光武之業天下治安章帝炟建初元年春耿秉擊破車師分兵至疏勒迎耿恭等還西域遂絶有詔召班超還超至于闐王侯已下皆涕泣不聽超還超復屯西域二夏有司奏請封諸舅為侯馬太后不許諸外戚有干禁者太后輒以法按治之秋盧水羌反遣車騎將軍馬防長水校尉耿恭擊破之三春立皇后竇氏融曽孫后兄弟四人憲景篤瓌始有寵賞賜日盛班超上書求助詔假司馬徐幹將千人詣超四夏立皇子慶為太子明徳馬太后崩五六七夏廢皇太子慶為清河王慶母曰宋貴人竇后惡之誣以巫蠱賜死遂廢慶而立梁貴人子肇為皇太子后又構貴人父梁竦殺之貴人以憂卒秋上幸河内魏郡西幸長安八冬上幸陳留梁國淮陽潁陽甲辰元和元秋上幸章陵冬幸江陵二春上幸泰山及魯東平遂幸魏郡河内登太行班超發諸國兵擊莎車降之三冬西羌寇張掖隴西金城章和元春䕶羌校尉傅育追叛羌出塞遇害秋上幸九江又幸彭城及壽春冬北匈奴為鮮卑所破降者十餘萬南單于上言願與耿秉等出兵破北成南并為一國令漢家長無北顧之憂帝欲從之師未出而帝寢疾二春帝崩帝明敏寛和東京繼體之治稱明章焉太子即位年十歳竇太后臨朝將軍竇憲内管機密三弟並據大位憲大作威福權侔人主冬憲與耿秉將三萬騎擊匈奴大臣袁安等固爭不能得和帝肇永元元年夏竇憲耿秉自朔方出塞三千里斬首大獲銘燕然山而還即拜憲為大將軍兄弟皆列九卿二夏耿秉出塞大破匈奴于涿邪山月氏攻班超破之秋竇憲出屯涼州北單于請入朝南單于及烏桓鮮卑共擊殺北單于衆逺遁漠北北匈奴地遂空竇憲欲立北匈奴降者谷蠡王為單于置兵擁䕶袁安固諫乃止三冬上幸長安龜兹等國皆降以班超為西域都䕶復置戊巳校尉竇氏宗黨驕横帝隂與清河王慶及宦者鄭衆謀之四夏帝幸北宫召百官使執金吾衛南北宫閉城門捕竇憲壻射聲校尉郭舉衛尉鄧疊誅之收憲印綬令與兄弟皆就國憲及弟景篤皆自殺宗族免歸故郡帝始親政事以鄭衆為大長秋宦官用權自此始五甲午六秋京都旱南單于安國起兵攻其左賢王師子中郎將杜崇度遼將軍朱徽將兵誅之立師子為單于帝後知崇徽擾亂匈奴致其背誕乃誅崇徽七春班超發龜兹等八國兵七萬人討焉耆尉黎誘焉耆王廣尉恭王汎斬之西域遂平遣掾甘英使諸國西過條支臨西海而還八春立皇后隂氏秋蝗九秋蝗章徳竇太后崩隴西羌犯塞執金吾劉尚將三萬騎擊平之十十一十二十三冬班超上書求代詔召還以校尉任尚代之十四夏皇后隂氏坐巫蠱廢冬立貴人鄧氏為皇后后鄧禹孫也十五冬上幸章陵甲辰十六元興元冬帝崩帝柔而不立漢道始衰帝數失皇子皇子生者養於民間及崩鄧后收皇子於民間長子勝有痼疾幼子隆始生百餘曰鄧后乃引兄隲等定䇿禁中立隆為皇太子是日即帝位鄧后為太后臨朝封勝為平原王殤帝隆延平元年夏鄧隲為車騎將軍秋帝崩太后立清河王慶子祜為帝年十三西域諸國反任尚自疏勒退保龜兹冬清河王慶薨安帝祜永初元年春青兖豫徐冀并六州饑夏西羌叛鄧隲率師擊之初上立非大臣意冬司空周章謀誅鄧隲兄弟廢太后及上而立平原王事覺自殺騎都尉王仁將兵迎任尚等還入塞遂棄西域二冬鄧隲與羌戰于平襄羌詐降既而復叛侵擾邊郡并涼遂虚詔召隲還迎拜隲大將軍諸弟皆據重位郎中杜根諫太后不宜乆攝政太后怒以縑囊撲殺之已而復蘇亡命民間三春王仁將兵討涼州京師饑人相食夏以用度不足令吏民入錢穀為闗内侯烏桓寇代郡冬南單于擅叛行車騎將軍大司馬何熙討降之四春匈奴寇常山時西北有事民饑國用不足鄧棄涼州郎中虞以為不可乃止西羌寇漢中夏太后母新野君薨鄧隲等棄官行服遂罷輔政五六七甲寅元初元髙句麗王宫卒先是宫數寇幽都𤣥菟太守姚光請擊之尚書陳忠以為不若弔恤其孤因責讓赦罪從之句麗請服二夏立皇后閻氏秋西羌寇三輔右扶風种暠南安太守杜佐皆戰沒冬遣中郎將任尚將兵屯三輔是時三輔屯兵二十萬民棄農桑戶無聊生懷令虞詡說尚令二十人共市一馬以與羌戰大破之餘種悉降三四夏司馬袁敞失鄧氏指自殺五秋鮮卑寇代郡六夏京師旱秋鮮卑入塞北單于與車師後部王攻敦煌長史索班殺之遂略有北道諸國以軍司馬班勇為西域長史屯樓蘭勇發鄯善及車師前部兵擊後部王大破之斬後部王及匈奴使者永寧元夏立皇子保為太子太子母李氏為閻后所殺西羌寇張掖建光元春髙句麗寇𤣥菟和熙鄧太后崩或譖鄧太后兄弟嘗謀廢立乃免鄧氏宗族皆歸故郡鄧隲自殺帝始親政事宦者李閏江京及乳母王聖皆用事秋鮮卑髙句麗寇𤣥菟冬西羌寇張掖武威延光元秋髙句麗王降羌寇涼州冬鮮卑寇鴈門又寇九原二春敦煌太守張璫上平西域三䇿陳忠亦以為宜増四郡屯兵以撫西域制匈奴從之夏封王聖為野王君聖女壻劉瓌為朝陽侯司空楊震上書極諫不從甲子三春帝幸泰山東平魏郡河内中常侍樊豐譖太尉楊震䇿免震自殺豐又與王聖江京譖太子乳母殺之太子思戀不已聖等懼與閻后兄顯共譖太子秋廢太子為濟隂王冬帝幸長安四春帝幸宛有疾道崩閻后立章帝孫北鄉侯懿閻后臨朝秉政以閻顯為車騎將軍誅王聖樊豐冬北鄉侯薨閻顯江京等更召諸王子欲立之中常侍孫程等奉濟隂王誅顯及京遷太后於離宫濟隂王即帝位年十一順帝保永建元年春安思閻后崩中常侍張防譖司𨽻校尉虞詡下獄浮陽侯孫程祝阿侯張賢等切諌秋免程等官皆就國二春鮮卑寇遼東西域長史班勇請兵擊焉耆詔發河西四部兵三千人詣之無功而還三秋鮮卑寇漁陽四五夏京師旱六陽嘉元春立皇后梁氏梁竦曽孫也父商為侍中屯騎校尉冬鮮卑寇遼東二夏爵乳母宋娥為山陽君尚書左雄請歲以錢千萬給阿母而勿加封爵不從甲戌三秋羌寇漢陽冬寇武都四夏以梁商為大將軍輔政永和元冬武陵太守上書蠻夷懷漢恩請入貢比漢民尚書虞詡以為不可弗聽二春武陵蠻夷以貢非舊約果反夏宋娥有罪歸里舍秋日南蠻反敗交阯刺史議者欲遣大將軍發荆揚兖豫兵四萬人擊之李固以為遣將發兵煩擾無益不如精擇牧守委任而責成功從之交阯獲安冬帝幸長安三四五夏南單于寇河西帝遣使諭降之單于謝罪中郎將陳龜遣令自殺龜下獄誅秋羌寇金城及三輔以䕶羌校尉馬賢為征西將軍討之冬遣䕶匈奴中郎將將兵討南匈奴叛者斬首二千餘級叛者請降六春馬賢討羌至姑射山而還秋梁商薨以商子河南尹冀為大將軍輔政羌寇武威冬遣行車騎將軍執金吾張喬屯兵三輔漢安元夏立匈奴立義王為南單于梁后寵盛梁冀兄弟權侔人主宗族滿朝二千石多非其人盜賊縱横諫議大夫周舉建議遣八使張綱杜喬等按行州郡澄汰長吏貪汚者綱因劾奏梁冀帝雖信網言亦不罪冀二冬令郡國中都官繫囚犯大逆以下皆出縑贖罪甲申建康元夏立皇子炳為太子太子母曰虞姬秋徐揚州盜賊羣起遣御史中丞馮放督州郡兵討之帝崩帝之初立宦官之力也由是寵之遂專政事太子即位年二歲梁太后臨朝冲帝炳永嘉元年春帝崩清河王蒜年二十餘最有名徳太尉李固等欲立之梁冀欲立幼主以乆其權乃與太后定䇿禁中迎章帝曽孫之子建平侯纘立之年八歲夏鮮卑寇代郡質帝纘本初元年帝聰警頗言梁冀跋扈遂遇酖崩李固杜喬復欲立清河王羣臣皆以為然冀與太后謀先䇿免固乃立章帝孫蠡吾侯志為帝時年十五冀專秉大政桓帝志建和元年秋立皇后梁氏太后之妹也九月甘陵人劉文謀立清河王蒜蒜閉門拒之事覺文伏誅蒜坐徙桂陽自殺冀因誣李固杜喬與文通謀皆下獄死天下寃之二秋京師大水梁冀廣納賂大治苑第所用親黨徧於天下所在貪暴過於盜賊四方調發貢獻半入冀家先輸上第而乗輿乃得其次愛監奴秦宫勢振百僚刺史二千石皆謁辭之和平元春太后詔歸政於帝帝始稱制順烈梁皇后崩元嘉元二永興元甲午二永壽元春司冀大饑人相食夏匈奴叛中郎將張奐擊降之二秋鮮卑寇雲中三延熹元夏京都蝗二夏鮮卑寇遼東秋皇后梁氏崩帝與宦者單超等謀誅梁冀秋帝御前殿勒兵誅冀及其宗族公卿以下坐冀親黨或死或免朝廷為之一空立鄧貴人為皇后封單超等五人為侯以超為車騎將軍帝幸長安西羌寇邊三春羌寇張掖䕶羌校尉段潁等討平之秋泰山賊盜羣起冬中郎將宗資討平之四夏羌寇金城安定漢陽武威中郎將皇甫規大破之規因奏案涼州刺史太守倚貴戚為貪者皆抵罪羌人聞之喜一時降者二十餘萬論功未畢宦官左悺譖規下獄坐論五夏武陵蠻夷反車騎將軍馮緄討之冬武陵蠻夷降六甲辰七秋武陵蠻夷反寇掠數郡荆州刺史度尚討大破之八春皇后鄧氏以驕妒廢夏匈奴寇邊中郎將度尚擊之冬立皇后竇氏九夏以后父竇武為大將軍鮮卑烏桓寇邊䕶匈奴中郎將張奐討平之是時宦官親黨布滿内外所在貪暴太尉陳蕃司𨽻校尉李膺等戮力救時舉善黜惡宦者告膺等結為朋黨誹謗朝廷連諸名士范滂等下獄免官者三百餘人永康元春西羌寇三輔夫餘寇𤣥菟冬帝崩無嗣竇武召御史劉儵謀之儵盛稱章帝曽孫之子解瀆亭侯宏武乃與太后定䇿禁中遣使迎宏於河間立以為嗣時年十二靈帝宏建寧元年秋竇武及太傅陳蕃謀去諸宦官太后不聽其謀頗泄中常侍曹節等脅太后取璽綬請帝御前殿勒兵誅武蕃及其宗黨冬鮮卑寇幽州自是每歲犯塞二春尊帝母董貴人為孝仁皇后秋江夏丹陽蠻夷反宦官因陳竇之謀諷有司奏諸鉤黨者請下州郡考治於是誅李膺范滂等百餘人凡海内賢俊之士皆被禁錮郭泰聞之私慟曰人之云亡邦國殄瘁漢室滅矣三四秋立皇后宋氏憙平元夏桓思竇后崩二甲寅三四五夏永昌太守曹鸞上書訟黨人曰謀反大逆尚蒙赦宥黨人何罪獨不開恕鸞坐檻車送棄市於是申黨人之例父子兄弟門生故吏皆免官禁錮六夏鮮卑寇邊烏桓校尉夏育請發幽州兵出塞討之故䕶羌校尉田晏因王甫求為將甫建議使晏與匈奴中郎將臧旻及育各將卒萬餘人三道出擊鮮卑大臣多以為不便不聽秋晏旻育兵大敗死者萬數光和元春初置鴻都門諸生能尺牘詞賦及工書篆者皆得充員至數千人或出典州郡入為尚書侍中冬皇后宋氏以無寵廢二秋匈奴中郎將張修擅斬單于呼徴更立右賢王羌渠為單于張修抵罪黃門令王甫大長秋曹節專權任勢太尉段熲附之司𨽻校尉楊球奏收甫熲下獄誅又欲收節節譖球於上而殺之三春赦冬立皇母后何氏以后異兄進為河南尹苗為越騎校尉四春置騄驥廏調郡國馬一匹至百萬夏赦冬帝幸廣城苑五春大疫詔三公以民言舉刺史二千石貪汚為蠡害者夏旱六鉅鹿張角以鬼道惑衆十餘年間弟子十餘萬人青徐幽冀荆揚兖豫之人皆奉之司徒楊賜等請禁捕以絶亂源不聽甲子中平元春角與其黨所在起兵天下震動號黃巾賊遣中郎將皇甫嵩朱儁發州郡兵擊之夏牓鴻都門賣公卿以下官皇甫嵩朱儁大破黃巾斬首數萬張角兄弟皆死然自是盜賊競起朝廷不能制冬金城人邊章韓遂反二春邊章韓遂反羌胡寇三輔賦民田畝十錢以脩宫室冬司空張温中郎將董卓擊破邊章韓遂帝好為私藏積私錢至數千萬羣臣及州郡爭為貢獻刻剥齊民發十獻一民不堪命皆相聚為盜賊三四夏狄道人王國反秋詔發幽州烏桓使涿令公孫瓚將之以擊源州故中山相張純率烏桓以反幽州人爭附之衆十餘萬五夏涼州刺史耿鄙合六郡兵討王國不勝而死國遂圍漢陽殺太守傅燮秋置西園三軍及典軍校尉冬帝大發兵講武平樂觀躬擐甲胄既罷以兵屬大將軍何進詔左將軍皇甫嵩前將軍董卓屯右扶風以討王國六春王國張純皆敗死夏帝崩皇子辯立何進謀誅諸宦官召并州牧董卓秋中常侍張讓段珪殺進黨袁紹袁術勒兵悉誅諸宦官讓珪刼少帝幸小平津讓珪赴水死董卓尋至廢少帝立其弟協酖殺何太后卓自為相國獻帝協初平元年春後將軍袁術冀州牧韓馥豫州刺史孔伷兖州刺史劉岱勃海太守袁紹陳留太守張邈廣陵太守張超東郡太守橋瑁長沙太守孫堅驍騎校尉曹操等皆起兵以討董卓推紹為盟主卓懼遷都長安諸軍憚卓兵强觀望莫進頃之食盡衆散諸將更相猜貳劉岱殺橋瑁孫堅殺荆州刺史王叡南陽太守張咨袁術表堅為豫州刺史堅擊破董卓軍進屯大谷詔以劉表為荆州刺史屯襄陽二春袁紹欲立幽州牧劉虞為帝虞大怒不許夏董卓西入闗孫堅入洛陽袁紹使人說韓馥以冀州讓紹秋紹領冀州牧以曹操為東郡太守袁術使孫堅攻劉表將黄祖擊殺之三夏司徒王允與董卓將吕布共殺卓卓將李傕郭汜樊稠張濟合兵陷長安殺王允吕布走傕汜稠共秉朝政濟屯𢎞農公孫瓚南攻袁紹大破瓚於界橋黄巾入兖州殺劉岱州人迎曹操為刺史四春袁術入陳留為曹操所敗奔夀春徐州刺史陶謙殺曹操父嵩秋操攻謙破其兵於彭城下冬劉虞攻公孫瓚不能克反為所殺甲戌興平元曹操再攻陶謙未還張邈及操將陳宫迎吕布為兖州牧操還擊布不克操退屯鄄城布屯山陽益州牧劉焉卒子璋嗣位袁術使孫䇿攻揚州刺史劉繇取江東二李傕殺樊稠因與郭汜相攻連月傕劫帝幸其營張濟自陜來和傕汜帝得東歸既而傕悔之追敗王師于曹陽白波帥李樂河内太守張楊迎帝幸安邑陶謙卒州人迎劉備為刺史吕布敗走歸備建安元夏張楊等送帝還洛陽沮授說袁紹迎帝都鄴紹不從秋曹操用荀彧計迎帝都許以操為司空袁術與劉備爭徐吕布乗虚襲下邳自稱刺史備敗奔曹操孫䇿克㑹稽二春曹操討張濟子繡於宛繡擊敗之秋以袁紹為大將軍都督冀青幽并四州三春李傕郭汜敗死曹操圍張繡於穰夏以劉備為豫州刺史袁紹北擊公孫瓚荀彧說曹操因此時取吕布秋曹操圍布于下邳布求援袁術術不救鍾繇都督闗中諸軍事撫諭諸將皆遣子入侍袁術稱帝於壽春四春曹操擒吕布袁紹滅公孫瓚曹操擊破袁術術走病死袁紹選精兵十萬將攻許沮授諌不聽冬張繡降曹操拒袁紹於宫渡紹求援於劉表表不應亦不助操孫䇿攻拔廬江豫章廬陵劉備屯下邳與董承謀誅曹操五春曹操殺董承劉備據徐州叛操自將擊拔之備奔袁紹田豐說袁紹乗虚襲許紹不從夏孫䇿出畋為其讎所傷以兵授弟權而死秋袁紹濟河擊曹操冬操擊紹大破之紹僅以身免操由是威振天下六劉備為袁紹寇掠汝南冬操擊劉備備奔劉表表使備屯新野備聞處士諸葛亮賢三就其廬見之遂以為謀主袁紹愛少子尚欲立為後乃出長子譚為青州刺史沮授諫不聽曰禍其始此矣七夏袁紹卒别駕審配矯紹命立尚為嗣譚自稱車騎將軍屯黎陽譚尚始有隙秋曹操擊袁譚八春譚兵敗操追至鄴而還秋曹操擊劉表袁譚攻袁尚不勝走平原尚就圍之譚遣别駕辛毘乞降于操以請救操自西平還救譚冬操至黎陽尚解圍還鄴孫權擊江夏太守黃祖破之甲申九春袁尚留審配守鄴復攻譚曹操進軍圍鄴決漳水灌之秋尚還救鄴操擊大破之尚走中山操拔鄴斬審配操自為冀州牧屯於鄴袁譚略州郡攻袁尚尚走故安就其兄熙曹操責譚以負約而討之譚奔南皮十春曹操拔南皮斬袁譚冀州悉平袁熙袁尚為其將所攻走烏桓夏黒山賊帥張燕降烏桓反曹操擊平之冬袁紹甥并州刺史髙幹反十一春操擊幹拔壺闗幹奔劉表不至死烏桓蹋頓與袁尚頻入寇十二夏曹操北征蹋頓出盧龍塞五百餘里秋大破蹋頓於白狼山斬之袁熙袁尚奔遼東公孫康斬熙尚送首初董卓以康父度為遼東太守度見天下亂遂自稱平州牧用天子禮度卒康襲位孫權擊黄祖虜其人民十三春曹操為丞相孫權拔江夏斬黄祖劉表立少子琮為嗣以長子琦為江夏太守秋曹操征表未至表卒琮以荆州降操擊劉備於當陽敗之操兵號八十萬勢振江東冬孫權用其將周瑜計與備合兵大破操於赤壁立劉琦為荆州牧十四春周瑜圍曹仁於江陵仁棄城走劉琦卒劉備自為荆州牧孫權以妹妻備備至京口謝周瑜勸徙備于呉權不從瑜又欲因曹操敗西取蜀未行㑹病卒薦魯肅代秋曹操征孫權軍合淝冬還軍譙十五孫權使魯肅屯陸口劉備以闗羽屯江北曹操以馬騰為衛尉留其子超屯槐里十六韓遂馬超反屯潼闗秋曹操擊遂超破之遂超走還涼州曹操留夏侯淵鎮長安孫權徙治建業益州别駕張松隂與劉備謀取益說劉璋使召備討張魯從事王累等固諌不聽備將萬人入蜀璋益其兵使討魯十七夏孫權城石頭及濡須冬曹操擊孫權荀彧卒於夀春劉備屯葭萌張松謀泄劉璋殺松備還兵攻璋所向皆克諸葛亮張飛趙雲自荆州泝江取白帝及江陽十八春曹操攻濡須不克而還夏封操為魏公加九錫置百官秋聘操三女為貴人馬超率羌胡擊隴上郡縣殺涼州刺史韋康曹操使夏侯淵討之甲午十九春韋康故吏楊阜等攻馬超超奔張魯又奔劉備夏侯淵擊韓遂遂走劉備圍成都數十日劉璋出降遷於公安劉備入成都冬夏侯淵斬枹䍐賊朱建皇后與父完謀誅操操殺后及皇子并完族百餘人二十春立曹操女為皇后夏斬韓遂秋曹操擊張魯魯降孫權求長沙零陵桂陽三郡於劉備備不與權使吕蒙擊取之備自至公安權屯陸口未戰備聞曹操拔漢中乃復與權和親冬曹操留夏侯淵屯漢中而還二十一夏進曹操爵為王曹操殺尚書崔琰囚僕射毛玠秋南單于朝魏魏留之使右賢王監其國冬曹操擊孫權二十二春攻濡須孫權請降操留從弟仁屯居巢而還冬曹操立子丕為太子初操愛少子臨菑侯植欲立之太中大夫賈詡等諌乃止二十三春太醫令吉本等起兵許中攻丞相長史王必營不克而死夏代郡上谷烏桓反曹操使其子鄢陵侯彰擊破之劉備攻漢中秋曹操西擊備至長安二十四春劉備襲殺夏侯淵曹操自長安南擊備備拒險不戰累月操還備遂取漢中秋備自稱漢中王還成都闗羽圍曹仁於樊于禁等七軍皆沒冬操自至摩陂使徐晃救仁孫權使吕蒙襲公安斬闗羽遂取荆州魏文帝丕黃初元年春太祖薨太子嗣王位改元延康夏酒泉張掖反金城太守蘇則討平之秋王南征次于譙劉備將孟達降冬王受漢禪徙都洛陽封漢帝為山陽公臣光曰新室之末民心思漢如渇之望飲饑之待餔也是以諸劉奮臂一呼而逺近響應曾未期年元惡授首更始入洛之初天下已服矣而素無人君之器紀綱不修諸將暴横不旋踵而亡固其宜也光武以仁厚之徳濟英傑之志昆陽之役驅烏合之衆埽滔天之敵使海内幡然變而為漢宜陽之師不戰而赤眉束手百萬之盜一朝而散皆希世之奇功也至於待王郎劉盆子止於不死取良吏卓茂以為太傅戒馮異以安集闗中不務戰攻取勝雖當草創之際可謂有帝王之逺畧矣天下已定不失舊物乃偃武修文崇徳報功勤政治養黎元興禮樂宣教化表行義勵風俗繼以明章守而不失於是東漢之風忠信廉恥㡬於三代矣及孝和以降政令寖弛外戚專權近習放恣然猶有骨鯁忠烈之臣忘身以狥國故雖衰而不亡豈非建武永平之餘烈歟至於桓靈而紀綱大壞廢錮英俊賊虐忠正嬖幸之黨中外盤結鬻獄賣官濁亂四海何進見殺袁紹不勝其憤遂燔燒宫闕肆行誅殺外召董卓以脅朝廷於是虺蛇雖除而虎貙入室矣卓貪愎殘忍廢主遷都州郡紛然稱兵以討之卓死而天下大亂漢室遂亡哀哉二漢昭烈帝備章武元夏劉備稱帝孫權徙治武昌甄夫人死蜀張飛為左右所殺秋蜀主自將擊孫權軍於秭歸權遣將陸遜拒之軍於夷陵權遣使來稱藩詔封權呉王加之九錫冬帝東巡三呉大帝孫權黄武元春幸許昌夏呉陸遜大破蜀軍於猇亭蜀主僅以身免秋蜀將黄權來降立皇后郭氏冀州饑帝責呉任子不至遣將軍曹休等擊呉冬帝幸宛呉蜀復和親蜀漢嘉守黄元反四漢安樂思公禪建興元春曹休等罷還蜀人斬黃元夏蜀主殂於永安太子禪立年十七丞相亮秉政秋帝幸許昌甲辰五秋帝幸許昌為水軍以擊呉至廣陵呉人為疑城以拒之帝還六春蜀諸葛亮渡瀘水撃䍧牱益州越巂永安四郡平之并州刺史梁習討鮮卑軻比能大破之冬帝復為水軍以擊呉至廣陵大寒水氷舟不得入江而還呉畨陽彭綺反七夏帝疾甚立甄夫人子叡為太子帝崩大將軍曹眞司馬懿等受遺詔輔政明帝即位自親政事以眞等為三公或以方任處之秋呉王圍江夏不克呉諸葛瑾張霸寇襄陽司馬懿擊破之斬霸魏明帝叡大和元年春呉人獲彭綺蜀諸葛亮出屯漢中以圖中原冬立毛后呉將韓琮來降新城太守孟達及遣司馬懿擊之二春斬達蜀諸葛亮寇邊天水南安安定皆應之闗中震動帝幸長安將軍張郃擊破亮於街亭亮誅其將馬謖而還秋曹休與呉陸遜戰敗於石亭冬蜀諸葛亮圍陳倉不克遼東公孫淵囚其叔父恭三呉黃龍元春蜀人取武都隂平夏呉王稱帝與蜀約中分天下秋呉徙都建業使陸遜佐太子登守武昌四春作合肥新城詔禁絶浮華免尚書諸葛誕等官議考課法呉廷尉隠蕃叛誅五溪蠻侵呉呉潘濬討之卞太后崩秋遣曹眞自斜谷司馬懿自漢水擊蜀㑹大雨班師帝幸許昌五春蜀諸葛亮寇祈山遣司馬懿鎮關中以禦之懿軍敗於鹵城亮食盡而退張郃追亮至木門戰死秋初聽諸侯王入朝蜀中都䕶李平有罪徙梓潼冬呉將孫布詐降揚州刺史王凌迎之為呉所敗六呉嘉禾元春帝愛女淑薨為之厚葬立廟帝幸許昌呉太子登入朝呉主因留建業秋帝幸摩陂治許昌宫冬呉主遣使詣公孫淵至成山汝南太守田豫擊取之呉陸遜寇廬江不克青龍元春帝幸摩陂公孫淵稱臣於呉呉主封淵燕王加九錫遣使者張彌許晏將萬人詣淵張昭等諫不聽將軍秦元明擊破鮮卑軻比能走漠北冬公孫淵斬呉使者首以獻呉主攻新城不克甲寅二春山陽公薨蜀諸葛亮以十萬衆自斜谷入寇呉主亦舉兵寇合肥襄陽廣陵司馬懿與亮相拒於渭南秋亮卒蜀師退蜀尚書令蔣琬代亮秉政帝幸壽春呉師亦退呉潘濬平五溪蠻三春郭太后崩蜀楊儀有罪自殺帝大治宫室羣臣楊阜等切諌雖不之罪亦不聽冬帝幸許昌幽州刺史王雄遣人刺殺軻比能鮮卑由是衰散立皇子芳為齊王芳實非帝子四春呉張昭卒冬帝幸許昌景初元春改定魏歴以建丑月為正秋呉朱然寇江夏冬全琮襲六安皆不克呉諸葛恪招撫山越得甲士四萬公孫淵反自稱燕王幽州刺史毌丘儉討之遇雨而還毛后以罪賜死二漢延熙呉赤烏元春遣司馬懿擊公孫淵秋拔襄平斬淵冬帝寢疾立皇后郭氏詔燕王宇及夏侯獻曹肇等輔齊王芳為嗣中書監孫資劉放惡獻肇以曹爽司馬懿代之蜀蔣琬出屯漢中三春帝崩帝及文帝皆勤吏治而好通才故俗尚刻薄賤守節焉太子即位年八歲曹爽用其黨何晏等計陽尊司馬懿為太傅爽兄弟並典兵侍從勢震四方懿謝病以避之冬復以建寅月為正魏邵陵厲公芳正始元年春旱蜀越巂反太守張嶷討平之冬呉饑三夏呉全琮寇淮南諸葛恪攻六安朱然圍樊諸葛瑾取柤中征東將軍王凌破全琮於芍陂司馬懿救樊呉師還呉太子登卒蜀大司馬蔣琬欲自漢沔以舟師伐魏蜀人以為不可乃止三春呉王立子和為太子封少子霸為魯王秋呉陸凱討朱崖儋耳四春呉諸葛恪寇六安冬蜀蔣琬自漢中還住涪以費禕為大將軍甲午五春曹爽之黨以爽素無威名勸爽發兵十餘萬與征西將軍夏侯𤣥自駱谷擊蜀蜀人守險不戰師不得進夏糧盡而還闗中為之虛耗由是天下益惡爽蜀董允守尚書令六春呉丞相陸遜卒七春呉朱然寇柤中毌丘儉擊髙句麗屠九郡髙句麗王宫出走秋呉分荆州為二郡使吕岱諸葛恪督之冬蜀蔣琬董允卒蜀主始親聽政宦人黄皓用事八蜀費禕與涼州刺史姜維共録尚書事九夏蜀費禕出屯漢中嘉平元春曹爽兄弟從帝出謁髙平陵司馬懿發兵閉門奏爽罪惡帝還懿收爽及其黨悉誅之秋蜀姜維寇雍州將軍郭淮陳泰擊走之王凌謀起兵立楚王彪以討司馬懿不果二呉魯王霸謀去太子和而代之全公主亦譖和秋呉主廢和賜霸死冬立少子亮為太子將軍王昶出江陵王基出西陵州泰出秭歸以擊呉呉陸凱拒之師還蜀姜維寇西平不克三呉太元元夏王凌事覺司馬懿自水道奄至夀春凌窮迫出降自殺賜楚王彪死悉集諸宗室置鄴呉立潘后秋司馬懿卒以其子師録尚書事冬呉主寢疾召諸葛恪於武昌委以國政蜀費禕北駐漢壽四呉候官侯亮建興元春立張后夏呉大帝殂太子亮立年九歲冬呉太傅諸葛恪脩東興隄詔王昶出江陵毌丘儉出武昌胡遵諸葛誕圍東興與諸葛恪戰於東闗遵誕兵大敗五春郭循刺殺蜀費禕呉諸葛恪復發兵二十萬寇淮南夏蜀姜維寇狄道陳泰禦之維退諸葛恪圍新城士卒病死以萬數秋引兵去呉侍中孫峻誘恪殺之又殺故太子和徙齊王奮於章安甲戌魏髙貴鄉公髦正元元年呉五鳯元春中書令李豐后父緝及夏侯𤣥謀殺司馬師皆族誅廢張后夏蜀姜維寇隴西帝與左右謀誅司馬師不克秋師廢帝迎立文帝孫髙貴鄉公二春鎮東將軍毌丘險揚州刺史文欽反渡淮據項城司馬師擊殺儉呉孫峻襲壽春文欽降呉司馬師卒于許昌以師弟昭為大將軍秋蜀姜維圍雍州刺史王經於狄道陳泰鄧艾救之維去甘露元呉太平元秋蜀大將軍姜維寇祈山將軍鄧艾大破維於叚谷呉吕據及文欽寇青徐㑹孫峻卒以政事付從弟綝綝召據等還據聞綝代峻大怒不受命冬綝擊殺據又殺大司馬滕𦙍二夏詔召鎮東大將軍諸葛誕為司空誕據壽春叛降呉呉將全懌全端及文欽入壽春司馬昭奉太后及帝將兵二十六萬以討誕圍壽春破呉將朱異冬懌端出降蜀姜維出駱谷將軍司馬望鄧艾禦之三漢景耀諸軍拔景帝休永安元春諸葛誕殺文欽春斬誕蜀軍聞之亦退呉主與太常全尚謀誅孫綝尚泄其謀秋綝廢呉主為㑹稽王立其兄琅邪王休為呉主冬呉主與將軍張布共誅滅綝四魏元帝奐景元元年夏髙貴鄉公率殿中兵以誅司馬昭不克崩于軍中昭迎燕王宇之子常道鄉公奐立之呉作丹陽湖浦里塘呉黜㑹稽王亮為候官侯亮自殺二春呉人使其將鄧由等詐降以誘征南將軍王基基知而不逆由果不至三秋呉立宋后及太子􅓣冬蜀姜維寇洮陽鄧艾敗之於侯和維與黄皓有隙因留沓中不敢歸蜀罷漢中諸國詔以鍾㑹為鎮西將軍勅青徐兖豫荆揚作船謀以伐蜀四漢炎興元夏呉交趾吕興叛詔鍾㑹鄧艾伐蜀㑹拔漢中艾破姜維于强川維退守劍閣㑹不能進㑹欲還艾不可冬呉丁奉寇壽春鄧艾自隂平入蜀破蜀諸葛瞻於緜竹蜀主出降呉師退臣光曰昭烈以敗亡之餘羇旅漢南而能屈體英傑要結同志摧沮勍敵因敗為功顚沛之際不忘徳義美矣劉璋昧弱侮而兼之遂奄有巴蜀君臨一隅安樂公才雖下中然委任賢相抗衡中國及姜黃用事面縛為虜宜矣甲申咸熙元呉歸命侯皓元興元春鍾㑹譖鄧艾殺之司馬昭奉帝幸長安鍾㑹尋反死呉陸抗圍巴東不克秋呉景帝殂大臣濮陽興張布立太子和之子皓皓既立族誅興布交趾日南九眞皆來降晉武帝炎泰始元年呉甘露元秋太祖薨太子炎嗣為晉王呉主殺景后朱氏及其二子使大臣丁固諸葛靚守建業徙都武昌冬王受魏禪封魏帝為陳留王臣光曰漢室不綱羣雄麋擾乗輿播蕩莫之收省太祖獨奉迎而相之披荆棘以立朝廷則其名義固足以結民心矣加之英威明畧過絶於人驅䇿賢豪糞除姦宄於是張繡屈膝吕布授首公路野死本初覆亡劉琮獻地韓馬遁逃中原肅清戎狄靖服然則魏取天下於盜手而非取之於漢室也惜其狹中多詐猜忌賢能此海内所以不盡服也及文帝受禪明帝繼業内綏外禦不廢前功而明帝於彌留之際姦臣牽率嗣子幼弱寄托非人曹爽驕戇黨與輕佻禍自内興遂衰微不振以至於易姓悲夫二呉寳鼎元春立皇后楊氏冬呉永安山賊施但等劫呉主弟永安侯謙以攻建業丁固諸葛靚擊破之謙自殺呉王還都建業三春立子衷為太子夏呉主作顯明宫開苑圃起土山二千石以下皆入山督木石四秋呉主出東闗使丁奉寇合肥五呉建衡元春以僕射羊祜鎭襄陽祜薦王濬為巴郡太守以謀伐呉冬呉丞相陸凱卒呉監軍虞汜自荆州李朂自建安擊交趾六春呉李朂以建安道不通引軍還坐族誅七春呉主自將大衆出華里欲入寇遇大雪而還虞汜破交趾殺晉所置吏役取交趾日南九眞八呉鳯皇元春納車騎將軍賈充女為太子妃夏益州牙將張松殺刺史皇甫晏詔以王濬為刺史擊平之秋呉將步闡以西陵來降呉陸抗擊殺之九呉主好祥瑞侍中韋昭非之怒殺昭呉主奢淫無度愎諌好殺或剥人面皮人有忤視者輒鑿其目民不聊生十秋楊后崩遺言請納叔父駿之女帝許之呉大司馬陸抗卒咸寧元呉天册元呉主燒鋸殺中書令賀劭二呉天璽元秋呉京下督孫楷來奔冬立皇后楊氏駿女也三呉天紀元四冬羊祜卒以河南尹杜預都督荆州五杜預王濬請伐呉太尉賈充太傅荀顗以為不可中書令張華以為可帝用華言冬遣琅邪王伷出徐州將軍王渾出牛渚王戎出武昌胡奮出夏口杜預趣江陵王濬下巴蜀凡二十餘萬衆伐呉太康元春王濬所向城戍皆下杜預拔公安諸將以嚮夏水潦疾疫方作請班師預固執不可夏王渾大破呉兵於板橋斬其丞相張悌王濬入石頭吳主詣濬降渾與濬爭功互相論奏帝兩無所是非臣光曰孫破虜以孤逺之兵決忠憤之志首犯賊鋒深蹂洛川汛埽陵寢有足多者討逆以童子提一旅之衆揮馬箠而下江東耆儒宿將狼狽失據開地千里眞英才也大帝承父兄之烈師友忠賢以成前志赤壁之役決䇿定慮以摧大敵非明而有勇能如是乎遂奄有荆揚傅於南海傳祚累世宜矣候官景帝皆明慧敢決有先世之風歸命驕愎殘虐浮於桀紂求欲不亡得乎二太子闇弱不辨菽麥侍中和嶠衛瓘屢以為言荀顗及尚書令荀朂常保䕶之故得不廢文帝子齊王攸有俊德人所屬望朂惡之三冬朂言於帝以攸為大司馬都督青州遣之國四春太子后賈氏手殺孕妾帝怒欲廢之楊后曰妬者婦人之常情乃止齊王攸憂憤嘔血薨甲辰五秋杜預卒于襄陽六七八九春鮮卑慕容廆請内屬拜廆鮮卑都督廆徙居青山十惠帝衷永熙元年夏武帝崩遺詔以后父楊駿為太傅輔政帝自平呉以來沈湎酒色不思國家乆逺之䇿俗以老莊放誕相髙而鄙經術禮法之士識者知天下將亂云惠帝即位秋立子遹為太子元康元春賈后殺楊駿及其親黨遷太后於金墉以汝南王亮為太宰與太保衛瓘對掌朝政賈后又使楚王瑋殺亮瓘因而誅瑋秋以梁王肜録尚書事二春楊太后乏食崩賈后黨侍中賈謐尚書郭章用事朝士爭附之三甲寅四冬慕容廆徙居大棘五武庫火六春張華為司空掌朝政秋氐帥齊萬年及羌胡反寇涇陽衆號十萬冬遣將軍周處等討之七春周處及氐戰敗死於六陌八賈后謀害太子左衛率劉卞說張華以四率兵奉太子入朝因録尚書事執賈后廢之華不從九冬賈后誣太子謀反廢徙金墉城由是人間疾惡賈氏益甚趙王倫諂事賈郭得車騎將軍或說倫腹心孫秀曰朝廷人人欲為太子報讎公軰受福不乆矣不如先之倫秀告張華華不可永康元春賈后殺太子於許昌夏趙王倫梁王彤領兵入宫誅賈謐郭章賜賈后死斬張華倫為相國如宣帝輔魏故事彤為太宰立太子之子臧為太孫秋淮南王允發兵誅倫不克而死冬立皇后羊氏永寧元春趙王倫簒位遷帝於金墉殺太孫臧齊王冏河間王顒成都王穎共起兵以誅倫夏將軍王輿殺孫秀迎帝復位賜倫死詔以冏為大司馬輔政益州刺史趙廞反詔以張軌為凉州刺史太安元秋趙廞殺巴人李庠庠兄特攻殺廞詔以羅尚為益州刺史尚欲誅特夏特攻尚於成都自稱益州牧秋立皇弟子覃為太子冬河間王顒起兵以討齊王冏長沙王乂執冏殺之二成景帝李特建初元春羅尚破斬李特特弟據流代領其衆秋流卒以衆付特子雄雄遂逐尚成都河間王顒成都王穎表長沙王乂罪惡又劫帝與顒穎相攻兵交洛陽詔令不出四門冬東海王越執乂殺之甲子永興元漢光文帝劉淵元熙成武帝雄建興元春以穎為太弟秋越奉帝攻穎敗於蕩隂越奔下邳穎以帝歸鄴東瀛公騰及都督幽州王浚共攻穎穎奉帝奔洛陽匈奴劉淵據離石稱大單于李雄稱成都王冬河間王顒劫帝幸長安立皇弟熾為太弟二秋穎將公師藩汲桑羯胡石勒起兵趙魏兖州刺史茍晞討斬藩廣陵相陳敏起兵據揚州冬穎衆入洛陽東海王越以宣帝曽孫琅邪王叡為安東將軍領揚州劉淵陷河東平陽徙都蒲李雄稱帝光熙元成晏平元春東海王越遣將宋胄逼洛陽成都王穎走河北胄引兵西迎大駕河間王顒兵敗走入太白山夏帝還洛陽冬遇毒崩穎顒皆為人所殺懷帝熾永嘉元年春陳敏為其將顧榮所殺東海王越出鎮許昌以南陽王模鎮長安東瀛公騰鎮鄴汲桑攻鄴殺騰秋荀晞擊殺桑琅邪王叡自下邳徙建康賊帥石勒王彌皆降劉淵二漢永鳯元夏王彌逼洛陽諸將擊破彌于七里澗彌自軹闗奔劉淵淵以彌為征東大將軍石勒為平東將軍居樂平冬劉淵稱漢帝張軌感風疾作子茂攝州事三漢河瑞元春劉淵徙都平陽漢將劉景拔黎陽夏石勒略鉅鹿常山衆十餘萬以張賓為謀主東海王越還京師冬劉聰劉曜劉景王彌合兵圍洛陽越擊走之四漢昭武帝聰光興元秋劉淵卒子和立欲盡討諸兄弟弟聰殺和自立石勒南侵洛陽遂至襄陽欲保據江漢張賓以為不可乃還冬東海王越自將討勒索頭猗盧自雲中入雁門并州刺史劉琨以五縣處之五漢嘉平成玉衡元春東海王越薨于甯平石勒追擊其軍盡屠夏王彌劉曜石勒合兵陷洛陽帝蒙塵于平陽秋漢將趙染陷長安殺南陽王模將軍索綝賈匹履取長安琅邪王叡督五州置百官石勒攻荀晞王彌取之六春司空荀藩奉武帝孫秦王子業入長安立為太子秋漢將劉粲攻劉琨拔晉陽索頭猗盧救琨敗漢兵琨表猗盧為代公石勒引兵至淮南遇霖雨還狥河北取襄國居之又擊王浚將段六春禽之愍帝鄴建興元年春劉聰使懷帝著青衣行酒舊臣有哭者聰惡之遂害帝夏太子即位石勒以從弟虎為魏郡太守鎮鄴勒欲取王浚先卑辭厚禮以事之許推為天子甲戌二春石勒襲幽州取王浚斬之夏索綝擊破趙染染走染又與劉曜入寇敗麴允於馮翊詔以張軌為凉州牧西平公軌尋薨子寔襲位賊帥杜弢寇掠汝南三漢建元元秋鎮東將軍王敦遣荆州刺史陶侃相州刺史甘卓擊弢斬之敦始自選置荆揚江湘交廣六州長史寖有跋扈之迹詔以代公猗盧為代王食代常山郡劉聰拜石勒為陜東伯得專征伐封拜牧守列侯以下四漢麟嘉元春劉琨遣將姬澹將兵二萬討石勒澹兵敗琨長史李𢎞以并州降勒琨走依幽州刺史段匹磾冬劉曜圍長安城中食盡帝出降曜以索綝為不忠斬之臣光曰宣帝始以重望髙才䇿名魏室西却諸葛東舉公孫若以忠順終之足為良臣矣遭爽晏忌疾乗間而發專制朝柄誅鉏異已平昔之美埽地盡矣及景文相繼遂遷魏祚武帝席卷全呉纘禹舊服恃其治安荒於酒色以開基之始不為逺圖崇尚浮華敗棄禮法惠帝昏愚不辨菽麥譬如萬金之寳委之中衢無人守之安得不為他人有乎禍生於閨闥成於宗室骨肉相殘而胡羯氐羌鮮卑爭承其弊剖裂中原齏醢生民積骸成丘流血成淵㡬三百年豈不哀哉代王猗盧為其子六脩所殺國人立其弟子鬱律元帝叡建武元年春初稱晉王置百官以王導為驃騎將軍録尚書事劉聰倖臣郭猗王沈譖太弟又殺之冬劉聰害愍帝以劉曜為相國太興元前趙劉曜光和元紹春王即位立子為太子劉聰卒子粲立段匹磾殺劉琨秋祖逖督諸軍屯雍丘以圖中原漢司空靳凖譖諸大臣而殺之因弑劉粲自立冬劉曜石勒合兵討凖滅之曜自立為帝二晉王保建康後趙明帝石勒元春劉曜以石勒為太宰封趙王既而悔之殺勒使者始與勒絶夏曜徙都長安改稱趙冬石勒自稱趙王大單于使張賓執朝政石虎督諸軍帝引劉隗刁協為腹心始與王敦有隙南陽王保稱晉王於祁山三春石虎攻厭次冀州刺史邵續出戰為虎所禽晉王保為其將張春所殺别將陳安殺春降劉曜秋梁州刺史周訪卒以甘卓代之又以譙王氶為湘州刺史以備王敦張寔為妖人劉𢎞所殺弟茂襲位四春石虎拔厭次執段匹磾以歸秋以僕射戴淵都督兖豫冀雍并五州鎮夀陽丹陽尹劉隗都督青徐幽平四州鎮泗口豫州刺史祖逖略定河南地聞王劉構隙知功不成冬憤恚而卒詔以弟約代領其衆永昌元春王敦舉兵向闕帝命王導將兵拒之導兵敗于栗州刁協死劉隗奔石勒詔以敦為丞相都督中外敦殺周顗及戴淵晉王保將陳安自稱凉王夏王敦還武昌殺譙王氶及甘卓帝以憂崩明帝紹太寧元年夏王敦徙屯蕪湖將相岳牧皆出敦門四方貢獻皆入敦府秋石虎拔青州殺刺史曹嶷劉曜攻斬陳安進臨張茂茂稱藩於曜甲申二春石虎寇兖州刺史劉遐退保泗口夏張茂卒兄子駿襲位王敦病甚帝用丹陽尹温嶠謀下詔討之秋敦遣將錢鳯將兵逼建康帝兵五千敦兵三萬㑹敦卒其衆自潰錢鳯王含王應皆死冬石生屯洛陽祖約退保壽陽三春立子衍為太子夏石勒將石良寇兖州殺刺史自淮以北司豫兖州皆没於勒以陶侃都督雍梁荆湘四州帝崩帝明敏有斷時年二十七太子即位年五歲庾太后臨朝后兄中書令亮秉政先是王導為政寛和亮以嚴猛代之衆頗怨懼成帝衍咸和元年夏大水庾亮以遺詔裒進大臣而不及陶侃租約侃約不恱亮懼秋以温嶠為江州刺史以備陶侃冬石勒將石聰寇壽陽祖約求救亮不許厯陽太守蘇峻救之聰走二庾亮惡蘇峻兵强欲召之王導及尚書令卞壼皆以為不可亮不聽召峻為大司農峻疑不赴乞補一荒郡不許峻乃與祖約謀起兵誅執政冬峻襲姑熟屠慈湖温嶠欲入援京師亮不許曰吾憂西方過於厯陽三後趙太和元春蘇峻陷建康庾亮奔潯陽峻自稱録尚書以祖約為太尉温嶠推陶侃為盟主同討峻約夏峻劫帝幸石頭石聰拔夀陽祖約走保厯陽石虎伐劉曜至蒲坂秋曜大破虎於髙堠遂圍洛陽陶侃温嶠攻石頭蘇峻出戰而死其徒推峻子碩為主冬石勒大破劉曜兵禽曜歸殺之四春劉曜太子熙奔上邽石生克長安祖約降于石勒殺之蘇碩兵敗走死秋石虎滅劉熙徙氐羌十五萬落於冀州臣光曰劉淵以匈奴遺種乗晉室之衰奄有河汾天下蠭起之衆輻湊而歸之石勒王彌皆北面為臣聰承其故業遂陷兩都執辱二帝矜夸淫縱殘暴無親幸以病終墳草未生家為屠肆矣曜以疎族屢建大功專制闗中遭靳凖之亂興師討賊遂承漢業及揚戈隴阪則陳安授首投甲西河則張茂稱藩亦戎狄之雄俊也然始與靳氏約降則非義終滅其家則非信使石勒因而自絶則非智乃知二三其徳而能成功者鮮矣及乗髙堠之捷以圍金墉一戰而跌生為禽虜雖其輕易以取禍亦不幸而夭亡也冬將軍郭黙矯詔殺江州刺史劉𦙍五趙建平元夏饑疫陶侃討郭黙斬之侃徙鎮武昌石勒稱大趙天王行皇帝事秋勒即帝位使營鄴宫以其子宏為大單于石虎為中山王虎自以功多怨怒徐光程遐勸勒除之勒不從冬趙郭祇拔襄陽太守周撫走還武昌六夏大旱七夏大水秋陶侃使將軍桓宣擊趙復取襄陽以宣為荆州刺史復脩祖逖之政冬帝遷居新宫八春蜀李壽陷寧州取南中之地夏慕容廆薨子皝弟仁據遼東以叛秋石勒卒石虎殺徐光程遐及勒后劉氏勒子堪太子𢎞請讓位不許冬石生據長安石明以洛陽叛虎皆擊滅之石聰以譙來降甲午九趙海陽王𢎞延熙元夏陶侃薨庾亮代鎮武昌秋李雄卒舎其子而以兄子李班為嗣冬石虎廢𢎞而殺之自稱居攝趙天王李雄子李越殺李班而讓其弟期期以李越為相國以從父漢王壽鎮涪段蘭破慕容皝於栁城咸康元趙武帝虎建武成卬都幽公期玉恒元夏石虎寇厯陽石遇圍襄陽京師大震虎兵遇饑疫而還秋旱冬慕容皝乗凍攻慕容仁殺之代人逐翳槐而立猗㐌之子紇郍翳槐奔趙二春立皇后杜氏旱冬石虎作大武殿基髙二丈八尺教宫人占星及馬射百工伎巧皆與外同虎荒于酒色國事皆委之太子邃三春石虎稱大趙天王太子邃以其弚宣有寵於虎謀殺之秋虎誅邃以宣為太子冬慕容皝自稱燕王置百官遣使稱藩於趙請兵以伐段氏㑹段遼攻薊虎自將兵十餘萬伐之四漢昭文帝壽漢興代昭成帝拓跋什翼犍建國元春虎大破段遼拔令攴遣將納翳槐於代紇郍奔燕虎以慕容皝不㑹令攴移兵討之圍栁城皝遣子恪擊破之又破趙將麻秋於密雲山李期驕暴欲殺李壽壽起兵襲破成都廢期自立更號曰漢代王翳槐卒弟什翼犍立五秋王導卒中書監庾氷代導秉政石虎以太子宣為大單于逮天子旌旗遣將䕫安寇沔南將軍毛寶戰没安掠七萬户而還冬庾亮卒庾翼代鎮武昌石虎將伐燕治兵于鄴戎士五十萬六春慕容皝破趙石城於邊西遣使獻捷冊封皝為燕王皝又伐髙句麗髙句麗請和七春杜后崩燕王皝襲趙幽州入髙陽虜三萬餘戸而還遷都栁城更命曰龍城又伐髙句麗焚九都髙句麗王出走虜其母妻及民五萬餘口八春髙句麗王稱臣於燕以請和夏帝疾甚庾氷以皇子丕幼且懼易世之後親屬愈疎請以帝弟琅邪王岳為嗣帝許之帝崩岳立冬立皇后禇氏石虎大發諸州兵百餘萬將入寇康帝岳建元元年春石虎用太史趙攬言大閲而罷遣其將張㐲都擊張駿駿主簿謝艾擊破之秋李壽卒蜀建寧上庸等五郡皆叛入于趙宇文歸將莫淺渾伐燕燕王皝擊破之甲辰二漢歸義侯勢太和元春燕王皝以慕容翰為前鋒伐宇文歸歸走漠北拓地千里秋帝有疾庾氷欲立㑹稽王昱何充請立皇子聃帝崩聃即位年一歲禇太后臨朝以昱録尚書冬庾氷卒庾翼發六州兵將與燕凉共伐趙聞帝崩氷卒乃還屯夏口穆帝聃永和元年春以禇太后父裒為兖州刺史秋庾翼卒以徐州刺史桓温代鎮武昌李勢弟廣以勢無子求為太弟不許大將鮮思明諫勢怒殺廣及思明思明曰國之不亡以我在也二漢嘉寧元漢將李奕反死冬桓温率所督六州之兵伐漢張駿卒子重華立三春桓温留大兵於彭模以七千人直抵成都李勢降秋趙麻秋攻凉州謝艾擊破之石虎用沙門呉進言發六十萬人晝夜修城死者數萬太子宣出祭山川從戎卒八萬虎曰我父子如此非天崩地陷當復何愁宣弟秦公韜有寵於虎宣惡之四秋宣使盜殺韜欲因虎臨喪而弑之事覺虎燒宣虎幼子世年十歲其母劉曜女也虎愛之乃舎其長子燕公武彭城公遵而立世為太子以劉氏為后故東宫衛士皆謫戍凉州燕王皝薨五趙太寧燕景昭帝儁元春石虎即帝位東宫衛士作亂姚弋仲擊斬之虎卒子世立夏世兄遵與姚弋仲苻洪冉閔自河内率兵入鄴殺世而立遵奪苻洪雍州洪怒據枋頭自稱三秦王秋禇裒聞趙亂伐趙大敗而還石遵欲殺冉閔冬閔殺遵立其弟鑒鑒復欲殺閔閔遂囚鑒盡殺諸胡六趙新興王祇永寧魏悼武天王冉閔永興元春冉閔殺石鑒稱魏帝於鄴石祇稱帝於襄國夏祇使石琨擊魏魏將王泰擊敗之苻洪為麻秋所鴆其子健殺秋因率衆入闗逐趙將杜洪據長安七秦明帝苻健皇始元秦苻健自稱秦天王冉閔圍襄國石祇求救于燕及姚弋仲燕恱綰及姚襄救之閔敗奔還鄴祇追之反為閔所敗夏趙將劉顯殺祇降魏臣光曰石勒以胡羯餓𨽻崛起皂櫪之間連百萬之衆横行天下斲喪晉室東禽荀晞北取王浚西逐劉琨南舉兖豫皆如俯拾地芥劉曜席戰勝之威長驅伊洛有并吞山東之志勒舉鞭一麾曜惛然就縛遂兼其國奄有中區羌氐咸服其才不有過人者能如是乎虎以悍戾之資濟貪狡之志賊虐其孤而剽奪其位恃其詐力以凌人暴物窮奢極欲不可盈饜自以為非天崩地陷則抱子弄孫無復後憂及夫父子相殘兄弟相攻尸浮漳濱家無噍𩔖積惡不已捨滅亡何適哉梁州刺史司馬勲伐秦不克八燕元璽元春慕容恪伐魏虜冉閔殺之姚弋仲卒其子襄為秦所破來降夏豫州刺史謝尚與襄共伐秦及秦主戰潁上尚襄大敗乃留襄屯淮南秋燕慕容評拔鄴虜魏太子智冬燕王儁初稱帝徙都鄴九冬中軍將軍殷浩伐秦以姚襄為前鋒既而疑襄遣使止之襄反擊浩浩兵大敗走保譙城襄收其資仗屯芍陂桓温表廢浩官冬張重華卒其庶兄祚廢重華子曜靈而自立殺謝艾甲寅十凉長寧侯祚和平元春張祚稱凉帝初㑹稽王昱輔政引殷浩為宰相欲以敵桓温温因浩敗奏免浩官而自伐秦夏破秦太子萇於藍田進次霸上三輔郡皆降㑹食盡反為萇所敗乃還秋萇卒秦主立萇弟生為太子十一秦越厲王生壽光元涼沖公𤣥靚建興四十三夏姚襄自稱大單于秦主健卒太子生立張祚惡其將張瓘宋混欲殺之瓘混起兵攻姑臧殺祚復立重華之子𤣥靚為凉州牧西平公瓘為撫軍將軍秉政十二春秦主以讒殺司空王墮秦主猜忌殘暴勲舊忠良害之略盡臣下皆朝不謀夕姚襄寇許昌汝南秋桓温自江陵討之大破襄兵於伊水襄奔平陽温遂入洛陽修復陵廟遣將軍毛虎戍之而還冬慕容恪拔廣固虜段龕升平元秦宣昭帝堅永興燕光壽元夏姚襄合諸羌進據黄落秦廣平王眉東海王堅擊斬之襄弟萇率衆降秦秦主忌眉之功殺之又欲殺堅堅與其將吕婆樓等共弑秦主而自立秋立皇后何氏二春秦張平反秦主自討降之以平子蜓為將秦主任處士王猛以國政太后弟茍强譖之秦主怒斬强由是人無能問者秋遣中郎將謝萬屯下蔡郄曇屯髙平諸葛攸屯武陽以圖北伐三秦甘露元夏涼張瓘謀殺宋混廢張𤣥靚而自立混攻殺瓘混為尚書令秉政冬謝萬等與燕大司馬慕容恪戰萬等大敗四燕幽帝暐建熙元春燕王儁殂太子暐立朝廷聞之以為中原可圖桓温曰慕容恪在憂方大耳燕太師慕容根説恪廢燕王而自立恪不從又勸燕王誅恪因欲篡位燕王殺之五夏涼宋混卒弟澄代為政帝崩禇太后復立成帝子琅邪王丕秋立皇后何氏凉張邕殺宋澄而代之冬張𤣥靚叔父天錫復殺邕而代之稽古録卷十三
