body:
  text: 有虞氏下帝作歌曰股肱喜哉元首起哉百工熙哉元首君也股肱之臣喜樂盡忠君之治功乃起百官之業乃廣言君得良臣乃能致治臯陶賡之曰元首明哉股肱良哉庶事康哉賡續也言人君選任之明則股肱大臣無不忠良大臣忠良則天下衆事無不安者言治安之本在君明又歌曰元首叢脞哉股肱惰哉萬事墮哉叢脞細碎無大畧明主好要闇主好詳主好要則百事詳主好詳則百事荒君既不知治要躬親細務則大臣無所事事皆解體不為用萬事非一人可治故皆墮壊舜老有子商均亦不肖不足𫝊天下乃命禹攝行天子事舜命禹征有苗三旬苗民逆命益贊于禹曰惟徳動天無逺弗届贊佐届至也益以此義佐禹欲其修徳致逺滿招損謙受益時乃天道自滿者人損之自謙者人益之是天之常道至諴感神矧兹有苗諴和也矧况也至和感神况有苗乎言易感禹拜昌言曰俞班師振旅昌當也以益言為當故拜受而然之遂還師兵入曰班振言整衆帝乃誕敷文徳逺人不服大布文徳以來之舞干羽于兩階干楯羽翳也皆舞者所執脩闡文教舞文舞于賓主階間抑武事七旬有苗格討而不服不討自來明御之者必有道舜生三十徵庸始見試用三十在位厯試二年攝位二十八年五十載而崩舜服堯喪三年其一在五十之數故為天子五十年壽百一十二歲禹封舜後於虞而客之及周武王克商封舜後胡公於陳賜姓媯氏孔子曰後世雖有作者虞帝弗可及也已矣夏后氏上夏后姒姓曰文命髙陽之孫鯀之子也堯命鯀治水功不成舜臣堯殛鯀于羽山舉禹使代父治水廢父興子堯舜之道天乃錫禹洪範九疇洪大範法疇類也洛出書神龜負文而出列于背有數至于九禹因而第之以成九類一五行二五事三八政四五紀五皇極六三徳七稽疑八庶徵九五福六極禹治水順五行之性循天地之理不墮山不崇藪壅者決之滯者導之行水於其所無事故功易成禹治水勤勞陸行乗車水行乗舟泥行乗橇子絶切形如箕擿行泥上山行乗梮紀録切以鐵如錐頭長半寸施之履下以上山不蹉跌也娶塗山氏女厯辛壬癸甲四日復往治水塗山氏女生子啓禹過門聞啓呱呱音孤而泣不入視之時下民昏墊丁念切昏瞀墊陷言困水災艱食難得食禹隨山刋木隨行山林斬木通道與益得禽獸佐民食決九川距四海濬畎澮距川距至也決九州名川通之至海一畝之間廣尺深尺曰畎方百里之間廣二尋深二仞曰澮澮畎濬之至川亦入海平田無水與稷教民播種百穀濬川得魚鼈佐民食濬深其流烝民乃粒萬邦作乂米食曰粒言天下由此為治本禹分天下為冀兖青徐揚荆豫梁雍九州任土作貢任其土地所有定其貢賦之差九州攸同四隩既宅四方之宅已可居九山刋旅九川滌源九澤既陂九州名山已槎木通道而旅祭矣九州之川已滌除泉源無壅塞矣九州之澤已陂障無決溢矣四海㑹同四海之内㑹同京師九州同風萬國共貫庶土交正底愼財賦交俱也衆土俱得其正謂壤墳壚致所慎者財貨貢賦言取之有節用之有度咸則三壤成賦中邦皆法壤田上中下大較三品成九州之賦明水害又除以天下近逺分甸侯綏要荒五服辨諸侯職守東漸于海西被于流沙朔南暨聲教漸入也被及也此言五服之外皆與王者聲教而朝見訖于四海堯乃錫禹𤣥圭告厥成功稽古録巻四欽定四庫全書稽古録巻五宋司馬光撰
