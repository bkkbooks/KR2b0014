body:
  text: 稽古録卷十一宋司馬光撰景王貴元年楚郟敖麋元夏閽弑呉子餘祭弟夷末立晉平公杞出也故合諸侯之大夫以城杞呉季札聘于上國秋齊髙止出奔北燕冬鄭公孫黒將攻伯有大夫和之盟於伯有氏禆諶曰禍未歇也二衛襄公惡呉子夷末元蔡景侯通於太子般之妻夏般弑景侯儋括作亂將立王子佞夫王殺佞夫宋災伯姬卒鄭良霄耆酒秋公孫黒攻之出奔許自許襲鄭不克而死冬諸侯大夫㑹于澶淵鄭子皮授子産政鄭由是復興三蔡靈侯般元夏魯襄公薨魯人立公子稠年十九而猶有童心比葬三易衰君子知其不終莒犂比公生去疾及展輿既立展輿又廢之冬展與弑莒子自立四魯昭公稠元春趙武楚公子圍及諸侯之大夫㑹于虢魯伐莒取鄆夏鄭放游楚于呉秦伯之弟鍼出奔晉秋莒去疾自齊入于莒莒展輿出奔呉冬楚公子圍弑郟敖自立圍弟比奔晉黒肱奔鄭五楚靈王䖍元晉韓起為政諸大夫强政出多門公室始卑夏晉侯娶少姜於齊尋卒秋鄭子晳將作亂欲去游氏而代其位傷疾作而不果子産殺之六春齊侯使晏嬰請繼室於晉晉侯許之嬰與叔向語皆知其公室之將衰也冬北燕簡公欲去諸大夫而立其寵人大夫比以殺公之外嬖公出奔齊七春楚靈王求諸侯于晉晉人許之夏楚㑹諸侯于申執徐子以伐呉執齊慶封殺之遂滅賴申無宇曰楚禍之首將在此矣召諸侯而來伐國而克王心不違民其居乎甲子八春魯人舍中軍四分公室季孟叔孫盡征之而貢于公楚子娶于晉晉韓起羊舌肸如楚送女夏莒牟夷以牟婁及防兹奔魯冬楚子以諸侯伐呉呉子使其弟蹶由犒師楚子執之九秦哀公元夏宋華亥與寺人栁譖華合比逐之秋楚薳洩伐徐呉救之令尹子蕩伐呉呉敗其師於房鍾子蕩歸罪於薳洩而殺之齊侯伐燕納簡公十春燕人賂齊侯不克而還楚子為章華之臺願與諸侯落之使薳啓疆召魯侯魯如楚秋衛襄公薨長子孟縶有足疾立少子元晉人反戚田于衛十一衛靈公元元陳哀公元妃生太子偃師二妃生公子留留有寵屬諸司徒招與公子過哀公有廢疾招過殺太子而立留夏哀公縊留出奔鄭晉侯成虒祁之宫諸侯畢賀歸而皆有二心冬楚公子棄疾奉孫呉以伐陳遂滅陳十二春諸侯之大夫㑹楚子于陳楚人遷許于夷晉與周爭閻田晉梁丙張趯率隂戎伐潁王讓于晉晉人致閻田十三夏齊陳氏鮑氏逐欒施室髙疆施疆出奔魯齊公益弱陳氏始大十四晉昭公夷宋元公佐元夏楚子䖍誘蔡侯般殺之于申楚公子棄疾圍蔡諸侯之大夫㑹于厥憗謀救蔡也冬楚滅蔡執蔡世子有以歸用之楚子大城陳蔡不羮申無宇曰末大必折尾大不掉必害於國十五冬魯南蒯謀去季氏不克以費叛楚靈王使蕩侯圍徐次於乾谿以為之援靈王驕侈欲求周九鼎又卜曰余尚得天下不吉投龜詬天民患王之無厭故從亂如歸十六蔡平侯廬陳惠公呉鄭定公寧元夏楚觀從以蔡公棄疾命召公子比公子黒肱遂奉棄疾帥陳蔡不羮許葉之師以入楚殺太子禄比為王黒肱為令尹楚師潰于乾谿靈王縊棄疾殺比及黒肱而自立封陳蔡復遷邑秋晉昭公合諸侯盟于平丘以邾莒之訴執魯季孫意如十七楚平王居元春費人逐南蒯蒯奔齊秋莒蒲餘侯殺公子意恢逐郊公而立著丘公之弟庚輿甲戌十八曹平公須元秋晉荀呉伐鮮虞圍鼔鼔人或請以城叛弗許使鼓人殺叛人而繕守備鼓人告食竭力盡然後取之呉子夷末薨將立季札季札逃國人立夷末之子僚十九呉王僚元春楚子誘戎蠻子殺之齊侯伐徐徐子及莒人從齊侯盟且賂之無伯故也夏魯子服囘如晉還曰晉君幼弱六卿强而奢傲將因是以習習實為常能無卑乎二十晉頃公去疾元秋晉荀呉滅陸渾冬呉伐楚楚司馬子魚大敗呉師二十一夏宋衛陳鄭災冬楚王子勝遷許于白羽二十二曹悼公午元楚平王使伍奢為太子建師費無極為少師無極無寵乃為建聘婦于秦既而勸王取之又大城城父而置太子焉夏許悼公飲太子止之藥薨太子奔晉春秋書止弑其君二十三春楚費無極譖太子及伍奢將叛太子奔宋又奔鄭楚子殺伍奢及其子尚少子員奔呉秋衛齊豹殺衛侯之兄縶衛侯如死鳥北宫氏攻齊氏滅之衛侯反國呉殺宣姜冬宋華亥向寧華定作亂出奔陳華登奔二十四蔡悼侯東國元夏宋華貙召華亥向寧華定復入于宋南里以叛華登以呉師救之宋師敗宋公欲出㕑人濮止之晉齊衛救宋大敗華氏圍諸南里冬楚費無極取貨于蔡平侯之弟東國使蔡人逐太子朱而立之二十五春楚薳越救華氏華氏向氏出奔楚景王愛長庶子朝劉耿單旗惡之王與賓孟謀殺劉單而立朝未及而崩夏劉單殺賓孟立王子猛子朝攻劉王室亂王猛居于皇復入于王城猛尋卒劉單立其母弟匄敬王匄元年春魯人取邾師晉人執魯行人叔孫婼莒子庚輿虐秋國人逐之出奔魯齊人納郊公呉敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧天王出居于狄泉尹氏立王子朝二蔡昭侯申元春晉侯使士景伯涖問周故立於乾祭而問於介衆乃辭王子朝不納其使子太叔言於范獻子以寧王室獻子與韓宣子圖之乃召諸侯期以明年甲申三夏諸侯之大夫㑹于黃父以謀王室魯昭公與臧昭伯郈昭伯謀去季氏子家羈曰不可不聴秋伐季氏季孫意如請以五乗亡弗許叔孫氏孟氏救之公徒敗公奔齊次于陽州四宋景公頭曼元春齊侯從魯取鄆以處魯侯齊侯將納魯侯季氏賂梁丘據圍成不克而還秋齊侯魯侯盟于鄟陵晉知躒趙鞅帥師納王冬召伯盈逐王子朝尹氏召氏毛伯奉王子朝及周之典籍奔楚王徙都成周五楚昭王軫元春呉師伐楚圍潛夏呉諸樊之子光弑王僚而自立楚費無極譖郤宛殺之秋晉士鞅及諸侯之大夫盟于扈令戍周且謀納魯侯士鞅取貨于季孫而以難復冬諸侯之師戍成周宋人執曹悼公曹人立其弟野六曹聲公野呉王闔廬元春魯侯如晉不見受次于乾侯夏晉殺祁盈楊食我呉王闔廬召伍員寵任之與謀國事七鄭獻公蠆元春魯侯歸于鄆齊人卑之復入晉次于乾侯王殺召伯盈及尹固八呉公子掩餘公子燭庸奔楚楚子封之於養冬呉王闔閭㓕徐徐子章羽奔楚呉子問伐楚之謀於伍員員曰為三軍以肄焉彼出則歸彼歸則出既罷而後以三軍繼之必大克之從之楚於是乎始病九晉定公午元春晉侯將以師納魯侯范獻子請召季孫季孫㑹晉荀躒於適厯請從君以歸躒與季孫如乾侯昭公不肯歸曰見夫人者有如河荀躒掩耳而走冬邾黒肱以濫奔魯賤而春秋書名懲不義也十夏呉始伐越冬晉魏舒合諸侯之大夫于狄泉城成周罷戍人魯昭公薨于乾侯晉史墨曰政在季氏於此君也四公矣民不知君何以得國是以為君慎名與器不可以假人曹平公之弟通弑聲公十一魯定公宋曹隠公通元夏魯昭公之喪歸于魯魯人立其弟公子宋十二秋楚令尹囊瓦伐呉呉敗其師于豫章遂圍巢克之甲午十三蔡昭侯唐成公朝于楚囊瓦欲得其裘與馬弗與三年止之蔡侯歸如晉以其子及大夫之子為質而請伐楚十四春諸侯㑹于召陵晉荀寅求貨於蔡侯弗得乃辭蔡侯蔡為晉滅沈冬蔡侯及呉子唐侯伐楚大敗囊瓦於柏舉囊瓦奔鄭呉入郢楚昭王奔隨伍胥鞭平王尸申包胥求救于秦曹聲公之弟露弑隠公十五陳懐公栁曹靖公露元春殺子朝于楚夏越入呉秦師救楚大敗呉師呉夫槩王歸自立以與呉子戰而大敗奔楚楚子還入郢秋楚滅唐魯季孫意如卒家臣陽貨囚其子斯而專魯政十六春鄭滅許夏呉人敗楚師楚國大懼令尹子西喜曰乃今可為矣於是遷郢於鄀而改紀其政以定楚國秋陽虎盟魯侯及三桓於周社冬儋翩以子朝之徒作亂王處於姑蕕十七春儋翩入于儀栗以叛齊人歸魯鄆陽闗陽虎居之以為政秋齊侯鄭伯盟于鹹齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙始叛晉也齊國夏伐魯冬王入于王城十八春魯侯侵齊夏齊國夏伐魯晉涉佗盟衛侯于鄟澤捘其手衛復叛秋晉士鞅侵鄭遂侵衛冬陽虎欲去三桓而代其位將享季孫斯于蒲圃而殺之斯入于孟氏虎劫魯侯及叔孫以攻孟氏弗克入于陽闗以叛十九陳閔公越曹伯陽元夏魯伐陽闗陽虎奔齊請伐魯鮑文子曰魯衆庶猶睦若之何取之君富於季氏此虎所欲傾覆也齊人執之逃奔宋又奔晉適趙氏秋齊侯伐晉夷儀衛侯㑹之秦哀公薨孫惠公立二十秦惠公鄭聲公勝元夏魯侯及齊侯㑹于夾谷孔子相齊人歸魯鄆讙龜隂之田晉趙鞅圍衛殺渉佗魯侯犯以郈叛秋郈人駟赤逐之犯奔齊宋公之弟辰暨仲佗石彄公子地出奔陳二十一春辰佗彄地自陳入于蕭以叛樂大心從之大為宋患宋公寵向魋故也二十二夏魯仲由為季氏宰將墮三都叔孫氏墮郈公山弗擾以費人襲魯弗克遂奔齊遂墮費將墮成公斂處父不可魯侯圍成弗克甲辰二十三春齊侯衛侯伐晉河内晉趙鞅殺邯鄲午午荀寅之甥也寅范吉射之婣也秋范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之冬荀躒韓不信魏曼多奉晉侯以伐范中行氏荀寅范吉射奔朝歌韓魏以趙氏為請晉侯許之二十四越王勾踐元春衛公叔戍奔魯楚滅頓夏呉伐越越子勾踐敗呉于檇李闔閭傷將指而薨晉人圍朝歌齊侯魯侯㑹于牽以救之衛靈公為夫人南子召宋朝于宋太子蒯聵羞之將殺南子弗克出奔于宋二十五呉王夫差元春楚滅胡二十六魯哀公蔣元春楚子圍蔡蔡人聴命師還蔡遷于呉呉王夫差敗越於夫椒勾踐棲於㑹稽請委國為臣妾夫差許之子胥諌曰去疾莫如盡不聴退曰二十年之外呉其為沼乎二十七夏衛靈公薨衛人立蒯瞶之子輒晉趙鞅納蒯瞶于戚秋齊輸范氏粟鄭罕達送之與晉師戰于鐡鄭師敗績冬蔡遷于州來二十八衛出公輒燕獻公元春齊國夏衛石曼姑圍戚夏趙鞅殺萇𢎞冬趙鞅圍朝歌荀寅奔邯鄲二十九春蔡公孫翩弑昭侯夏晉人執戎蠻子赤歸于楚秋趙鞅圍邯鄲冬荀寅奔鮮虞齊國夏伐晉取八邑㑹鮮虞納荀寅于栢人三十秦悼公蔡成侯朔元春晉圍栢人荀寅范吉射奔齊齊景公愛幼子荼故不立太子公疾使國惠子髙昭子立荼寘羣公子于萊秋公薨羣公子皆出亡公子陽生奔魯三十一齊孺子荼元春呉伐陳楚子救陳夏齊陳乞鮑牧以兵逐國子髙子國髙奔魯陳乞使逆公子陽生于魯而立之殺孺子荼三十二齊悼公陽生楚惠王章元夏魯侯㑹呉于鄫呉責百牢于魯秋魯侯入邾執邾子益以歸曹公孫疆言霸説于曹伯陽伯陽説之使為政乃背晉而奸宋宋人伐之晉人不救甲寅三十三春宋公滅曹執曹伯陽殺之呉伐魯及萊門齊悼公逆季姬于魯魯人弗與悼公怒伐魯取讙及闡又請師于呉魯人歸季姬悼公喜歸讙及闡又殺鮑牧及胡姬魯人歸邾隠公于邾三十四春齊侯辭呉師呉子怒與魯謀伐齊宋取鄭師于雍丘秋宋公伐鄭呉城邗溝通江淮三十五春邾隠公奔齊呉子魯侯伐齊齊人弑悼公以說于呉呉子三日哭將以舟師自海入齊齊人敗之乃還夏晉趙鞅伐齊冬楚子期伐陳呉延州來季子救陳三十六齊簡公壬元春齊國書髙無㔻伐魯戰于郊夏呉將伐齊越子朝且獻賂焉子胥曰是豢呉也呉子及魯侯大敗齊師于艾陵獲國書歸賜子胥屬鏤以死冬孔子自衛反魯正禮樂刪詩書三十七夏魯侯㑹呉于槖臯衛侯㑹呉于鄖呉人將執衛侯子貢說太宰嚭乃止三十八春鄭罕達取宋師于嵒夏呉子晉侯㑹于黃池爭長越子伐呉入之獲太子友呉子惡其聞也自剄七人于幕下三十九春魯人獲麟孔子作春秋齊闞止有寵于簡公使為政諸御鞅曰陳闞不可並也弗聴止欲去陳氏夏陳恒攻止殺之遂執簡公于舒州弑之立其弟驁恒專齊政宋桓魋之寵害於公公討之魋入于曹以叛遂奔衛四十齊平公驁衛莊公蒯瞶元春魯公孫宿以成叛如齊魯使子貢如齊齊歸成于魯冬衛蒯瞶因衛渾良夫孔伯姬以入于衛劫孔悝以逐輒而自立仲由死之輒奔魯又奔齊四十一夏孔子卒衛莊公飲孔悝酒而遣之孔悝載伯姬出奔宋楚太子建之子勝在呉子西召之葉公諌不聴使為白公秋白公作亂殺子西子期子閭劫惠王自為令尹葉公率方城外人以入攻白公滅之四十二春衛太子疾殺渾良夫越子敗呉於笠澤秋楚滅陳衛莊公不朝于晉冬晉趙鞅伐衛逐莊公而立公孫般師晉師還莊公復入于衛石圃作亂莊公死于戎州已氏齊人伐衛立靈公之子起執般師以歸甲子四十三衛侯起元春宋公殺右師皇瑗楚公子寧敗巴師于鄾夏衛石圃逐其君起起奔齊衛侯輒自齊復歸逐石圃元王仁元年秦厲共公元衛出公後元春越人侵楚二夏齊人魯人鄭人㑹于廩丘謀伐晉冬越敗呉師于艾及郊敗之遂圍呉三晉出公錯元夏越人始通使於上國四夏邾隠公自齊奔越越人歸之邾太子革奔越越圍呉三年冬呉師潰夫差請委國為臣妾勾踐不許夫差乃自殺曰死者有知吾何面目以見子胥也五夏晉荀瑤伐齊敗齊髙元卒於犂丘六蔡聲侯産元夏晉侯及魯臧石伐齊取廩丘魯哀公以嬖妾為夫人以其子荆為太子國人始惡之哀公朝于越越太子適郢將妻公而多與之地季孫懼因太宰嚭以納賂焉乃止七夏衛褚師比及諸大夫逐衛侯輒輒奔宋請師于越魯侯歸自越季康子孟武伯逆於五梧語相侵也公與大夫始有惡八夏越臯如后庸宋樂茷魯叔孫舒伐衛納出公衛公孫彌牟重賂越人申開守郫而納公公不敢入師還立蒯瞶之弟黚出公卒于越宋景公無子取公孫周之子得與啓畜于公宫未立而薨大尹矯命立啓六卿逐啓及大尹而立得貞定王介元年衛悼公黚宋昭公得元晉荀瑤伐鄭齊陳成子救之晉師還魯哀公將以越伐魯而去三桓故出奔越魯人立其子寧甲戌二魯悼公寧元三四五燕孝公元晉荀瑤圍鄭恥趙襄子襄子由是惎知伯六七鄭哀公易元八秦伐大荔取其王城九十十一甲申十二晉三卿宴於藍臺知襄子戲韓康子而侮段規知伯國諌曰主不備難必至矣曰我不為難誰敢興之對曰蜹蟻蜂蠆皆能害人况人之君相乎弗聴十三晉哀公驕蔡元侯元晉知氏韓氏趙氏魏氏專政出公欲去之四卿反攻公公出奔齊昭公孫忌善於知伯而早死故知伯立忌之子驕而相之國事皆决於知伯十四齊宣公就匝元鄭人弑哀公而立聲公之弟丑十五鄭共公丑元十六晉知伯請地於韓魏韓魏與之請地於趙趙襄子不與知伯怒攻趙氏趙襄子走保晉陽知伯以晉師圍而灌之城不没者三板襄子夜使張孟談私於韓康子魏桓子韓魏與襄子合攻知伯滅之分其地十七十八十九衛敬公費蔡侯齊元二十燕成公元二十一甲午二十二楚滅蔡二十三二十四楚滅杞二十五秦伐義渠虜其王二十六二十七秦躁公元二十八王崩太子去疾立是為哀王五月弟叔襲殺去疾而自立是為思王五月叔弟嵬攻殺叔是為考王封其弟於河南以續周公之職是為東周桓公秦南鄭反考王嵬元年二三甲辰四晉幽公栁元五六七八燕閔公元九十楚簡王仲衛昭公糾元楚滅莒十一魯元公嘉元十二秦躁公薨國人立其弟懷公十三秦懷公元甲寅十四十五衛公子亹弑昭公而代之威烈王午元年衛懷公亹元晉趙襄子卒襄子以兄伯魯之不立不肯置嗣以伯魯之孫浣為後浣生烈侯秦庶長嵬弑懐公懐公太子曰昭子早卒國人立其子靈公二秦靈公元三鄭幽公已元晉韓武子伐鄭殺幽公鄭人立其弟駘四鄭繻公駘元五六晉幽公夜竊出邑中盜殺之魏斯以兵誅亂者立幽公之子止七晉烈公止元八甲子九十十一衛敬公之孫頽弑懷公而代之秦靈公薨國人廢其子獻公而立其季父簡公名衛十二秦簡公衛慎公頹元十三十四十五十六十七魯穆公顯元十八晉魏斯使樂羊伐中山克之使其子擊守中山又伐秦至鄭韓䖍伐鄭取雍丘齊人伐魯取成甲戌十九楚聲王當元鄭人敗韓氏於負黍魏斯好賢以卜子夏田子方為師過段干木之廬必式之任李克為政用呉起為西河守魏由是强於三晉二十二十一二十二齊康公貸元右伏羲氏至周威烈王二十三年臣今所補二十三魏文侯斯韓景侯䖍趙烈侯籍宋悼公購由元初命晉大夫魏斯韓䖍趙籍為諸侯先是大夫専國者多矣未有敢自君者至是三大夫始受天子之命禮之紀綱盡矣二十四燕僖公元盜殺楚聲王國人立其子類安王驕元年楚悼王類元二魏人韓人趙人伐楚至桑丘鄭人圍韓陽翟趙烈侯薨弟武侯立三秦惠公韓烈侯取趙武侯元四楚人圍鄭鄭人殺其相駟子陽甲申五盜殺韓相俠累六鄭駟子陽之黨弑繻公而立幽公之弟乙七宋休公田鄭康公乙元八九十晉孝公頃元十一齊田和遷康公于海上食一城以奉其祀十二十三齊田和㑹魏文侯楚人衛人於濁澤求為諸侯文侯為之請于王王許之十四甲午十五蜀伐秦取南鄭趙武侯薨國人復立烈侯之太子章十六秦出公魏武侯擊韓文侯趙敬侯章齊大公田和元初命田和為諸侯十七秦庶長改逆獻公于河曲而立之沈出子及其母于淵秦數有亂益衰弱三晉侵奪其河西地十八秦獻公齊桓公午元魏相公叔疾呉起之賢譖諸武侯呉起奔楚楚悼王恱之以為相呉起乃為明法審令廢不急之官罷公族疏逺者以撫養戰士故楚國强盛諸侯畏服而貴戚怨之十九二十二十一楚悼王薨宗室大臣攻呉起殺之并中王尸肅王即位誅為亂者七十餘家二十二楚肅王臧元二十三齊康公薨田氏絶其祀齊桓公薨齊威王即位齊始强於天下二十四齊威王田齊元甲辰二十五晉靖公俱酒元二十六韓哀侯魯共公奮元趙魏韓共廢晉靖公為家人而分其地烈王喜元年韓滅鄭因徙都之二趙成侯種元三四衛聲公訓宋辟公兵燕桓公元五韓嚴遂弑哀侯韓人立其子懿侯魏武侯薨無適子公子罃與公中緩爭立國内亂六魏惠王罃韓懿侯元齊威王來朝楚肅王薨弟良夫立七楚宣王良夫宋公剔成元王崩弟扁立韓懿侯趙成侯因魏之亂伐魏大敗魏師於濁澤遂圍魏趙欲弑罃立公中緩割地而退韓欲兩分之趙不可韓怒以其師夜去趙師亦歸魏罃遂滅緩顯王扁元年甲寅二三四五秦獻公敗三晉之師于石門斬首六萬天子錫以黼黻六七秦獻公薨孝公即位是時六國强大皆擯斥秦夷翟遇之楚有巴巫黔中魏有華隂上郡秦孝公乃發憤修政欲興穆公之業八秦孝公衛成侯速燕文公元秦孝公下令求賢師羣臣有能出奇計强秦者尊用之魏相公叔痤知衛鞅之賢薦之魏惠王王不能用衛鞅西入秦孝公與語大悦九十秦孝公以衛鞅為左庶長鞅欲變法秦大臣固爭鞅曰民可與樂成難與慮始孝公卒用鞅言變法令明爵秩黜奸慝務耕織禁墮游尊戰士下無功太子犯法鞅黔其師公孫刑其傅公子䖍明日秦人皆趨令鄉邑大治十一韓昭侯元甲子十二十三十四十五魯康公屯元秦人敗魏人於元里取少梁魏惠王伐趙圍邯鄲趙告急于齊十六齊威王使田忌將兵以孫臏為師以救趙忌用臏言直趣大梁魏釋趙而還自救與齊師戰于桂陵魏師敗績臏與魏將龎涓同學兵法涓自知不如臏誘而刑之臏逃入齊田忌薦之威王威王用之十七十八韓昭侯以申不害為相内修法制外應諸侯韓由是興十九秦徙都咸陽初并小都鄉邑聚以為縣縣置令丞凡三十一縣廢井田開阡陌皆衛鞅之謀也趙威侯薨公子緤與太子爭立不勝奔韓二十趙肅侯元二十一甲戌二十二二十三衛更貶號曰侯服屬于三晉二十四魯景公偃元二十五二十六秦益强天子致伯諸侯畢賀秦伯使公子少官㑹諸侯於逢澤以朝天子二十七二十八魏龎涓伐韓齊旧忌救韓伐魏龎涓釋韓追齊獲師孫臏伏兵于馬陵以邀之殺龎涓大敗魏師魏太子申衛鞅說孝公因魏敗逐之使東則秦可以全據山河之固東制諸侯也二十九秦衛鞅伐魏魏公子卬禦之鞅詐魏公子與飲因執之以擊魏師大敗之魏惠王懼自安邑東徙大梁乃恨不用公叔之言秦封衛鞅為商君三十楚威王商元三十一商君相秦法令苛酷臨渭論囚渭水盡赤秦人上下怨之孝公薨公子虔之徒告商君謀反商君奔魏魏弗受内之秦秦車裂商君滅其族甲申三十二秦惠王元韓申不害卒三十三三十四三十五魏後元魏惠王齊威王㑹于徐州以相王越王無疆伐楚楚人大敗之殺無疆冬取故呉地越以此散周人蘇秦說燕文侯與趙合從以拒秦文侯聴之三十六蘇秦說趙肅侯以六國合從之術云秦伐一國五國共救之不如約者五國共伐之肅侯使蘇子約韓魏齊楚皆聴蘇子并相六國為從約長又恐秦敗從約乃激怒張儀入之于秦秦惠王以儀為客卿三十七韓宣惠王燕易王衛平侯齊宣王辟疆元秦使犀首欺齊魏與共伐趙趙肅侯以讓蘇子蘇子慙恐請使燕必報齊蘇子去趙而從約皆解趙決河水灌齊魏之師乃去三十八三十九魏獻西河之地于秦四十宋公剔成之弟偃攻剔成剔成奔齊四十一楚懷王槐宋康王偃元秦公子華張儀伐魏取蒲陽儀言于惠王復以與魏又以公子繇為質儀因説魏王盡入上郡十五縣于秦以謝秦以張儀為相甲午四十二四十三趙肅侯薨武靈王即位加故臣肥義秩克己為政四十四趙武靈王元秦始稱王四十五秦後元衛嗣君元秦張儀平陜蘇秦自燕奔齊為間四十六燕魏皆稱王趙武靈王獨不肯曰無其實敢有其名乎令國人謂已為君四十七秦張儀相魏欲令魏先事秦而諸侯効之四十八愼靚王定元年燕王噲元衛更貶號曰君獨有濮陽二三魏襄王元楚趙韓魏燕伐秦攻函谷闗秦人出兵五國皆敗走甲辰四秦敗韓師於脩魚斬首八萬獲申差諸侯震恐魏王因張儀以請成于秦張儀歸復相秦齊大夫有與蘇秦爭寵者刺秦而殺之五魯平公祚元秦惠王欲伐蜀張儀以為不如伐韓司馬錯曰蜀亂易取而可以廣地富民天下不以為貪暴是我一舉而名實附也遂使錯伐蜀滅之秦益富强蘇代與燕相子之為姻代説燕王噲以國讓子之是與堯同名也王從之六赧王延元年秦敗韓師于岸門韓太子倉質于秦燕子之專國三年國内大亂齊王使人說燕太子平使攻子之平與將軍市被圍公宫攻子之不克連戰數月死者數萬人齊使章子伐燕殺燕王噲及子之二齊湣王地元秦患齊楚從親乃使張儀說楚懐王令與齊絶許賂以地六百里楚王許之陳軫諌曰秦重楚者以有齊也若絶齊秦必負王二國之兵將俱至矣不如隂合而陽絶之楚王不聴秦果負約三楚王將伐秦陳軫諌曰不如因以一名都賂之與之伐齊以取償焉不聴遂伐秦秦大破楚師於丹浙斬首八萬獲屈匄取漢中楚復悉兵以襲秦又敗于藍田韓魏乗楚困皆來襲楚楚乃割二城以和于秦四韓王倉燕昭王平元楚王求張儀於秦秦與之楚王用嬖臣靳尚幸姬鄭袖之言弗果殺燕人立昭王昭王怨齊欲報之乃苦心勞志撫民求士郭隗曰王欲致士請從隗始王築宫師事之於是樂毅自魏往劇辛自趙往五秦武王元張儀與秦武王有隙乃去秦相魏遂卒于魏六七秦甘茂伐韓宜陽茂曰宜陽大縣也攻之未易卒拔臣羇旅之臣也樗里子公孫奭挾韓而議之王必聴之武王曰寡人不聴也與之盟于息壤而遣之甲寅八甘茂圍宜陽五月不拔樗里子爭之王欲罷兵茂曰息壤在彼乃益兵而拔之斬首六萬秦武王好力扛龍文赤鼎絶脈而死無子秦人逆其異母弟稷於燕而立之趙武靈王變俗為胡服騎射以攻林胡中山皆勝之九秦昭王稷元秦昭王母宣太后楚女也有異母弟曰魏冉同母弟曰華陽君芊戎王同母弟曰髙陵君涇陽君魏冉自惠王時任職用事武王薨諸弟爭立冉力能立昭王王以為將軍衛咸陽十秦庶長壯與大臣諸公子謀作亂魏冉誅之及惠后武王后出歸魏王兄弟不善者冉皆殺之威振秦國王年少太后臨朝冉任政封穰侯十一十二十三十四十五初楚以秦宣太后之故倍從約而親秦使太子黃為質于秦太子私鬬殺秦大夫懼而亡歸秦華陽君伐楚斬首三萬殺楚將景缺楚王使太子質于齊以請和十六秦伐楚取八城秦王更與楚懷王約為好㑹武闗懷王至則劫之入朝章臺求巫黔中郡懷王不可因留之楚人逆太子于齊而立之趙武靈王寵姬呉娃生少子何欲及其生而立之乃廢太子章而傳位于何自稱主父十七趙惠文王何楚襄王横元楚人告于秦曰賴社稷神靈國有王矣秦人伐楚斬首五萬取十六城甲子十八楚懐王亡歸秦人遮楚道乃之趙主父在代趙人不敢受將之魏秦人追及之以歸十九魯湣公賈元楚懷王發病死于秦楚人憐之如悲親戚諸侯由是不直秦二十魏昭王元韓僖王咎元趙主父與齊魏共滅中山呉娃卒主父憐故太子章欲分代以王之猶豫未決主父與王游沙丘宫公子章作亂以主父命召王肥義先入章殺之李兊攻章章走主父開之兊已殺章因圍主父主父食雀鷇而死二十一齊田甲作亂孟嘗君奔薛二十二韓公孫喜及魏師伐秦穰侯薦左更白起於秦王王以為將大敗韓魏之師於伊闕斬首二十四萬獲公孫喜諸侯大恐秦王謂楚襄王曰願王飭士卒得一樂戰襄王患之復與秦和親秦以女妻之二十三楚襄王逆后于秦二十四二十五魏入河東地四百里韓入武遂地二百里于秦二十六秦大良造白起客卿錯伐魏至軹取城大小六十一二十七秦稱西帝齊稱東帝蘇代謂齊王曰秦稱帝而天下安之王徐稱帝未後也若天下惡之王因勿稱以收天下之望齊王從之稱二日復去帝號頃之秦王亦去帝號甲戌二十八二十九秦司馬錯伐魏魏獻安邑以和于秦宋公偃驕虐無道與齊楚魏戰勝之自稱宋王天下謂之桀宋齊閔王及楚魏伐之偃走死温齊遂滅宋三十齊閔王已克宋而驕因南割楚之淮北西侵三晉欲并天下諸侯疾之燕昭王拊循其民二十餘年欲以報齊樂毅曰齊地廣民衆未易獨攻也請約秦楚趙魏韓共伐之王從之五國皆許諾三十一樂毅以六國之師大敗齊師于濟西諸侯皆罷燕獨追齊師遂入臨淄齊湣王走保莒楚淖齒救齊因為齊相乃隂與燕人約殺閔王而分齊地閔王子法章變姓名為太史敫家庸三十二齊襄王法章元淖齒去莒齊大夫求得法章立之乃布告齊國曰王已立在莒矣三十三衛懷君元三十四楚欲伐周王使周武公說楚令尹昭子曰周地不過百里然為天下共主攻之者為弑君然而諸侯猶攻之者祭器在故也今楚欲殘天下之共主居天下之重器器南則兵至楚矣楚人乃止三十五秦白起敗趙師斬首二萬司馬錯伐楚楚獻漢北及上庸地于秦燕樂毅徇齊地數歲下齊七十餘城獨莒即墨未下圍之三十六燕昭王薨惠王即位素惡樂毅且疑之齊即墨將田單縱反間于燕燕王使騎劫代樂毅將樂毅奔趙燕師皆忿無鬬志田單乃用詐計大破燕師殺騎劫悉復齊故地秦白起伐楚取鄢鄧西陵秦王趙王㑹于澠三十七燕惠王元秦白起伐楚抜郢燒夷陵楚王兵散遂不復戰徙都陳秦以郢置南郡甲申三十八秦白起定巫黔中置黔中郡三十九魏安僖王元楚王收東地兵得十餘萬復西取江南十五邑四十秦穰侯伐魏韓暴鳶救魏穰侯大破之斬首四萬魏納八城以和穰侯復伐魏走芒卯入北宅遂圍大梁魏納温以和四十一魏復叛秦穰侯伐魏斬首四萬得三縣四十二魯頃公讎元趙賈偃魏芒卯伐韓攻華陽秦白起救韓大破趙魏之師于華陽之下斬首十五萬取魏卷蔡陽長社魏納脩武以和又取趙觀津秦王欲伐楚楚使者黃歇上書諌王乃止與楚和親四十三韓桓惠王元楚左徒黄歇侍太子完為質於秦秦初置南陽郡四十四燕武成王元趙田部吏趙奢收稅平原君家不肯出趙奢殺平原君家用事者九人平原君欲殺之奢曰君為趙貴公子奉公守法則上下平上下平則趙固而强君於天下顧不重乎平原君以為賢薦之趙王使治國賦四十五秦人伐趙圍閼與趙奢救之大破秦師趙封奢為馬服君秦客卿竈伐齊取剛壽魏人范雎見秦王言太后穰侯等專恣於外重於王且越韓魏而伐齊非計不若逺交而近攻王説以為客卿四十六四十七甲午四十八四十九秦范雎益親用事乃言太后穰侯等將不利於國曰自古及今失其國者皆君務逸游委政于臣所委者御下蔽上以成其私而君不悟所以亡也秦王乃廢太后逐穰侯華陽君涇陽君於闗外以范雎為丞相封為應侯五十趙孝成王丹元五十一齊王建元齊王建即位其母君王后賢事秦謹與諸侯信秦日夜攻三晉燕楚五國各自救故建立四十餘年不受兵五十二楚襄王有疾太子在秦不得歸黃歇使太子變服亡歸而自留請死秦王以歇為忠而遣之襄王薨考烈王即位以歇為相封以淮北號春申君五十三楚考烈王完元秦武安君伐韓拔野王上黨道絶上黨守馮亭以城市邑十七降趙趙王與平原君謀欲受之平陽君豹曰聖人甚禍無故之利此韓嫁禍於我也王不聴發兵取上黨五十四五十五秦左庶長王齕攻上黨拔之上黨民走趙趙王使廉頗軍長平以拒秦頗堅壁不戰應侯因縱反間以疑頗于趙王趙王使趙括以代頗將秦王隂益兵使武安君將以擊趙大破之殺趙括阬降卒四十萬人五十六武安君分兵拔虎牢定太原將進圍邯鄲韓魏皆恐使人說應侯曰趙亡則武安君為三公君能為之下乎應侯乃請許趙割地而罷兵由是與武安君有隙頃之五大夫王陵復伐趙武安君病不行五十七平原君求救于楚楚王許之武安君病愈秦王欲使代王陵武安君辭王與應侯强請之終不肯行乃使王齕代陵圍邯鄲終不能拔軍數不利魏王使晉鄙救趙壁於鄴觀望不進信陵君盜兵符殺鄙奪其軍甲辰五十八燕孝王元秦應侯譖武安君賜死杜郵魏公子無忌及楚春申君大破秦師于邯鄲下王齕走信陵君自留趙使將將其兵歸魏王亦怒信陵君不召也五十九秦取韓陽城負黍赧王恐倍秦與諸侯合從秦王使將軍樛攻西周赧王如秦頓首受罪盡獻其邑三十六口三萬周自武王以來凡三十六王八百六十七歲而亡臣光曰周自平王東遷日已衰微至於戰國又分而為二其土地人民不足以比強國之大夫然而天下猶尊而事之以為共主守文武之宗祧緜緜焉久而不絶其故何哉植本固而發源深也昔周之興也禮以為本仁以為源自后稷已來至於文武成康其講禮也備矣其施仁也深矣民習於耳目浹於骨髓雖後世微弱其民將有陵慢之志則畏先王之禮而不敢為將有離散之心則思先王之仁而不忍去此其所以享國長乆之道也不然以區區數邑處於七暴國之間一日不可存况數百年乎秦昭王稷五十二秦應侯免相蔡澤代之楚人取魯地遷魯頃公于莒五十三燕王喜元韓王入朝魏舉國聴令五十四楚遷于鉅陽五十五衛元君元衛懷君朝于魏魏人殺之立其弟元君元君魏壻也秦太子妃華陽夫人無子庶子二十餘人夏姬子楚質於趙陽翟賈人吕不韋為楚說華陽夫人令楚為嗣華陽夫人許之五十六王薨孝文王立楚為太子吕不韋娶美姬有娠以獻楚生子政燕王使栗腹約歡于趙還言趙可伐王使栗腹卿秦伐趙樂問將渠諌不聴趙廉頗大破燕師于宋子弑栗腹虜卿秦遂圍燕燕謝得解孝文王元年王即位三日薨莊襄王立尊華陽夫人為華陽太后夏姬為夏太后楚滅魯遷頃公於卞邑為家人莊襄王楚元年吕不韋為相國封河南洛陽十萬户為文信侯蒙驁伐韓取成臯滎陽置三川郡二蒙驁伐趙定太原取三十七城楚春申君以淮北地易呉以為封邑甲寅三置太原郡蒙驁伐魏魏王兵數敗乃復信陵君信陵君歸為將諸侯爭救魏信陵君并將五國兵大破蒙驁於河外追至函谷闗抑之而還王薨太子政立年十三國事皆决于吕不韋號稱仲父晉陽反始皇政元年蒙驁擊趙定晉陽作鄭國渠引涇水灌田闗中益富饒秦行萬金於魏間信陵君魏王疑之使人代將兵信陵君自知再以毁廢乃日夜縱酒而卒二麃公攻卷斬首三萬趙相國廉頗伐魏取繁陽趙孝成王薨悼襄王立使樂乗代之頗怒攻乗而奔魏魏人不能用趙數困于秦悼襄王復思得頗使使者視之嬖臣郭開賂使者使毁頗頗卒于楚三趙悼襄王偃元蒙驁伐韓取十二城趙李牧伐燕取武遂方城牧者趙之北邊良將也嘗屯代鴈門破匈奴十餘萬騎滅襜襤敗東胡降林胡匈奴逺遁十餘歳不敢近趙邊四蒙驁伐魏五魏景閔王増元䝉驁伐魏取酸棗等二十城置東郡燕劇辛伐趙趙龎煖大破燕師殺劇辛六諸侯患秦攻伐無已時故楚趙魏韓衛共伐秦春申君為従約長至函谷秦出兵擊之五國敗走秦遂伐魏取朝歌拔衛濮陽衛君走保野王楚自陳徙夀春以避秦患七伐魏取汲八吕不韋舍人嫪毐有寵於太后封以太原為長信侯政事皆決於毐勢振秦國魏人以鄴與趙九韓王安元嫪毐有寵於太后事覺作亂捕得車裂滅其宗遷太后於雍楚考烈王無子趙人李園獻妹於春申君知其娠納諸王生子悍為太子王病朱英謂春申君必殺李園不聴王薨李園殺春申君滅其家甲子十楚幽王悍元吕不韋免相就國王納茅焦之諫復迎太后於雍大索逐客楚人李斯上書諫王召斯還與圖國事斯行金玉以間諸侯之君臣名士可賂者賂之不可者刺之上下乖離乃使良將隨其後卒并諸侯十一王翦桓齮伐趙取鄴閼與趙悼襄王薨太子遷立其母倡也悼襄王廢太子嘉而立之十二趙幽穆王遷元發四郡兵助魏伐楚奪吕不韋國徙之蜀不韋飲鴆死十三桓齮伐趙大破趙師於平陽斬首十萬殺扈輒趙王更使李牧將以拒秦大破秦師於宜安桓齮走十四桓齮定平陽武城宜安韓王納地效璽請為藩臣十五伐趙取狼孟鄱吾燕太子丹質於秦王不禮焉丹怒亡歸傾身竭財求勇士以刺王其傅鞠武諫曰行危以求安計淺而怨深不量力之能否臣不知其可也丹不聽十六韓獻南陽郡十七内史勝滅韓虜韓王安以其地置潁川郡臣光曰韓以微弱之國居天下之衝首尾腹背莫不受敵然猶社稷血食㡬二百年豈非昭侯奉法之謹賞不加無功罰不失有罪後世雖不肖猶得䝉遺烈以自存乎嗚呼有國者安可以無法哉十八衛君角元大興兵使王翦將伐趙下井陘趙李牧司馬尚禦之十九趙郭開多受秦間金言李牧司馬尚欲反趙王使趙蔥顔聚代之牧不受命捕得斬之廢司馬尚王翦擊殺趙蔥遂滅趙進兵臨燕趙嘉奔代自立為王楚幽王薨弟郝立郝兄負芻殺之自立甲戌二十魏王假代王嘉楚王負芻元燕太子丹使荆軻刺王不中王怒益發兵使王翦伐燕大破燕代師于易水之西遂圍薊二十一王翦伐薊燕王走保遼東斬太子丹之首以獻王賁伐楚取十餘城欲遂滅楚王翦曰楚地廣民衆非六十萬人不可王以為怯使李信䝉恬將二十萬人伐楚二十二王賁伐魏引河溝灌大梁魏王假降殺之遂滅魏臣光曰魏文侯以列國大夫好賢禮士終為天下之顯諸侯至于今稱之惠王有一商鞅不能用而棄之於秦使還為國害喪地七百里竄身大梁子孫遂微賢不肖之相望豈不逺哉無忌去而魏輕還而魏重安僖王猶以為疑無忌死而魏亡賢者之於國何如哉李信䝉恬為楚所敗王自請王翦將六十萬人以復伐楚二十三楚悉兵以逆王翦翦堅壁不戰楚引而東乃追擊大破之于蘄南殺項燕乗勝畧定楚地二十四王翦滅楚虜王負芻因南征百越降之置楚郡㑹稽郡臣光曰楚自祝融鬻熊以來其有國㡬何年矣方其盛也奄有南海慿陵諸夏及懷王放廢忠良親近讒慝惑張儀之口而耳目不能自守見欺而不悟亡師而不悔以失濟失客死於秦使其子孫銜涕忍恥以事仇讎强之女而不敢辭陵廟焚而不敢怨兔逃鼠伏自屏於陳束兵不戰而攻之不解割地請和而侵之不止卒不見赦而國以淪亡不亦悲乎二十五王賁伐遼東虜燕王喜還擊代虜代王嘉以其地置遼東代郡臣光曰燕在春秋時玉帛不通於中國簡䇿所書鮮焉及文侯始大與諸侯約從以擯秦王噲慕堯舜以國授子之而敗死為天下笑求名失實乃至是乎昭王刻意勤身招賢下士卒用弱燕以報强齊有志者功無不成也惠王信讒以喪垂成之業惜哉燕丹不勝一朝之忿以犯虎狼之秦輕慮淺謀挑怨速禍使召公之廟不祀忽諸罪孰大焉而論者或謂之賢豈不過哉夫為國家者任官以才立政以禮懷民以仁交鄰以信是以官得其人政得其節百姓懷其徳四鄰親其義夫如是則國家安如磐石熾如焱火觸之者碎犯之者焦雖有强暴之國尚何足畏哉丹釋此不為顧以萬乗之國決匹夫之怒逞盜賊之謀功隳身僇社稷為墟不亦悲哉夫其膝行蒲伏非恭也復言重諾非信也糜金散玉非惠也刎頸決腹非勇也要之謀不逺而動不義其楚白公勝之流乎荆軻懷其豢養之私不顧七族欲以尺八七首强燕而弱秦不亦愚乎又曰武靈王不顧流俗變胡服習騎射以制林胡滅中山大啓土宇威加强秦可謂賢君矣及溺於嬖寵欲分國以王二子卒餒死沙丘宫佚欲為之敗也如此夫趙於三晉為最强及貪上黨之田以喪長平之師用郭開之讒而棄廉頗李牧使宗廟不血食言之可為長欷矣齊自君王后卒后勝相齊多受秦間金約齊王去從朝秦不為攻戰之具秦以故得滅五國而齊不救二十六王賁自燕南攻齊猝入臨淄民莫敢格者遂滅齊虜齊王建臣光曰齊地廣而民衆負滄海以臨中夏重以威宣之賢國家富强及湣王驕汰不可盈厭自取顚沛茍無田單齊不國矣凡游士言從横者雖更相傾覆要之合從者六國之利也齊為三晉燕楚之根柢三晉燕楚為齊之藩蔽秦雖强暴百有餘年不能一諸侯者以其表裏相鈎帶也及齊王建用后勝之謀信秦間之言拱手以事秦不救五國五國已亡而齊并為虜理勢然也王自謂功徳兼三皇五帝故號皇帝除去諡法欲以傳萬世無窮不建立子弟為諸侯分天下為三十六郡徙豪傑於咸陽悉收天下兵銷之二十七始皇巡隴西北地出雞頭山過囘中作信宫渭南又作甘泉前殿二十八東行郡縣上鄒嶧山遂封泰山禪梁父東游海上登瑯邪使齊人徐市發童男女數千人入海求蓬萊不死之藥過彭城出周鼎南之衡山南郡浮江赭湘山由武闗歸二十九始皇東游至博浪沙中韓人張良為韓報讐狙撃始皇不中天下大索十日始皇遂登之罘瑯邪還自上黨入甲申三十三十一三十二始皇之碣石壊天下堅城決通隄防巡北邊從上郡入盧生入海還奏録圖書言亡秦者胡乃使蒙恬發兵三十萬北擊匈奴三十三發兵取南越地置南海桂林象郡以謫徙民五十萬人戍五嶺蒙恬斥逐匈奴收河南地築長城起臨洮至遼東延袤萬餘里暴師於外十餘年恬居上郡以治之三十四丞相李斯建議令天下有藏詩書百家語者皆詣守尉雜燒之有敢偶語詩書者棄市以古非今者族三十五除直道道九原塹山堙谷千八百里作阿房殿東西五百步表南山以為闕作者七十餘萬人嚴刑重賦民不堪命諸儒誹謗始皇坑殺四百二十餘人長子扶蘇誎始皇怒使監蒙恬軍于上郡三十六徙民河北榆中三萬家始皇子二十餘人少子胡亥最愛始皇使中車府令趙髙教之法律髙得幸於胡亥而與蒙恬蒙毅有隙三十七始皇南游雲夢東上㑹稽並海至之罘還道病為書賜扶蘇令與喪㑹咸陽書未發始皇崩趙髙説斯曰長子若立蒙恬必相君無死所矣乃矯詔立胡亥為太子賜扶蘇蒙恬蒙毅死二世胡亥元年楚隠王陳勝趙王武臣齊王田儋燕王韓廣魏王咎元二世東巡郡縣用趙髙䇿誅大臣宗室殆盡滅衛楚戍卒陳涉起兵於陳天下豪傑爭應之楚趙齊燕魏皆自立王項梁起呉劉季起沛二楚義帝心趙王歇魏王豹韓王成齊王市元陳涉敗死李良殺趙王武臣張耳陳餘立趙歇為王項梁殺楚王景駒立楚懷王孫心章邯破殺齊王儋魏王咎及項梁圍趙歇咎弟豹及儋兄子市韓成皆稱王誅李斯以趙髙為丞相甲午三楚王使宋義項羽救趙羽殺義并其軍大破秦師于鉅鹿下虜王離趙髙以盜賊責章邯邯恐以其軍降楚楚沛公伐秦入武闗二世以盜賊責趙髙髙恐發兵攻二世二世乞為黔首不得而死髙立二世兄子嬰為王嬰殺髙臣光曰孔子曰知及之仁不能守之雖得之必失之秦之謂矣善夫賈生之言曰秦以區區之地千乗之權招八州而朝同列百有餘年然後以六合為家殽函為宫一夫作難而七廟墮身死人手為天下笑者何也仁義不施而攻守之勢異也稽古録卷十一
