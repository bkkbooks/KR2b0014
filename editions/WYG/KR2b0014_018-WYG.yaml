  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_WYG_018-1a, image: WYG0312/WYG0312-0517c.png}
body:
  text: 稽古録卷十八宋司馬光撰真宗咸平元年正月辛酉朔改元法三月壬申初令饑民刼窖者減强盜五月戊午朔日食十七月丙戌初令惡民再犯徒三犯杖送軍頭司月丙戌朔日食十二月丁酉初令大辟疑者具獄以聞行新編敕二二月催欠司奏自即位放逋欠物千餘萬釋繫囚三十餘萬溪蠻冦奉節施䕫廵檢侍其振討平之寅七月甲申詔外任官各給職田蠲其税八月丙大閲於城東北步騎二十萬路九月庚辰朔日食祀癸夘傅潛奏破契丹於㢘良十一月丙戌上圓丘初以太祖太宗並配大赦丙契丹冦北邊上自將擊之張十二月甲寅發東京午幸澶州己未知冀州旻奏敗契丹于城南之甲子幸大名兵丁未府州奏折御昌等擊契丹破傅潛等擁八萬屯定州畏懦不戰契丹遂冦祁趙逰騎至邢洺是歲置羣牧司總内外馬政三正月己夘朔益州戍卒趙延順反殺鈐轄符昭夀逐知州牛冕奉都虞侯王均為主辛巳陷漢州直抵劒門知劒州李士衡擊却之康保裔與契丹戰於瀛州敗沒契丹遂自徳棣濟河掠淄青而去庚寅范廷召等奏追契丹至莫州北大破之甲午上發大名京詔雷有終等將步騎八千討王均庚子上還東二月辛酉西川都廵檢張思鈞奏破王均復漢州乙丑均偽遁雷有終入益州為均所敗三月戊寅朔日食丙申雷有終奏破王均於彌牟鎮益四月乙夘改葬元徳皇后辰雷有終等敗王均於州城下遂圍之五月甲河決王陵命内侍閻承翰等塞之之九月雷有終等克益州石普追王均至富順監斬十一月壬子詔百官轉對四二月丙寅詔舉賢良方正得查道王曙等月辛巳分川峽為四路庚寅行儀天厯三四月壬子初令審官磨勘京朝官引對人罷郊祀遷官六月省天下冗吏十九萬五千餘八月丙寅趙保吉冦清逺軍九月乙亥陷之敗庚寅詔陜西家出一丁充保毅保㨗辛夘曹璨趙保吉於栁撥川夘契丹入冦十月甲寅張斌敗契丹於長城口十乙授西涼六合酋長藩羅支官令討趙保吉一月丙子王顯奏契丹遁去五三月己酉西邊奏趙保吉陷靈州四月庚午初令軍職有闕即時遷補不俟三年廣置𣙜塲於雄州與契丹互市壬契丹入冦乙酉北邊方田以梗虜騎五月寅籍河南民丁為兵之六月壬申趙保吉圍麟州丁丑知州衞居實擊却七月甲午朔日食詔以鹽給施黔州蠻蠻請輸榖於邊以九月西蕃冦鎮戍軍知軍李繼和擊却之戊申終南處士种放為左司諌直昭文館初趙保吉冦金明都監李繼周擊却之十月戊寅令州官同録問大辟十一月壬寅上祀圓丘大赦六四月䕫州路轉運使丁謂奏生蠻入冦高州蠻田承進等擊破之趙保吉冦洪徳蕃將慶香等擊破之繼忠與戰於望都南敗績丙子契丹入冦己夘王五月壬寅罷雄州𣙜塲大十一月趙保吉陷西涼府潘羅支詐降襲擊保吉破之保吉中流矢還死於靈州之境子徳明襲位甲辰景徳元正月丙戌朔大赦改元帥己丑麟府路奏契丹約尼部長拔黄三百餘帳内屬請癸夘石隰州奏河西四十五族内屬二月趙徳明降三月乙酉朔魏能奏破契丹於長城口己亥太后李氏崩北四月閻承翰奏自嘉山引徐河入沙河種稻於水五月命向敏中安撫西邊受趙徳明降與之議立條約月禮院奏以懿徳明徳二后並祔太宗廟從之六知鎮戍軍曹瑋奏敗西戎於石門川上潘羅支遣兄邦迪支入見準九月減三司吏員聞契丹將入冦議親征冦等請幸澶州吉河決横隴作閏月禮院奏殯明徳太后於壬地俟歲乃𦵏先主祔廟契丹統軍達蘭冦威虜順安軍保州契丹主及其國母冦定州遣使以王繼忠表授石普求和十月命麟府保州威虜北平軍引兵入契丹境以分其兵勢契丹冦瀛州弟國信使奏潘羅支為密帮磋所殺西涼諸胡立其斯多都子詔殿直曹利用齎書詣契丹許其和州黎桓遣其明提入貢十一月契丹攻瀛州知李延渥等擊走之甲詔徳清軍吏民棄城保澶魏連庚午上發東京戍契丹至澶州城下達蘭中弩而死契丹引却瓦丙子上至澶州渡河登北城以戊寅契丹遣使求橋闗南之地上不許但約歲絹二十萬疋銀一十萬兩遺之復十二月庚辰朔日食事契丹陷通利軍甲辰契丹遣使請和願以兄禮上上許之自是不復為冦北鄙寧息甲午上發澶州戊戌至東京二正月庚戌朔大赦復置𣙜塲於雄霸州安肅軍等五月别試河北舉人遭胡冦不及試期者賜范昭及第初以近邊間田給弓箭手永蠲其税増黎桓卒子龍鈛立弟龍廷殺之自立科七月甲子置博通墳典等科并賢良方正凡六九月癸丑趙徳明始遣使入貢祀十月行農田敕民間便之十一月丁巳上圓丘大赦三二月丙子詔轉運使知州皆領勸農使謀併入内内侍諸司為入内内侍省京兆民李琰反并其黨族誅萬四月乙未詔朝臣轉對黎己巳渭州奏密阿等族七千餘口内屬六月桓諸子爭立國大亂羣臣多請伐之上曰未加弔恤而伐其䘮豈王者所為命邊臣撫安之上自明徳太后之䘮雖從易月之制自非凱旋郊廟不舉樂羣臣屢以為請戊戌始許之七月壬戌縁海安撫使邵曄上邕州至交州水陸路圖上曰祖宗開疆如此其大慎守而已安用勞民以貪無用之土乎若封略之内有叛亂者則不得不除耳未㡬黎龍廷請入貢逰上以年豐事簡九月庚戌詔羣臣不妨公務勿禁從丁夘趙徳明遣使獻誓表十月庚午朔授徳明官爵丁酉葬明徳皇后四正月己未上發東京丙寅至永安鎮丁夘謁諸陵二月己巳至西京己夘幸龍門辛夘發西京三月己亥至東京四月辛巳皇后郭氏崩五月丙申朔日食知六月乙夘葬荘穆皇后月冝州登海軍校陳進殺州劉永規舉兵反七丙寅陳進陷栁城遂陷栁州甲戊辰初令見任京朝官及三年方得磨勘遷官戌詔曹利用將兵討陳進乙亥黎龍廷遣其弟明昶入貢辛巳授龍廷官爵賜名至忠癸丑初置諸路提㸃刑獄八月陳進冦象州分九月壬申詔文武官俸應折支者給實錢在朝六在外四分甲申曹利用敗陳進於武仙追至象州斬之十月進餘黨黎有育等陷貴州十二月曹利用追討悉平之大中祥符元年正月乙丑皇城使奏天書降於左承天門䲭尾戊辰大赦改元發卒修東京外郭四月作玉清昭應宫若五月禁銷金等侈物自禁中始辛六月丁酉王欽奏天書降泰山靈液亭十月夘上發東京丁未至乾封庚戌登泰山辛亥祀上帝封玉牒壬子禪社首祭地祗癸丑大赦十一月丁丑還至東京甲申謁太廟加上太祖太宗諡諸路大稔二四月癸夘詔自今所舉官犯贓與同罪七月丁巳置紏察在京刑獄司十黎雅州轡拒命遣文思副使孫正辭等招安之月詔州府軍監各置天慶觀十一月乙夘上作文武七條賜外官十二月契丹國母蕭氏卒遣使弔祭三二月廣南西路奏黎至忠卒弟明提明昶争立大校李公藴發兵皆擊殺之自稱留後遣使入貢三月授公藴官爵九月河決白浮圖村塞之四正月丁酉上發東京二月癸丑次河中丁巳至寳鼎辛酉祀后土於睢上封玉冊壬戌大赦戊辰自河中東還己夘次西京乙未至永安丙申謁諸陵四月甲辰朔至東京己酉謁太廟月五月乙未加五岳帝號錢七壬申朔免南方兵丁身五正月河決棣州聶家口塞之八月丙申朔日食己九月丁亥作㑹靈觀上十月戊午聖祖降延恩殿未大赦閠月乙丑朔聖祖尊號曰上靈高道九天司命保生天尊大帝景十一月甲辰詔增文武百官俸十二月戊辰作靈宫丁亥立徳妃劉后為皇后六四月丙戌詔大辟情可憫者奏覆尊五月乙巳迎聖像入昭應宫八月老君曰混元上徳皇帝祔戎蠻冦淯井監討平之朔十月辛酉升元徳皇后太宗廟十二月戊午日食甲寅七正月壬寅上發東京丙午至真源己酉謁太清宫以應天府為南京二月辛酉上還東京壬申恭謝天地大赦十八月河決澶州發夫卒塞之九月作㑹靈觀月昭應宫成十二月廣南奏交趾冦欽州八正月壬午朔上玉皇聖號曰太上開元執符御厯含真體道玉皇大天帝大赦院四月壬申夜榮王宫火延及朝元殿内藏崇文六月己酉朔日食閏月己夘朔大赦九五月趙徳明攻慶州屬羌屬羌擊却之之七月廣南奏撫水蠻冦融州又冦宜州州兵擊却八月己夘行新編敕斬總噶爾罝勒斯賚等冦伏羌寨曹瑋擊敗之於三都谷首數千級九月戊辰初令京朝官在外任者亦以年勞遷官十一月乙夘改來年元天禧元正月庚戌上朝饗六廟辛亥祀天地大赦諫二月丁丑初選諫官御史各六員不兼他職北專掌争曹瑋奏討總噶爾族破之京東西河河東陜西蝗莊十一月曹瑋奏破果族平之二正月下溪蠻彭儒猛冦辰州州兵擊却之閏月知辰州錢絳奏將兵討儒猛破之獲其子仕漢兩冇泉出拱聖營作祥源觀五月彭儒猛請降京訛言有物如席㡌夜飛入人家為妖人相聚操兵自衞赦喧噪逹旦八月甲辰立昇王受益為皇太子大三三月戊午朔日食徃壬申慶州奏趙徳明冦柔逺寨官軍不利命曹瑋安撫冦凖奏天書降乾祐山中淮六月乙未河決滑州城南灌澶濮鄆濟至徐州入羣蠻冦辰澧鼎州八月丁亥大赦十一月辛未上祀圓丘大赦四正月宥州羌臘兒冦延州金明監押李士彬擊斬之命馮守信發兵六萬夫二萬餘人塞滑州南決河二月丁酉奏已塞決上不豫四月丁亥黒風晝晦六月丙申河復滑州西北殺七月癸酉周懷政坐與御藥使朱能偽造符瑞謀大臣復用冦凖事覺斬之遣中使詣長安捕能能殺使者擁兵走衆潰自殺司上體小康者九月丁夘大赦十一月庚午詔諸事應取㫖如故外自餘常事委太子與兩府於資善堂㑹議施行訖奏是歲天下户九百七十餘萬口二千二百七十餘萬五七月甲戌朔日食乾興元正月辛未朔改元午二月庚子朔大赦戊上崩于延慶殿太子即皇帝位遺詔尊皇后為皇太后軍國事權取太后處分己未大赦文武京朝官各遷一資宮丁謂雷允恭計專權不令太后御殿但進文書入丁夘貶道州司馬冦凖為雷州司户連坐者甚衆尋庚申雷允恭以擅移皇堂及盜山陵物伏誅丁謂亦貶官連坐者甚衆七月上始與太后同御便殿垂簾聴政酉八月環州屬羌沁藏帥衆叛數歸趙徳明十月己葬真宗于永定陵罝勒斯賚與趙徳明相攻十一月甲戌涇原奏罝勒斯賚求内附十二月順州蠻田彦晏冦施州稽古錄卷十八
