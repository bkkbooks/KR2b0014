body:
  text: 稽古錄卷十五宋司馬光撰唐太宗世民貞觀元年春涇州都督羅藝反統軍楊岌討斬之分天下為十道突厥部落離散國中大雪六畜多死或勸帝擊之帝不許二春闗中饑民多賣子者詔出御府金帛贖之右衞將軍柴紹擊延安賊帥梁師都斬之以其地為夏州秋放宫人數千使還家遣使拜薛延陁君長夷男為真珠可汗頡利始懼請稱臣尚主三春司空裴寂流静州上夏太上皇徙居太安宫始聴政於太極殿靖突厥頡利可汗舉兵攻突利突利來告急冬詔李李勣將兵二道伐突厥突利率衆來奔四春李靖以驍騎三千自馬邑直抵惡陽嶺頡利大驚遁入鐵山請舉國内附靖乗其無備襲之俘斬十餘萬頡利奔沙鉢羅部追擒之以獻於是大漠以南皆為州縣屬於唐以突利為順州都督五西域諸國因高昌王文泰上書請入朝上許之秘書監魏徴諌乃止六党項羌三十萬口請内屬七甲午八冬右僕射李靖以疾辭位吐吐谷渾數盜邊詔李靖侯君集討之蕃賛普始遣使入貢九夏太上皇崩破李靖侯君集大破吐谷渾於牛心堆追至邏真谷吐谷渾可汗伏允自殺其子順來降立以為可汗冬順為國人所殺國内亂詔侯君集復將兵往定之立其子諾曷鉢十夏文徳長孫皇后崩十一春房喬上新律令及新禮為上如洛陽夏詔以宗室功臣襲封刺史倣古諸侯十二春上自洛陽過砥柱觀䀋澤道蒲州歸突厥既亡薛延陁東遷盡有漠北之地勝兵二十萬上拜其二子為小可汗以分其勢十三春停襲封刺史突夏上幸九成宫厥突利弟結杜率作亂夜襲御營入四重幕折衝孫武開擊斬之秋立頡利族人思摩為突厥可汗使建牙於河北之外諸胡在河南者皆使從出塞十四高昌王文㤗恃逺驕倨春詔吏部尚書侯君集擊之秋軍至磧石文泰病死子智盛請降以其地為安西都䕶府吐蕃擊破吐谷渾冬進冦松州詔侯君集擊之吐蕃懼遣禄東賛入謝十五春上幸洛陽將以明年封泰山夏彗星見而止薛延陀可汗夷南遣子大度設屯白道川將攻突厥詔李勣討之冬上還長安大度設走李勣追破之於諾真水夷南懼謝罪請與突厥和親十六高麗大臣蓋蘇文弑其君建武立其兄子藏而相之十七春魏徴卒臣齊州都督齊王祐謀反賜死君魏王奉隂結朝謀代太子承乾太子懼與侯集謀攻大内事覺夏廢太子為庶人徙黔川徙魏王於鄖鄉立晉王治為太子既又欲立呉王恪長孫無忌固爭乃止甲辰十八冬上幸洛陽高麗盖蘇文數侵伐新羅上遣使諭解之盖蘇文不奉詔上怒欲自征之羣臣諫不聴詔發天下甲士十萬皆㑹平壤故太子承乾卒於徙所十九春上自將征高麗詔太子監國留居定州夏拔蓋牟及白岩城高麗高延夀等以衆十餘萬降秋攻安市城不拔班師兵薛延陁拔灼寇州夏敗為回紇所殺二十春上自并州還長安李秋詔江夏王道宗及勣等出塞討薛延陁餘黨皆滅之鐵勒諸部及回紇等十三姓來降置六都督府七州以撫之北荒悉平上幸靈州冬還長安二十一春詔以來年封禪㑹山東大水而止夏上幸翠微宫冬詔左驍衞大將軍阿史那社爾討焉耆二十二春上幸玉華宫安秋房喬卒冬上還長阿史那社爾拔焉耆虜其王訶黎布失畢之徙安西都䕶於龜兹兼統于闐疎勒碎葉謂四鎮二十三夏上幸翠微宫太李靖卒安上崩長孫無忌褚遂良受遺詔輔政子還長即位秋李勣為右僕射同中書門下三品高宗治永徽元年春右驍衞郎將高侃擊突厥餘寇車二鼻可汗虜之分突厥地置單于瀚海都䕶府以統之自是北邊無冦三十餘年冬西突厥賀魯擊射匱可汗滅之二秋西突厥賀魯冦延州詔左武侯大將軍梁建方發回紇五萬擊之三春梁建方大破西突厥於牢山秋立陳王忠為太子卒東魏王泰於徙所四春駙馬都尉房遺愛柴令武寧州刺史薛萬徹謀反伏誅荆王元景呉王恪賜死象江夏王道宗流州甲寅五春上幸萬年宫秋夏山水暴漲犯寝殿帝還長安六禮部尚書許敬宗中書舍人李義府勸上立武昭儀為皇后太尉長孫無忌僕射褚遂良切誎司空李勣曰此陛下家事羣臣何敢與知秋貶褚遂良為潭州都督令廢皇后王氏立武昭儀為皇后顯慶元太子忠以非皇后子廢為梁王立代王𢎞為太子秋左衞大將軍程知節擊破西突厥賀魯至怛篤城而還府侍御史王義方劾中書侍郎李義義方坐貶二春上行幸洛陽詔右屯衞軍蘇定方擊賀魯州秋李義府許敬宗譖侍中韓瑗中書令來濟與桂都督褚遂良謀反皆貶逺州刺史三春上還長安突蘇定方擒賀魯分其地置二都䕶府以故厥小可汗稱射步真分領之四夏許敬宗誣長孫無忌謀反上徙無忌於黔州侍中于志寧亦坐免冬上行幸東都許敬宗李義府使人即貶所殺長孫無忌及韓瑗褚遂良皆以反法籍其家五春上幸并州夏還東都秋廢陳王忠為庶人徙黔州十蘇定方破百濟虜其王義慈分其地三七郡為五都督府龍朔元夏詔左驍衞大將軍契苾何力左武衞大將軍蘇定方兵部尚書任雅相三道伐高麗二春上幸同州蘇定方破高麗於葦島圍平壤不克更夏上還長安初作大明宫含元殿成上徙居之命故宫曰西内三春右相李義府坐贓流嶲州人上自顯慶以後苦風疾政事皆委之武后時謂之二聖上寖不能制内甚忿之甲子麟徳元冬上與西臺侍郎同三品上官儀宻謀廢武后后知之上急歸罪於儀而殺之又殺故太子忠自是上毎聴朝政武后常垂簾於後政無大小皆與聞之二春上幸東都冬皇后上書請封禪行幸泰山乾封元春上封泰山禪梁甫夏還洛陽高麗相蓋蘇文卒其子男生襲位其弟男建男産攻之男生自拔來歸冬詔李勣將兵擊高麗二總章元春李勣渡遼拔安市城高麗遣男產入朝勣進圍其王城秋拔之虜高麗王藏及男建悉定其地一百七十城六十九萬餘戸置安東都䕶府以治之二冬李勣薨咸亨元春吐蕃擊破吐谷渾夏陷白州等十八州及安西四鎮詔右威衛大將軍薛仁貴討之秋吐蕃將論欽陵大破仁貴於大非川遂滅吐谷渾吐谷渾可汗諾曷鉢以餘衆入居靈州二春上幸洛陽三冬還長安四甲戌上元元高麗百濟既亡新羅寖强不受制春詔同三品劉仁軌擊之秋上始稱天皇皇后稱天后又加祖宗諡號冬上幸洛陽二春劉仁軌破新羅於七里城新羅王法敏降上赦之李上疾甚欲使天后攝政同三品郝處俊中書侍郎義琰誎乃止夏太子𢎞薨廟號義宗立其弟雍王賢為太子儀鳳元夏上還長安二吐蕃益强盛其地北際松涼南及嶲茂方萬餘里數為冦於邊詔左僕射同三品劉仁軌中書令李敬真更將兵討之皆不克三秋吐蕃破李敬真於青海虜副大總管劉審禮圍敬真於承風嶺將軍黒齒常之擊破之以常之為河源軍使吐蕃由是不敢犯塞調露元春上幸洛陽裴西突厥匐延都支及遮匐反秋吏部侍郎行儉襲虜之冬北突厥徳温傅及奉職反單于府二十四州皆應之詔裴行儉將兵三十萬討之永隆元春行儉大破突厥於黒山殺真可汗泥熟匐虜奉職而還之秋吐蕃冦河源太子賢自疑非天后子天后惡乃廢賢立其弟英王顯為太子冬上還長安開耀元突厥餘衆復奉徳温傅以反其族人伏念自立為可汗以應之秋詔裴行儉討之行儉多縱反間伏念執徳温傅以降永淳元夏上幸東都秋吐蕃冦柘松翼諸州北突厥骨篤禄收餘衆反冦邊𢎞道元春突厥冦定州媯州圍單于都䕶府又㓂蔚州嵐州中冬上崩遺詔軍國大事有不決者取天后處分宗即位尊天后為太后太后欲謀革命乃自臨朝稱制甲申則天后曌光宅元年春太后廢中宗為廬陵王徙於均州立其弟豫王旦為帝常居别殿不得與政事程故太子賢卒於巴州馬秋骨篤禄冦朔州詔将軍務挺擊之栁州司徐敬業罪状太后起兵廣陵太后使將軍李孝逸擊斬之之侍中裴炎勸太后歸政太后斬之於是大開告宻門賞以官爵使酷吏來俊臣等治之羣臣族滅者不可勝紀垂拱元春遷廬陵王於房州二春初置銅匭以受吏民章奏儋冬同三品武承嗣譖李孝逸流州三秋骨篤禄冦朔州燕然道大總管黒齒常之擊走之四春作明堂始夏武承嗣使人詐為寳符獻之太后稱聖母神皇秋博州刺史琅邪王冲起兵欲誅諸武尋敗死其父豫州刺史越王貞亦起兵太后使内史岑長倩擊誅之遂誅韓王元嘉魯王靈䕫霍王元軌唐之宗室相繼夷滅殆盡永昌元秋内史張光輔棄市納言魏𤣥同賜死冬右武衞大將軍黒齒常之族誅皆酷吏周興所誣也天授元冬初以十一月為正月秋沙門法明偽造大雲經上之云神皇當代唐為閻浮提主太后始自稱大周聖神皇帝以睿宗為皇嗣賜姓武氏立武氏七廟封兄子承嗣三思等為王二秋鳳閣舍人張嘉福洛州人王慶之上書請立武承嗣為皇太子同三品岑長倩請治嘉福等罪冬長倩坐事誅突厥可汗骨篤禄卒其子幼弱弟黙啜自立為可汗長夀元冬武威軍總管王孝傑大破吐蕃復四鎮之地王慶之上書不已鳳閣侍郎平章事李昭徳收慶之杖殺之餘黨始息二春復置安西都䕶府死或譖皇嗣妃劉氏妃坐賜又譖皇嗣左右謀反太后使來俊臣推之皆自誣服太常工人安金藏自刳腹出五藏以明皇嗣不反太后乃命停推輪秋太后自稱金皇帝甲午延載元秋鑄天樞天册萬歲元春太后自稱慈氏越古金輪聖神皇帝明堂火萬歲通天元冬太后封嵩高禪少室王孝傑及吐蕃將論欽陵賛婆戰於素羅汗山孝傑不利更造明堂成夏營州契丹李盡忠孫萬榮反詔將軍張遇擊之秋遇敗沒於黄麞谷又詔大将軍武攸宜擊之吐蕃冦涼州殺都督許欽明李盡忠死孫萬榮代領其衆冬陷冀州神功元春王孝傑兵十八萬及契丹戰於東峽石孝傑敗死夏鑄九鼎成遂詔大將軍武懿宗將兵二十萬討契丹不克契丹陷趙州突厥黙啜與奚合兵襲擊孫萬榮破斬之義冬誅僧薛懐聖厯元春太后用平章事狄仁傑言迎廬陵王還洛陽黙啜請薦女太后使武延秀徃受之黙啜怒曰安用武氏子秋發兵冦媯檀陷趙定二州乃立廬陵王為太子以討黙啜黙啜悉阬趙定民亡去二春封皇嗣為相王悉初置奉宸府吐蕃賛普器怒弄殺其相論欽陵夏欽陵弟賛婆率所部三千五百帳來降久視元秋内史狄仁傑薨一冬復以正月為十月長安元春改元大足易秋太子長思郡王重潤為司衞少卿張之所譖自殺是時易之及弟昌宗得幸太后勢傾海内中外疾之冬太后幸長安二春黙啜冦鹽夏州三冬太后還東都甲辰四冬以秋官侍郎張柬之同平章事常太后有疾羣臣莫得進見惟張易之兄弟侍左右隂引黨援以自固中宗顯神龍元年春柬之及平章事崔暐左丞敬暉司刑少卿􅁊彥範袁恕已大將軍李多祚以羽林兵誅張易之等太后傳位於太子徙居上陽宫以恕已同三品暉彥範為納言尊太后曰則天皇帝復國號曰唐立皇后韋氏及帝女安樂公主上官昭容干預政事黨於諸武武氏權復振共譖柬之等夏封柬之等為王罷其政事尋又出為刺史冬太后崩遺制去帝號二春駙馬都尉王同皎謀殺武三思以反法誅之三置員外官二千餘人王秋立子重俊為太子武思復譖張柬之等五流嶺南殺之沙冬帝幸長安三黙啜冦靈州敗大總管叱忠義死者萬遂冦原㑹州景龍元夏以宗女妻吐蕃太安樂公主欲上廢太子重俊立已為皇太女秋子與李多祚以羽林兵誅武三思攻𤣥武門不克而死上以太子首祭三思二春朔方總管張仁亶築三受降城於漠南冬突騎施可汗娑葛攻安西都䕶呂牛素牛師奨殺之入冦邊州置東西都四銓斜封墨勑濫官不可勝紀三春上與大臣觀宫女大酺南以郭元振為安西都䕶秋娑葛請降冬上祀郊皇后為亞獻黙啜擊娑葛虜之其将蘇禄收餘衆自立為可汗睿