儀尚父張冬崔寧入朝蕃反南蠻冦南詔徙荆南帥延賞鎮劒南賀立子誦為太子健回紇相頓莫殺其可汗移地而代之徳宗适建中元年春平章事楊炎譖劉晏貶忠州尋殺之涇州將劉文喜反别將劉海賓斬之太上母沈氏遇亂不知所在和秋遙尊為后冬詔還吐蕃俘囚與親二春李寳臣卒子惟岳及田悦李正已俱反時上欲矯肅代姑息之弊方鎮皆懼故反夏郭子儀薨秋田悦圍邢州李正已卒子納自立譖梁崇禮反淮西帥李希烈討斬之平章事盧杞楊炎賜死冬河東帥馬燧救邢州田悦敗走三春朱滔敗李惟岳於束鹿惟岳將玉武俊殺惟岳以降馬燧敗田悦於洹水遂圍魏州夏滔武俊以賞不滿意復與悦合擊破燧兵詔鳳翔帥朱泚還京師秋詔李希烈討李納希烈潛與賊通烈冬滔悦武俊納希皆稱王四秋李希烈圍東畿帥哥舒曜於襄城冬涇原兵作亂入京城上幸奉天亂兵立朱泚為秦帝侯鳳翔將李楚琳殺其帥張鎰朱泚攻奉天都虞渾瑊禦之朔方帥李懷先破賊於醴泉泚乃退宋盧杞貶新州李希烈陷襄城取汴甲子興元元春李懐光叛與朱泚合武上幸梁州號夏田承嗣子緒殺田悦而代之王俊等去王與昭義李抱真及馬燧擊破朱滔於涇城李納亦歸欵帝神䇿將李晟克長安朱泚走死涇州李希烈稱殺宣慰使顔真卿既而兵數敗乃自汴州走還蔡州汴滑皆平貞元元春希烈陷鄧州夏朱滔卒以其將劉怦代之怦尋卒子濟復代之燧上自幸奉天後復行姑息之政又欲赦李懐光馬固爭請一月平之秋懐光為其下所殺二春山南帥樊澤破李希烈將杜文朝擒之夏淮西將陳仙竒斬希烈以降别將呉少誠復殺仙竒敗秋吐蕃將尚結賛大舉入冦至好畤李晟遣將邀之諸汧陽冬吐蕃陷鹽銀夏州三春轉運使韓滉卒帥平章事張延賞以私怨罷隴右等道副元李晟兵柄拜太尉中書令夏侍中渾瑊及尚結賛盟於平涼結賛伏兵刼之瑊逃得免吐蕃掠鹽夏而去秋又掠涇隴自是涇州西門之外皆為虜境四春福建軍亂逐觀察使呉詵諒涇原帥劉昌築連雲堡隴右帥李元築良元城涇隴由是稍安回吐蕃冦邠寧汗冬以咸安公主妻紇骨咄禄可五春劒南帥韋臯説南詔蠻王異牟尋始去吐蕃内附南中丞竇參同平章事州冬韋臯使其將王有道及蠻擊破吐蕃於故雋臯在劒南屢破吐蕃吐蕃氣稍挫回紇骨咄禄可汗卒六春成徳將趙鎬以棣州歸李納王武俊攻之納以州還武俊國人殺弟立其子夏回紇忠貞可汗為其弟所殺冬吐蕃攻北庭回紇救之回紇兵敗於北庭遂降於吐蕃節度使楊襲古奔西州七春義武帥張孝忠卒子茂昭代之秋回紇殺楊襲古安西路遂絶然西州猶固守八春汴宋帥劉𤣥佐卒軍中立其子士寧新帥呉湊不敢之官而還同夏竇參貶郴州以兵部侍郎陸䞇平章事李納卒子師古代之九春初税茶由詔城鹽州是邊患稍息冬夏韋臯大破吐蕃得堡柵五十餘代秋李晟薨宣武將李萬榮逐其帥劉士寧而之甲戍十春南詔異牟尋破吐蕃於神川得城堡一十六劉濟弟澭率其衆歸朝夏李抱真卒以衙將王虔休代之裴秋欽州蠻黄少卿反陷欽横潯貴四州度支使延齡以巧佞得幸於上陸䞇極言其姦賓冬䞇罷相為太子客十一夏裴延齡譖陸䞇貶忠州上欲以延齡為相諫議大夫陽城欲裂其麻坐改國子司業馬劉濟擊奚王啜利破之河東帥李自良卒以司李説代之秋侍中馬燧薨程冬横海將程懷信逐其帥懷直而代之十二夏田緒卒子李安代之初以中官竇文塲霍仙鳴為左右神䇿軍中尉上自漢中還稍稍罷諸宿將不令典兵而以中官代之秋李萬榮卒以東都留守董晉代之裴延齡卒十三夏韋臯破吐蕃克雋州無上自陸䞇罷相之後事大小皆自决之宰相奉行文書而已然所詢謀倚信者皆纖邪之人裴延齡及京兆尹李實翰林學士韋執誼等毁譽任情賞罰益紊焉又令中官掌宫市强買人物京師苦之十四夏長武城軍亂逐神䇿行營帥韓全義都虞侯高崇文遏定之以崇文為長武兵馬使全義鎮夏州十五春董晉卒宣武軍亂殺司馬陸長源以宋州刺史劉逸凖為帥逸凖尋卒以衙將韓𢎞代之秋陳許帥曲環卒呉少誠遣兵攻掠臨穎圍許州詔十六道軍討之潰朔方等道副元帥渾瑊薨十六道軍不相統壹自於小殷水十六春以韓全義為淮西招討使諸軍皆屬焉全義無將略以賄結中官得之夏諸軍潰於五樓全義退保陳州河北宣武軍皆逃歸之徐泗帥張建封卒軍中立其子愔詔淮南杜佑討不克卒以愔為留後又復呉少誠官爵十七春韓全義班師上不知其敗而以招降呉少誠為功寵賜甚厚王或告浙西觀察使李錡謀反上執送錡燒殺之掠武俊卒子士真代之秋吐蕃陷麟州鹽州大而去蕃韋臯大破吐於雅州十八春韋臯造其將陳泊擊破吐蕃拔七城圍維州吐蕃相論莽熱救之臯擒莽熱以獻之十九秋韋執誼譖左補闕張正一等皆坐貶時棊待詔王叔文得幸於太子與執誼及朝士陸淳呂温韓曄韓泰栁宗元劉禹錫等結為死友疑正一言其朋黨故毀逐之甲申二十春昭義帥李長榮卒以衙將盧從史代之上毎除節度使常遣中使探其軍情所附者用之從史隂賂中使奏云為軍情所附用之太子始得風疾不能言順宗誦永貞元年春徳宗崩順宗即位疾不能視朝以韋執誼為平章事王叔文為翰林學士待詔王伾為散騎常侍相與建置朋黨勢傾海内夏立子純為太子程懷信卒子權代之王叔文等謀奪中官兵權中官俱文珍等與韋臯共請使太子監國秋詔傳位太子自稱太上皇叔文伾執誼皆貶死闢韋臯卒副使劉代之憲宗純元和元年春太上皇崩章劉闢求領三川發兵攻陷東川平事杜黄裳薦高崇文使討之卒靈夏楊惠琳反衙將張承金討斬之川夏李師古弟師道代之秋高崇文擒劉闢兩皆平二秋浙西李騎反衙將張文良等討擒之三夏黄少卿降赦之頔秋以山南東道帥于同平章事頔䟦扈日久徳宗優容之聞上英武懼而入朝上初即位杜黄裳曰貞元中節度使皆出於軍士與中使之心陛下必欲天下治宜稍裁以法度上從之故藩鎮稍可制御四春王士真卒子承宗自立請獻徳棣二州許之承夏度支使李㢲卒㢲善治財賦過於劉晏冬王宗獻徳棣襲薛昌朝虜之詔中尉吐突承璀討承宗史立子寧為太子呉少誠卒以中州刺呉少陽代之五盧從史建議討王承宗而隂與之通夏衙將烏重𦙍執從史以聞吐突承璀久無功承宗因言為從史所賣乞昭洗詔許之茂秋劉濟子聰弑濟而代之廸冬易定張昭舉族入朝詔左庶子任簡代之六夏詔以天寳以來中原宿兵至八十餘萬内外官萬員財賦日寡廩給日多悉令詳定減併冬太子寧薨七立子桓為太子懷秋田季安卒子懷諫代之年十一冬魏博軍亂逐諫以衙將田𢎞正代之𢎞正因獻籍請吏上令中書舍人裴度宣慰之軍中大悦八春于頔坐事貶恩王傅振秋併天威入神䇿軍冬武軍亂逐其帥李進賢詔夏州張煦代之甲午九秋呉少陽卒子元濟自領軍務出兵攻掠鄰境上用平章事李吉甫䇿不授節鉞以山南東道帥嚴綬為招撫使合諸道兵討之吉甫尋卒上以軍中事委平章事武元衡及中丞裴度李師道王承宗屢請赦元濟上不許十夏師道承宗使賊殺武元衡并擊傷度或請罷度官以安二鎮心上怒曰如此姦計得行即拜度平章事討淮西益急秋師道復遣賊入東都謀亂留守呂元膺討誅之嚴綬為元濟所敗以韓𢎞為淮西都討代之十一春詔河東河北軍討王承宗多王太后崩曰夏唐鄧帥高霞寓為元濟所敗朝議欲罷兵上豈可以一將失利便沮成計但當議討賊方略耳又貶將相請罷兵者數人羣臣乃不敢言冬易定帥渾鎬為王承宗所敗黄蠻陷扈州十二夏以國用不足罷討承宗諸軍士亦厭兵欲赦元濟裴度以為不可秋以度為淮西宣慰處置使平章事李逢吉欲沮度事上罷逢吉相專任度度至悉罷監軍督諸將進戰屢㨗冬唐鄧帥李愬夜入蔡州擒元濟淮西悉平十三春程權請罷鎮入朝二王承宗納二子及徳棣州以自贖上許之之李師道請獻三州既而悔之秋詔宣武等五鎮討户部侍郎皇甫鎛同平章事時上稍驕侈鎛以聚斂得幸復冬靈夏平涼三道大破吐蕃克原州十四春淄青將劉悟殺李師道以降分十三州為淄青鄆濮沂海三道度夏詔諸州兵皆屬刺史罷其鎮將皇甫鏄譖裴出鎮河東之秋沂州軍亂殺其帥王遂詔棣州刺史曹華代韓𢎞入朝為中書令田𢎞正朝請留不許十五上服金丹多躁忿春中官陳𢎞志弑上后穆宗即位貶皇甫鏄崖州尊母郭妃為太冬王承宗卒軍中立其弟承元承元請帥詔以田𢎞正代之徙承元鎮義成吐蕃党項冦涇州吐蕃又冦雅州穆宗恒長慶元年夏劉總納地請為僧分范陽為二鎮以帝妹太和公主嫁回紇登邏可汗之秋范陽將朱克融囚其帥張𢎞靖又襲瀛莫取成徳將王廷湊殺田𢎞正魏博帥李愬卒詔𢎞正子布代之鎮王廷湊圍深冀帥牛元翼於深州冬以裴度為幽招討使督諸將討之滄徳帥杜叔良敗於博野以陳許帥李光顔代之朝廷力不能兼討兩賊乃以朱克融不殺張𢎞靖赦之專討王廷湊二春魏博軍亂田布自殺衙將史憲誠代之其以國用匱竭并赦王廷湊廷湊逐牛元翼而取地武寧副使王智興逐其帥崔羣秋宣武將李㝏逐其帥李愿詔韓𢎞弟克鎮宣武討平之冬上有疾立子湛為太子韓𢎞薨三甲寅四春上崩上喜宴遊爵賞多濫以崔植元稹李逢吉為相而踈裴度是以再失河朔憲宗之業衰焉州初上即位年十六李逢吉譖户部侍郎李紳貶端尊母王氏為太后敬宗湛寳厯元年秋昭義帥劉悟卒子從諫求為留後僕射李絳請除近澤潞將帥代悟令倍道之官李逢吉及樞宻使王守澄固請以節鉞授之二春詔興元帥裴度同平章事李逢吉之黨百計毁之上不聴其夏横海帥李全略卒子同㨗代之幽州軍亂殺帥朱克融以都將李載義代之誅冬軍將蘇佐明等弑上李絳王悟王守澄等討之立江王昻敬宗輕佻逰戲無度故及於禍文宗昻太和元年夏徙李同㨗鎮兖海以天平帥烏重􅉙代之同㨗不受詔冬詔諸道討之頗上初即位恭勤庶務以裴度韋處厚為相革兩朝弊政既而多疑少決中外失望二秋王智興攻李同㨗拔棣州詔王廷湊謀取滄景數出兵侵鄰道以沮撓官軍冬諸軍討廷湊魏博將亓志紹為廷湊所誘以其衆作亂義成帥李聽擊破之韋處厚薨三夏横海帥李祐破李同㨗斬之史憲誠請入朝詔李聽代之分磁相衞三州為别鎮聰至舘陶魏博軍亂殺憲誠逐聰立衙將何進滔秋詔授進滔節鉞仍赦王廷湊州冬南詔蠻反陷戎嶲卭雅四州及益外郭大掠而去四春興元軍亂殺其帥李絳詔左丞温造代之之秋裴度以病出鎮襄州平章事牛僧孺李宗閔惡也僧孺宗閔素與義成帥李徳裕有隙争植朋黨迭相傾軋上不能治而歎曰去河北賊易去朝中朋黨難五春范陽將楊志誠逐其帥李載義上用平章事牛僧孺言以志誠代之上患中尉王守澄專權隂與平章事宋申錫謀去之守澄用其客鄭注謀誣申錫與上弟漳王湊謀反貶申錫開州注始用事衣冠徃徃附之六冬立子永為太子乗吐蕃維州守將悉怛謀以城降西川帥李徳裕請釁取之牛僧孺曰得一維州而失大信若吐蕃因此名以入冦悔將何及詔悉縳還賛普賛普烹之由是徳裕怨僧孺益甚七春以兵部尚書李徳裕同平章事牛僧孺李宗閔皆罷相甲寅八春上有風疾鄭注始以醫得見因薦其黨李訓訓善講易上悦之李范陽將史元忠逐其帥楊志誠而代之上欲授訓鄭注官李徳裕言訓注奸邪訓注乃薦興元帥李宗閔為相以徳裕鎮浙西王廷湊卒子元逵代之九夏李徳裕李宗閔皆坐事貶之上以中官太盛元和弑逆之黨尚在左右畏而惡隂與李訓鄭注謀誅之秋以注鎮鳳翔以訓同平章事罷王守澄兵柄酖殺之中官禁軍畏之側目冬訓詐為甘露降謀伏兵誅中官不克中尉仇士良率兵殺訓及宰相王涯賈餗舒元輿等并鄭注凡十二族京師大駭以僕射鄭覃户部侍郎李石同平章事於是中官益横劉從諫三表請王涯等罪名中官稍沮開成元秋鄜坊帥蕭洪坐詐稱蕭太后弟賜死二三春仇士良使盜擊傷李石石懼求罷相出鎮荆南是時楊嗣復陳夷行李珏鄭覃為相日相詆斥於上前上亦不能有所是非也秋荘恪太子永以憂薨楊賢妃譖之也賢妃欲立安王溶李珏非之乃止四春中書令裴度薨遺表以儲嗣未定為憂金吾將軍蕭本泉州人蕭𢎞坐詐稱太后弟流嶺南敬鄭覃陳夷行坐與楊嗣復李珏不叶罷相秋立宗子陳王成美為太子五春上冇疾中尉仇士良魚𢎞志矯詔立潁王瀍為太弟廢太子為陳王上崩武宗即位誅陳王及楊賢妃安王嗣秋知樞宻劉𢎞逸薛季稜謀廢立不克而死楊復貶潮州李珏貶昭州復以華州刺史陳夷行淮南帥李徳裕同平章事冬何進滔卒何𢎞敬代之武宗炎㑹昌元秋幽州將陳行泰殺其帥史元忠冬雄州武軍使張仲武討誅之以張仲武鎮幽二春回紇薛特勒可汗死黠戞斯大破回紇焚蕩殆盡烏介可汗劫太和公主南渡漠上用李徳裕䇿慰撫之斯秋回紇將赤心冦幽州張仲武擊破之别將温沒殺赤心以降烏介侵掠振武詔河東劉沔及張仲武討之三春河東將石雄大破烏介奪公主以歸烏介奔室韋夏劉從諌卒兄子稹求節鉞李徳裕請討之羣臣多言不可上用徳裕䇿遣使諭魏鎮以澤潞與河北不同不當承襲令與諸軍討之二鎮皆聴命秋李宗閔貶郴州甲子四春河東將楊弁逐其帥李石上遣使視之還言弁有十五里光明甲李徳裕知其詐言於上曰寧赦劉稹不赦楊弁上從之監軍呂義忠斬弁以獻秋昭義將郭誼斬劉稹以降詔以誼首為稹畫反計并諫之冬牛僧孺貶瑞州五春王太后崩上好神仙術道士趙歸真得幸李徳裕諫上曰朕聊欲與之談道滌煩耳至於軍國政事當問卿及次對官雖百歸真無能惑也二夏詔廢天下寺四千餘所省僧十六萬餘人六春上服方士藥得疾不能言立光王忱為太子上崩宣宗即位尊母鄭氏為太后以翰林學士白敏中同平章事李徳裕出鎮荆南徳裕用事久白敏中及朝士等多疾之宣宗亦惡其權盛故罷相宣宗忱大中元年春復天下佛寺及僧尼可夏蕭太后崩拜黠戞斯為英武汗上性明察勤於政理重惜官爵未嘗輕授貴戚倖臣犯法絲毫無借由是中外肅然常曰高祖太宗之法朕安敢專之二春李徳裕貶潮州弟夏太皇太后郭氏崩之回紇烏介可汗死阿捻代之黠戞斯虜以歸其甥龎勒先奔磧西自稱可汗歲時朝貢無復昔時之盛三春吐蕃相論恐熱以秦原威三州及石門等七闗内附詔涇原帥康季榮靈武帥朱叔明邠寧帥張君緒出兵應援悉定其地夏張仲武卒子直方代之幽秋吐蕃維州内附直李徳裕貶崖州州軍亂逐其帥張方四秋以幽州衙將張允伸為節度使五夏户部侍郎魏謩同平章事先是累朝非上有意羣臣無敢請立太子者謩獨首以為言且泣上甚感之然不能用内秋吐蕃沙州刺史張義潮以𤓰沙伊肅等十一州附詔置歸義軍以義潮為節度使於是盡復河湟之地六夏以轉運使裴休同平章事太和以後轉運使非其人姦吏盜竊沈溺歲漕江淮米四十餘萬石入渭者什無三四大隳劉晏之法休作漕法十餘歲漕入渭者一百二十萬石更無敗溺七甲戌八九十十一春平章事令狐綯惡魏謩切直譖之謩出鎮西川紹王光逵卒詔其子紹鼎代之秋又卒弟懿代之十二夏林邑蠻冦安南時都䕶李涿侵刻羣獠故獠引蠻入冦攻掠州縣十三秋上寢疾大臣莫得見遺詔内樞宻使王歸長等立少子䕫王上崩左軍中尉王宗實立長子鄆王漼為帝誅歸長等尊帝母晁氏為太后党項冦邠寧以翰林學士渾諴鎮邠寧諭降之懿宗漼咸通元年春令狐綯坐招權罷相式浙東賊裘甫攻陷州縣觀察使王討平之上奢侈無度崇尚佛敎嬖倖用事忠諫被誅軍旅數起百姓愁怨唐室由是遂衰二秋林邑蠻攻陷安南詔神䇿將軍康承訓率禁軍及江西湖廣兵擊之連年不克自是諸道發兵不絶天下騷動矣三春分嶺南邕廣為東西道秋武寧軍亂逐其帥温璋初王智興召募頑獷數千人為衙兵驕不可制節度使田牟親為之把板唱歌日費萬計猶喧訴無厭憚璋嚴而逐之詔王式鎮武寧以兵還鎮悉收掩衙兵誅之四甲申五夏林邑蠻冦邕管詔徐州經畧使高駢率禁軍㑹諸道兵討之六夏高駢大破林邑蠻於邕州遂復安南諸州唄冬太皇太后鄭氏崩上好奉佛於禁中親為賛以栴檀為二高座賜安國寺僧其餘奢靡皆此類七春王紹懿卒詔紹鼎子景崇代之八冬南詔蠻陷嶲州武寧軍士戍桂州者過期不得代因作亂推判官龐勛為主掠潭湘北還徐州淮南將李湘白其帥令狐綯請邀擊之曰若過淮與徐軍合則不可制綯不從九秋龎勛陷徐州殺其帥崔彥曽散庫財募兵至十萬遂圍泗洲表求節鉞詔諸道兵討之冬勛遣兵陷徐和濠三州淮南皆被其害十春徐泗招討使康承訓督兵七萬討龎勛屢為勛所敗秋招討使馬舉代之賊宿將張𤣥稔降與舉合攻徐州勛走死渙水中賜沙陀朱邪赤心討勛有功以為振武軍節度使姓李名國昌何𢎞敬卒子全皥代之十一春翰林學士韋保衡同平章事上愛女同昌公主婿也魏博將韓允忠殺其帥何全皥而代之秋同昌公主薨毉官皆族誅平章事劉瞻京兆尹温璋諫上怒瞻貶康州璋貶振州自殺冬南詔蠻驃信衆二十萬冦劒南圍成都詔神䇿將顔慶復等救之蠻兵遁去十二夏平章事路岩出鎮西川尋流嶺南賜死韋保衡譖之也十三春張允伸卒平州刺史張公素逐其子簡㑹而代之國子司業韋殷裕表論郭淑妃弟敬述隂事上怒杖殺殷裕籍沒其家冬李國昌子克用殺雲州刺史段文楚而代之詔國昌召克用還國昌不奉詔十四春詔張公素及河東崔彥昭討之秋上崩子普王儇立年十二尊母王氏為太后中尉劉行深韓文約用事韋保衡貶賀州尋賜死冬幽州將李茂勲逐帥張公素而代之驃信復冦劒州甲午僖宗儇乾符元年春以天平帥高駢鎮西川討驃信驃信至新津而還諸軍討李國昌父子乆無功代北咸被其害冬詔靈武帥李鈞招諭之韓允忠卒子簡代之二夏長垣賊帥王仙芝陷濮州天平帥李穜討之不克是時上幼弱政事出于羣下南衙北司互相乖戾選任非材賞罰散亂因之饑饉徐兖江淮盜賊羣起州縣莫能制三王仙芝陷曹州詔將軍徐克讓鎮兖海以討之仙芝引兵入陳許襄鄧虜人為兵衆號三十萬又陷汝州攻唐鄧安黄諸州皆閉城拒守所過殘滅邑落無遺四春以平盧帥宋威為招討草賊使勲寃句賊帥黄巢攻陷鄆州逐其帥薛崇夏李茂請致仕子可舉代之李秋黄巢自沂海趣頴蔡與王仙芝合攻陷隨州國昌冦雲朔詔河東幽州昭義三鎮討之冬王仙芝攻江陵陷外郭五春李國昌陷遮虜軍尚王仙芝攻洪州宋威擊斬之其將讓收餘衆歸黄巢詔平章事王鐸為都統討之巢陷䖍吉饒信州自浙東西道陷福建諸州秋李國昌陷岢嵐軍冬李克用破河東帥崔季康昭義帥李鈞於洪谷鈞死六春河東軍亂殺崔季康詔司馬康𫝊圭代之廣黄巢陷桂州廣州求天平節鉞平章事鄭畋請以南授巢盧攜曰浙東帥高駢智勇無雙使統諸軍賊不足平夏畋攜皆坐上前忿爭罷相冬以高駢為江西招討使復以攜為相廣明元春河東軍亂殺康傳圭詔平章事鄭從讜代之係黄巢軍大疫遂掠湖南江西陷潭州殺王鐸將李鐸奔襄陽詔以高駢代之奔夏李可舉與吐渾赫連鐸大破李克用克用父子逹靼高駢將張璘屢破黄巢巢請降駢奏罷諸道兵巢遂擊殺張璘引兵北渡駢嚴兵自固巢遂陷東都破潼闗上幸興元巢入長安自稱齊帝中和元春河中將王重榮逐其帥李都而代之鳳翔帥鄭畋破賊將尚譲于龍尾陂傳檄藩鎮王師復振都復以王鐸為都統李克用冦太原據秋上幸成昭義將孟方立邢州稱留後赴鄭畋病行在二春諸道援兵集長安義武帥王處存先入城賊偽遁去還擊處存敗之賊因屠長安晸秋賊將朱晃以同州降之冬韓簡攻太平帥曹全殺之詔赦李克用使討賊王景崇卒子鎔代之鄭畋薨三春魏博將樂彦禎殺韓簡而代之巢夏李克用及諸軍大破黄巢克長安南走轉掠鄧許汴洛徐兖等州葢陵人以充糧食淮西帥秦宗權降賊秋以克用鎮河東朱晃鎮宣武冬鴈門帥李國昌卒元忠武將鹿晏𢎞陷興甲辰四夏李克用㑹闗東諸軍討黄巢大破之巢走死泰山朝秦宗權稱帝秋李克用還過汴朱晃謀殺之不果廷和解之官軍拔興元冬鹿𢎞晏陷許州殺周岌秦宗權擊殺之光啓元春上還長安時藩鎭跋扈朝廷所制惟闗内三蜀而已全杭州刺史董昌殺浙東帥劉漢宏王夏幽州將李忠殺李可舉而代之田令孜與重榮爭鹽池率邠寧帥朱玫以討之李克用救重榮冬令孜軍敗上幸鳳翔二春朱玫反上幸興元夏玫立襄王煴為帝赦克用重榮使討玫威代之冬詔朱晃兼鎮義成秋李全忠卒子匡邠寧將王行瑜殺玫降煴走死河中葛秦宗權孫儒逐河陽帥諸仲方三春浙西將劉浩殺其帥周寳上還鳳翔帥夏雄南將畢師鐸殺其帥高駢迎宣州帥秦彥為秦宗權圍汴州天平帥朱瑄兖海帥朱瑾救之宗權走史河中軍亂殺王重榮以兄重盈代之冬盧州刺楊行宻攻拔揚州彥師鐸走歸孫儒文徳元春上還長安太樂彥禎卒衙將羅𢎞信代之逐立夀王曄為弟上崩河南尹張全義河南帥李罕之罕之引河東兵攻全義朱晃擊却之遣其將丁㑹鎮河陽孫儒陷揚州楊行宻走宣州朱晃拔蔡州斬秦宗權昭宗煜龍紀元年春壁州刺史王建攻西川帥陳敬瑄夏邢洛帥孟方立卒弟遷代之李克用使李罕之攻遷朱晃使兵將王䖍裕擊却之杭州刺史錢鏐攻拔潤州殺劉浩大順元春李克用虜孟遷又攻雲州帥赫連鐸鐸與朱晃李匡威同請討之夏以平章事張濬為招討使討克用克用擒澤潞帥孫揆殺之冬克用將李存信敗濬于隂地遂拔晉絳掠河中朝廷震恐詔復克用官貶濬連州二春宣武將龎師古攻魏博拔十縣宻孫儒圍楊行宻三年不克其衆執儒以降行行宻復入揚州恭夏王建克成都殺陳敬瑄而代之使詔中尉楊復致仕復恭擁兵不受詔詔天威軍李順節討之復恭奔商州破朱晃攻武寧帥時􅄎之景福元夏中尉劉景宣西門重遂誘李順節斬之寧冬楊復恭走依興元帥楊守亮鳳翔帥李茂貞邠帥王行瑜鎮國帥韓建等請討守亮上不許李茂貞擅出兵攻拔興元以其子李繼宻鎮之楊復恭守亮走死乾元二春克用攻鎮州李匡威救之弟匡籌自立而逐匡威死于鎮州置夏朱晃拔徐州殺時溥以其將龎師古守之秋鎮海軍于杭州李茂貞求兼興元上不許發禁兵討之不利茂貞逼京師上殺平章事杜讓能而以興元授之甲寅乾寧元春李克用拔邢州殺其帥李存孝使其將馬師素守之夏孫儒將劉建鋒陷潭州自稱湖廣節度使李克用拔雲州執赫連鐸使其將薛志勤守之冬又拔幽州使幽州將劉仁恭鎮之李匡籌走死於景城二春王重盈卒子珂代之昭浙東帥董昌自稱羅平王平章事崔緯召李茂貞王行瑜韓建使舉兵詣闕殺平章事韋昭度李谿秋李克用舉兵討二鎮邠岐兵謀刼上上幸南山踰月而還詔克用先討行瑜冬拔邠州斬行瑜三夏湖南軍亂殺劉建鋒邵州刺史馬殷代之鎮海帥錢鏐攻斬董昌詔鏐兼鎮兩浙幸李克用攻魏博不克秋李茂貞舉兵向闕上將河東至渭北韓建迎上幸華州茂貞遂焚長安冬茂貞謝罪請修宫闕許之四春朱晃拔鄆州殺朱瑄又拔兖州朱瑾奔淮南于是河南諸州多為晃所有萬韓建以親王典禁兵惡之乃囚諸王悉散禁軍二餘人秋盡殺諸王立皇子裕為太子擒冬朱晃使其將龎師古攻楊行宻行宻使朱瑾擊之劉仁恭大破李克用于安塞光化元春劉仁恭逐滄景帥盧彥威以其子守文代之夏立皇后何氏宣武將葛從周攻李克用邢洺磁三州取之之秋上還長安朱羅𢎞信卒子紹威代之李罕據澤潞降於晃二春劉仁恭将兵十萬屠貝州進攻魏州朱晃使其將張存敬葛從周救之與羅紹威大破仁恭于内黄夏宣武將氏叔琮攻河東不克殺陜西將李璠殺其帥王珙而代之冬别將朱友謙璠而代之遂以陜歸朱晃三夏王建攻拔梓州殺其帥顧彥暉詔建兼鎮兩州秋朱晃合三鎮兵攻王鎔鎔請和晃遂逐易定帥王郜以易定將王處直代之内平章事崔𦙍抑損宦官冬中尉劉季述幽上于東立太子裕為帝神䇿將孫徳昭攻季述斬之天復元春上返政廢太子為徳王朱晃攻河中王珂降之悉是時中尉韓全誨善於李茂貞崔𦙍隂結朱晃欲誅宦官冬全誨刼上幸鳳翔𦙍趣晃迎鑾駕晃進攻華州韓建降之遂入長安進至鳳翔上詔晃還鎮晃退攻邠寧帥李繼徽取之二春河東将周徳威攻磁隰宣武將朱友寧擊破之遂進拔汾州圍晉陽不克而還夏朱晃以兵五萬自河中進圍鳳翔冬宣武將孔勍襲鄜坊帥李周彜取之于是茂貞大懼斬韓全誨等與晃和親三春上還長安盡誅諸宦官荆平盧將劉鄩拔兖州死夏楊行宻攻鄂岳帥杜洪南帥成汭救之汭敗朱友寧攻平盧帥王師範楊行宻救之殺友寧朱晃復遣將揚師厚攻師範冬師範降李茂貞逼京師晃屯河中崔𦙍募六軍晃惡而殺之甲子哀帝祝天祐元年春朱晃逼昭宗遷都洛陽悉坑衞士李茂貞與邠寧帥楊崇本侵擾闗中秋晃自討之隂令樞宻使蒋𤣥暉弑昭宗立輝王祝為帝冬晃南擊楊行宻以廣南衙將劉隱為節度使二春楊行宻拔鄂州殺杜洪朱晃殺昭宗子九王夏又殺朝士裴樞等于白馬秋晃自將攻襄鄧帥趙匡凝荆南帥趙匡明取之以其將高季興鎮荆南匡明奔西川王建始得䕫峽之地冬晃攻夀州不克何晃殺蒋𤣥暉弑太后三春朱晃羅紹威攻滄景誅魏博衙兵八千家秋晃急攻滄州劉仁恭求救于李克用冬克用使將周徳威李嗣昭攻澤潞帥丁㑹取之以嗣昭鎮澤潞晃聞之乃還楊行宻卒子渥代之梁太祖晃開平元年河東鳳翔淮南天祐四西川天復七夏受唐禪臣光曰髙祖舉晉陽精兵承亡隋之弊席卷長驅奄有闗中命將出師埽除亂略遂降李宻係建徳禽世充芟武周翦黑闥夷蕭銑六年之中海内咸服何成功之速哉盖以太宗為之子也太宗文武之才高出前古驅䇿英雄罔羅俊又好用善謀樂聞直諫拯民於湯火之中而措之衽席之上使盗賊化為君子呻吟轉為謳歌衣食有餘刑措不用突厥之渠係頸闕庭北海之濱悉為郡縣盖三代以還中國之盛未之有也惜其好尚功名而不及禮樂父子兄弟之間慙徳多矣高宗沉溺宴安仁而不武使天后斲䘮唐室屠害宗枝毒流縉紳迹其本原有自來矣中宗久罹幽辱備嘗險阻一旦得志荒淫不悛糞土之牆安可汚也睿宗鑒前之禍立嗣以功所謂可與權矣明皇能㫁有謀再清内難開元之初憂勤庶政好賢樂善愛民利物海内富庶四夷賓服浸淫於貞觀之風矣及天寳以降自以為功成治定無復後艱志欲既滿侈心乃生忠直寢疎讒諛並進以娯游為良謀以聲色為急務以李林甫楊國忠為周召以安禄山哥舒翰為方虎癰疽結於心腹而不悟豺狼游於藩籬而不知一旦變生所忽兵起邊隅廟堂執檄而心醉猛將望塵而束手腥膻汚於伊洛流血染於河潼乗輿播蕩生民塗地禍亂並興不可救藥使數百年之間干戈爛漫而不息嗟乎靡不有初鮮克有終安之不可恃治之不可保如此夫肅宗以國之元子收兵靈武反斾而東不失舊物代宗分命羣帥翦除凶醜使大河南北復為唐臣其功皆不細矣然此二君者武不足以決疑明不足以燭理向無郭子儀之忠李光弼之智因僕固懷恩以用回紇之師則天下已非唐有矣夫以肅宗之孝慈而制於李輔國不能養其父惑於張后不能庇其子則其武可知矣以代宗之寛仁而聴讒臣之言使光弼不敢入朝慙憤而死懷恩招引外冦㡬再亡國則其明可知矣而又不思經逺之謀專為姑息之政盗賊據州郡者因用為牧守士卒殺主帥者因授之旌鉞使强暴縱横下陵上替積習成俗莫知其非唐之紀綱大壞不可復振則肅代之為也徳宗憤積世之弊憫王室之卑南面之初赫然有撥亂之志而識度闇淺資性猜愎親信多非其人舉措不由其道賦斂煩重果於誅殺故闗外之冦未平而京師之盗先起矣於是困辱於奉天播遷於山南公卿拜於賊庭鋒鏑集於黄屋尚頼陸䞇盡心於内李晟渾瑊輸力於外故能誅夷元凶還奉宗社自是之後消剛為柔刓方為圓逮其晩節偷懦之政甚於祖考矣順宗不幸嬰疾奸邪肆志而能委政冢嗣以安社稷足為賢矣憲宗聰明果決得於天性選任忠良延納善謀師老財屈異論輻輳而不為之疑盗發都邑屠害元宰而不為之懼卒能取靈夏清劒南誅浙西俘澤潞平淮右復齊魯於是天下㴱根固蔕之盜皆狼顧䑕拱納質効地稽顙入朝百年之憂一旦廓然矣而怠於防微變生肘腋悲夫穆宗蒙已成之業承既平之緒授任非才為謀不臧使柙中之虎復縱暴於原野網中之魚得自脱於深淵元和之功於兹墜矣寳厯既易荒縱自貽顛覆文宗優游不㫁受制家臣雖有好賢之心文雅之美皆不足稱也武宗英敏特逹委任能臣克上黨如拾芥取太原如反掌饗國日淺功業未究惜哉宣宗少歴艱難長年踐位人之情偽靡不周知盡心民事精勤治道賞簡而當罰嚴而必故方内樂業殊方順軌求諸漢世其孝宣之流亞歟懿宗驕奢無度賊虐不懼輔弼之任委於寵嬖四海之財竭於淫樂民怨不知神怒不恤李氏之亡於兹決矣且唐自至徳以來近習用權藩臣跋扈譬如羸病之人以糜粥養之猶懼不濟又况飲之毒酒其能存乎及僖昭嗣位天禄已去民心已離盗賊徧於寰區蓬蒿塞於城闕漂泊幽辱寄命諸侯當是之時雖欲救之其將能乎楊渥攻江西帥鍾匡時取之又遣其將劉存陳知新攻湖南為馬殷所虜劉仁恭子守光囚仁恭而代之將軍李思安圍潞州築夾城守之二蜀高祖王建武成元李克用薨子存朂嗣春晉王夏晉王大破梁兵於夾城渥馬殷攻灃朗帥雷恭彦取之國淮南將張顥殺楊立其弟渭别將徐温殺顥匡帥劉知俊大破李茂貞於幕谷稱秋晉王侵晉絳上幸晉州王建帝三春上幸河中王景崇將高萬興以鄜延來降蘇淮南將周本拔撫信吉州李夏錢鏐敗淮南兵於州劉知俊以闗西諸州降茂貞上幸河中招討使劉潯楊師厚襲長安取之知俊奔鳳翔冬知俊破梁兵于興平茂貞復振四春封福建帥王審知為閩王羅紹威卒子周翰代之秋上幸洛陽因止都之深上遣將杜廷隱襲王鎔冀二州取之因命振討使王景仁伐鎔鎔求救於晉冬王自將救鎔王處直以兵㑹之乾化元蜀永平元還春晉王大破王景仁於栢鄉遂圍魏州破澶州而秋上幸魏州劉守光自稱燕帝冬晉王遣周徳威合鎮定兵攻劉守光嶺劉隱卒弟龔代之攻下邕容交等州盡有南之地二春上自將救劉守光至棗强遇晉將符存審大敗而還晩夏晉將周徳威大破劉守光取其瀛順等州上年淫虐尤甚子友珪懼誅弑上及殺上養子博王友文又欲誅河中朱友謙友謙以所部降晉冬晉王敗梁兵於平陽周以楊師厚鎮魏博徙羅翰鎮滑州均王瑱三年春東京留守均王瑱與宿衞將趙巖等殺友珪即帝位因留都汴夏淮南將李濤攻錢鏐鏐子元瓘敗濤于臨安擒之之冬晉王拔幽州擒劉守光父子歸殺甲戌四春晉王始開府置行臺晉秋武寧帥蒋殷反招討使牛存節劉潯討平之王及王鎔攻邢州楊師厚與戰于張公橋敗之是時租庸使趙巖及后兄張歸霸等用事賣官鬻獄政治日亂平章事敬翔素有謀略疎廢不得用貞明元春楊師厚卒上用趙巖䇿分澶相衛為昭徳軍以張筠鎮之分魏博衙兵以𨽻昭徳衙兵張彦作亂囚其帥賀徳倫以降于晉夏晉王入魏州誅張彦劉鄩軍華縣以禦之冬上弟康王友欽反誅上由是疎忌宗室二蜀通正元蜀春茂貞將李繼崇劉知俊以秦降蜀主用知俊為將攻茂貞與鳳隴成階州下之遂圍鳳翔不克茂貞由是遂衰將軍王檀以竒兵襲晉陽不克晉王大破劉鄩於故元城鄩退保黎陽北秋邢洛帥閻寳降晉滄景帥戴思逺張筠皆走河盡入于晉契丹陷蔚州三蜀天漢南漢高祖劉龔乾亨元年春新州將盧文進引契丹圍幽州晉將李澶擊走之夏劉龔稱漢帝冬上幸洛陽劉城蜀主殺劉知俊晉王濟河抜楊徐温徙治昇州四蜀光天元春晉王侵鄆濮知夏軍使謝彦章敗于碭州李朱瑾殺淮南副使徐訓知訓父温殺瑾以假子呉代知訓蜀蜀主以太子衍好酒色欲廢之衍與張格鴆敗殺主徐温攻錢鏐拔䖍州冬招討使賀瓌晉兵於胡栁殺周徳威既而瓌復為晉軍所敗晉遂拔濮州京師大恐五蜀順正公衍乾徳呉宣帝楊渭武義元渭春晉將符存審夾河築徳勝二城殺夏徐温立楊為呉王錢元瓘破呉師於狼山其將彭彦呉與兩浙和親主冬晉王敗招討使王𤨏於楊村蜀親巡利閬六夏呉宣帝殂徐温立其弟丹陽王溥審朱友謙襲據同州詔劉鄩尹皓討之秋晉將符存大破鄩皓於同州皓譖鄩而殺之龍徳元呉睿皇溥順義元閻春成徳將張文禮殺王鎔而代之晉王使寳討之秋文禮卒子處瑾代之子冬晉王破戴思逺於戚城遂北攻鎮州王處直使郁召契丹以救鎮州假子都殺處直自立契丹遂圍幽州攻易定二春晉王破契丹於定州追奔至幽州戴思逺襲魏州拔成安急攻楊劉晉王還救之段晉人攻鎮州乆不下名將李嗣昭等多死秋監軍凝拔衞州梁兵復振晉將符存審拔鎮州殺張處瑾卒晉監軍張承業唐莊宗存朂同光元年春澤潞李繼韜降于梁州夏王稱帝於魏州李亶襲梁鄆取之梁將王彦章拔徳勝急攻楊劉㡬拔趙巖等惡彦章以段凝代之上用樞宻使郭崇韜䇿自鄆州直趣大梁擒王彥章於中都梁主自殺諸藩鎮皆降臣光曰太祖始以黄巢降將秉旄宣武逞其詐力蠶食東夏地廣兵强威權日熾志欲無厭遂遷唐祚淫虐不悛禍自内興不得其死宜矣均王膏梁之子材不過人棄敬翔王彥章而用趙巖張歸霸以與莊宗為敵能無亡乎上入汴尋遷都洛陽甲申二春立皇后劉氏上既滅梁日益驕淫伶人宦官用事劉后隂狡上畏而惑之四方解體契夏秦王李茂貞卒子從曮嗣秋蜀主遊青城丹冦幽州及鎮定嵐蔚州三蜀咸康南漢白龍元決春契丹冦幽州李亶擊走之上幸魏州塞酸棗河秋曹太后崩魏王繼岌郭崇韜伐蜀蜀主將遊秦州至利州圍之奔還蜀城邑皆奔潰冬蜀主降以北都留守孟知祥鎮西川卒閩王王審知子延翰嗣明宗亶天成元年春莊宗以讒誅郭崇韜朱友謙禮天雄衙兵皇甫暉反推衙將趙在為主攻陷魏州詔總管李亶討之軍士劫亶與在禮合荘宗將幸汴州亶先入據之荘宗還洛夏軍校郭崇謙反弑荘宗劉后死於并州魏王死於渭南亶入洛即帝位秋契丹安巴堅入幽州王延翰驕恣弟鏻及審知假子延禀攻殺之璘自立以延禀鎮建州二呉乾貞元州春高季興擅取䕫峽詔襄州帥劉訓討之不克子冬上幸汴州宣武帥朱守殷反討平之徐温卒知詢代為副都統鎮昇州呉王溥初稱帝三南漢大有元王春契丹陷平州契夏王都謀反詔宋州帥晏球討之秋丹將楊隱救鎮州晏球大敗之兼徐知詢與李昪爭權冬昪誘知詢入朝奪其兵柄領之昇賢而好士國人悦之子高季興卒從誨代之四呉太和元使春王晏球攻定州殺王都樞宻安重誨惡錢鏐之僭秋詔鏐致仕鏐令子元瓘自雪乃復其官爵長興元春徙李從曮鎮宣武潞立皇后曹氏上假子王從珂鎮河中安重誨惡之使其將楊彦温逐之又惡孟知祥及東川帥董璋割其支郡夏知祥及璋俱反詔上婿天雄帥石敬瑭討之不克冬楚王馬殷薨子希聲嗣二春契丹主徳光之兄賛華來奔尋石敬瑭糧盡引還上惡安重誨恣横使出鎮河中族誅之重誨曰臣死不恨但不為國家誅潞王他日必為患家夏王延禀襲福州王鏻擊殺之已上族董璋而不誅孟氏璋由是疑知祥背三春詔赦兩川知祥聴命璋怒攻知祥至漢州敗死詔知祥鎮兩川封蜀王許行墨勑知祥乃分利閬遂䕫黔為五嶺嗣呉越王錢鏐薨子元瓘嗣鎮夏馬希聲薨弟希範以潞王鎮鳳翔石敬瑭河東冬呉李昇出鎮昇州留子景知政事四閩惠宗王鏻龍啓元子春王鏻自稱閩帝或請立太上不悦夏上疾秦王從榮請見不得疑上崩而左右匿之勒兵將入宫樞宻使朱𢎞昭馮贇孟漢瓊等擊斬之上崩召少子宋王從厚於魏州而立之甲午潞王從珂清泰元年蜀高祖孟知祥明徳无潞春孟知祥王稱蜀帝朱𢎞昭等徙王鎮河東不受命詔西京留守王思同討之圍鳳翔㡬克㑹軍士亂潰思同走死王整衆而東所向崩潰閔帝奔衞夏州王入汴即帝位立后劉氏鴆殺閔帝知興元帥張䖍釗洋州帥孫漢韶皆降蜀秋蜀主祥殂子昶立敬冬契丹冦雲應州詔石瑭屯代州以備之二呉天祚閩永和元蜀秦國公昶夏契丹冦新代應州權秋以晉州帥張敬達為副總管以分石敬瑭之冬閩將李倣弑其主鏻立其子昶晉高祖敬瑭天福元年閩康宗昶通文元稱夏清泰徙石敬瑭鎮天平敬瑭疾不行清泰詔張敬達討之誅天雄將張令昭逐其帥劉延皓詔宣武帥范延光討之秋張敬達圍晉陽敬瑭稱臣求救於契丹誓為父子契丹主自將五萬騎救達敬達敗退保晉安契丹團之詔樞宻使趙延夀天雄帥范延光幽州帥趙徳鈞救晉安清泰幸懷州冬趙徳鈞延夀屯團栢隂與契丹通求為漢帝契丹立敬瑭為帝割幽州所管及新武雲應朔州以賂契丹諸將殺張舉敬達以降徳鈞父子亦降上遂長驅而南清泰奔還室自焚臣光曰武皇以沙陀微種奄有河東黄巢之亂有大功於唐室上源之變訟於朝廷而不能自直遂與朱氏治兵相攻糾紛不解流血成川僵尸蔽野至其晩節鋒銳益衰窮居一隅僅能自保莊宗自弱齡襲位麾下諸將皆白首行陳與武皇並轡齊驅之人乃能以恩信結其心英果折其氣莫不竭力致命頤指如意遂服真定從中山取漁陽兼魏博䇿馬渡河而梁氏失國當是之時天下莫不震動諸侯陸梁踞肆者皆􅌓眙相顧莫敢保其土地王衍恃其險逺辭禮倨慢偏師西指而劒閣不守觀其行兵可謂能矣惜其器小志近驕心易生矜功自喜御衆無法便嬖是説婦言是用纔及三年隕身亡族悲夫明宗無取國之心而為衆所附資性寛厚克終天禄清泰於危難之中坐受神器得之非難失之孔易負扆未安家為煨燼十年之中易姓者四禍福相尋何其速哉上入洛陽為安州盧文進奔呉呉封李昇齊王上幸洛陽二唐烈祖李昇昇元元夏范延灮反詔親軍將楊光逺討之進圍魏州信京畿巡檢使張從賓反自河陽入東都殺上子重重義詔親軍將杜重威討誅之帝冬李昪受呉禪稱唐三蜀廣政元復秋范延光降赦之冬以汴州為東京長安為晉昌軍四秋唐主始復姓李氏立閩主昶貪虐閣門使連重遇弑之其叔父曦五閩景宗曦永隆元于夏安州李金全叛入唐六秋上幸魏州決錢元瓘薨子佐嗣河滑州冬襄州帥安從進反攻鄧州親軍將李建崇擊破之擊成徳帥安重榮反將兵數萬聲言入朝詔杜重威之大破重榮於宗城遂圍鎮州七漢殤帝玢光天元河春拔鎮州斬重榮塞滑州決夏漢王龔殂子玢嗣延上疾命平章事馮道立幼子重睿上崩親軍將景廣矯詔立上兄子齊王重貴延廣使告哀於契丹稱孫不稱臣契丹始有隙秋拔襄州殺安從進齊王重貴八年漢中宗晟乾和唐元宗景保大殷光王延政天徳元春上自魏州還汴唐主昪殂子景立以弟齊王遂為元帥燕王逹副之約以傳國漢王玢弟晟弑玢自立閩主弟延政自稱殷帝聴侍中桑維翰屢請與契丹和親上不冬青州帥楊光逺召契丹入冦甲辰開運元春契丹數道入冦河北諸州皆城守上幸澶州契丹主至澶州而還閩指揮使朱文進弑閩主曦來降文冬兖州帥李守貞討楊光逺誅之文唐將邊鎬查徽攻王延政福州將林仁翰殺朱進降於延政二春契丹冦邢洺磁相至榆林而還彦上幸澶州秋契丹圍杜重威於陽城河陽帥符卿擊破之唐人拔建州虜王延政福州將李孺贇泉州將留從效皆降於唐冬樞宻使馮玉譖桑維翰罷其政事三夏契丹冦定州相州帥張彦澤擊破之唐秋唐陳覺等攻李孺贇兩浙將張筠救之大破兵取福州遇冬契丹瀛州請降上遣杜重威悉率禁兵以應之契丹於中渡橋重威與張彦澤皆降契丹彦澤還兵襲京師帝遂降於契丹漢髙祖暠天福十二年春契丹主入汴遷晉帝於黄龍臣光曰高祖以地尊勢重廹於猜嫌親執臣子之禮以事戎狄賂之土田藉其兵力以取天下夫羽翼未成不可以高飛國家未治不可以應敵齊王舍桑維翰之深謀信景延廣之狂策内政不脩而外挑强鄰使黎民塗野草胡騎汚宫闕生為降虜死為羇魄非不幸也河東帥劉暠即帝位於晉陽殂河南北盜起契丹主懼留其將蕭翰鎮汴而還夏於欒城兄子元欲自立囚述律太后汴蕭翰立唐明宗子從益而去帝留弟旻鎮河東入殺從益馬希範薨弟希廣嗣錢佐薨弟倧嗣冬衙將明進思廢倧立其弟俶乾祐元春上崩子周王承祐立年十八平章事蘇逢吉樞宻使楊都郭威史𢎞肇輔之反河中帥李守貞及鳳翔將王景崇永興將趙思綰秋詔郭威討之子冬高從誨薨保融嗣隱帝承祐二年夏馬希廣庶兄永州刺史希蕚襲長沙不克乞師于唐趙思綰降殺之秋拔河中殺李守貞威冬契丹冦北邊詔郭禦之三春拔鳳翔殺王景崇兩浙敗唐兵於福州虜其將查文徽之夏以郭威為鄴都留守等秋馬希蕚攻弟希廣殺自立冬帝倖臣李業譖殺楊邠史𢎞肇等又遣使殺郭威威擁兵入朝帝戰敗自殺威迎劉崇子贇於徐州而立之未至契丹冦洺州威北伐至澶州還兵内向以太后令廢贇以威監國臣光曰高祖擁精鋭之兵居形便之地屬胡騎北旋中州乏主故雍容南下而天下歸之豈其才徳之首出哉乃㑹其時之可為也夫根疎者不固基薄者易危隱帝雖有南面之名而政非已出民不知君輕信羣小之謀欲除拔扈之臣禍不旋踵自然之勢也父子相繼四年而滅自古饗國之短未有若兹者也周太祖威廣順元年北漢世祖劉旻乾祐四榮春即帝位以養子榮鎮澶州柴皇后兄子也鎬劉旻稱漢帝湖秋馬希蕚與弟希崇争國唐將邊擊虜之遂滅南冬漢主引契丹攻晉州不克二春兖州帥慕容彦超反上自將擊誅之因幸曲阜拜祀孔子朗州將劉言襲長沙逐邊鎬上表請節鉞詔言鎮湖南徙治朗州三春上有疾樞宻使王竣坐專恣貶商州以晉王榮為開封尹逵秋湖南軍亂囚其帥劉言迎潭州王代之冬誅鄴都留守王允中甲寅顯徳元春以晉王判内外兵馬上崩晉王即位軍漢王引契丹冦潞州世宗自將禦之戰於高平親將樊愛能何徽先遁斬之并其軍使以上遂大破漢兵彦夏進圍晉陽拔遼憲嵐石沁沂代七州天雄帥符卿及契丹戰敗於折口乃班師務冬漢主旻殂子承釣立帝大閱諸軍精不務衆世宗榮二年北漢主承鈞乾祐八平鳳翔帥王景攻蜀秦鳳成州拔之冬章事李榖率十二将伐唐圍唐將劉仁贍於夀州三春築東京外城唐上自將伐唐親軍將李重進斬將劉彦於正陽太祖拔滁州擒其將皇甫暉親軍將韓令坤拔揚州江北諸州降者甚衆唐主稱臣請獻六州以和上欲盡得江北不許夏太祖破唐府王逹於六合將潘叔嗣殺其帥王逵迎潭州周行逢代之湖南上自渦口還時天暑糧且盡戰數不利諸將皆棄所得州并兵圍夀州不克四北漢天㑹元春上復伐唐大破唐兵於紫金山劉仁贍以夀州降上還冬復伐唐拔濠泗楊秦四州五唐交泰元春上屠楚州遂幸迎鑾欲濟江唐主大懼去帝號稱國主請盡割江北十四州用周正朔上乃班師唐大弟遂固請讓位唐主乃立子冀為太子冬唐殺其相宋齊丘六南漢恩赦侯鋹大寳元春鑿五丈及惠民河契樞宻使王朴薨降上自將擊契丹夏上至瓦橋闗丹闗南三州俱將攻幽州㑹上有疾而還即李重進破河東兵於百井立上崩太梁王宗訓位秋漢南主晟殂子鋹唐子冀卒臣光曰太祖負震主之威挾不賞之功措身無所乗危而發雖履天下之籍而家室先覆矣世宗以異姓之親入乗大統知近世之弊起於威令不行下陵上替故高平之役首誅樊何以振軍法遂能變弱為强因敗為功乘勝北逐至於太原歸而簡師習戰并心進取於是南割江淮西克秦鳳北開闗南攻無堅城戰無强陣又以桴鼓之隙治律厯興禮樂審法令脩政事收賢才養百姓可謂能知治安之本矣大功未成中道而夭盖太平之業天將啓聖人而授之固非人謀之所及也稽古録卷十五
