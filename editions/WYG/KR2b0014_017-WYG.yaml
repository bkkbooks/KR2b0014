body:
  text: 稽古録卷十七宋司馬光撰庚申太祖建隆元年正月甲辰上受周禪奉周帝為鄭王乙巳改元大赦契丹冦定州邊將擊却之高二月尊太夫人杜氏為皇太后祖三月辛酉追尊祖曰僖祖曽祖曰順祖祖曰翼考曰宣祖福四月浚蔡渠詔李筠叛降河東襲澤州殺刺史張而據之癸巳石守信等諸軍討筠五月己亥朔日食遣己未上自將討李筠使河東主劉鈞軍于太平驛其平章事衞融宣徽盧賛將兵救筠筠帥其衆南下與石守信等遇于長平守信等大破之盧賛溺死筠走保澤州諸軍進圍之六月己巳朔上至澤州辛巳克之筠自焚死獲衛融釋之乙酉上進攻潞州丁亥筠子守節以城降釋之河東主鈞聞之遁歸上還至東京折徳扆破河東沙谷寨為七月戊申八月甲申立夫人王氏皇后九月李繼勲擊河東焚平遙守李重進叛降江南江南主李景不敢受己未詔石信等諸軍討之甲子縱邊將所獲河東民數萬口還其國鈐高保融卒弟保朂襲位十月河決厭次晉州轄荆罕儒襲河東汾州戰没日庚寅上自將討李重進十一月丁未上至揚州即克之重進自焚死乙夘江南主李景遣其臣嚴績來犒師庚申復遣其子從鎰入貢十二月丁亥上還至東京二正月發開封陳許民夫數萬導蔡渠入于潁都二月發曹單民夫數萬浚五丈渠江南主景遷南昌三月丙申内酒坊火后河東冦麟州南四月癸巳朔日食煜六月甲午太杜氏崩江主景卒于南昌子立七月以䘮還金陵丹八月詔李懷節執孫行友送闕下九月甲子契嘉哩等來降十月丙午葬明憲皇后于安陵千詔竊盜贓錢滿三者死三正月甲戌發民廣皇城東北隅罷遞夫募卒以代之二月庚寅初令文班常叅官舉幕職令録有罪連坐詔百官轉對河東冦潞晉二州守將擊走之三月初令大辟奏案刑部詳覆以止藩鎮專殺鎡留從効卒養子紹鎡襲位四月衙將陳洪進誣紹謀歸兩浙執送江南立大將張漢思為留後月高保朂卒兄子繼冲襲位五月増修大内六秦州屬羌尚波于拒命巳詔歸江南降兵數千周九月尚波于降七月癸初定編勑二十條行逢卒子保權襲位掌十二月詔諸縣盜賊鬬訟事皆歸令尉鎮將唯得郭下是歲周鄭王居于房陵周保權上言衡州刺史張文表作亂來乞師乾徳元正月命慕容延釗等將兵討文表未至文表為湖南所擒二月延釗等至荆南高繼冲請舉族歸朝延釗等進克潭州三月拔岳州朗州周保權出降兩道諸州悉平為荆湖路税癸酉定常行杖法笞杖徒流各有數置義倉毎一石别輸一斗四月行應天厯權鑿講武池有初置諸州通判以分節度使刺史之或節度使闕則以文臣權知諸州張漢思諸子謀殺陳洪進洪進廢漢思而代之數六月初命朝臣知縣七月王全斌等擊河東俘千人八月辛巳行新定刑統河王全斌等攻河東樂平縣拔之置平定軍九月東反契丹攻平晉軍守將拒却之泉十月庚辰詔天下造版籍及户帖户鈔江十一月州留後陳洪進請内屬許之仍以詔諭南月甲子上始親祀圓丘配以宣祖大赦改元敗十二甲申皇后王氏崩河東冦府州折徳扆之勢初置形税簿甲子二正月初聴選人四時參選不限冬集發民夫治鄆州遙堤二月李繼勲等攻河東遼州敗河東將郝貴超於城下遼州降三月河東將周審玉等來降四月乙夘改葬宣祖及昭憲皇后於河南安陵月乙丑初置參知政事六月河南北陜西蝗八詔於京師及緣江冬置𣙜貨務令商旅入金帛於京師執引詣緣江給茶九月丁徳裕等攻廣南郴州拔之折徳扆卒以其子御勲知府州事自是世襲知府州西川主孟昶遣間使以蠟書遺河東謀連兵入冦十一月甲戌命王全斌等將兵三萬自鳳州道劉光義等將兵二萬自歸州道伐西川十二月涼州來請帥詔以麴彦饒為之其王全斌等拔興州敗西川兵於三泉獲招討使韓保貞副使李進三正月劉光義等拔䕫州殺其節度使高彥儔又王全斌等破西川兵於大漫天遂破利州及劒門破西川并拔劒州擒其知樞宻院事王昭逺馬步軍都指揮使趙崇韜劉光義等拔萬施開忠遂五州西川主昶出降蜀地悉平得州四十五為西川路月二月王全斌殺西川降兵二萬餘人於成都三蜀中盜賊羣起詔所在討之國五月丙戌孟昶入見六月甲辰以昶為中書令秦公太子大臣皆除美官庚戍昶薨八月河決陽武九月河決澶州發兵治之四正月丁亥詔丁徳裕等將兵討蜀中餘盜二月羅彥環等敗河東兵於静陽度使于延來降三月廢義倉年四月契丹豐州節六月詔内侍三十無養父方許養一子百河決觀城決七月聴州縣官各置俸戸月輸錢五八月河靈武遣韓重贇等發夫卒數萬人塞決河律是歲初用和峴議以景表尺造下王朴樂一律五正月戊戌發畿内及鄰州民夫數萬治河隄河三月丙辰河東石盆寨降朔五星聚于奎五月東鴻唐寨降六月戊午日食丙子詔諸州通判鈐轄都監等毋得受節度使添給八月衞州河溢入城殺數百人九月庚子李彜興卒子光叡襲位濫十二月丙辰禁惡錢及行縑帛開寳元正月甲午發畿内民夫治東京城鎮丁未河東偏城寨將任恩帥衆來降賜三月甲辰州奏破河東馬鞍山寨五月丁未江南糧十萬斛以救其饑河七月丙午鎮州奏河東烏玉寨主胡遇帥衆降東王鈞卒養子繼恩立八月戊辰詔李繼勲等將兵擊河東九月庚子繼勲奏敗河東軍於洞渦水口河東供奉官侯霸榮弑其主繼恩平章事郭無為殺霸榮立繼恩弟繼元月十月丙子呉越王錢俶遣其子惟睿入貢十一癸夘上祀圓丘大赦改元二正月壬寅命使者十八人調軍食詣河東行營二月乙夘遣曹彬党進等先將兵伐河東於甲子上發東京戍三月乙未李繼勲奏敗河東軍太原城下戊上至太原辛丑發諸縣民夫數萬赴城下水癸夘河東憲州判官史昭文以州降丙午決晉灌太原四月辛亥遣海州刺史孫方進圍汾州擒契丹救河東王己未何繼筠奏敗契丹於陽曲北其武州刺史彥符五月癸未韓重贇奏敗契丹於定州北滌甲申引汾水灌太原戊子初令獄官於盛暑清杻械貧者給食御甲午河東嵐州刺史趙文度降其丙午楊重勲折勲來朝閏月戊申劉繼元殺平章事郭無為分己未徙河東民萬餘户於山東㑹暑雨疾疫庚申諸軍屯鎮潞壬戌上南還六月辛夘江南主煜遣其弟從謙入貢帥癸巳上至東京以十月契丹藏才干酋長王甲衆來降置豐州處之三正月癸丑發畿内民夫數萬治河隄收四月辛夘朔日食庚子詔開河北鹽禁聴通商税置便錢務廣七月丙辰減州縣官員數龔上命江南主煜招諭南主劉鋹鋹不聴囚其使慎儀九月己亥朔命潘美等將兵伐廣南潘甲辰詔修完前世帝王陵為亂兵所毁者乙夘美等破廣南兵拔富州十月庚寅拔賀州十一月壬寅拔昭桂二州破癸亥邉將破契丹於遂城十二月辛亥潘美等廣南兵拔連州二癸巳發畿内民夫萬治河隄四正月癸丑潘美等抜廣南英雄二州二月己丑奏克番禺擒廣南主鋹廣南悉平得州四十一為廣南路折詔以幕職州縣官闕多人少初令特放選仍聴超注擬釋五月乙未朔上御明徳門諸將以練繫劉鋹獻之以為恩赦侯王甲卒以其子承美知豐州事自是世襲知豐州己未上祀圓丘大赦十月癸亥朔日食人十一月癸亥川班直四十撾鼓訴賞薄悉斬之判河決澶淵泛數州澶州通姚恕坐死五五月辛未河決濮陽廢廣南媚川都六月庚寅河決陽武汴決穀熟武戊申命曹翰發民夫三萬六千卒一萬五千塞陽決河又發卒夫數萬塞濮陽決河日八月己亥廣州奏破羣獠於容州九月丁巳朔食十一月己未廣州奏破羣獠於英州大饑六正月癸酉發民夫治魏縣河堤月三月房州奏周鄭王殂諡曰恭帝四癸丑初選令錄簿尉為堂後官月五月己巳交趾丁璉始遣使内附授以官爵六癸未朔隰州奏將兵入河東境拔七塞甲戌七二月庚辰朔日食完上詔江南主煜入朝辭不至而繕自守九月命曹彬等將舟師自荆南㳂江而下伐江南閏月己酉破江南兵丙辰拔池州十一月丙子破江南兵於采石作浮梁濟江月契丹來請和命知雄州孫全興以書答之十二辛亥曹彬等破江南卾州兵於江北八正月甲戌朔破江南兵於新林港月丁丑知晉州武守琦奏破河東兵於洪洞二壬戌曹彬奏拔昇州闗城未三月己亥契丹初遣其臣克實克舒蘇入見辛呉越王俶拔江南常州四月乙巳王明破江南兵於江州七六月辛亥澶州奏河決頓丘發丁夫數萬塞之月辛未朔日食庚辰初遣郝崇信使于契丹潤八月封丁璉父部領為交趾王九月乙酉江南州降十月丁巳治西京内克十一月辛未江南遣其臣徐鉉入見九乙未曹彬金陵擒江南主煜江南悉平得州十為江南路太宗太平興國元年正月辛未曹彬遣使獻李煜太祖釋以為違命侯三月辛夘羣臣三上表請加尊號太祖以燕晉未平不亢辭丁巳作禮賢宅以待呉越王俶己未俶入朝辛未歸太祖將幸西京壬申先饗太廟月丙子發東京圓庚辰謁安陵辛巳至西京四庚子雩祀于丘大赦擒丙午東還徳辛亥至東京辰丙寅曹翰奏拔江州江南將宋明八月丙發兵伐河東九月戊寅破河東兵月辛巳郭進奏得山後諸州民三萬七千餘口十癸丑太祖崩于萬歲殿皇弟晉王炅即皇帝位不乙夘大赦李光叡奏破河東呉保寨詔諸場務聴人添額置撲十一月戊辰罷天下俸户殿十二月甲寅上御乾元大赦改元二正月擢進士呂蒙正等百三十三人及第皆除京官通判以興文教抑武事初二月廢江南鐵錢悉用銅錢庚子上改今名置江南𣙜茶塲四月甲午置威勝軍於亂栁澤乙夘𦵏太祖于永昌陵七月河決温縣又決滎又決頓丘發夫卒塞之陳諸道大水洪進入朝發潭州兵擊梅山洞蠻師八月丙寅初令藩鎮支郡悉屬京長吏得專奏事者死九月丁酉詔私鑄小錢十一月丁亥朔日食三正月甲午詔絳州浚汾河發唐鄧民夫數萬人及諸卒萬人開曹渠自襄漢抵京師渠成而水不行二月丙辰朔秦州奏西羌冦邊使者任徳明將兵擊走之所三月己酉呉越王俶入朝決四月己夘陳洪進獻有州二庚辰懷州奏河獲嘉發夫卒塞之寅五月呉越王俶表獻所有州十三為兩浙路壬李光叡卒子繼筠襲位戊申秦州判官李若愚之子飛雄謀反族誅民六月汴渠決寧陵詔發宋亳民夫塞之又發畿内夫塞汴口河十月置内藏庫掌藏經費之餘以待非常之用配決靈武發夫卒塞之十一月丙申上祀圜丘以太祖大赦編是歲行太平興國敇四正月庚寅詔先遣潘美等將兵伐河東二月甲子上自將發東京三月庚辰朔至真定乙未分兵攻嵐州契丹救河東郭進邀擊大破之四月壬戌上發真定折御卿奏破岢嵐軍乙丑諸將破隆州己巳破嵐州庚午上至太原壬申上幸城西督諸將攻城五月甲申河東主繼先出降河東悉平得州十為河東路北庚子上發太原六月甲寅詔發河北京東芻粟赴面行營欲乗勝取幽州州庚申上發真定丁夘至易州刺史劉宇降戊辰涿降庚午上至幽州破契丹衆于城北七月癸未督諸將攻城不克甲申班師乙巳上至東京李繼筠卒弟繼捧襲位八月癸亥詔潘美將兵屯三交口以備契丹詔汴渠決宋城發民夫塞之九月河決汲縣乙酉何紹勍等將兵屯定州以備契丹城初聴銅錢入蜀奏破契丹於遂西徐鮑二水間十月庚午闗南十一月己亥嵐州奏破契丹於三交口闗南奏破契丹五正月發民夫治衞澶濮三州河隄二月苛嵐軍奏雜虜二百五十户内屬步三月癸巳代州奏破契丹殺其侍中蕭咄李禽馬軍都指揮使李重誨閏月三交奏雜虜二百餘户内屬璉四月戊子代州奏雜虜二百餘戸内屬上以丁阻兵專地七月丁未遣孫全興等將兵討之屯十月戊寅命楊重進等將