body:
  text: 夏后氏下舜受禪使禹宅百揆舜老以位𫝊禹曰朕居帝位三十有三載耄期倦于勤汝惟不怠總朕師師衆也八十九十曰耄百年曰期頤年已耄老厭倦萬㡬汝不懈怠于位稱總我衆欲使攝禹辭帝曰克勤于邦克儉于家不自滿假惟汝賢滿謂盈實假大也言禹惡衣菲食卑其宫室而盡力為民執心謙沖不自盈大汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功自賢曰矜自功曰伐言禹推善讓人而不失其能不有其勞而不失其功所以能絶衆人天之厯數在汝躬汝終陟元后陟升也元大也大君天子人心惟危道心惟微惟精惟一允執厥中危則難安微則難明精所以明其難明一所以安其難安然道之大要莫若信執其中無稽之言勿聽弗詢之謀勿庸無考無信驗不詢專獨終必無成故戒勿聽用可愛非君可畏非民衆非元后何戴后非衆罔與守邦民以君為命故可愛君失道民叛之故可畏言衆戴君以自存君恃衆以守國相須而立禹拜稽首固辭帝曰毋惟汝諧毋禁止辭惟汝能諧和元后之任禹乃受命攝行天子事如舜之初舜崩禹三年喪畢即天子位㑹諸侯於塗山執玉帛者萬國又㑹諸侯於㑹稽長狄防風氏後至禹戮之禹命逺方圖物圖畫山川奇異之物而獻之貢金九牧使九州之牧貢金鑄鼎象其州之物象所圖物著之於鼎百物而為之備使民知神姦圖鬼神百物之形使人逆備之故民入川澤山林不逢不若若順也魑魅魍魎魑山神獸形魅怪物魍魎水神莫能逢之禹崩壽百年孔子曰禹吾無間然矣堯之崩也天下諸侯不歸丹朱而歸舜舜之崩也天下諸侯不歸商均而歸禹禹崩子啓賢天下諸侯皆曰吾君帝禹之子也相帥歸之啓乃即天子位有扈逆命扈今京兆鄠縣啓征扈滅之享諸侯於鈞臺陽翟縣南有鈞臺陂啓崩子太康立王太康尸位尸主也以逸豫滅厥徳黎民咸貳乃盤遊無度畋于有洛之表十旬弗反有窮后羿窮國之君因民弗忍王之惡拒于河王不得入國遂廢之立其弟仲康而相之夏室微弱王仲康崩子相立王相之時羿遂代夏政相失國依於同姓諸侯斟灌及斟鄩氏羿恃其善射不脩民事而淫于原獸好佃獵棄武羅伯囚髠熊龍圉四子皆羿之賢臣而用寒浞寒浞伯明氏之讒子弟也伯明寒君名伯明后寒棄之夷羿收之夷氏信而使之以為己相浞行媚于内内宫人而施賂于外愚弄其民欺罔之而娯羿于畋樂之以游畋樹之詐慝以取其國家樹立也外内咸服信浞詐羿猶不悛悛改也將歸自畋家衆殺而烹之以食其子靡奔有鬲氏靡夏遺臣事羿者有鬲國名浞因羿室就國妃妾生澆及豷澆五叫切豷許醫切恃其讒慝詐偽而不徳于民使澆用師滅斟灌及斟鄩氏殺夏后相處澆于過處豷于戈后緍方娠逃出自竇后緍相妻娠懷身也音身歸于有仍后緡有仍氏女生少康焉為仍牧正牧官之長澆使椒求之椒澆臣逃奔有虞為之庖正虞思於是妻之以二姚思有虞君也虞思自以二女妻少康而邑諸綸綸虞邑有田一成有衆一旅方十里為成五百人為旅能布其徳而兆其謀兆始以收夏衆撫其官職靡自有鬲氏收斟灌斟鄩之遺民以滅浞而立少康祀夏配天不失舊物物事也王少康立夏道中興少康崩子杼立王杼崩子槐立王槐崩子芒立王芒崩子泄立王泄崩子不降立王不降崩弟扃立王扃崩子廑立王廑崩不降之子孔甲立王孔甲之時夏徳衰諸侯多叛之孔甲崩子臯立王臯崩子發立王發崩子癸立是為桀王桀都安邑滅徳作威敷虐于萬方百姓用兵伐有施得其女末喜嬖之荒淫無度有以危亡為諫者桀自恃天命指日曰是日何時喪乎予及汝偕亡闗龍逢强諫桀殺之諸侯多叛桀歸商湯桀囚湯於夏臺欲殺之既而釋之湯乃與伊尹興師伐夏與桀戰於鳴條克之桀奔南巢夏后氏遂失天下夏有王與無王用歲四百三十二稽古録卷五欽定四庫全書稽古録卷六宋司馬光撰
