body:
  text: 殷下王武丁思復興殷道亮隂三年不言羣臣咸諌王曰予恭黙思道夢帝賚予良弼夢天與我良佐乃以形求于天下傅説築傅巖之野惟肖傅巖在今陜州平陸界傅説賢而隠代胥靡刑人築此道以供食肖似也王召與語果聖人也爰立作相置諸左右曰啓乃心沃朕心若藥弗瞑眩厥疾弗瘳開汝心以沃我心如服藥必瞑眩極其病乃除欲其出切言以自警若跣弗視地厥足用傷跣必視地足乃無傷言欲使為己視聽説曰天立后王君公承以大夫師長不惟逸豫惟以亂民不使有位者逸豫民上言立之王使治民又曰惟治亂在庶官言所官得人則治失人則亂又曰無恥過作非恥過誤而文之遂成大非又曰非知之艱行之惟艱王曰若作酒醴爾惟麴蘖若作和羮爾惟鹽梅釀酒者麴過太苦蘖過太甘調羮者鹽過太鹹梅過太酸必求和適為難良相治國懲勸寛猛凡區處施設若大酋之釀酒膳夫之調羮曲盡其宜乃為善爾交修予罔予棄予惟克邁乃訓交非一之義邁行也言我能行政教説曰王人惟學于古訓乃有獲有所得道積于厥躬王曰股肱惟人良臣惟聖手足具乃成人有良臣乃成聖惟后非賢不乂惟賢非后不食言君須賢治賢須君食髙宗祭成湯有飛雉升鼎耳而雊古后切鳴也祖已曰惟先格王正厥事言至道之王遭變異正事而異自消髙宗從之不敢荒寧嘉靖殷邦至于小大無時或怨善謀殷國至于小大之故人無是有怨者言無非享國五十九年崩號髙宗祖庚立王祖庚崩弟甲立王甲時殷復衰甲崩子廩辛立王廩辛崩弟庚丁立王庚丁崩子武乙立王武乙復去亳徙河北王武乙崩子太丁立王太丁崩子乙立王乙崩子受徳立受徳一曰辛是為紂王紂王都朝歌資辯捷疾聞見甚敏材力過人智足以拒諫言足以飾非矜人以能以為皆出已下播棄黎老昵比罪人播棄不禮敬昵近也為天下逋逃主萃淵藪平居弗祀上帝神祇宗廟恃其强大喜用兵百戰皆克伐有蘇得其女妲己惟妲己之言是用作奇技淫巧以恱之淫湎肆虐作炮烙之法膏銅柱下加之炭令有罪者行焉輒墮炭中以取妲己笑刳庫胡切剔天易切孕婦斮側角切朝涉之脛冬月見朝涉水者謂其脛耐寒斬而視之醢九侯脯鄂侯囚西伯於羑里羑音酉乆乃赦之既而西伯戡黎近王圻之諸侯戡勝也祖伊恐奔告于王王曰嗚呼我生不有命在天祖伊反曰嗚呼乃罪多參在上乃能責命于天反報紂也言汝罪惡衆多參列在上天誅且至乃恃命于天乎紂終不悛比干强諫紂怒曰吾聞聖人之心有竅剖比干心箕子懼乃佯狂為奴紂又囚之㣲子恐殷絶祀遂奔周紂專任嬖臣飛廉惡來知政事於是周武王伐紂殷之士女皆篚其幣帛迎周師紂率其衆如林㑹戰于牧野紂卒皆不戰前徒倒戈攻于後以北紂走登鹿臺自焚死周遂滅殷自成湯受命至是凡六百二十九年稽古録卷七欽定四庫全書稽古録卷八宋司馬光撰
