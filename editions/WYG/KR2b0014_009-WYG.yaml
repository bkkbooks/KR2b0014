body:
  text: 周下共王崩子懿王囏立囏居閑切懿王崩共王弟孝王辟方立孝王崩復立懿王太子夷王燮夷王時王室卑下堂而見諸侯夷王崩子厲王胡立厲王淫昏無道召穆公作詩刺之不敢斥言借商紂以言之曰殷鑒不逺在夏后之世榮夷公好專利有寵於王芮良夫諫曰夫利百物之所生也天地之所載也而或專之其害多矣天地百物皆將取焉所怒甚多胡可専也王人者將以導利而布之上下者也匹夫専利猶謂之盜王而行之其歸鮮矣王不聴國人謗王王怒得衛巫使監謗者監察也王以為巫有神靈有謗必知之以告則殺之國人莫敢言道路以目王喜告召公曰吾能弭謗矣召公曰防民之口甚於防川川壅而潰傷人必多王不聽後三年民不堪命作亂流王于彘太子靖匿於召公之家召公以其子代之乃得免大臣共和行政自是以後年始可譜共和之初諸侯所自出魯周公旦姬姓周文王之子武王之弟佐文武克商定天下食采於周武王崩成王幼周公攝行天子事七年致太平復政成王成王命周公子伯禽就封於魯都曲阜留周公自輔為太師周公薨於豐魯公伯禽後七君至愼公濞曲阜今兖州齊太公望姜姓其先出於神農氏堯時嘗為四岳封於吕太公事周為文武師佐武王滅商號尚父封於齊都營丘太公留鎬京與周公夾輔成王後五世至胡公静徙都薄姑胡公弟獻公山徙都臨淄獻公薨子武公壽立營丘在今青州界薄姑在棣州界臨淄在青州界晉唐叔虞姬姓周武王之子成王之弟成王封叔虞於唐在河汾之東叔虞子燮為晉侯又四世至靖侯宜臼秦仲嬴姓其先出於髙陽氏至伯益佐禹治水為舜虞其後裔有飛廉飛廉生惡來革皆以材力事紂與紂俱死飛廉𤣥孫曰造父以御得幸於周穆王封於趙城為趙氏惡來革五世孫非子為周孝王主馬于汧渭之間馬大蕃息孝王邑之秦曰秦嬴秦嬴生公伯公伯生秦仲秦仲始大秦今秦州楚芈姓其先出於髙陽氏有子曰黎為髙辛氏大正有功徳號祝融黎死弟呉回代為祝融其後子孫蕃衍為八姓夏商之際為顯諸侯已姓昆吾董姓豢龍彭姓彭祖豕韋秃姓舟人妘姓鄔鄶偪陽曹姓鄒莒斟姓無後呉回之孫曰季連為芈姓楚之祖也世居蠻荆為君長其苗裔曰鬻熊事周文王鬻熊曽孫熊繹事成王封為楚子熊繹後八君至熊勇芈音弭宋微子啓殷帝乙之子紂之庶兄周公既誅武庚禄父以微子代殷後封於宋世為周客微子薨弟衍立號微仲微仲後六君至僖公舉宋今應天府衛康叔封姬姓周公之弟也周公既伐管叔蔡叔以殷餘民封康叔於衛康叔後八世至僖侯衛今衛州陳胡公滿帝舜之後周武王克殷以元女太姬妻胡公而封諸陳賜姓媯氏後五世至幽公寧陳今陳州蔡叔度周公之弟也流言讒周公周公囚諸郭鄰其子胡率徳改行周公復封諸蔡蔡仲後世至武侯蔡今蔡州曹叔振鐸周文王之子武王封於曹後五世至夷伯喜曹今曹州稽古録卷九欽定四庫全書稽古録卷十宋司馬光撰庚
