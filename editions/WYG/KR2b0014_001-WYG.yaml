front:
  text: 司馬光撰
  hash: sha256:20c74d74fbfe6f29e5765267ee259ecf851ced80b15d41aaa03d3763e63a1d6d
body:
  text: 伏羲氏太昊伏羲氏太昊有天下之號伏羲氏其所以有天下之號也惟天生民有欲無主乃亂必立聰明之君長以司牧之何謂司牧蓋民不足於衣食則能養之衣食足矣或不知禮義相侵漁則能教之教之備矣或頑嚚不從則能威之由是民愛之如父母仰之如日月信之如四時畏之如雷霆莫不恱服推而尊之聰明之小者所服寡聰明之大者所服衆所服寡者為聚邑之長為士大夫卿所服衆者為一國之君君一國者是為諸侯天下為國位均力敵或相侵陵吞噬莫能相治必待天生聖人出乎其類拔乎其萃聰明照萬事威令行四海天下無不歸往而率服然後為天子夫天地者萬物父母諸侯者一國父母天子者萬國父母人之至尊無與為比惟父事天母事地故曰天子伏羲之前為天子者其有無不可知也如天皇地皇人皇有巢燧人之類雖於𫝊記有之語多迂怪事不經見臣不敢引獨據周易自伏羲以來叙之風姓姓者人之所自生也以木徳繼天而王都宛丘今陳州是也仰則觀象於天俯則觀法於地於是始作八卦太昊之時有龍負圖出於河太昊法而象之始畫八卦曰乾坤震巽坎離艮兊以通神明之徳神明謂造化也乾為天坤為地震為雷巽為風坎為水離為火艮為山兊為澤造化萬物皆由此八者而生成通導也作八卦以通導造物之徳使人知之也以順萬物之情乾健也坤順也震動也巽入也坎陷也離麗也艮止也兊説也萬物之情無出此八者作結繩而為網罟以佃以漁佃音田佃獵取禽獸也漁取魚也上古之民處於草野未知農桑但逐捕禽獸食其肉衣其皮禽獸飛走非人所及制之甚難無以禦飢寒故太昊教之為罟網以羅禽獸漉水物又教民豢養六畜馬牛羊豕犬雞無逐捕之勞可以充庖且以為犧牲享神祇故號伏羲氏亦號庖犧氏神農氏炎帝神農氏姜姓繼伏羲以火徳王天下是時民益多禽獸益少炎帝乃教民播種百穀斵木為耜揉木為耒春耕夏耘秋穫冬藏民食以充故號神農氏炎帝以一人所為不足以自養必通功易事貿遷有無乃教民日中為市致天下之民聚天下之貨交易而退各得其所有熊氏黃帝有熊氏姬姓曰軒轅有熊國君少典之子生而神靈弱而能言幼而徇齊徇疾齊速也長而敦敏成而聰明炎帝既沒子孫徳衰蚩尤始作亂延及于平民罔不寇賊姦宄奪攘矯䖍羣行攻劫曰寇殺人不忌曰賊在外曰姦在内曰宄自來而取曰攘矯詐䖍殺也黃帝乃治五兵以征之與蚩尤戰于涿鹿之野禽而殺之涿鹿涿州諸侯皆去神農氏歸黃帝黃帝與炎帝子孫戰于阪泉之野三戰然後得其志諸侯咸尊黃帝為天子代神農氏黃帝以民生有欲衣食雖備茍無禮義則强陵弱衆暴寡智欺愚勇苦怯於是始制軒冕垂衣裳貴有常尊賤有等威使上下有序各安其分而天下大治作舟楫以濟不通服牛乗馬引重致逺正名百物天下有不順者征之平者去之邑于涿鹿之阿遷徙往來未嘗寧居在位百年而崩年百一十歲有二十五子其得姓者十四人為十二姓姬酉祁已滕箴任荀僖姞儇依姞其訖切儇呼縁切金天氏少昊金天氏己姓曰摯亦曰青陽黃帝之子繼黃帝以金徳王天下故號金天氏都曲阜今兖州髙陽氏顓頊髙陽氏黃帝之孫也父曰昌意髙陽氏以水徳王天下都濮陽静淵而有謀疏通而知事養財以任地履時以象天北至幽陵南暨交趾西蹈流沙東極蟠木動静之物小大之神主山川神日月所照莫不平服先是帝王皆以天瑞為官師之名至髙陽氏始為民師而命以民事在位七十八年壽九十一歲髙辛氏帝嚳髙辛氏黃帝之曽孫𤣥囂之孫蟜極之子也都亳今穀熟號南亳普施利物不於其身聰以致逺明以察微順天之義知民之急仁而威惠而信脩身而天下服其色郁郁其徳嶷嶷其動也時其服也衷執中而徧天下日月所照風雨所至莫不從化在位七十年壽百有五歲稽古録巻一欽定四庫全書稽古録巻二宋司馬光撰
