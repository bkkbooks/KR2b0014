  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0014_WYG_019-1a, image: WYG0312/WYG0312-0521a.png}
body:
  text: 稽古録卷十九宋司馬光撰仁宗天聖元年正月丙寅朔改元裁癸未命劉筠等以景徳校天禧用度減冗費二月壬戌省天下齊醮十存一二崇三月甲申減諸宫觀清衞卒分𨽻諸軍辛夘行天厯初聴商旅入芻糧於邊者給錢及茶鹽礬藥於内地謂貼射户閏月甲午詔婦人有罪免配針工庚子雷州司冦凖卒請田彦晏降甲子二十月新修三司成乙十一月丁酉上祀圓丘大赦酉立皇后郭氏三八月涇原屬羌舉兵攻堡寨茶十一月庚辰初令商旅入河北芻糧者給香錢三物於榷貨務謂之三税罷貼射法四正月知鎮戍軍王仲寶等討原州康奴族破之二月戊申朔初置上御藥供奉四人法五月壬午詔大辟有可憫及疑而奏者雖不應奏官毋得舉駁閏月戊申初定江淮發運司歲漕米課六百萬斛初六月京東西及河北江淮以南大水九月庚申聴舉人能講三經者特奏名日十月甲戌朔食五五月趙徳明冦金明都監李士彬擊敗之七月丁巳詔發民夫三萬卒二萬餘人塞滑州決河十月丙申奏已塞十一月上祀圓丘大赦六正月罷提㸃刑獄三月丙申朔日食奏五月廣南西路奏李公藴殺掠鄉民六月己夘又公藴卒八月甲戌澶州奏河決王楚發夫卒塞之七正月曹利用貶官連坐者甚衆得六科及武舉久廢閏月壬子復置之富弼等州癸未詔百官轉對公四月庚寅大赦爵乙未置萊采金塲辛亥授李藴之子徳政官五月己巳行新令日六月丁未玉清昭應宫災八月丁亥朔食十月丙午初舉縣令八正月作㑹聖宫於永安升八月庚子初令知縣通判兩任無私罪者得門十一月戊辰上祀圓丘大赦九正月減畿内田税什之一言六月己夘契丹主隆緒卒子宗真立十月施州蠻覃彦綰冦永寧寨明道元二月丁夘以上母順容李氏為宸妃是日薨三月戊子行天聖編敕八月壬戌夜禁中火焚崇徳等八殿癸亥上與太后寓居延福宫更修大内丁夘大赦十一月大内成甲戌上恭謝天地于天安殿謁太廟大赦改元文武京朝官各遷一資壬辰延州言趙徳明卒癸巳授其子元昊官爵二二月乙巳太后服衮衣儀天冠朝饗太廟寅丁未上籍田于東郊大赦三月太后有疾庚大赦事甲午太后崩遺誥尊皇太妃楊氏為太后軍國大與太后内中裁制諫官上言上春秋已長不應復使政出宫壼四月丙申朔詔刪遺誥之語毋壬寅追尊故宸妃李氏為皇太后壬子詔宗戚得于禁中通表奏祈恩澤凢傳宣内批有司未得即行皆審取處分癸丑罷上御藥官出副都知江徳明等于外州蝗六月甲午朔日食慈七月京東西河北河東陜西草木殆盡作奉廟别祀荘獻荘懿太后刑十月丁酉𦵏荘獻莊懿太后許十二月復置提㸃獄乙夘皇后郭氏請入道之賜號浄妃丁巳詔改明年元大饑甲戌景祐元七月河決横隴宗趙元昊冦環州知州齊矩出戰兵敗為元昊所執既而遣還楊八月戊辰上不豫辛未大赦壬申出美人尚氏氏九月上良愈甲辰立皇后曹氏淮十月庚申罷江淮制置發運使命南轉運使兼領之二二月集賢校理李照言國朝所用王朴樂比古樂高五律比胡樂高二律其黄鍾才應仲呂請更定新樂許之五月甲午廣南東西路奏􅀈獠冦高竇雷化等州天庚子禮院言太祖太宗真宗廟皆萬世不毁其祀地太祖定配太宗真宗迭配從之作六月乙亥廣南西路奏􅀈獠莫陵降七月李照新樂成用今尺為律其言迂誕罷之更命鎮東節度推官阮逸進士胡瑗議定新樂河八月壬子朔詔寛强盜刑名戊辰罷塞横隴㳄自是河東北行不復歸故道有詔句當御藥院自今選内臣入仕三十年以上累勞績者為之己酉作睦親宅以聚皇族集詔中丞杜衍等沙汰三司吏十月辛亥朔作朝院以處朝士在京師者十一月戊子故后郭氏薨二乙未上祀圓丘大赦官初癸聴宗室換南班官十月壬子授罝勒斯賚丑詔内侍都知押班落職者毋得復任其見任者毋得句當皇城司親戚毋得句當御藥院三二月三司吏數百擁杜衍宅投瓦礫肆醜言乙夘流後行二人於沙門島二十餘人於逺州五月丙戌以范仲淹離間君臣牓朝堂集賢校理余靖等坐貶者數人辛夘復令商旅入錢京師給南方茶入芻糧於邊者給京師及諸州錢罝丙午詔罷塞横隴河口更治金隄七月乙未初太宗正司以宗室領之庚子太平興國寺災延及開先殿律考之古今終不合九月悉罷之阮逸等所議尺十一月戊寅保慶太后楊氏崩四二月己酉𦵏荘惠皇后冬七月戊申夜衆星西南流數刻乃止忻代并三州地震壊廬舍忻州尤甚覆壓死者萬九千餘人民皆露處或地裂湧泉出火連年不止是歲天下户一千六十餘萬口二千三百二十餘萬寳元元二月廣南西路奏安化軍轡冦融宜州八月丁夘復置江淮制置發運使南九月己酉鄜延路奏趙元昊叔父山遇等請以河地内屬具言元昊反状郭勸執還之祚十月甲戍元昊自稱大夏皇帝改元天授禮法延十一月庚戌上祀圓丘大赦改元十二月丙寅鄜延路奏趙元昊遣使奉表納旌節敕斯告詔削元昊官爵除屬籍發兵備西邊癸酉進罝勒賚官使擊元昊二正月癸亥廣南西路奏安化州蠻降二五月癸夘詔張若谷等減省冗費十月元昊冦保安軍延州鈐轄盧守懃等擊却之環慶鈐轄高繼隆等攻元昊後橋寨破之康定元正月丙辰朔日食甲元昊冦延州破金明寨執都監李士彬遂圍延州戌大敗官軍於三川口執劉平石元孫㑹大雪解圍去三詔陜西諸州悉完城為守備二月丙午改元月丙子黒風晝晦五月有輦官千餘人應戍邊遮兩府馬諠呼不遜張士遜馬驚墜地詔斬二人流二十餘人元昊陷塞門安逺寨鄉六月甲辰詔陜西河北河東京東京西皆籍民為弓手强壮九月丙寅元昊冦鎮戎軍三川寨丁夘敗都監劉繼宗等陷乾溝乾河趙福三堡東庚午任福襲元昊白豹城克之破四十一族浙軍士鄂郝等殺廵檢使張懷信剽掠州縣逃入海樞十月戊子詔自今有内降遷官并差遣者令中書宻院執奏旬十二月乙巳詔鄜延涇原兩路以正月上出兵擊元昊巴蜀江浙饑稽古録卷十九
