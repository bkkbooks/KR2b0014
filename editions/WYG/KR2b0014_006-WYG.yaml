body:
  text: 殷上亦號商又封商湯居殷而受命故二號殷湯子姓曰履其先出於高辛氏帝嚳生契契為舜司徒封於商商在大華之陽今商州契生昭明昭明生相土相土居商丘今應天府相土生昌若昌若生曹圉曹圉生冥冥生振振生微微生報丁報丁生報乙報乙生報丙報丙生主壬主壬生主癸主癸生天乙世為諸侯天乙是為成湯自契至成湯八遷湯始居亳從帝嚳居湯不邇聲色不殖貨利邇近也殖生也言清潔不貪徳懋懋官功懋懋賞用人惟已改過不吝勉於徳者則勉之以官勉於功者則勉之以賞用人之言若自己出有過則改無所吝惜所以能成王業居上克明言理恕為下克忠事上竭誠與人不求備檢身若不及使人必器之常如不及恐有過為夏方伯葛伯不祀奪餉者黍肉湯始征之歸市者不止耕者不變誅其君而恤其民自是東征西夷怨南征北狄怨西夷北狄舉逺以言則近者著矣曰奚獨後予攸徂之民室家相慶曰徯予后后來其蘇湯所往之民皆喜曰待我君來其可蘇息伊尹有元聖之徳耕於有莘之野以樂堯舜之道湯使人以幣聘之使三返然後至湯任之以政伊尹以為桀雖無道君也湯雖有聖徳臣也不可捨君而輔臣乃去亳適夏既而知桀不可輔復歸于亳乃與湯謀伐桀勝之放桀於南巢諸侯推湯為天子湯以堯舜皆以揖讓𫝊天下已獨以干戈得之有慙徳仲虺乃為之作誥言天錫湯勇智表正萬邦夏桀昏徳民墜塗炭若陷泥墜火無救之者非徳言所能諫徳言道徳善言不可不伐之意湯改紀夏政代虐以寛又自誥諸侯曰爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心所以不蔽善人不赦已罪以其簡在天心故其爾萬方有罪在予一人自責化不至予一人有罪無以爾萬方無以爾萬方言非所及諸侯由是歸之湯為天子十三年而崩太子太丁未立而卒立太丁之子太甲王太甲既立不明欲敗度縱敗禮伊尹屢諫不聽恐王習不義遂成性欲困苦以革其心乃放王于桐宫伊尹攝行天子事王於是悔過遷善三年伊尹復奉王歸于亳復王位還其政太甲不怨而徳之伊尹申戒于王曰有言逆于汝心必求諸道人以言咈違汝心必以道義求其意勿拒逆之有言遜于汝志必求諸非道遜順也言順汝心必以非道察之勿以自臧太甲由是能保惠于庶民克終湯業享國三十三年崩號祖甲子沃丁立王沃丁崩弟太庚立王太庚崩子小甲立王小甲崩弟雍已立王雍已崩弟太戊立王太戊時伊尹之子陟為相巫咸佐之亳有祥桑穀共生于朝一暮大拱祥妖怪也兩手搤之曰拱太戊懼伊陟曰妖不勝徳太戊從之桑穀枯死太戊治民祗懼不敢荒寧殷復興享國七十五年崩號中宗子仲丁立王仲丁遷于囂仲丁崩弟外壬立王外壬崩弟河亶甲立王河亶甲時居相殷復衰河亶甲崩子祖乙立王祖乙時相為水所毁遷于耿祖乙崩子祖辛立王祖辛崩弟沃甲立王沃甲崩祖辛之子祖丁立王祖丁崩沃甲之子南庚立王南庚崩祖丁之子陽甲立王陽甲崩弟盤庚立王盤庚時復避水災南涉河遷于亳從湯居行湯政殷復興盤庚崩弟小辛立王小辛時殷復衰小辛崩弟小乙立王小乙崩子武丁立稽古録卷六欽定四庫全書稽古録卷七宋司馬光撰
