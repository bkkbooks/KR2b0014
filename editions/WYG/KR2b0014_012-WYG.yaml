body:
  text: 稽古録卷十二宋司馬光撰漢髙祖邦元年西楚霸王項籍衡山文王呉芮臨江王共敖九江王英布常山王張耳齊王田榮雍王章邯燕王臧荼殷王司馬卬河南王申陽韓王鄭昌元冬沛公至霸上秦王子嬰降項羽入闗欲擊沛公張良購解得止春羽陽尊楚王為義帝徙之郴羽自稱西楚霸王分天下以王諸侯以沛公為漢王徙趙王為代王齊王為膠東王燕王為遼東王魏王為西魏王而立楚將英布為九江王共敖為臨江王呉芮為衡山王秦將章邯為雍王司馬欣為塞王董翳為翟王趙將張耳為常山王司馬卬為殷王申陽為河南王齊將田都為齊王田安為濟北王燕將臧荼為燕王諸侯由是不服田榮擊殺田市田都田安并王三齊臧荼擊滅遼東王廣漢王用韓信䇿還定三秦項王殺韓王成而立鄭昌二代王陳餘齊王廣韓王信元冬項籍弑義帝陳餘逐張耳復立趙王歇歇立餘為代王項王擊殺田榮河南王殷王來降韓王孫信滅韓立信為韓王春漢王以諸侯伐楚入彭城項王大破漢兵獲太公吕后杕韓信滅魏三冬韓信滅代及趙復立張耳為趙王燕齊皆聴命英布來降夏項王圍漢王於滎陽用陳平反間逐楚謀臣范増紀信詐降漢王乃得脱出軍宛葉間彭越反梁地項王東擊之反拔滎陽殺周苛又東擊彭越四冬王大破楚軍汜水上殺曹咎司馬欣項王還與漢臨廣武而軍射王傷胷韓信滅齊破殺楚將龍且因自立為齊王秋楚兵疲食盡與漢割鴻溝以和王用陳平張良䇿復追楚五冬大破項王於垓下滅之臣光曰世稱項王不王秦而歸楚故失天下觀其擁百萬之衆西入函谷擅天下之勢裂山河以王諸侯自謂可以逞其私心而人莫敢違安行無禮忍為不義欲以一夫之力服億兆之心才髙者見疑功大者被絀推此道以行之雖得百秦之地將能免於敗亡乎立齊王信為楚王彭越為梁王春諸侯共尊漢王為皇帝都洛陽令天下皆罷兵婁敬説帝徙都闗中從之秋燕王臧荼反滅之立盧綰為燕王六冬帝㑹諸侯于陳執楚王信廢為淮隂侯悉封兄弟庶子以大國以鎮服天下夏尊太公為太上皇徙韓王信於太原秋匈奴圍馬邑信降匈奴七冬匈奴圍帝于平城七日不火食用陳平秘計得免春徙都長安與匈奴約和親八冬帝擊韓王信餘寇於東垣過趙趙相貫髙謀為逆不果春帝如洛陽九冬初徙郡國豪傑以實闗中帝如洛陽貫髙事覺廢趙王敖為宣平侯甲辰十夏太上皇崩秋代相陳豨反帝自擊之至邯鄲十一冬遣將軍周勃擊豨淮隂侯信謀反伏誅或告彭越謀反越坐廢死夏帝還長安遣太中大夫陸賈拜秦南海尉趙陀為南越王秋淮南王布反帝自擊之十二冬布敗走死長沙周勃斬陳豨燕王綰隂與豨通事覺亡入匃奴夏帝崩初帝以太子仁弱欲以少子趙王如意代羣臣固爭乃止帝豁達寛仁知人善任使故能平一海内又使叔孫通制禮儀蕭何次律令雖日不暇給規模宏逺矣惠帝盈元年冬太后殺趙王如意及其母戚姬帝由是不樂稱病不聽政二冬齊王來朝獻城陽郡為魯元公主湯沐夏大旱秋相國蕭何薨以齊相曹參代之三春大發民城長安夏立閩越君繇為甌王發諸侯徒𨽻城長安四冬立皇后張氏春除挾書律五春發男女十四萬五千人城長安秋城成六七秋帝崩無子太后詐取他人子名之為孝惠子殺其母立以為帝太后臨朝稱制立兄子台為吕王太傅王陵免甲寅髙后雉元年夏立所名孝惠子五人皆為侯二秋行五銖錢三夏江漢溢流四千餘家秋伊洛汝水溢流千餘家四夏少帝知太后殺其母出怨言太后幽殺之詔羣臣曰皇帝乆病昏亂其廢之更立常山王義為帝以太后稱制故不改元義亦所名孝惠子也五春南越王反自稱南越武帝秋發河東上黨騎士屯北地備匈奴六夏匈奴寇狄道行五分錢七冬匈奴寇狄道春趙幽王友幽死于邸徙梁王恢為趙王夏趙王恢自殺太后廢其嗣立其兄子吕禄為趙王秋燕靈王建薨太后殺其子立兄孫吕通為燕王南越侵長沙遣隆慮侯周竈將兵擊之八秋太后病使吕産吕禄將南北軍太后崩産禄欲作亂齊王襄發兵以誅諸吕産使大將軍灌嬰擊之嬰留滎陽不行太尉周勃使人詐吕禄奪其軍使朱虛侯章擊吕産殺之悉誅諸吕廢少帝迎立髙帝子代王恒文帝恒元年春立皇后竇氏立子啓為太子秋丞相周勃謝病免陸賈使南越越復去帝號稱臣二甲子三夏匈奴寇北地遣丞相灌嬰將兵擊之衛將軍軍長安帝幸太原濟北王興居反秋大旱帝自太原還將軍柴武擊濟北王殺之四五夏除盜鑄錢令更造四銖錢六冬帝弟淮南厲王長謀反發覺徙蜀道死七八九夏大旱十冬帝幸甘泉十一冬帝幸代春至自代匈奴寇狄道十二冬河決東郡酸棗潰金隄甲戌十三夏詔除肉刑以笞代重者笞五百又詔除民田租十四冬匈奴單于將十四萬騎入蕭闗燒囘中宫候騎至雍帝遣三將軍屯隴西北地上郡衛將軍周舍車騎將軍張武屯渭北大將軍張相如將軍欒布擊匈奴匈奴出塞師還十五夏帝幸雍始郊見五帝畤十六夏分齊為六國立悼惠王子六人淮南為三國立厲王子三人皆為王是時諸侯驕恣賈誼知其必為患請稍裁抑帝不能用後元二夏帝幸雍還幸棫陽宫匈奴和親三春帝幸代秋大雨藍田山水出流五百餘家漢水溢壊民室八十餘家所殺三百餘人四夏帝幸雍五春帝幸隴西又幸雍秋幸代六冬匃奴三萬騎入上郡三萬騎入雲中使將軍李勉屯飛狐口蘇隠屯句注張武屯北地又使劉禮屯霸上徐厲屯棘門周亞夫屯細栁以備胡月餘匈奴退軍皆罷夏大旱蝗甲申七夏帝崩帝寛惠恭儉百姓富樂景帝啓元年夏復收民田半租二御史大夫晁錯患諸侯强大請以過稍削其支郡諸侯怨怒三春呉王濞楚王戊膠西王卬趙王遂濟南王辟光菑川王賢膠東王雄渠反南連越北連匈奴天下震動帝誅晁錯遣太尉周亞夫將三十六將軍擊之呉楚攻梁不克亞夫擊破之七國皆滅於是始貶削諸侯權宗室寖微四夏立栗姬子榮為皇太子五六七春帝怒栗姬廢太子榮為臨江王夏立膠東王徹為皇太子太子母王氏為皇后取平陽公主女陳氏為太子妃中元二甲午三夏旱秋蝗四夏蝗五六夏帝行幸雍夏詔減笞法不過二百自是笞者始得全匈奴入鴈門武威酒泉上郡取苑馬吏卒戰死者三千餘人後元二春匈奴入鴈門殺太守發車騎材官屯鴈門三春帝崩帝守文帝之業家給人足太子即位年十六武帝徹建元元年春行三銖錢二三春河決平原大饑人相食秋閩越圍東甌東甌來告急帝使太中大夫嚴助發㑹稽兵救之未至閩越走秋起上林苑甲辰四夏旱五春罷三銖錢行半兩錢初置五經博士夏蝗六秋閩越圍南越南越守天子約不敢發兵遣大司農韓安國將兵出㑹稽大行王恢出豫章救之兵未逾嶺閩越王弟餘善殺王降漢乃罷兵南越遣太子入侍元光元冬初令郡國貢孝亷一人春車騎將軍李廣屯雲中程不識屯鴈門以備匈奴六月罷二冬帝幸雍自漢興與匈奴和親匈奴數敗約漢驅之出塞而止至是王恢始建議伐匈奴令馬邑豪聶壹誘致單于夏遣韓安國等五將軍伏兵三十餘萬於馬邑旁單于入塞覺之亡去漢追至塞不及而罷誅王恢三春河徙自頓丘東南入於渤海夏河決濮陽汎濫十六郡發卒十萬救河四中郎將唐蒙使南越見蒟醬笻竹杖請通西南夷以制越五夏發巴蜀卒通西南夷道徭役費用甚多皆閉昆明道不得成巴蜀民始愁苦又發卒萬人治鴈門險阻秋螟六冬初算商車春穿漕渠通渭匈奴入上谷遣將軍公孫敖出代公孫賀出雲中李廣出鴈門衛青出上谷青頗斬首虜諸將皆無功李廣為匈奴所得逃歸夏大旱蝗帝幸雍秋匈奴盜邊遣韓安國屯漁陽元朔元春立衛皇后赦秋匃奴入遼西殺太守入漁陽鴈門敗都尉遣衛青出鴈門李息出代獲首虜數千級東夷穢貊君南閭等二十八萬口降置滄海郡甲寅二春令諸侯王得分郡邑封子弟為侯匃奴入上谷漁陽遣衛青李息出雲中西至符離獲首虜數千級收河南地置朔方五原郡遣校尉蘇建築朔方城夏募民徙朔方十萬户徙郡國豪傑於茂陵三夏匈奴單于入代殺太守入鴈門殺畧千餘人西南夷道累年不通御史大夫公孫𢎞請罷之專意朔方秋罷西南夷屯築朔方城四冬帝幸甘泉匈奴入代定襄上郡殺數千人五春大旱遣衛青出髙闕公孫賀蘇建李蔡出朔方李息張次公出右北平凡十餘萬騎擊匈奴圍右賢王僅以身免獲禆王十餘人男女萬五千餘人還即軍中拜青大將軍三子皆封侯諸將侯者六人秋匈奴入代殺都尉六春遣衛青率公孫敖等六將軍凡十餘萬騎出定襄斬首虜三千級還休士馬於定襄雲中鴈門夏衛青復將六將軍出逾漠北大克獲右將軍蘇建及前將軍趙信以三千騎獨遇單于戰敗信降匈奴建僅以身免元狩元冬帝幸雍淮南王安衡山王賜謀反㐲誅大雪民多凍死夏立子據為太子匈奴入上谷殺數百人二冬幸雍春驃騎將軍霍去病出隴西擊匈奴過焉耆山斬獲甚衆夏又出北地過居延獲三萬餘級匈奴入鴈門張騫李廣出右北平騫失期廣為匈奴所圍秋昆邪王以其衆四萬餘人來降置武威酒泉郡匈奴由是稍衰三夏大旱秋匈奴入定襄右北平殺畧千餘是時縣官費衆倉庫空竭貧民流徙縣官無以賑之帝寵貴河南人卜式以諷百姓莫有應者減隴西北地上郡戍卒半責吏卒穿昆明四春作白金皮幣銷半兩錢置均輸鹽鐵官夏衛青將四將軍出定襄霍去病出代各萬餘騎步兵數十萬青到漠北圍單于斬首萬九千級追至闐顔山乃還去病與右賢王戰斬首七萬餘級封狼居胥山而還五甲子元鼎元二夏大水闗東饑下巴蜀粟以賑江南三冬初令人告緡夏闗東饑人相食四冬帝幸雍遂幸汾隂初祠后土幸洛陽膠東人欒大以方技見上月餘佩四金印拜五利將軍待以不臣之禮使入海求神藥於是燕齊迂怪之士爭言有禁方能神仙者以萬數夏得寳鼎汾隂迎置甘泉五帝幸雍遂踰隴登崆峒而還初立泰畤於甘泉親祠太一夏南越相吕嘉反殺其王及漢使者秋遣路博徳等五將軍五道擊之列侯坐酎金失侯者百六十人欒大詐覺伏誅西羌反匈奴入五原六冬將軍李息將十萬卒擊西羌平之以其地為五郡帝幸緱氏秋東越王餘善反將軍韓説擊之元封元冬帝北巡上郡至朔方登單于臺勒兵十八萬匈奴讋不敢出乃入塞罷兵歸甘泉東越殺王餘善降悉徙其民於江淮春帝幸嵩髙遂東巡夏封太山禪肅然坐明堂巡海上至遼西碣石厯北邊還甘泉二冬帝幸雍春幸緱氏遂至東萊候神人不見乃禱萬里沙過祠太山發卒數萬人自臨塞決河築宣防宫導河北行為二渠作通天臺甘泉前殿始廣諸宫室朝鮮王右渠反遣將軍楊僕荀彘擊之三夏朝鮮王來降以其地為四郡軍還荀彘坐爭功棄市楊僕贖為庶人秋武都氐人反分徙其人於酒泉甲戌四冬帝幸雍通囘中道遂北出蕭闗厯獨鹿鳴澤自代而還幸河東夏大旱民多渇死秋匈奴寇邊遣拔胡將軍郭昌屯朔方五冬帝南巡至南郡祀虞舜於九疑登灊天柱山自潯陽浮江舳艫千里薄樅陽而出並北至琅邪並海春還至太山增封因朝諸侯受計於明堂夏還甘泉初置刺史部十三州六冬帝幸囘中春作首山宫於蒲坂帝幸河東益州昆明反遣郭昌將兵擊之秋大旱蝗太初元冬帝幸太山祠上帝禪嵩里望祀蓬萊還受計甘泉春起建章宫千門萬户夏正律厯以寅月為正首遣公孫敖築受降城於塞外秋帝幸安定帝聞大宛有善馬求之不得使將軍李廣利將數萬人伐大宛二春帝幸河東籍吏民馬補車騎馬秋蝗遣浚稽將軍趙破奴將二萬騎出朔方擊匈奴不還三春帝東巡海上夏還増封太山禪石閭遣光禄大夫徐自為築五原塞外列城西北到盧朐山游擊將軍韓説將兵屯之强弩都尉路博徳築居延城秋匈奴單于入定襄雲中殺略數千人破壞光禄諸亭障又入張掖酒泉殺都尉四春大宛殺王母寡降得馬三千餘疋而還於是外國震恐爭遣使入朝貢以窺漢之廣大上毎巡狩常從胡客多為侈靡以誇示之冬幸囘中天漢元春幸甘泉河東夏大旱秋謫戍屯五原二春帝幸東海還幸囘中夏李廣利將三萬騎出酒泉擊匈奴斬首萬餘級都尉李陵以步卒五千出居延與單于戰斬首萬餘級力盡降匈奴東方盜賊羣起遣繡衣使者暴勝之等分道捕逐僅能克之甲申三春帝幸雍遂至安定北地匈奴入五原酒泉李廣利將七萬人出五原商丘成將二萬人出西河馬通將四萬騎出酒泉夏丞相劉屈氂坐與李廣利謀立昌邑王為嗣皆族誅廣利戰不利遂將其衆降匈奴歸者千人中惟一二四春帝幸東萊臨大海又幸太山脩封夏還甘泉是時天下疲於兵革上亦悔之下哀痛之詔深陳既往之悔禁苛暴止擅賦務本勸農民稍蘇息後元元春幸甘泉遂幸安定夏侍中僕射馬何羅謀反伏誅甲午二春帝幸五柞宫戾太子既死皇子燕王旦廣陵王胥多過失帝欲立少子弗陵恐母后亂國乃先誅其母鈎弋夫人上疾篤立弗陵為太子年七歳霍光金日磾上官桀受遺詔輔政上崩冬匈奴入朔方昭帝弗陵始元元年夏益州反遣水衡都尉吕破胡擊之秋大水燕王旦自以年長不得立與齊王澤中山王長謀反事覺秋澤長等伏誅旦以至親勿治二冬發習戰射士詣朔方屯田張掖郡三四春立皇后上官氏后霍光外孫上官桀之孫也以后父安為驃騎將軍冬大鴻臚田廣明擊益州五春夏陽男子張延年詣闕詐稱衛太子京兆尹雋不疑收案誅之秋田廣明破益州斬首捕虜三萬人六夏大旱秋罷𣙜酤元鳯元春武都氐人反遣執金吾馬適擊之夏上官桀與霍光爭權詐為燕王旦上書言光罪帝知其詐益親厚光有毁光者輒怒之桀乃與蓋長公主桑𢎞羊謀殺光廢帝立燕王事覺皆族誅光威震天下二三冬遼東烏桓反遣度遼將軍范明友擊之甲辰四夏平樂監傅介子使樓蘭因斬其王首而歸以威示西域五六夏烏桓復犯塞遣范明友擊之元平元夏帝崩無嗣霍光迎武帝孫昌邑王賀立之即位滛亂光復白太后廢之誅昌邑羣臣二百餘人迎衛太子孫病已於民間以為昭帝嗣時年十八更名詢冬立皇后許氏宣帝詢本始元年春霍光稽首歸政帝不許事皆先聞光然後奏御公卿皆以定䇿安宗廟功増邑受封二三春霍光夫人顯酖殺許后夏旱匈奴侵烏孫遣田廣明等五將軍兵十五萬與烏孫合擊匈奴獲名王已下四萬餘級冬單于自擊烏孫值大雪人畜死者什七八因以饑饉諸國羇屬者皆瓦解攻盜不能治匈奴遂衰四春立皇后霍氏光女也地節元二春霍光薨以光子禹為左將軍兄子雲為侍中奉車都尉山領尚書事皆封侯上始親政事勵精為治夏立許后子奭為皇太子甲寅三四帝知霍氏毒殺許后事稍斥退其親黨秋霍禹憂懼謀反族誅廢霍后連坐誅滅者數十家元康元二春立皇后王氏三四神爵元春上幸甘泉河東先零羌豪楊玉反遣後將軍趙充國討之秋大旱趙充國誘䍐幵種羌以擊先零大破之罷騎兵留萬人屯田稍以爵賞壞其支黨二夏羌人斬楊玉首降衛司馬鄭吉擊車師破之匈奴大亂日逐王將其衆萬餘人詣吉降初置西域都䕶中西域而立幕府以鎮撫諸國漢之號令班西域矣匈奴遣名王奉獻和親三四夏匈奴單于遣弟呼留若王來朝甲子五鳯元春上幸甘泉冬左馮翊韓延夀棄市二春上幸雍秋匈奴握衍單于為其衆所叛自殺五單于爭立更相殘滅冬匈奴呼遫累單于率衆來降封為列侯三春上幸河東置河西屬國都尉以處匈奴降者四春匈奴呼韓邪稱臣遣弟谷蠡王入侍以邊塞無寇減戍卒什二大司農丞耿夀昌奏言故事歳漕闗東穀四百萬斛以給京師用卒六萬人宜糶三輔𢎞農河南上黨太原郡足給京師可減闗東漕卒之半從之甘露元春上幸甘泉呼韓邪單于遣子右賢王入侍呼韓邪兄左賢王自立為郅􅑢單于亦遣子入侍冬呼韓邪單于遣弟左賢王來朝賀二春珠崖郡亂夏遣䕶軍都尉張禄擊之三春上幸甘泉呼韓邪單于為郅􅑢所破稱臣入朝遣衛將軍車騎將軍將萬六千騎送單于還幕南保光禄城郅􅑢初以呼韓邪不能復還乃西收右地聞漢兵至懼引兵西滅呼偈堅昆丁令而都之四黃龍元春上幸甘泉呼韓邪單于來朝冬帝崩帝綜覈名實信賞必罰官不數遷是以吏稱其職民安其業元帝奭初元元年春立皇后王氏匈奴來告饑轉雲中五原穀二萬斛以給之以太子太傅蕭望之為前將軍少傅周堪為光禄大夫及宗正劉更生皆寵任用事甲戌二春上幸甘泉夏立子驁為皇太子冬中書令石顯譖蕭望之下獄自殺及周堪劉更生皆被廢逐公卿已下畏顯皆重足而立三春珠崖反用待詔賈捐之議廢其郡夏旱罷建章甘泉衛士令就農四春上幸甘泉河東五春上幸雍郅􅑢單于怨漢擁䕶呼韓邪殺漢使者谷吉自以負漢深又聞呼韓邪益强乃西奔康居王以女妻郅􅑢尊禮之欲倚其威以脅諸國罷鹽鐵官永光元春上幸甘泉二秋西羌反遣右將軍馮奉世擊之奉世請兵萬人期一日可克帝與之萬二千人不克益六萬人克之三冬以用度不足復鹽鐵官四春帝幸雍冬罷祖宗廟在郡國者五春帝幸甘泉遂至河東冬幸長楊大獵毁太上皇孝恵廟園建昭元春帝幸雍甲申二春帝幸甘泉遂至河東冬大雪深五尺魏郡太守京房譏刺石顯顯譖殺之三郅􅑢益强西域皆畏服之冬都䕶甘延夀副校尉陳湯矯詔發城郭軍兵四萬人襲擊郅􅑢獲閼氏太子名王以下六十餘人威振西域丞相御史及石顯皆害其功軍還爵賞不行四春以討郅􅑢功告祠郊廟五秋帝寢疾盡復祖宗園廟舊祀竟寧元春呼韓邪單于來朝請罷備邊卒郎中令侯應以為不可乃止夏帝崩帝優游不斷漢業始衰太子即位尊王皇后為太后以太后弟衛尉鳯為大司馬大將軍領尚書事王氏始專政成帝驁建始元年夏封舅譚商立根逢五人為闗内侯冬作長安南北郊罷甘泉泰畤河東后土祠二春罷雍五畤立皇后許氏夏大旱三秋闗中雨四十餘日四春罷中書宦官初置尚書員五人初河決金堤兖豫諸郡冬河隄使者王延世塞之二十六日而成河平元春匈奴復株累單于新立遣右賢王伊祈黄渾來朝伊祈黄渾乞降光禄大夫谷永議郎杜欽以為不可受從之果詐降者甲午二三四春單于來入朝王鳯嫉丞相王商之賢誣以罪商嘔血死陽朔元冬京兆尹王章言王鳯過惡章坐死妻子徙合浦自是天下莫敢譏斥王氏二三夏潁川鐵官徒申屠聖等百八十人劫庫兵為羣盜遣使討平之秋王鳯薨以鳯從弟音為大司馬車騎將軍秉政鳯弟譚素倨故鳯不薦譚而薦音自代也四鴻嘉元春帝幸昌陵初作昌陵二春帝幸雲陽徙郡國豪傑五千餘户於昌陵三冬許后坐姊為媚道廢陽阿公主侍者趙飛燕及其女弟始得幸姊弟專妬帝由是絶嗣廣漢人鄭躬作亂甲辰四秋河決勃海青河用李尋議遂不塞鄭躬黨浸廣至萬餘人冬詔發廣漢蜀郡二萬兵擊滅之永始元夏封舅曼子莽為新都侯莽善飾名譽士多稱之立趙飛燕為皇后女弟為昭儀封太后姊子淳于長為侯昌陵作數年不成府庫空竭天下徧被其勞秋罷昌陵二春王音薨以鳯弟商為大司馬輔政三冬尉氏人樊並山陽鐵官徒蘇令皆劫略吏民賊殺長吏詔討平之復甘泉太畤河東后土雍五畤祠四春帝幸甘泉河東元延元春帝幸雍冬王商薨弟根代為大司馬時人多譏切王氏帝亦疑焉故丞相張禹常為帝師帝虚心問禹禹曰鄙儒亂道誤人帝由是不疑王氏是歳後宫許美人曹才人皆生子趙昭儀妬殺之二春帝幸甘泉河東冬幸長楊縱胡人校獵烏孫末振將殺大昆彌而病死右中郎將段㑹宗誅其太子番丘三春帝幸雍四春帝幸河東甘泉帝以定陶王子欣為賢王祖母傅太后亦私事趙后昭儀及王根三人皆欲自託爭稱譽之綏和元春立欣為皇太子帝幸雍夏廢丞相御史大夫官置三公冬王根病免王莽告淳于長及紅陽侯立罪而去之莽代根為大司馬乃折節散財交士以立名聲傾諸父焉初罷刺史置州牧甲寅二春帝幸甘泉河東還暴崩趙昭儀自殺哀帝即位尊王太后為太皇太后趙后為皇太后父定陶恭王為恭皇祖母傅太后為恭皇太后母丁太后為恭皇后於是丁傅用事而王氏稍黜王莽以病免王根王立皆以罪廢逐哀帝欣建平元年春傅太后誣中山馮太后祝詛上馮太后自殺馮氏死者十七人二春罷司空及州牧復御史大夫刺史官夏尊恭皇太后曰帝太太后恭皇后曰帝太后尋崩秋待詔夏賀良以妖妄誅丞相朱博自殺帝屢誅大臣欲强主威以則武宣而嬖幸用事賞罰益紊矣三冬待詔息夫躬誣告東平王雲與后祝詛上皆自殺四夏幸臣董賢封為髙安侯上為賢起第如天子禮武庫禁兵上方珍寳其上等皆在賢家乗輿所服乃其副尊帝太太后為皇太太后元夀元春皇太太后崩帝欲益封董賢丞相王嘉封還詔書上大怒收嘉下獄嘔血死秋以董賢為大司馬領尚書事勢傾海内單于求朝帝不許揚雄諌乃許之二春匈奴單于烏孫大昆彌來朝夏復置三公官帝崩無嗣元后召新都侯莽委以尚書事及殿中兵董賢自殺元后以莽為大司馬迎元帝孫中山王衎立之孝成趙后孝哀傅后皆廢絀自殺平帝年九歲太后臨朝稱制平帝衎元始元年春羣臣請尊王莽為太傅安漢公莽乃奏紹封諸侯惠賜庶民以取恱上下之人又引劉歆等為羽翼云欲興禮樂致太平上以欺太后下以惑衆庶權與人主侔矣二夏旱安漢公已下獻田宅賦貧民秋莽遣人諭說江湖賦令自出又賂單于令改名遣女入侍所以誑耀媚事太后下至旁側長御方故萬端三春納莽女為皇后夏莽奏定上下車服及田宅之制學校之禮莽世子宇非莽隔絶衛氏以血灑莽門莽殺宇盡誅衛氏因連引郡國豪傑不附已者及紅陽侯立皆殺之死者以百數海内震恐甲子四春立皇后王氏加莽號曰宰衡莽諷西羌令獻地置西海郡増法五十條犯者徙西海徙者以千萬數民始愁怨又更易百官及郡縣名制度天下多事吏不能紀吏民上書亟請加賞於莽者前後四十八萬七千餘人五春加莽九錫帝崩莽取宣帝曽孫之子嬰年二歲託云卜相最吉是月前煇光立之謝囂奏瑞石文告安漢公莽為皇帝於是吏民爭獻符瑞元后怒而力不能沮乃令莽如周公故事稱攝皇帝禮儀一如天子吏民皆稱臣漢孺子嬰居攝元年春立嬰為皇太子曰孺子夏安衆侯崇起兵欲誅莽攻宛不克而死西羌反逐西海太守二春䕶羌校尉竇况擊破西羌夏改造錯刀契刀大錢秋東郡太守翟義起兵誅莽立嚴鄉侯信為天子衆十餘萬三輔盜賊趙明霍鴻等並起衆且十萬莽皇懼作大誥言將復辟之意遣王邑等八將軍擊信義滅之初始元春邑還軍擊斬明鴻等於是莽自以獲天人之助謀即真矣冬莽以符命進稱假皇帝以應天命云俟孺子加元服復子明辟梓潼人哀章又獻天璽金䇿莽遂即皇帝位以十二月為正月新王莽建國元年春莽封孺子為定安公令人不得私賣買田及奴婢有敢非井里聖制及挾五銖錢言大錢當罷者流諸四裔於是農商失業民涕泣於道路又改易蠻夷印綬匃奴始怨叛二秋戊巳校尉史陳良終帶殺校尉劫畧吏民自稱漢大將軍亡入匈奴更名匈奴單于曰降奴服于甄豐子尋劉歆子棻復獻符命莽怒殺之連坐死者數百人三河決清河召能治水者數百人問以治河之術卒無所施行四五元后崩西域焉耆叛殺都尉甲戌天鳯元置州牧郡監二冬以災害減吏禄莽多遣中郎繡衣執法監察州郡其人乗權勢更相奏舉章交道路莽不能察其是非獄訟連年不決莽自以專權得漢政不委信臣下有司受成茍免因縁為姦競為貪苛穀糴常貴百姓窮困始為盜賊焉三春地震莽下詔曰地有動有震震者害動者不害夫坤其動也闢其静也翕一翕一闢萬物生焉其自誣飾皆此類也山崩壅涇水羣臣上夀以為土填水匃奴滅亡之兆羣下從諛亦如之四琅邪女子吕母起兵殺縣長五琅邪人樊崇起兵於莒時青徐盜賊螽起皆附於崇衆至數萬久擊破探湯侯田况殺萬餘人所過殘滅號曰赤眉六莽遣大司馬嚴尤等十三將軍將四十萬衆齎三百日糧欲同時出塞逐匈奴内之丁令分其地立呼韓邪十五子嚴尤苦諌免為庶人又募伎術之士以萬數師乆屯不行運轉不已天下騷然以至於亡終不能出塞地皇元莽自言受命三萬六千歲作九廟提封百頃黃帝廟方四十丈髙十七丈餘廟半之費用巨百萬卒徒死者以萬數南方饑饉緑林賊起數月至七八千人二秋闗東大饑緑林賊破荆州收還至亡萬餘時民皆饑愁州郡不能慰安又不得擅發兵以故盜賊寖多唯翼平連率田况發兵擊之多所摧破况請毋出大將以擾民唯選牧尹明其賞罰賊必可平莽疑况召之還三蝗饑民相食緑林散為下江新市平林兵莽遣將孔仁嚴尤陳茂擊下江等兵王輔亷丹擊赤眉丹戰死漢宗室劉縯起兵春陵新市平林皆附之莽將甄阜梁丘賜破縯於小長安縯弟秀説下江平林下之漢淮陽王𤣥更始元年漢梁王永淮南王李憲元新市平林共立劉聖公為帝夏劉秀大破莽將王尋王邑兵百萬於昆陽郡縣爭應漢旬月徧天下隗囂起隴右公孫述起蜀更始拔宛聴譖殺劉縯秋三輔豪傑共殺王莽臣光曰髙祖奮布衣提三尺劍八年而成帝業其收功之速如是何哉惟其知人善任使而已故髙祖自謂鎮國家撫百姓不如蕭何運籌䇿決成敗不如子房戰必勝攻必取不如韓信三者皆人傑吾能用之所以取天下韓信亦曰陛下不善將兵而善將將斯言盡之矣吕氏之亂漢氏不絶如綫然而卒不能為患者外有宗藩之强内有絳灌之忠也文景之時天下家給人足㡬致刑措後世皆知稱慕莫能及之夫民之情何嘗不欲安樂而富壽哉文景能勿擾而已矣孝武喜淫侈慕神仙宫室無度巡游不息窮兵於四夷嚴刑而重賦迹其行事視秦皇何逺哉止以崇儒重道求賢納諫故其成敗若此之殊也孝昭以童稚之年辨霍光之忠確然不可動何天資之明也然光猶專政而不歸此則光之罪矣孝宣綜覈名實信賞必罰使吏稱其職民安其業方之孝武功烈優焉孝元優游不斷漢業始衰孝成荒於酒色委政外家孝哀狠愎不明嬖幸盈朝陵夷至於孝平以幼沖嗣位王莽因之遂移漢祚莽恃其詐慝煩民玩兵罪盈怨積而天下叛之矣冬更始北都洛陽政令無紀諸將恣横民皆思莽朝以劉秀為大司馬狥河北卜者王郎稱帝於邯鄲燕趙皆應之廬江太守李憲自稱淮南王甲申二成公孫述元春更始遷都長安隗囂入朝夏劉秀擊滅王郎更始召秀還秀不應命殺尚書令謝躬略有河北之地冬赤眉西趣長安劉秀亦遣鄧禹狥闗中梁王劉永與青徐賊張步董憲連兵專據東方公孫述自稱蜀王稽古録卷十二
