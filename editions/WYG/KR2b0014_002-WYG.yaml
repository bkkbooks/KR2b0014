body:
  text: 陶唐氏帝堯祁姓曰放勲帝嚳之子初封於陶後改封唐故曰陶唐氏年十六以唐侯升為天子都平陽今晉州堯欽明文思威儀表備謂之欽照臨四方謂之明經緯天地謂之文道徳純備謂之思允恭克讓光被四表格于上下允信克能光充格至也既有四徳又信恭能讓故其名聞充溢四外至于天地也克明駿徳以親九族駿大也言堯能脩明其大徳以睦上自髙祖下至𤣥孫等列旁支之親大學所謂身修然後家齊也九族既睦平章百姓百姓國人也言九族之外臣民之異姓者也皆化九族而平和章明所謂家齊然後國治也百姓昭明協和萬邦黎民於變時雍昭亦明也協合黎衆時是雍和也言天下衆民皆變化化上是以風俗大和所謂國治然後天下平堯徳廣運乃聖乃神乃武乃文廣謂所覆者大運謂所及者逺聖無不通神妙無方文經天地武定禍亂稽于衆捨已從人稽考也雖聰明不獨斷自用必考察從謀捨己所有從人所長所以為聖其仁如天其智如神就之如日温燠望之如雲能庇廕天下惟天為大惟堯則之則法也法天行化蕩蕩乎民無能名焉蕩蕩廣逺之稱言其布徳廣逺民無能識其名巍巍乎其有成功功成化隆髙大巍巍煥乎其有文章煥明也其立文垂制又著明命羲和厯象日月星辰敬授人時重黎之後羲氏和氏世掌天地四時之官星五星辰日月所㑹十二次厯象其分節謹記天時以授人也允釐百工庶績咸熙釐治工官庶衆績功咸皆熙廣也言定四時成歲厯以告時授事則能信治百官衆功皆廣時洪水為災堯咨四岳唐虞建百官内有百揆四岳如今之宰輔百揆掌揆度百事四岳分掌四時及四岳諸侯之政舉能者使治之四岳舉鯀古本切堯知鯀頑嚚傲狠不可用心不則徳義之經為頑口不道忠信之言為嚚四岳固請試之堯屈己從之所謂捨己從人鯀治水九年功用弗成堯老有子丹朱不肖欲遜位于四岳四岳辭以不徳堯使明舉有明徳之人搜揚在側陋者衆乃曰有鰥在下曰虞舜舜年三十未娶故曰鰥虞今河中府虞鄉縣媯水之汭舜所居也帝曰俞予聞如何俞然也然其所舉堯聞舜而不用亦任天下之耳目不自任也岳曰瞽子父頑母嚚象傲舜父有目不能分別善惡故時人謂之瞽瞍象舜弟之字傲慢不友言皆惡克諧以孝烝烝又不格姦諧和烝進也言能以至孝和諧頑嚚昏傲使進進於善道以至自治不至陷入於姦惡盛徳之至無惡不化帝曰朕其試哉舜至徳升聞堯猶試之者將授以大任不得不重愼女于時觀厥刑于二女女妻刑法也堯於是以二女妻舜觀其法度接二女以治家觀治國釐降二女于媯汭嬪于虞降下嬪婦也舜為匹夫能以義理下帝女之心使行婦道于虞氏帝曰欽哉歎舜能脩已行敬以化帝女則其所能者大矣於是登舜於朝厯試諸難試以治民之難事既有大功遂使攝行天子事堯在位一百一年壽百一十七歲而崩百姓哀慕如喪考妣舜封堯後於唐為虞賓
