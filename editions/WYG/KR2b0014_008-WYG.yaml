body:
  text: 周上周文王姬姓曰昌其先亦出於髙辛氏帝嚳生弃佐禹播時百穀堯封之邰地來切舜命為后稷后稷薨子不窋立窋行律切夏后政衰棄稷不務不窋用失其官自竄於戎狄之間不窋生鞠鞠生公劉能修后稷之業務耕種行地宜行者有資居者有積民賴其慶多徙而歸保焉故詩人歌樂思其徳公劉生慶節國於豳豳與邠同今邠州慶節生皇僕皇僕生差弗差弗生毁隃音俞毁隃生公非公非生髙圉髙圉生亞圉亞圉生公叔祖類公叔祖類生古公亶父古公亶父是為太王復修后稷公劉之業積徳行義國人皆戴之狄人攻之事之以皮幣犬馬珠玉皆不得免乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞有民立君將以利之君子不以其所養人者害人民之在我與其在彼何異民欲以我故殺人父子而君之吾不忍也二三子何患乎無君我將去之乃與私屬去邠踰梁山邑于岐山之下居焉故號曰周豳人曰仁君不可失也從之者如歸市旁國民亦多歸之古公乃貶戎狄之俗營築城郭室屋而邑別居之分別而為邑治也民歌樂之肇基王迹古公長子太伯次仲雍次季厯生昌昌有聖徳在傅弗勤處師弗煩不聞亦式不諫亦入道義雖所未樂率意行之冥合於法式過失不待人諫言已先入皆言其生知古公知其必興周家欲立季厯以𫝊昌太伯仲雍知其指自竄於句古侯切呉以讓季厯太伯猶服端委端委𤣥端委貌周之禮服仲雍遂從夷俗斷髮文身以示不可用古公薨季厯立是為王季王篤於行義諸侯順之王季薨昌立是為文王都豐文王徽柔懿恭懷保小民以美道和民故民懷之以美政恭民故民安之發政施仁必以鰥寡孤獨為先老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤此四者天下之窮民而無告者自朝至于日中昃不遑暇食用咸和萬民從朝至日昳不暇食思慮政事用皆和萬民文王為殷西伯古之王者擇諸侯之賢者分掌天下諸侯文王為西伯掌西方諸侯于時西有昆夷之患北有玁狁之難玁音險狁音允文王以天子之命命將帥遣戍役以守衛中國逺近之人皆畏而愛之則而象之諸侯大邦畏其力小邦懐其徳虞芮之君相與爭田乆而不平欲質於西伯乃相與朝周入其境則耕者讓畔行者讓路入其朝士讓為大夫大夫讓為卿二國之君慙而相謂曰我等小人豈可以履君子之庭乃相讓以其所爭田為閒田而退天下聞之而歸周者四十餘國時紂方無道諸侯多去紂歸文王紂怒囚文王於羑里七年諸侯皆從之囚紂於是懼而歸之文王乃整兵以誅諸侯之不道者伐崇伐宻伐阮伐共伐黎皆勝之文王為諸侯四十二年更稱元年三分天下有其二以服事殷九年崩壽九十七太子發立是為武王武王三年喪畢十一年觀兵孟津諸侯不期而㑹者八百餘人皆曰紂可伐武王曰未可退而増徳及紂殺比干囚箕子十三年武王帥諸侯復伐紂與紂戰于牧野克之遂滅紂一戎衣天下大定乃反商政政由舊用商先王善政釋箕子囚封比干墓式商容閭封益其土商容賢人紂所貶退式其閭巷以禮賢在車上慿軾小俛曰式散鹿臺之財發鉅橋之粟紂所積之府倉皆散發以賑貧民大賚于四海而萬姓恱服施舍已責救乏賙無所謂周有大賚天下皆恱仁服徳王還至豐乃偃武修文載戢干戈載櫜弓矢戢聚櫜韜也音髙歸馬于華山之陽放牛于桃林之野示天下弗服示天下不復乗用興滅國繼絶世舉逸民垂拱而天下治徙都鎬戸老切封紂子武庚禄父於殷以守湯祀命王弟管叔霍叔蔡叔監之又封姬姓之國五十三通道于九夷八蠻西旅貢獒西方逺國貢犬犬髙四尺曰獒音敖太保召公作書戒王以愼終曰明王愼徳四夷咸賓皆賓服不役耳目百度惟貞言不以聲色自役則百度正玩人喪徳玩物喪志以人為戲弄則喪其徳以器物為戲弄則喪其志不作無益害有益功乃成不貴異物賤用物民乃足游觀為無益奇巧為異物言明王之道以徳義為益器用為貴所以化俗生民犬馬非其土性不畜非此土所生不畜以不習其用珍禽奇獸不育于國皆非所用有損害政不寳逺物則逺人格不侵奪其利則來服矣所寳惟賢則邇人安又曰為山九仞功虧一簣音匱八尺曰仞喻向成也未成一簣猶不為山是以聖人乾乾日昃愼終如始武王即位四年克商克商七年而崩壽九十三成王誦立成王年十三周公為冢宰攝行天子事管叔蔡叔霍叔乃流言於國曰公將不利於孺子遂奉武庚禄父淮夷作亂周公帥師東征居東二年罪人斯得殺武庚禄父及管叔囚蔡叔于郭鄰降霍叔于庶人滅淮夷三年而歸卜宅洛邑為王城使四方入貢道里均又作下都於瀍水東瀍澄延切命曰遷殷頑民教治之然天子猶往來常居鎬京曰宗周夏徳既衰戎狄内侵九州之地寖滅周公復唐虞之舊域斥大九州之境王畿之外分五服為侯甸男采衛蠻夷鎭蕃九畿周公攝政凡七年制禮作樂致太平乃復政成王而告老王曰公無困我哉留周公為太師與召公共輔王室周公作無逸以戒成王曰君子所其無逸君子之道所在念徳無有逸豫先知稼穡之艱難乃逸則知小人之依稼穡農夫之艱難事先知之乃謀逸豫則知小人之所依怙又作立政曰拜手稽首告嗣天子王矣言不可不愼宅乃事宅乃牧宅乃凖兹惟后矣宅居也居汝事謂六卿掌事者牧牧民之官謂九州之長凖平法者謂士官皆得其人則此惟后矣言立政在官人文王武王克知三有宅心灼見三有俊心文武能知擇人居此事牧凖三官之心又能灼然見俊徳之人可以任此三官者之心所以能立政灼明見左右攜僕百司庶府雖左右攜持器物之僕及百官有司主券契藏吏亦皆擇人文王惟克厥宅心乃克司牧人以克俊有徳文王惟其能居心務大略細守本遺末乃能司牧人用能俊有徳者文王罔攸兼于庶言庶獄庶愼惟有司之牧夫文王無所兼知於毁譽衆言及衆刑獄衆所當愼之事惟愼擇有司牧夫而已勞于求才逸於任賢是訓用違庶獄庶愼文王罔敢知于兹是萬民順法用違法衆獄衆愼之事文王一無敢自知於此委任賢能而已又作周官命太宰司徒宗伯司馬司寇司空六卿各帥其屬分掌天下之務成王即政三十年崩子康王釗立釗之遙切康王修文武成王之業四海治安成康之世刑措不用者四十餘年康王崩子昭王瑕立昭王時王道微缺昭王南征濟漢沈没不復周人諱之不赴告子穆王滿立穆王將征犬戎祭側介切公謀父曰先王耀徳不觀兵夫兵戢而時動動則威觀則玩玩則無震震懼也故先王有威讓之令有文告之辭布令陳辭而又不至則増修於徳而無勤民於逺王不聽得四白狼四白鹿以歸自是荒服者不至穆王肆其心肆極也周行天下將皆必有車轍馬跡焉祭公謀父作詩以止王心曰思我王度式如玉式如金金玉取其堅重形民之力而無醉飽之心言國之用民當隨其力任如金冶之器隨器而制形故言形民之力去其醉飽過盈之心王為之少息在位五十五年崩子共王繄扈立稽古録卷八欽定四庫全書稽古録卷九宋司馬光撰
