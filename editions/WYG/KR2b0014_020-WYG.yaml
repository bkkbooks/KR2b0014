body:
  text: 稽古錄卷二十宋司馬光撰慶厯元正月壬戌遣使十五路安撫昊范仲淹言乞留鄜延一路毋出兵以招元夏竦言如此則涇原兵難以獨出議未決二月元昊冦渭州任福大敗於好水川福及將佐死者甚衆己亥豫王昕薨置初令諸州募置宣毅軍合十餘萬人州七月壬戌萬勝軍二十指揮戊辰元昊圍麟府八月退陷寧逺寨又圍豐州乙未陷之殺知州王餘慶謀初令陜西行鐵錢未㡬并河東亦行之聞契丹入冦十月初治河北諸州城秦甲午罷陜西都總管經畧安撫招討使分緣邊為鳳涇原環慶鄜延四路命知秦渭慶延州者領之元十一月丙寅上祀圓丘大赦改二二月初令河北大修邊備乙未詔選河北强壮為義勇三月乙夘選河東鄉弓手為義勇敕陜西鄉弓手為保㨗凡一百八十五指揮月乙巳契丹遣其臣蕭特劉六符來求闗南地于四戊寅命賈昌等減省浮費庚辰遣富弼使契丹州五月戊午以大名府為北京知契丹大集兵于幽庚申置京東兩路安撫使命青鄆州者領之遺七月癸亥遣富弼再使契丹不與闗南地歲増所銀絹各十萬兩匹九月乙丑契丹遣其臣耶律仁先劉六符來致誓書修好如初辰閏月元昊冦鎮戎軍己夘葛懷敏將兵出禦之壬懷敏大敗於定州寨懷敏及諸將死者甚衆虜深入至潘原大掠而去十月詔將校戰死妻女無依者養之禁中三正月辛未鄂王曦薨尼癸巳鄜延奏元昊遣其臣賀從朂上書自稱男邦鼎國烏珠曩霄上父南朝皇帝請通和朝廷以其名分未正遣著作佐郎邵良佐與從朂俱至其國更議之五月丁夘朔日食戊寅詔轉運使皆領按察使歲具官吏能否以聞倫丁亥初置武學於武成王廟京東奏虎翼卒王等殺忻州巡檢使朱進為羣盜轉掠京東淮南州縣下七月甲戌初聴羣臣遭父母䘮不以文武品秩高並解官持服月閣門祗候傅永吉等追討王倫至和州斬之九丁夘上召知雜御史以上於天章閣問以禦戎之䇿帥十月戊戌光化軍宣毅軍校邵興等逐知軍韓綱衆亡趣興元築順徳軍水洛城官十一月丙寅上清宫火擒供奉陳曙等擊邵興於壻水之甲申四正月丙子南環州進士歐希範立蠻酋蒙趕為王攻陷本州及鎮寧州殺官吏三月乙亥詔諸州皆立學以錫慶院為太學尋罷之蠻五月丙戍元昊始遣使稱臣自號夏國王常寧鄧文志等冦桂陽監殺都監廵檢六月文志等詣潭州降舉丁未開寳寺塔災甲七月癸未契丹遣使來告以兵討元昊八月午保州雲翼軍士殺知州通判奉都監韋貴為主乗城拒守命田况招諭且發旁近兵討之甲寅城中兵皆出降况阬其難存者四百餘人萬朝廷許元昊稱夏國主歲賜銀絹茶綵合二十五五千元昊乃獻誓表十月庚寅賜詔荅之月契丹駙馬劉三嘏來奔甲午詔械送還之十一甲子監進奏院蘇舜欽等坐宴㑹除名館閣連坐者甚衆夏壬午上祀圓丘大赦原十二月乙未冊命元昊為國主更名曩霄築州細腰城五正月罷河東陜西招討使福詔選汰諸路羸弱兵京東西淮南兩浙荆湖建諸州宣毅過三百人者毋得更募黨三月廣南西路轉運使杜杞誘歐希範蒙趕及其六百餘人悉屠之十月辛酉升荘獻荘懿皇后附真宗廟大赦來以諸路按察使競為苛察罷之自真宗東封以不復出獵直集賢院李東之言講武不可廢庚午上始校獵于楊村十一月歐希範餘黨唐和等冦桂陽監殺禮賔副使胡元等徐州人孔直温謀反誅六三月辛巳朔日食十登州岠嵎山震十日不止一月廣南東路奏唐和冦英韶州七正月行慶厯編敕宅五月唐和等請降九月作廣親以處秦王子孫則十一月戊戌上祀圓丘大赦反是日貝州宣毅王執知州張得一殺官吏據城自稱東平王國號安陽改元得聖十二月壬寅詔發旁近兵討之庚戌以明鎬安撫河北八正月辛未夏主曩霄為其太子寧陵噶所弑國人殺寧陵噶立其弟諒祚貝丁丑以文彦博為河北宣撫使閏月辛丑彦博奏克州擒王則送京師誅之得親從顔秀等作亂夜殺軍校入禁中斫傷宫人捕誅之三月甲寅上幸龍圖天章閣問御史中丞以上以天下利病得失又御迎陽門召知制誥以下至臺諫官問之四月辛夘初置河北四路安撫使命知大名真定府􅌡定州者領之六月癸酉河決商胡乙未初令陜西以大銅錢一當常錢三小鐵錢三當常錢一七月并河東小鐵錢如陜西用之十月壬午以美人張氏為貴妃十二月乙丑朔詔改明年元芻糧者加給南鹽謂之四法丁日詔河北縁邊入是歲河北大水饑人相食流殍甚衆皇祐元正月甲午朔日食夏三月己未契丹遣使來告以再討國九月乙巳廣南西路奏廣源州蠻冦邕州皆十二月壬戍詔陜西保㨗年五十以上及短弱者聴還農是歲簡汰天下羸兵無慮八萬人二春男子冷青詐稱皇子伏誅未五月丙申罷國信三番使臣丁廣南西路奏交趾攻廣源州蠻酋儂智高悉九月辛亥上大饗明堂合祀天地祖宗並配從祀如圓丘大赦文武京朝官各遷一資戊閏月丁巳詔兩府兩制太常禮樂官共定大樂辰王舉正留班諌張堯佐恩命大重三二月己亥詔河北縁邊入芻糧者並給見錢於京師如景祐法三月儂智高請内屬弗受十七月辛酉河決舘陶郭固口月己夘朔詔解鹽聴通商四正月乙亥塞郭固河口二月又議開六塔河以分水勢知四月儂智高襲陷横山寨五月乙巳朔陷邕州殺州陳珙等自稱仁惠皇帝改元啓厯引兵沿江東下癸丑陷横州丙辰陷貴州庚申陷龔州辛酉陷藤梧封州壬戍陷康州癸亥陷端州丙寅攻廣州不克七月壬戌解圍西還攻賓州不克與廣南東路鈐轄張忠戰于白田忠敗死九月戊申襲殺廣南東路鈐轄蒋偕於太平塲又敗廣南西路鈐轄王正倫于館門驛遂陷昭州庚午命狄青將兵討智高丁丑智高陷賔州甲申復入邕州助十一月壬寅朔日食交趾李徳政請發兵二萬官軍討儂智高於十一月壬申朔智高敗廣南西路鈐轄陳曙金城驛壬辰王洙等獻新樂五正月丁未詔止交趾毋出兵狄己酉狄青至賔州斬陳曙丁巳㑹靈觀火戊午青與儂智高戰於歸仁鋪大破之智高棄邕州奔大理吳陜西轉運使范祥城占渭州青唐羌惡之攻破廣嶺堡圍啞兒峽寨命劉渙將兵擊破之殿甲子奉太祖太宗真宗御容於滁并澶三州神御閏月戊辰朔詔自今内侍黄門以上毋得過一百五十人一月己巳上祀圓丘大赦十月丙申朔日食為十以曹滑陳許鄭州輔郡奏開封府田税永減三分癸十二月丁酉廣南西路獲儂智高母及子弟丑詔内侍都知押班須年五十以上歴任無贓私罪乃得為之甲午至和元正月癸酉貴妃張氏薨丁丑追冊為温成皇后日三月庚辰改元觀四月甲午朔食辛丑祥源火二四月契丹主遣使以其畫像來獻求易御容以代相見篤兄弟之情智辛亥初罷諸鄉里正豫以貲産排鄉户衙前儂高死於大理六月乙巳誅其母及子弟下八月己丑契丹主宗真卒子洪基立辰州蠻酋溪州刺史彭仕羲之子師寳來奔荆湖北路轉運使李肅之等以為鄉導擊仕羲不克自是仕羲數入為冦十月癸丑詔本路發兵討之月李徳政卒十一月乙亥授其子日尊官爵十二戊子命殿中丞李仲昌開六塔渠導河入横隴故道嘉祐元正月甲寅朔上不豫甲子大赦子二月甲辰小瘳御延和殿四月壬朔李仲昌等塞商胡河北流使悉東入六塔是夕復決如故自是朝廷但治西堤以衞北京及契丹國信路不復治東堤大詔罷乾元節奏䕃恩例自餘亦省之分五月京城水折安上門闗壊官私府舍命兩府行諸門禦水江河皆溢河北水災尤甚上八月庚戌朔日食罷陜西小鐵錢九月辛夘恭謝天地于大慶殿大赦改元水癸夘詔作木岸以狹汴二二月龎籍上言西夏累歲侵耕屈野河西地請禁河東陜西與之和市從之五月庚辰夏國冦府州敗官軍於斷道橋求管勾麟府軍馬郭恩執走馬承差黄道元既而遣還官壬寅初令文武京朝官毋得自乞磨勘歲滿委審三班舉行八月丁巳詔自今登制科者毋得引舊例超擢月丁夘初以户絶田所收置廣惠倉以備窮乏九契丹復遣使以新主畫像來求易御容許之歲十月甲辰朔初頒厯令十二月戊申詔自今間一開舉塲初置明經科裁損進士高第人恩例三正月戊戌穿永通河於京城西羲八月己亥朔日食官軍討彭仕久不克遣使招諭之庚申荆湖北路奏仕羲歸所掠請降十一月己丑罷三司河渠司置都水監庚寅初令汴船毋得出外江四正月丙申朔日食錢丁酉詔以雪寒遣官賜京城貧民二月己巳詔開江淮茶禁聴民自賣通商收税罷十三山塲六𣙜務庚午廣南西路奏交趾冦欽州命官編校館門書籍以癸未詔陜西大銅鐵錢並當常錢之二上癸酉詔柴氏子為崇義公奉周祀十月癸酉祫饗太廟大赦用是歲初以諸坊監及諸軍牧馬所餘田賦貧民耕種五春韓䞇穿二股渠分河流入金赤河力四月丙戍詔均天下田税兵五月丁酉置寛恤民司六月邕州蠻引交趾入冦知唐州趙尚寛始勸民墾闢荒田諸路民多歸之武八月甲申初置陜西鹽馬司乙酉罷提㸃刑獄臣六五月丙戍賜諸路所敦遣行義之士顏復等出身庚戍詔禁契丹於界河内捕魚六月壬子朔日食衛九月丁丑城故豐州宗十月壬辰以太宗曽受孫右大將軍岳州圍練使實知宗正寺固辭不七正月乙亥詔以太祖定配圓丘大四月壬午行嘉子祐編敕八月丙子詔以右衞將軍宗實為皇復固辭不許辛丑始入宮去九月辛亥上大饗明堂祀昊天上帝以真宗配悉圓丘從祀大赦十月乙酉廣南西路奏火峒蠻儂宗旦等請内屬本乙未詔以錢一百萬緡賜諸路常平倉為糴八二月癸未上不豫三月辛未崩于福寧殿癸四月壬申皇子即皇帝位遺詔尊皇后為太皇后酉大赦文武京朝官各遷一資小乙亥上不豫己夘詔請太后權同聴政御内東門殿兩府奏事己亥立皇后高氏出五月戊辰上御延和殿七六月癸酉復以疾不甲戌廣太廟為八室月壬子上始御紫宸殿宗十月甲午葬仁于永昭陵英宗甲辰治平元年正月丁酉朔改元月辛酉以仁宗代真宗配明堂四甲午上始出幸寺觀祈雨五月戊申上始日御前後殿視事如故事睦親廣親宅敎授舊六員六月己亥増置講書教授凡二十一員農夏國冦抄屬羌十十一月乙亥詔刺陜西民為義勇無慮四萬人二三月乙巳行明天厯餘八月京城大水入宮殿壊公私屋溺死者千五百人十月己亥唃厮囉卒子董氊襲位女十二月壬申上祀圓丘大赦世甲申初聴娶宗室者除文官委主婚者訪問家不復使内侍省覆驗三正月癸酉契丹改稱大遼國事壬午臺諫官呂誨等坐論執政欲追尊濮王貶出者甚衆三月壬午彗見西方其本大如月遷九月壬子朔日食癸亥初令待制以上六歲一官至議諌止京朝四歲一遷至前行郎中止少卿監以七十為定員有缺則補其擢任及有功若特恩皆不用此法夏國冦太順城柔逺寨十月癸未遣西京左藏庫副使何次公齎詔責之夏主諒祚謝罪稱邊吏所為丁亥詔自今三年一開舉塲月命郭逵宣撫西邊皇十一月戊午上不豫十二壬寅立潁王頊為太子癸夘赦天下口是歲天下户一千二百九十餘萬二千九百餘萬四正月辛亥詔民間先私造寺觀及三十間者悉存之賜名夀聖丁巳上崩于福寧殿太子即皇帝位遺詔尊皇太后為太皇太后皇后為皇太后右臣於神宗皇帝時所進國朝百官公卿表大事記稽古錄卷二十
